body:
  text: 竹嶼山房雜部卷十五明宋詡撰尊生部三酒部珀香酒用糯米一斗淘浄將九升水浸於甕内將一升炊作飯候稍冷拌細麴粗末二兩以篘盛之深埋在所浸米中兩三日後飯浮起只撈出浮飯却蒸下九升米作飯候極冷拌細麴末十八兩以一升浮飯置甕厎須以九升米飯置上面以所浸米漿稱下十斤或八斤以紙四層封甕口春天半月熟冬天一月或通榨下用或只逼清者先飲後榨錯認水酒白糯米二石水酵二百斤足稱緑荳麴二十五斤足稱純白麫麴亦得又糯米飯三斗臨榨時用櫪柴灰六升其醅過熟三兩日上榨無妨醅不能汪去此猶不用石灰味極珍美或云不用灰更好櫪柴灰亦可救酒味每酸酒三四斗一甕可入炊菉豆一升不炊亦得經宿酸味皆退但味淡了當以好酒夾和用白酒糯米一斗淘浄浸一宿炊熟以水淋過傾出令冷相离見六七分乾用白酒母三兩舊麴力大只用二兩半研為末拌飯匀拍在綽口罁内四圍中央似井須看見厎仍以少麴末糝面上候漿來一盆方許下水四升水少則味濃三日方翻醅面五六日可篘若要第二酒再下水二升菊花酒九月菊花盛開時揀黄色味甘香者摘下曬乾每以瓶貯清酒一斗用菊花頭二兩絹袋盛懸於酒面上約離一指髙宻封瓶口經宿去花袋自然酒味有菊香如木香桂花梅花之類一切有香之花皆可依此法為之盖酒性與茶性同能逐諸香而變也陳祭酒浸酒方生地黄一斤熟地黄半斤當歸四兩荆芥半斤防風半斤甘草四兩甘菊花半斤香附米四兩黄連半斤紅􅀥四兩核桃四兩枸杞子四兩木香一兩沉香二錢右擣碎為細末浸酒服之造蓮花白酒法每以大米一斗官數為率晚飯時用水浸經一宿次早飯後漉米置籮中井水淋清去泔氣下甑炊熟復出飯在籮内再用井水淋極冷如飯性硬帶些水下罁搭平中心留漿潭每斗用藥六丸丸大則不必拘碾令極細撒拌飯内抄令十分匀却搭平作潭待一周時漿映再一周時漿方滿潭看漿老嫩下水每斗有三等第一等十斤第二等十二斤第三等十五斤若賣者二十斤亦下了下水時先下一半了用飯鍬鍬作四五塊翻轉再下一半畧將飯塊擺開不要盫了炊中冪之今晚下水來早飯後看老嫩便篘或糠火煨或甑蒸但隔屋聞酒香便住蒸時要毎瓶下木香一小片蒸後再過一周時便可飲定置不移動可留至半月造酒時或值天道炎熱用水一小瓶懸挂漿潭内去熱氣若用紅麴便是煨紅北酒方至妙每大米一石民斛用麴十斤一法每石臘月只用八斤亦可三九月則增一二斤其米用百滚湯一二提桶泡之待米漲乾却以十分酸泔約一桶浸米令透如泔少只添水没一拳為率若泔不酸入醋些少尤好浸三日漉起便取頭浸泔割面上清者於鍋内煎沸撇去沫仍放滲糠油大紙撚一根在内則湯不湧起却用炊飯倘泔少亦添水令滿鍋煎泔時要熟泔不熟酒不清初炊飯時先用慢火待飯將熟緊用火無妨便熟先取四五升攤冷先用麴三四斤擣碎第二扒糟三兩碗及炊飯温泔同拌和作酵頭如未曾造酒未有此糟則以清酒糟代用亦可將飯置罁中看天道寒熱夏天要十分冷春秋要㣲放熱冬畧熱些先浸泔既以割面上清者炊飯留餘者浸第二罁米其所餘者下面必有濃脚如薄糊又逼出面上稍清者浸米用却將此脚煎令極熟如初就豆腐一船待冷與上項酵及餘麴餘泔拌和飯中抄令匀然後下水毎斗約二十斤如今晚下水明日午間面上裂開酒作緊方通一扒待面薄俱可打下過四五日可喫絶不可下灰􅀈了頭酒却以糟仍入罁做副酒下水一大桶便上􅀈此酒只可添升合多不可獨用又法米一石官水十桶每桶約十八斤副酒一般水用二扒糟十斤為酵同時下泔并水餘法同前賽蒲萄酒麴裏米汁酒也皂衫兒曬乾磨碎去皮用約二斗許黒豆也白礬些少甜兒些少蜜也烏梅數箇右用砂鍋或銀器先將衫兒梅礬一處入熬色黑濾去渣方入甜兒和匀再和麴汁調停得所盛瓶中宻封一宿飲之與真者無異造臘酒法每米一斗先浸一升七日炊將餘九升淘浄每米一斗用水一十六斤浸次將炊熱飯鋪罁面上候熟飯浮起撈飯叧安方撈米炊熟次將浮飯拌舀每斗米用麴一斤就將原泔下酒每斗留浸過米一升骰音豆俱用熱飯若天氣冷只用畧熱飯菊花酒酒醅將熟時每罁取黄英一作单葉菊花去萼蒂甘者只取花英二斤擇浄前一日入醅内攪匀次早榨則味香美糟不可乆留便醖醋不妨但一切有香無毒之花倣此用之皆可收雜酒法如人家賀客擕酒味之美惡必不齊可共聚一罁澄清去渾將陳皮三兩許撒入罁内浸三日漉去再如前撒入如此三次自成美醖拗酸酒法若冬月造酒打扒遲而作酸即炒黑豆一二升石灰二升或三升量酒多少加減却將石灰叧研炒黄二件乘熱傾入罁内急將扒打轉過一二日榨則全美矣又法每酒一大瓶用赤小豆一升炒燋袋盛放酒中即解治酒不沸釀酒失冷三四日不發者即撥開飯中傾入熟酒醅三四碗須臾便發如無酒醅將好酒傾入一二升便有動意不爾則作甜長春酒法􅕺定甲子五月間賈秋壑以長春法酒一甕并方進於穆陵上欲供而輟者再李坦髙忠輔任閤長兼内轄奏云願先賜臣一盞候三五日藥力効驗方可進御李因是得罪於賈適七月十三日居民遺漏修丙司救撲官兵見火勢趨和寧門李於是令預撤民屋保䕶大内賈謂不遵朝廷節制嗾䑓臣上疏二李叩閽屢貶鬰林州除名勒停方用當歸川芎黄芪蜜炙白芍藥甘草炙五味子白朮人參橘紅熟地黄青皮肉桂去粗皮半夏㯽榔木瓜白茯苓􅒦砂薏苡仁炒藿香去梗麥蘖炒沉香桑白皮蜜炙石斛去根白豆䓻仁杜仲炒木香丁香草果仁神麴炒厚朴薑製炒南星蒼朮製枇杷葉去毛炙右件各製了浄秤三錢等分作二十包每用一包以生絹袋盛浸於一斗酒内春七日夏三日秋五日冬十日每日清晨一盃午一盃甚有功効除濕實脾去痰飲行滯氣滋血脉壯筋骨寛中快膈進飲食黄耆酒治風濕痺因酒而得宜以酒治身體頑麻筋脉攣恵手足不遂時覺不仁黄耆防風去蘆官桂天麻蓽撥石斛去根虎骨酥炙白芍藥當歸去蘆雲母粉白朮茵芋葉木香仙靈脾甘草炙續斷各一兩右件剉如麻豆大以生絹袋盛之好酒一斗浸春五日夏三日秋七日冬十日每服一盞温煖服不拘時候常令酒氣相續為佳神仙酒竒方専醫癱瘓四肢拳攣風濕感搏重者宜服之五加皮一兩并心剉去土紫金皮并骨剉當歸鬚六錢洗浄剉右件㕮咀用酒瓶浸三宿夏一宿更用好酒一瓶取酒一盞入末浸酒一盞每日兩盞煖服兩瓶酒盡時自有神效天門冬酒醇酒一斗六月六日麴末一升擣粗末好糯米五升作飯天門冬煎五升其煎但如稀􅄳即得米須淘訖曬乾取天門汁浸麴如常法候熟炊飯適寒温用煎和飯令相入投之夏七日勤看勿令熱春冬十日宻封閉之熟榨濾每服三合再欲造地黄枸杞五加皮葳㽔黄精白朮諸藥酒並凖此法秋夏飯須冷下春冬須稍温看時候方下之合須九月盡三月前又法取天門冬三十斤擣碎煑取汁依常法以作酒少少飲之滓作散服尤佳枸杞五加皮三骰酒骰音豆枸杞根五加根莖牛膝丹參忍冬枳殻枝華松節右件各切一大斗以水三大石於大釡中煑取六大斗去滓澄清水凖凡水數浸麴即用米五大斗炊飯熟訖取生地黄細切一斗擣如泥和下第二骰用米三斗炊飯取牛蒡根細切二斗擣如泥和飯下消訖第三骰用米二斗炊取大秋麻子一斗熬擣令極細和飯下之候消冷熱一依常法候酒味妙即去糟飲之如酒冷不發即更以少麴末骰之若味苦薄更炊二三斗米骰之若飯乾不發取諸藥等分量多少煎汁熱骰之候熟去糟量性飲之多少常令有酒氣老少男女皆可服亦無所忌已上三骰起麴候放冷入酒麴不用發只擣細拌令極匀熱如麻子狀入罁中用浸米泔拌手擘極碎不碎則易酸如欲用水多則添些小經二宿後一一翻三宿可榨或四五宿可以香更看香氣如何如天氣寒煖消詳之榨了再傾糟入罁内别用糯米一升碎者用二升以水三斤煑為粥拌前糟更釀一二宿可榨和前酒飲如欲煎過年則不可和若更用水拌糟浸作第二酒亦可醹醁酒方一名香一錯認水白麫一百斤菉豆三准升官桂半斤杏仁半斤去皮大麥糵川烏半斤甜瓜蒂半斤四兩亦得右件五味為末依前攪和拌匀先將好蓼子用罁浸五七日汁濃㚖為妙臨時取汁和麫豆藥末等乾濕得所入蓼子踏緊掌大切作二片用楮葉紙包繩縛兩塊相連搭挂屋下通風無日色處造酒每米一准斗用九兩或十兩醖造法米一石為率赤小豆用四十兩菉豆用六十兩先淘米六斗入甕内别淘米一斗炊作飯用籮兒盛安米甕中以新汲水過米面上三二寸許後三五日籮兒内飯浮漿酸取出籮兒傾浮飯入盆中不得帶出一粒生米恐作酸以麴六兩赤小豆四兩拌飯匀却將浸者六斗米炊飯令極冷將元漿四斗麴隨米照前數時候使菉豆三十六兩赤小豆二十四兩將飯麴拌匀不令有飯塊入甕撥開中心傾籮兒内拌了飯在甕中心平其面以物蓋覆次日便看之如大叚發即揩甕邊汗失揩即味澁攪令勻三日晩再用米三斗淘浸一宿次日早炊飯攤極冷入一盆中撥開甕内酒面取醅入飯同麴拌勻却傾入甕内再拌匀平面每日勤勤拭汗兩次攪冬月春秋二十日可熟雞鳴酒歌括云甘泉六碗米三升做粥温和麴半斤三兩􅄳稀三兩酵一抄麥蘖要調匀黄昏時候安排了來朝便飲甕頭春右先將糯米三升浄淘水六升同下鍋煑成稠粥夏攤冷春秋温冬㣲熱麴酵麥糵皆擣為細末同􅄳稀下在粥内拌匀冬五日春三日夏二日成熟為好酒矣又法就此料内加官桂胡椒良薑細辛甘草川烏泡川芎丁香已上各半錢碾為細末和粥時一同攪匀在内其味尤妙香美異常羊羔酒法用精羊肉五斤用炊簞裹了放甑厎蒸熟乾批作片子用好糯米酒浸一宿研濾三四次用川芎一兩為末入汁内攪匀潑在糯米脚糜内下脚用麴依常法治酸薄酒作好酒法官桂一兩白茯苓去皮一兩白檀五錢陳皮一兩白芷一兩􅒦砂一兩良薑一兩甘草五錢沉香少許右用生絹袋一箇盛前藥味在内用甜水五大升煑十沸將絹袋藥取出蜜六兩熬去蠟滓入前藥汁内滚二三沸又用好油四兩熬令香熟入前藥汁内再滚二三沸磁器盛之量酒多少入藥嚐之南畨煿酒法畨名阿里乞不拘酸甜淡薄一切味不正之酒裝八分一甏上斜放一空甏二口相對先於空甏邊穴一竅安以竹管作嘴下再安一空甏其口盛住上竹嘴子向二甏口邊以白磁碗碟片遮掩令宻或瓦片亦可以紙筋擣石灰厚封四指入新大罁内坐定以紙灰實滿灰内埋燒熟硬木炭火二三斤許下於甏邊令甏内酒沸其汗騰上空甏中就空甏中竹管内却溜下所盛空甏内其色甚好得此法臘煑等酒皆可燒煑酒法將窨下清酒裝瓶滿以箬葉如法封紥口緊鍋内湯止浸瓶甏三分之一其瓶甏不可著鍋厎以物閣起四邊頂口以物襯壓定勿令透氣發火時先於甏頭放隔宿浸過糯米一撮以米熟為度或只揭起所盖之物一起其瓶甏便乾即是候也速用水潑滅火然後起瓶甏離鍋火不減味必壊火過酒味汪餹火不足其味必酸矣盤露六月六踏伏麴止用一味潔淨水搜勻用碗脱下一塊一塊滿厚懸開一擔米用麴二十五斤米要上上白米蒸熟一斗米一斗水下罁待糟沉下酒澄清了再蒸一斗米下之再不用麴再待糟沉下酒澄清榨之即成酒矣惟用十月造餘月不可造東坡酒經一篇與前諸法參看可見古今釀道不甚相懸㑹而通之存乎人爾其辭云南方之氓以糯與秔雜以卉藥而為餅嗅之香嚼之辣揣之􅑎然而輕此餅之良者也吾始取麫而起肥之和之以薑液蒸之使十裂繩穿而風戾之愈乆而益悍此麴之精者也米五㪷以為率而五分之為三㪷者一為五升者四三㪷者以釀五升者以投三投而止尚有五升之贏也始釀以四兩之餅而每投之以二兩之麴皆澤以少水足以解散而勻停也釀者必甕按而井泓之三日而井溢此吾酒之萌也酒之始萌也甚烈而㣲苦盖三投而後平也凡餅烈而麴和投者必屢嘗而增損之以舌為權衡也既溢之三日乃投九日三投通十有五日而後定也既定乃注以㪷水凡水必熟而冷者凡釀與投必寒之而後下此炎州之令也既水五日乃篘得二㪷有半此吾酒之正也先篘半日取所為贏者為粥米一而水三之揉以麴餅凡四兩二物并也投之糟中熟撋而再釀之五日壓得㪷有半此吾酒之少勁者也勁正合為四㪷又五日而飲則和而力嚴而不猛也篘絶不旋踵而粥投之少留則糟枯中風而酒病也釀酒乆者酒醇而豐速者反是故吾酒三十日而成也竹嶼山房雜部卷十五
