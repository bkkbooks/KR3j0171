body:
  text: 竹嶼山房雜部卷九明宋詡撰樹畜部一樹類總法移木凡移種木時傷動木根則菑翳開根外故土須大上用約繩纒匝下用濶厚木板襯而扛舉之雖拱把皆生也詩皇矣注曰菑木立死者也翳自斃者也種木凡種木先開一坎比原木根土須寛以糞水調成濘泥乃立其根皆令舒直沾遍方實以乾壤又使糞水灌透則活根宜平其身不得太深深則不長不活又不可令風偃人扳之葢下生細根上長萌蘖細根新得水土而生意方回一動必損若今年欲移先於去年春前開斷木之四週謂之轉垜木大先三年每年輪開一方乃可移其果木種則宜踈每一丈二尺一株者方為適中惟八月至正月皆可種之時所種之地肥瘠不同惟雜以沙土最得春氣之先易於發生灌木凡灌木最不宜其發萌時灌之灌則遂為菑翳灌亦宜晩凉之候其糞及撏猪湯退雞鵞翎湯投以荔枝龍眼之核則翎腐皆不宜親木跗必生蛀至灌果木結實時灌之以助其長摘實後灌之以濟其乏臘前則通灌之以俟其來春發育糞必久宿者必雜以水亦視其宜乾宜濕不宜頻灌也如松檜之在盆者土氣淺薄必每年去根面故土一重而加以客沃土則宜土乾則灌自與在地生者不同接木陳瑩中曰色紅可使紫葉單可使千花小可使大子少可使繁黄庭堅曰雍也本犂子仲由元鄙人必視其時或將發生時或將黄落時在春分之前秋分之後是其候也接之必先舉手定凖執刀端直不至重傷則易成活木生至一二年者可接其接枝宜剪其已生果發及二年有旺氣者過脉乃善接法甚多不能殫述腰接木之盈把者近跗一尺或七八寸許間執細齒鋸截之為枮又用利刀裁枮使之光平則不沁水遂以枮之一傍裁開其皮㣲連其膜長約一小寸先取剪下之枝裁去兩傍亦僅一寸置口含之使熱連唾揷掩於所開枮傍皮膜之間人忌食飲腥酒先以紙封次以箬封通務以麻皮緊縛之每枮對接兩枝相同外取乾壤以箬載於所接之處少潤以水復不宜灌又以濶箬髙跨其接枝上不容日㬥之俟其成體而始宜開掲也根接木身小者連跗截去如前法裁開枮頭中央以木貼照前揷之縛之以土封之七頭接取一木枝及一木根各帶斜裁去使半以人唾兩相粘掩之用紙及麻皮緊縛埋根於土以瓦規定露枝於上灌使少潤雖遇晴隂皆以器覆稍宻俟成形體而方開也木液濃者其榦亦堪接寄枝先一年前移其相似之木種大木側既盛活於春分前後屈大木之枝與新種相方之木近其根跗間各裁去其皮與膜如接貼同紐合相定以過其氣仍用紙及麻皮封縛甚緊不令顛掲直俟次年八月候視膚理已平乃剪離大木之枝俟寄下者全活始宜移種有取種於盆盎中立架以就其大木惟欲深支勿使揺動則生也揷木視木之宜時用地開一寛穴斬木榦輕手揷入須深實以沃土灌以糞水或揷於芋魁蘿蔔中埋之葢榦之上苞發為體下苞行為根慎勿振揠烏入切以稿之也種子用木子於臘時先浸於宿糞穢中半月許取出於沃壤間播種比則脅之使直長則以時而出土移之子須帶肉者為良壓枝春間或秋間屈木枝以石壓之於地用土封之俟苞間生根遂移種也枝跗須斷其半焉脫木凡果木於八月間和牛羊之滓包其鶴膝處先㣲傷其膚使氣流行取紙麻皮緊縛之復以杖支之不令揺振從其開花結實至明年夏秋間啟視如根生滓間則斷其本植之於土宛然一故木也善木臘月間於木下側開坎寛深探攅心釘地之根斫斷止留四散生者仍以土覆之以糞水灌透則生子碩大也修木必自其秋冬枝葉零落時始宜修平攘剔大者斧鏟小者刀剪亦視其繁冗及散逸者可去裁痕向下不受雨漬自無食心之腐無顛頂者則取其直生向上一枝留其成長有枯朽皆宜摧拉須盡則不引蛀以妨盛枝欲木身之直者則從其不足處每年以刀劙音離其膚氣行則傷痕先滿而身漸能直也劙說文曰直破也綰木必視木之已長發萌未久而枝榦易於轉屈順其性而攀挽之也若枝大則用鉗碎而曲折之取麻皮約寛繩䌈音榻綰不宜太緊刺斷其膚氣脉不貫通亦不能活也䌈以索罥物也綰亦罥也通論凡移種接脫花木等最貴及時又不宜使凡草根荄古哀切雜長以分其肥沃奪其生意至於具腓也凡果木多生蠧蝎胡葛切蛣去吉切􅔒丘物切之類齧之必探其穴以杉木裁為針闗塞其氣則自亡又以焰硝硫黄合紙線絍穴口火然走其臭皆亡坋百部内穴中亦能殺蠧治魚腥水洒蔬果等􅋪蟲自消滅海魚勝池魚蟲能飛動者取江橘黐以膠焉啄本善啄蠧凡果木花卉最忌麝香熏觸則花葉遂皆枯厭宜多種葱薤則能解之凡接寄之木必用枝體相似與氣味相合者如桃與李梅與杏棃與棠橘與枸方可接也如木筆與木蘭繡逑與八仙檜與纓絡方可寄也牡丹與芍藥方可七頭接也凡伐木不宜亂伐惟視其性之易生者如桑如柳必伐而髠且用其肄是也斬而復生曰肄有在土之果木畏冷如橘畏熱如梨松宜乾檜宜濕各適其性而封䕶培植之有在盆之花卉畏冷如茉莉愛日如火榴喜水如菖蒲無失其宜有相害之物木揷桂而枯烏賊骨而斃有相益之物牡丹得鍾乳粉而茂海棠得糟水而花鮮宜識其由一云桂矴木上則茂矴木下則枯凡果實結一年至二年自必歇枝譬如人家有桃李三株俟其開花結實悉摘去十五株上者止留十五株成熟逮明年乃摘去今年成熟者留前年摘去者結實則本不傷而常年得其果實用也漢大夫曰李梅實多者來年為之衰凡花卉蔬果所産地土不同在北者則耐寒在南者則喜煖故種植之時亦各不同開花結實先後亦不同有在髙山者有在平地者有宜早者有宜晩者又有在北者移於南則盛在南者移於北則變如果木之類在淮南為橘淮北為枳而蔬菜之屬在北為蔓菁有根在南則為菁菜惟葉龍眼荔枝之類生於南方閩粤南粤榛松之類盛于北方胡遼梅李之實食於初春南詔皆不能越其地土而長茂學稼圃者又如柳子厚云順木之天以致其性而後壽且孶音字也斯得乎種植之法矣種木果法漢書食貨志曰果蓏應劭曰木實曰果草實曰蓏音裸種松細葉毎五鬛為一葉或有兩鬛七鬛者膚形片解有如鱗次春用子種之材宜為器為門子細丼香堪食春後収採松黄為餅餌需冬半則毎鬛葉中生丼露凝若小珠食甚丼美其脂為香埤雅曰松命根遇石則偃天目松即松種産於天目山巖罅間得雨露所潤而生非由土而滋養其松針麤短甚堅荿久亦止數寸自含古意罅虚訝切宜種入盆翫之可以常溉亦復畏濕羅松松身葉甚柔春月宜種娑音梭羅葉長大子如栗子種之苞體漸為大木詩行葦注曰苞甲而未拆也體成形也長葉羅漢松柏短葉羅漢松種佳皆柏身子種之苞體漸為木歳久亦材大檜體香同柏葉細短而或銳刺爾雅曰柏葉松身子種之大材甚堅宜為舟纓絡形體皆檜條弱倒垂如線風動裊娜裊奴鳥切娜奴可切宜寄枝用檜體有子亦可種為木桐大葉疎榦子若胡桃埤雅曰岡桐臘月種子榨油為黏舟飾器之材甚多其木材中為琴瑟一種矮身止長四五尺生子三年即斃用子再種梓竦身大葉即檟埤雅曰梓為木王琴瑟材也種於林則令諸木皆内拱之斷其根瘞於土能遂長條枚取以分種漆長葉身短朝鮮國有黄漆樹似棕六月取汁漆物如金臘月種取液以飾器物失取其液液滿則菑翳惟取於霜降後者為良樊重欲作器先種漆樹人嗤之後皆得用向之笑者咸求假焉貲至鉅萬柟木最長大爾雅疏曰木理細緻放豫樟子赤者材堅子白者材脆年深向陽結成旋紋者為鬬柏楠臘月種材宜為居室亦宜於為舟及家具楸似梓長大釋名云楸梧早脫故謂楸美木也爾雅云大而皵楸小而皵榎皵音昔榎音檟臘月種材可為器物理有雲朶紋温杉葉細刺杉葉麤爾雅曰柀杉身皆竦直一種桱木似杉而破柀碑詭切材理不腐可為居室為器用芒種時遇雨只斬其肄以揷之楓格物論曰樹似白楊其脂為白膠香易長根側分其小木種之櫧小葉似茶木色似柟少黒結實小狀似栗捄蝟自裹味有丼苦材最堅白蟻不能齧而房之利為居室實丼苦皆可食可種樟體甚香葉似楊陳藏器云縣名豫章因木為名相如賦注豫章二木生至七年乃可分别材可為居室器物易長根側分小木種之老則出火自焚種不宜近家室柏體香葉細埤雅曰世云柏之指西猶磁之指南也蓊烏孔切柏葉宻又名側柏材最利於造舟歳久不能磷力忍切敝苓堪為合香者所需宜以子種檫葉小而岐材善為舟楫根側取小木種之青楊膚青白楊膚白材善雕刻伐其木則根能再發條肄移而種之諺云一株死有百株楊長葉黄楊種佳短葉黄楊材理細緻宜鏇器物子可種難長東坡云只有黄楊厄閏年赤楊即水楊材同楊臘月宜斬小條為栵音例而揷之於河壖而縁切根深耐水藉以䕶堤詩皇矣注曰栵行生者也呉茱萸葉有紋惠民要術云種井上葉落井中飲此水者無温病春月分小木種之子可種梧桐枝竦而疎葉大而岐膚青而細爾雅曰櫬桐材中琴瑟有子小堪食可種莊子以子為桐乳榆葉細膚内長而外脫種多皮細者佳字說榆瀋滑故謂俞瀋充甚切倒垂榆枝柔材堅可為家具子可種大葉柳似楊長葉柳枝弱有線倒垂柳長線麴塵旖旎又曰官柳旖於蟻切旎女綺切材同於楊臘月斬大榦燔下焦而深揷之稊音題則歳可以髠而復條肄也諺云根要焦埋到腰陶朱公云可髠以足柴槐葉細色青緑結子角如荳春秋說曰槐者虚星之精倒垂槐枝脆爾雅注曰槐冇數種葉大而黒者名櫰槐葉晝日聶合合而夜炕布者名為守宫櫰槐石回反材堅宜為器倒垂宜接用植槐體其芽可芼其子可種其花蕋和石灰蒸之可以供染埤雅曰弱槐初生不能自立即於槐下種麻脅槐令長既植移而蒔之亭亭若一檀葉似槐詩曰坎坎伐檀兮注曰檀可為車者材最堅臘月分根側小木種之椐榆枌屬材理甚細可為居室為家具宜斬大榦揷之椿葉長而疎格物論曰椿與樗相似然樗木疎而氣臭椿木實而葉香身大而榦端直有壽根側分小木種之弱芽可蒸為茹亦可生食棟細葉踈榦圖經曰棟實即金鈴子也材可為器不裂取其子聨栵而宻種之長則駢部田切結如垣墻然其本芒種時始種則毎本有成紫花者為佳種也收子浸臘水貯甕中至夏月滌器蠅永不近取其子晒乾雜冬舂米内不生蛀能殺百蟲黄棟春月種弱芽宜燖焙堪食居家必用以黄楝芽為木蓼椶櫚木膚為椶一節生一匝葉從頂起甚堅靱而散頭杈枒周出如張葢子生於葉底漢書曰并閭春月取子種任其椶自纒匝俟木大方裁脫之遂發而長且大若裁之早形雖長而不復大矣木盛時止宜春分裁其六葉秋分裁其六葉其子未透而苞者名木魚肥穉堪葅畏雞糞經之則朽椶與木材皆利於用東坡云贈我木魚三百尾桑荆公夏詩云繰成白雪桑重緑春間斷其枝瘞於地生條至臘月移種之平其根剪去俟次年離跗四五寸剪去至後年又離舊痕四五寸剪去始成木采葉以飼蠶自後毎歳蠶老時皆剪髠其榦令遂發條肄生葉採飼再蠶常鋤其園使熟壅則惟以欝棲莊子注云欝棲糞壤也不宜於灌糞方俗云灌糞喜長根不長枝葉也種宜葉大而厚者良其膚堪為紙材其黮堪食亦堪種柘多叢生榦竦而直葉豐而厚春月種子亦可種葉宜蠶其葉隔年不採者春再生必毒蠶採不盡者夏月宜擊脫須盡冬青葉光潤經霜雪亦不凋脫木理細而堅重本草曰女貞謝𤣥暉詩云風動萬年枝徽宗試畫院諸生以萬年枝上太平雀為題無中程者或宻扣中貴曰萬年枝冬青樹也水冬青葉細利于養蠟子子可種堪入酒至長盛時五月養以蠟子七月収蠟不宜盡採留迨來年四月又得生子取養蠟晒乾以越布䝉於甑口置蠟布上置器甑中釡内水沸蠟遂鎔下入器凝則堅白而為燭材其滓盛之以絹嚢復投於熱油中則蠟盡油遂可為燭凡養蠟子經三年停亦三年巴蜀擷其子漬淅米水中十餘日搗去膚種之蠟生則近跗伐去發肄再養蠟養一年停一年採蠟必伐木無老榦桕緑葉似杏經秋發頳色可愛木無直榦本草曰烏桕頳音蟶子可種亦可接接於本體其子外白膜蒸鎔之凝為燭材其子内肉杵榨之為清油可然燈飾器又用其材也水槿細葉小黄花又名水椐臘月斬其條而揷之易成大木材可為器宜養蠟子以取蠟木槿詩曰舜爾雅注云齊魯之間謂之王蒸紅花曰朱槿白花黄花重葉花四季花臘月斬取小條為栵而揷之可以編為樊籬肥皂子形短而肥色紫皂角子形長如刀色黒木有長刺名天丁豬牙皂角子形小如猪牙色黒香皂子形圓小而香色白四木形葉不相似惟子氣味同子可種材可為器子可洗油膩甚益粉黛栩音許即柞櫟木身長大伐則灌生而葉大爾雅曰其實梂釋曰捄盛實之房也其實橡也子可種其斗為染皂材其葉大用以苴物樸榆類即白駁木大而膚麤皵子可種惟葉沙可磨滑牙角器材脆不堪大用白皂葉似楊子可種其材中鏤刻海桐葉滑潤圓長取子為栵種之可為藩障可接楊梅楮葉大而岐漏膚中有液能粘一名榖子可種惟膚為造紙材榕柳宗元詩云榕葉滿庭鶯亂啼鳥銜其子寄生他木初如葛藟縁之根鬚㳂木自垂得土氣則過所寄卷曲臭惡不可為材然多清樾桂葉豐厚凌冬不凋枝條甚繁木無直體又曰木犀以其材理有花如犀角也丹色黄色白色古詞云狀元紅是黄為榜眼白探花郎早花晩花四季花結子種種宜髙阜不宜灌以糞穢花時堪移屈其條壓土中能自生根得取種之子可種不如壓者亦宜以冬青體接花甚香逺多所須於食物材亦中為器青松鬛葉似松針則麤短而翠能守歳寒膚青内長而外遂浮脫之諺云栝子松結一房數十葉一葉捄一子子外有殻有皮仁甚丼香滇南種子色黒遼種子色黄滇音顛冬月種髙阜處不堪修伐大枝修後必出脂液流盡遂為枯翳小枝修時隨然烙鐵通紅烙之更以人糞調濘泥塗之能禦其脂液春間用沃壤篩潔細取其子種於小盆盎中以大器蓄水隔離之停貯於内杜蟻不能進齧其根愛乾雖常灌使之㣲潤則止矣成形體漸以移種榛灌生大葉其實捄實外有殻有皮仁丼美宜北地南方間有之子可種荔枝子殻紅鮮肉甚甘美蔡襄譜有紅鹽白晒之法宜閩粤南粤楊誠齋三山生荔枝詩云甘露落來雞子大曉風凍作水精團龍眼一曰荔奴子殻圓色青黄肉甚丼美宜閩粤南粤橄欖形似生訶子無稜瓣青可食味初酸澀後丼香王元之詩云良久有回味始覺丼如飴烏欖仁大而丼香緑欖宜閩粤南粤人面果肉丼酸核如人面其仁甚丼香美宜南粤椰子大如瓠皮若椶皮肉有殻殻内有肉肉内有漿肉漿可食殻可為器有大小材宜南粤按椰子漿自然作酒氣食之亦㣲醉名為椰酒梅實青酢黄丼花甚香種有鶴頂梅實大而紅消梅實青可啖雖酢甚鬆脆無滓白花重者小單者大冠城梅花白實甚大五月熟時梅花白實大五月六月皆有早梅花白實四月熟冬梅花白實小十用用不能熟緑萼梅花白萼緑實大五月熟紅梅花紅重葉二種或結並蒂小實不堪啖方子通詩云紫府與丹來換骨春風吹酒上凝脂韓无咎詩云錯認天桃有暗香玉蝶梅春分前秋分後可接接用桃杏體及其本體杏花粉紅實熟紅丼名之著者沙杏油杏文杏金杏小杏梅杏一名交和子埤雅曰梅至北方多變而成杏晩杏春分前秋分後接於本體及梅桃體化書曰梅接杏而本强者其實丼桃家語孔子曰果屬有六而桃為下種多名之著者金桃實皮肉色如金上有朱㸃味甚香丼實大時用油紙䕶之銀桃實色白丼王母桃實圓大丼襄陽桃實圓大丼半斤桃實圓大丼鷹嘴桃實大香丼瑞香桃木矮不宜澆糞其實香丼綿桃實丼匾桃實丼宜油紙䕶墨桃實皮黒而肉如胭脂丼亦有匾者早桃實丼五月可用晩桃實丼八月十二月皆有杏桃實丼無毛亦有匾者有曰油桃緋桃千葉鮮紅花不結實暫結雙實不堪用碧桃千葉白花不結實單葉者有實孩兒桃亦曰芙蓉桃千葉肉紅花不結實瑪瑙桃千葉紅白相間花不結實春分前秋分後接接於本體畏水十年後則脂凝而木枯以刀直劙其膚而流去之又延生有十年盛也化書曰李接桃而本强者其實丼玉桃實似櫻桃而大肉紅色熟丼宜燕薊李李肇國史補云李直方嘗第果實多如貢土者以緑李為首今美者曰嘉慶子種多名之著者御黄李實熟肥丼金沙李實熟丼蜜李實熟丼青脆李實青丼脆白李實熟甚丼緑李實丼脆紫李實熟丼早李實熟丼晩李實熟丼根側分其小木種之亦宜春分前秋分後接接於本體桃杏體壅便猪糞埤雅云性頗難老老雖棘枮子亦不細枝頭乾實如李乾熟於樹宜大名南樂桬棠果如李而無核宜肇慶櫻桃一名含桃子肥丼也深紅子早熟深紫子早熟淺紅子遲熟曰蠟桃枝榦節目間有根鬚常下垂春前帶枝揷之子將肥時得糞氣則易丼熟月令仲夏天子羞以含桃先薦寢廟柰北方曰火剌賔實甚丼一統志云紅黄白三種陳子良云大長者柰圓者林檎剌膚逹切秋分後接接用林檎體及本體林檎花似鐵梗海棠子半熟丼有漿又名來禽俗名花紅一種多紅者曰海紅秋分後接接用棠梨體與本體春間一草稕之閏切懸於枝端復支昻其條使長而下俯生子繁盛最易生蠧秋前皆善藏於木杪剖之可得過時則避入根跗間矣子將肥時得糞氣則熟遲久頻婆似林檎而大南粤一種形如肥皂其核亦可煮食梵書以色之鮮紅者為頻婆接用林檎與棠梨體楸子熟丼酸似柰而小宜陜西慶陽府及各衛所同林檎擣其汁熬之以為果單榅桲木如林檎花白緑色其實類樝但膚慢而多毛味酸丼宜闗陜枇杷實味丼有漿古名盧橘按司馬相如上林賦盧橘與枇杷並列又郭璞注云蜀中有盧橘通歳食之非一種也韻府云盧橘皮厚大小如柑九月結實正赤明年二月更青黒不接者壽接者結實核少接於本體宜水淋淡草灰以壅於根側糞穢非其所便優曇鉢似枇杷無花而實宜肇慶羊桃其實五瓣色青黄肉丼酸非萇楚之曰羊桃也萇丈羊切宜閩粤餘丼子又名菴摩勒狀如川練子初食味苦澀少頃甚丼陳剛中使安南集云盧都子餘丼子皆珍味可食宜南粤馬金囊實似松子而殻薄肉皆細條而盤結食之甚香丼津溢齒頰又曰馬㯽榔宜金齒波羅蜜實大如斗剖之若蜜其香滿室子練悉如冬𤓰核可煮食能飽人宜瓊州安南楊梅實熟甚丼紫色楊誠齋詩云玉肌半醉生紅粟墨暈㣲深染紫裳白色晩楊州曰聖僧春分前接接用海桐及本體壅便水淋淡草灰黄彈似枇杷無核丼宜閩粤梨花白實丼香有漿埤雅曰百損一益朱子曰梨名快果安南有菴羅果似北梨四五月間熟多食無害一種柤梨味酢澁故張敷曰柤何比梨種之著者香梨青消梨瓶梨綿梨鵞梨紫梨水梨金花梨黄梨紅梨雪梨寒梨春分前接接用桑體過時則桑液濃融浮其貼而不能固矣亦宜棠梨體摘去繁實實大顆用油紙䕶之則皮薄而不踳駁實時旱喜恒灌水棗實熟甚丼太平廣記曰木蜜􅀥子也哈烈有巴且杏似􅀥而甜又名忽鹿麻種多名之著者瓢􅀥即壺􅀥甜􅀥梭􅀥雞心􅀥細核􅀥長􅀥又曰三寸􅀥圓􅀥大􅀥小􅀥五熟龍􅀥枝榦卷曲如攀束然結實不堪食種宜髙阜不接者夀根側分小木種之詩曰八月剥棗􅏄俗作柿非實熟甚丼格物論曰柿朱果也種多名之著者海門其蒂經乆雨即脱用油紙䕶體重大立竹木以支之銅盆方蒂匾花火珠圓珠牛妳歩帶杵頭盖􅏄有盖如盤皆朱色綠􅏄耐乆藏閒居賦云梁侯烏椑之􅏄脆􅏄生而不澀可啖皆緑色春分前接接於本體白露時􅏄生繁而摘下者碎擣毎升水半升釀四五時柹液為造雨盖材實時雨多從跗至尺許以膚間横裁斷之不脱橘花葉枝榦皆香種多名之著者沙橘九月採實至春可食肉甚丼逺藏可經盛夏皮亦可用形大衢橘實皮薄香肉丼早黄實皮薄香肉丼蜜橘實小皮薄而細者佳麤者又一種形甚匾肉皆少核丼甚小橘實皮薄囊小肉丼穿橘實皮薄心穿透露至頂肉丼塘南橘實名猪肝者肉丼名鱓血者肉次匾橘實形大皮細青時遂可啖丼緑橘實皮厚肉丼耐乆藏金橘實一種形如小彈丸皮香甚丼肉酸一種形如大蓮菂體長圓不一圓者皮香丼肉酸長者皮香丼肉亦丼皆少核花遲熟旱三月後四月前接接宜枸橘體畏乾生實時常以水灌之則肥便猪糞易生蠧蠧化蝴蝶蝴蝶胎子還育於木為孩蟲時得探去盡不接者夀帷難繼佳種也至冬下積秔稻穰壅之上織秔稻草包䕶之以死䑕浸糞中發肥瘞于橘根則生實繁盛釋書云如橘得䑕柑花葉枝榦皆香廣東有宜母子状類柑橘味酸種多名之著者香柑實形小而圓囊甚丼皮甚香甜柑實形甚麤大皮丼於囊乾柑實皮細囊少漿味丼耐藏至夏蜜曇柑實比乾柑有漿一種形小甚香脱花甜柑實皮細青遂可啖囊最丼牛乳柑實形長如牛乳皮丼囊酸波斯柑實皮麤囊㣲苦能耐乆藏佛手柑狀両手作和南禮有狀一手問訊禮無囊用皮青柑實皮細囊酸惟青可啖廣柑實大皮辛囊酸酒柑形長皮苦囊酸得酒丼香同種接橘法李衡種柑曰有千頭木奴及成嵗得輸絹數千疋金荳實形如荳皮辛香大核肉甚酸同種接橘法香櫞實有名枳皮甚香其囊酸三月以核種之甲折漸為木柚實皮香可食囊甚酸朱文公柚花詩云春融百卉茂素榮敷緑枝三月以核種甲拆漸為木亦宜同種接橘法列子云食其皮汁已憤厥之疾橙實囊酸皮可用果木志橙似橘而非似柚而香韓子謂之瓌橙三月核種遂苞體之亦宜同種接橘法自橘以下畏寒枸橘實皮囊皆無用二月取核索於穰綯間開泥溝種之成長時為栵而齊每年裁髠其頭枝葉從根生而比宻且多棘針甚能屏障散種者可接柑橘栗其實捄冇刺如蝟實有殻有皮肉丼有大小埤雅云北方之栗也二月種子亦可接於本體子種其在捄中而方匾者他日生子豐滿胡桃實有肉核有仁仁有皮去肉用仁丼香博物志張騫使外國還始得種十月種子宜大石重壓其根使實生子不脱落安石榴實有百数子成捄紅子甚明潤白子名水晶榴皆丼美酉陽雜爼曰丹若陸機與弟書云張騫為漢使外國十八年得塗林安石榴紅花結子丼黄花肉紅花四季花並蒂花白花芒種時取小枝挿之宜深能灌生亦可分小木種宜伐盡留一榦則茂暑月烈日中亦宜淖音閙以水糞又喜旱喜肥以石置於枝間則宜結實視其花苞底尖者不實惟可摘而簮戴其實以油紙䕶之雖經霜日不能開裂詩皇矣注曰灌叢生者也火榴宜入盆翫五六月間置烈日中以水日浸日晒間以糞穢淖之則花恒開不絶畏寒芒種以小條挿俟活遷入盆子酸細不堪食可種餅子榴黄花紅花王禹偁詩云誰家巧婦殘針線一拶生紅熨不開拶子葛切白花肉紅花樓子花芒種揷其條宜肥澆法同火榴銀杏實外有肉内有皮殻仁去肉用仁又名鴨脚木大二月種子亦可接於本體大則随其榦多寡各裁枮以貼接之其材制為家具雖久燥不裂不結實從木跗開小穴補以結實木遂結也榧實有肉殻皮仁用仁東坡云玉山果本草云去三蟲木大甚材為器甚滑二月種子木蜜實紫黒色形似珊瑚屈曲成叢又多枳枸朱子謂俗言癩漢指頭是也曲禮曰婦人之摯椇榛埤雅以椇即木蜜也椇俱禹切春前分小木種之種不宜近酒室使酒味薄材為盛酒器遂敗酒作枕卧醉者易醒木𤓰實似桃而大味酸澀老穉有所須埤雅曰剪紙作花粘實得日露之氣乃紅其文如生一種香色黄本草云生壓汁和𤣥參丼松末作濕香秋分後根側分取小木種之喜陰喜肥埤雅曰楙木𤓰百益一損楙音茂無花果根側分取小木種之郁李灌生子如櫻桃丼若李爾雅疏云常棣一名棣春月分小木種之羊棗實如小􅏄今人謂之羊矢􅀥春月取子種之蒲萄張騫遺種劉禹錫詩云繁葩組綬結圓實珠璣蹙紫實水精實皆有圓有長甚丼有漿二三月之間斬其藤挿於芋頭或於萊菔頭中種之造髙架以承受其藤葉一日以冷茶灌間兩日復以水灌一度茶二度水又宜灌以肥肉汁同於灌茶生子逼側亦為酒材宜根接八檐仁味丼仁似杏子仁而丼香宜回回田地必思答味丼仁似榧仁而色赤酸丼有香宜回回田地君遷子有汁如乳汁味丼平吳都賦云平仲君遷皆木也南粤呼為牛妳子宜南粤大藥有大如斗者味極丼美宜滇南鎭康州鮮子大如􅀥味酸宜滇南鎮康州朱蕉黄蕉水蕉牙蕉皆花色葉似芭蕉而微小花如蓮而繁宻日放一瓣放後即㽔而結子㽔儒誰切品類甚多畏寒至冬以柔穰宻䕶不令著霜雪氷凍有故體則能開花結子名蕉黄春間勾萌時分種之出閩粤者佳灣甸州志開花結實味丼可食一統志名蕉黄韓文荔子丹兮蕉黄霏雪録云焦黄如􅏄味極香美勝𤓰椒爾雅曰檓大椒檓欣詭切取帶目未開子雜乾壤同入罌中宻封口倒置垂堂下有南日之地每日須令晒之至二月開種皆生臘月移熬其子油甚香美能宜食物茶本草云茗苦茶二月間凡一坑下子數粒俟長耘種之每株離三四尺為行惟以水灌不便於糞三年遂可採造之矣按茶不可移植移必不茂世俗婚聘用茶葢取一定不移之義云茶䔲葉如茶而長大五六寸食之有橄㰖餘丼之味本草曰臯蘆是也宜南粤荷蓮藕皆丼美有漿葉用鹽㸃其蒂晒乾亦堪用爾雅云荷芙蕖其莖茄其葉蕸其本蔤其華菡蓞其實蓮其根藕其中菂菂中薏黄荷紅荷白荷碧荷富荷四面荷並蒂荷皆以香名之有藕又有蓮者有蓮而藕小者有花重多而無蓮藕亦小者立夏前宜淺池種之先放池水令竭畚以種稻腴土築使平實以卧其藕逺去四五尺為一本覆以濘泥而後以水沒焉須立露其萌勿著沈下隨形體漸以水加之也宜糞秋冬視水旱漸取其藕疎而易大種於缸器中翫者則壅以酒糟皮角等末屑甚畏婦人入水經之遂作􅖖於為切腐喜雨王荆公詩云新荷挾雨驕墨娥小録云用蓮實裝於雞子空殻中紙糊其口與雞母伏候雞兒出日取出以天門冬為末和肥泥安盆中將蓮實磨穿一頭種之勿令水乾自然生葉開花如錢菱實殻澀内肉丼有漿酉陽雜爼曰武陵記四角三角曰芰兩角曰菱種有紅色青色長圓大小早晩宜淺水清明時置水中養取長萌者用蘆竹􅋦之挿肥水土中上露顛體遂依蘆竹識其本可以著糞仇池筆記菱花背日開故菱寒芡實又名雞頭一名水硫黄無刺殻不苦澀肉味香丼柔膩有刺殻苦澀肉味次宜淺水中留帶膜者五月種之凡摘時須認記結實之日如已七日可摘過八日則遂堅老矣仇池筆記芡花向日開故芡暖蓮心子角柔肉丼香浙人又名茶菱宜淺水五月種之俟其結子成連根葉收取晒乾擊落其子若種則留其帶角者鸚歌舌范石湖虞衡志云即紅鹽草果之珍者宜桂林地栗子丼有漿即荸薺四月時先種於濕土間令已成形體五月盡以腐草壅水田種蒔之必理其根平覆於淺泥上行宜甚疎壅便狗糞恒蓄以水至九月開土中視其子色已紅則樵去其莖以養其子氷霜後可鋤得甚丼嫩老者𢷬其汁堪為片粉再種曰蒔丼蔗長短不齊長者五六尺短者三四尺狀似竹有節無枝實中直理葉似荻聚頂上膚粘干肉味甚甘有漿因横出故曰庻生子虚賦曰諸柘本草云赤色名崑崙蔗容齋五筆載蔗有四色本草云廣州一種數年生如大竹長丈餘廣記云交阯蔗圍數寸長丈餘世說扶風蔗一丈三節見日即消見風即枯三月沃土横種之節間生苗去其繁者至七月取土封壅其根加之以糞穢遂成長而可收矣雖常灌水不宜久蓄俾水勢流滿濕潤則已今飲食所須甚廣杵濾其漿水煎之為赤砂餹易以一法煎之為白砂餹又易以一法煎之為餹霜也竹嶼山房雜部卷九
