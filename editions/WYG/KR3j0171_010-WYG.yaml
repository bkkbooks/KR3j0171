body:
  text: 竹嶼山房雜部卷十明宋詡撰樹畜部二種花卉法山茶葉似木樨而豐厚經冬不少脱寶珠蘇子瞻詩云葉厚有稜犀甲健花深少態鶴頭丹楊妃花肉紅色開早四季花宜寄枝寄用本體黄花香宜寄枝寄用茶體若山茶體花仍為紅色白花宜寄枝同黄花一種玉茗如山茶而色白黄心緑萼磬口花鬯口花宜子種茶梅花萼如山茶而小凌冬不彫宜寄枝寄用山茶體繡毬花大葉皴體屈折一花五瓣百花成叢一叢如毬其毬滿樹紅花白花宜寄枝寄用八仙花體玉蘭按木蘭翠葉紫房今玉蘭花白而香如蓮亦有黄者相傳即為木蘭火理府志木蓮花樹髙大葉如枇杷花如蓮有青黄紅白四種形與玉蘭相似今疑即其黄白花者耳宜寄枝寄用木筆體花香似蘭故名陸龜蒙詩不知元是此花身木筆灌生花紫白深淺二種即辛夷且泉賦曰新荑宜根側分小本種之宜斬小條揷之玉蘂花周必大云條蔓如荼䕷冬凋春茂柘葉紫莖花苞初甚㣲經月漸大暮春方八出鬚如垂絲上綴金粟花心後有碧筩状類膽瓶其中别抽一英出衆鬚上散為十餘蘂猶刻玉然花名玉蘂曽端伯以為瑒花李衛公以為瓊花黄山谷以為山礬皆非也王建詩云一樹玲瓏玉刻成楊巨源詩云蘂珠公主玉花香此與玉蘂花傳神也一統志瓊花下曰一名玉蘂花今以八仙比之似非必大之論今無州土山礬花白江南取以供染故曰山礬宜根側分小木種又宜以小條揷必存其故土七里香碎白花又曰九里香壓其枝俟生根分種之葉能染黄八仙花體葉似繡毬白花八朶為叢横分出之形似瓊花然瓊花不結子瓣厚而香八仙花結子瓣薄而不香雲南一種鄧花亦八蕋有五色宜分種其小本體可寄繡毬瓊花種絶後人以此代之銀毬花白似球形小葉似桑宜脱木法海棠賈耽著百花譜以海棠為花中神仙無香惟大足縣産者有香垂絲梅聖俞詩云胭脂色欲滴紫蠟蒂何長宜寄枝用櫻桃體西府東坡詩云朱脣得酒暈生臉翠袖卷紗紅映肉林深霧暗曉光遲日煖風輕春睡足臘月開其根外為小溝只長條本可以移種亦可以枝揷不花則裁其已花之木為釙内於根跗間則花也四季花即鐵梗又曰祝家桃花同西府柎㣲堅宜根側分小本種貼梗灌生無大木紅花宜根側分小本種黄海棠海棠譜洪适有詩棠梨花似海棠色白子白者曰棠赤者曰杜根側分小本種子亦種遂苞體體可接梨又可接林檎頻婆材細中於鏤刻八寶妝葉如椿白花結子青紅碧緑如寳石之錯雜然春月種紫薇花花碎色紅開甚乆格物論曰俗名怕癢花今名百日紅春月根側分小本種之金松垂條如弱栁結子如碧珠三年子乃一熟毎嵗生者相續一年新舊生熟皆綴於條上璀錯相間璀七罪切出台州紫荆花大葉花繁碎紫色灌生春月根側分小本種之刺桐花小葉身有刺今又曰海榴紅花枝榦堅大成木歳寒集曰晴烘鶴頂丹白花條柔以春月分其根側小本種之紫槐似槐榦弱而花紫即守宫槐春月從其根側分小本種檉葉甚細條花粉紅枝弱下垂風中裊娜又名西河栁春前斬其榦挿之牡丹花甚肥大多葉髙簇者曰樓子埤雅曰世謂牡丹為花王周濂溪曰牡丹花之富貴者也花葉单者曰山丹花品甚衆歐陽文忠公及本朝周府皆有譜記之祥而種植灌溉之法不同盖余家松江薄音博下隰之處土中常有潴音猪水多灌則土冷淖而寒生意根更蝕朽初分者天乆晴燥間十日灌一次至立冬灌一次臘月終灌一次纔得春意遂挾春驕復不宜灌怯春風䕶著花豐秋分通起出於土面視根盛析而種之或劚竹足切芍藥剪牡丹枝兩裁為七頭接之至來秋騐其本體生根裁去芍藥即真也花過速剪去則花牀無傷霏雪録云張茂卿嘗接牡丹於椿樹之杪花開時延賓客推樓翫焉衣羅花長葉有紋如羅花粉紅一名間竹桃花畏寒壅便雞糞澆撏猪退雞鵝等湯宜脱木法宜根側分小本種剪羅花花甚紅畏寒澆法同衣羅出南粤佛桑花葉似桑而小黄花紅花蘇東坡詩云熖熖燒空紅佛桑白花紫花淡紅花畏寒澆法同衣羅出南粤茉莉葉如茶而大江奎詩曰他年我若修花史列作人間第一仙白花甚香重葉白花甚香澆法同衣羅出南粤墨娥小録云在盆者立冬時必入房内遮風常置有日之處至立夏乃出外去上面舊土一層再加新土培之不宜太肥至長葉而後澆肥也黄氏日抄云以米漿日溉之則花可耐一夏六月六日以治魚腥水一溉益佳菊梅條似梅花似菊一名仙梅一名鐵柱梅澆法同衣羅杜鵑花廣記南方多躑躅花照耀如火即今杜鵑花本草言羊躑躅花黄似鹿葱躑丈隻切躅馳禄切鮮紅花東坡詩云披香殿上紅氍毹氍巨俱切毹山于切粉紅花皆重葉而小性喜陰澆宜天雨水井水畏煙油映山紅全類杜鵑肉紅花白花淺深數種花皆单葉春時從根側分小本種梔子葉圓長有紋一名越桃子虚賦曰鮮支杜工部詩曰紅取風霜實青看雨露柯單花生子重花子少而少四季花皆白色五月芒種時穿腐木板為穴塗以汚泥剪其枝分板穴中浮水面候根生破其板為宻栵而種之可以樊圃有每枝以沃壤一團揷而置之鬆畦内常灌水候生根移種之亦宜芒種時其子為染黄材貨殖傳云梔茜千石亦比千乘之家茜此見切蠟梅灌生葉長而沙涪翁花詩云色染薔薇露體熏山麝臍磬口花宜子種芒種時檀香花狗蠅花宜從根側分小本種棣棠灌生葉有紋如麻冀越集曰黄花開土旺時春季則棣棠夏季則黄葵秋季則菊冬季則蠟梅余觀棣棠遇季月即開今亦有白花者花時從根側分小本種之輔以屏架金絲灌生葉長花黄多鬚春半秋半宜從根側分小本種金梅灌生短葉花黄似梅春時芒種時從根側分小本種錦帶灌生花粉紅若桃王元之名曰海仙春月根側分小本種荼䕷灌生作酴醿酒山谷詩云露濕何郎試湯餅日烘荀令炷爐香東坡詩云分無素手簪螺髻且折霜㽔浸玉醅白色花鵝黄色花春月分根側小本種以屏架輔之刺䕷灌生細葉多刺紅花重葉状如玫瑰而大無香春時分根側小本種含笑花形葉似梔子霏雪録云花若苖蓞未開時故名紫花白花楊廷秀詩云大笑何如小笑香紫花不似白花妝不知自笑相笑笑殺人來惱斷腸春月移種月季灌生小葉紅花白花春前剪其枝深揷於肥土中俟生根移種之輔以屏架花謝結子即摘去花開恒不絶玫瑰花灌生多刺細葉黄色花紅色花唐詩云蕋粘宫額粉花勝醉仙妝白色花皆香堪入酒入茶入蜜春時從根側分小本種輔以屏架繡停針灌生小葉似郁李俗名馬鞭花粉紅花白花皆重葉春雨時分根側小本種瑞香葉光潤有黄邊者枝頭甚繁體榦柔靭黄花紫花楊萬里詩云紫苴翻了白花枝白花二色花一體有紅白又有数本樓子花單頭花串子花皆有香帶花枝揷於背日處或於初秋時揷於水稻側俟生根移種之丁香花白葉如瑞香春月分根側小本種之結香枝葉如瑞香而大花淡黄無所奇惟枝柔可以束結毬物之形春月分根側小本種之鬢邉嬌灌生紫花又名栁穿魚春月分根側小本種之芙蓉灌生花葉俱大一名拒霜唐太宗詩云遊鸎無定曲驚鳬有亂行轉觀花紅白相間次第開謝深淺敷榮紅花肉紅花黄花白花四面花七月遂開十月花謝後則髠其條斬成尺許之段卧置向南日墻下覆以乾壤候來春見節目間勾萌有體則為坎深揷於中皮柔靭連條風戾之至春漚於池以糾便索徽纒甚能勝水嵗可髠用也金鳯花灌生細葉黄花俗名金雀晏殊詩云九苞顔色春霞萃丹穴威儀秀氣殫春雨時根側分小本種花堪芼食珍珠珮灌生白重花如繡停針而小有單花而細張舜民詩云千璣萬琲照庭除春時分根側小本種天竹葉小脱而耐冬開碎白花結紅子成叢冷茶或退雞鵝翎水澆春時每株分移之子亦可種秋後裁髠其榦留孤根俟春遂長條肄而結子則身低矮其子蕃衍虎刺葉潤而細枝間有刺子紅養生雜纂云壽庭木也子可種喜陰退雞鵝翎水并臘糞澆之培䕶年乆層層葉綠如葢結子若綴火齊然葉下紅一榦数枝横出緑葉結子於葉底經嵗常紅新舊相續澆同虎刺法雪裏紅葉細柔結子至冬始紅澆同虎刺法木香灌生條長有刺花香甚清逺黄花紅花白細朶花紫心者佳白中朶花白大朶花宜臘月斬其條揷之立屏架以為輔金沙花灌生條長有刺紅色㣲香王介甫詩云海棠開後數金沙高架層層吐絳葩咫尺西城無力到不知誰賞魏家花宜冬盡斬其條揷之輔以屏架寶相花灌生似金沙花亦紅色差大宜冬盡斬其條揷之輔以屏架佛見笑似金沙肉紅花大朶一種花小而開遲曰玉堂春宜冬盡斬其條挿之輔以屏架十姊妺似金沙花數朶成叢肉紅花色即錦被花霏雪錄曰錦團兒宜冬盡斬其條揷之輔以屏架薔薇灌生有刺本草以花單葉白者結子為營實花單白者香黄花大朶花紅花紫花肉紅花白花香皆有重葉而厚疊者宜冬盡斬其條揷之輔以屏架素馨灌生即那悉茗花生王素馨冡故名黄花細小香而醖藉莖葉緑肥而稍堅白花細小香而醖藉葉青而㣲柔春雨時分根側小本種宜撏猪湯退雞鵝翎湯澆立屏架以輔之迎春細葉柔條花黄小又名金鎻玉連環花二瓣一紅一白自相勾挽春前從根側分小本種以屏輔之或取其枝壓地中節目間即生根可移錦䦨干葉長條柔小黄花又名金釵同迎春種法潑雪藤一葉一花甚繁而白朶若梨花經春至夏春雨時取枝條壓土中生根移種之輔以屏架辟麝香春月從根側分小本種於園庭中能祛麝氣芍藥苞生花似牡丹埤雅曰芍藥為花相品類甚衆劉攽王觀皆有譜今不重叙秋分時分其苞根種者交春即花春分時分者次年方花澆如牡丹喜肥向陽畏陰濕詩下泉註曰苞草叢生也蘭苞生一莖一花清香石門山有春蘭秋蘭鳯尾蘭素蘭石蘭竹蘭又福建有建蘭花時種之喜陰宜皮屑浸水澆壅便雞糞楚詞余既滋蘭之九畹又樹蕙之百畆山谷云蘭似君子蕙似士大夫大槩山林中十蕙而一蘭懸蘭束以銅絲懸於梁簷間不著以土惟宜取冷茶清潠蘇因切之自生自花箬蘭濶葉紫花無香春雨時種之喜陰蕙苞生香同蘭一莖數花春花秋花四季花種同蘭法萱苞生一名鹿葱一名宜男傅𤣥賦曰令草宜男花也春花秋花秋花冬花有紅黄重葉單葉麝香花二色花甚香淺黄者又曰金萱白者又曰銀萱雨中分勾萌種之其穉芽花跗皆可食芽跗春宜夏秋不宜潁濵詩曰呀然黄鵠嘴芭蕉苞生葉甚長大漢書曰巴且草畏寒冬以柔穰苴之䕶其霜雪能開花花倒俯花瓣中積水如蜜名丼露侵晨取食發時分其勾萌為種根堪作脯水仙苞生根有囊花清香山谷詩云水沈為骨玉為肌金盞銀臺花重葉花六月時其根囊自出土上通鋤起曬六七日收至九月浸糞中亦如日曬數取瓦規沃壤用露芽向上苞種之則花繁宻而葉短少寶葢花苞生花紅下􅂷結細子春間宜分其苞根種之金蓮花苞生開花結子霏雪錄云似蓮而小色黄如金六七月開春間宜分其苞根種之長春菊苞生又名倭菊花黄子落即苞體遂花花後即結子花恒不絶剪金羅花黄色剪黄羅花紅色剪春羅花丹色剪秋羅花紫色皆苞生三月分其苞根種之或春以其子稀播於絶細濕糞壤中遂勾萌也紫河車本草曰蚤休黄紫花蕋赤色上有金線垂下俗呼重樓金線春時從根側分其子種之石菊苞生又名瞿麥紅花肉紅花紫花白花芒種雨中分根葉種之洛陽花花似石菊而色嬌艷苞生紅花肉紅花紫花深紫花白花春雨中分根葉種之百合長四五尺葉小而花大一名摩羅麝香花色㣲黄冇香珍珠花色紅有黒㸃莖葉中有紫珠根有囊可剖春取其囊甲分種之囊可蒸食渥丹本草曰中庭花亦百合也古名山丹花小於百合紅花楊廷秀詩云楝紅一色名羅袖金粉羣蟲集寶簪白花根有囊種同百合玉簪花苞生大葉花香白色又名白萼涪翁詩云玉簪墜地無人拾化作東南第一花紫萼有葉青白名間道花紫色黄萼花黄色春雨時分其勾萌種之鶯花莖長四五尺花甚大嬌好本草曰罌粟又曰米囊花花色數十品紅白紫淺深重葉單葉之異八月種子以墨緇之有雜以菜子熟屑皆能制蟻不銜子可食壅以糞壤肥則有重葉滿園春似鶯花而小即虞美人花色數種紅白深淺重葉單葉之異治沃壤臨八月種其子以糞水澆之肥有重葉菊色青肥盛長有五六尺本草云一種莖紫氣香而味丼葉可作羮食者為真一種青莖而大作蒿苦氣味苦不堪食花類百餘種劉蒙范至能史正志皆有譜不能盡品第其花之色後有好事者又喜用其巧意而一種易二三名呼之季秋時月得翫此花亦為美景非必為𨼆逸花也濂溪謂陶之愛亦寓言耳菊本苞生清明時每莖分析預以猪糞更番為沃土取瓦規之而種雖怯水亦常喜陰又須三五日澆以糞水長約八九寸則斷其中頭留二三頭令齊長揷楥為眷切為倚俟至秋又長枝蕋必摘去其繁衍每枝帶花一朶不過八朶九朶則花大而茂耐久觀翫擊瓦礫覆其土不使浸㸃葉上葉從根跗而青宻也秋牡丹苞生花而小形如牡丹色紅苞體時雨中分而種之秋海棠葉大俗名斷腸草花状海棠惟四瓣亦嬌美二三月取子種於背日巖谷之間喜陰有毒蜀葵葉㣲大爾雅曰戎葵花深紅淺紅紫白色數種皆有重葉單葉秋間花後只宜種子凌冬不凋春雨時移澆之肥則多重葉錦葵葉大而肥厚花小爾雅曰荍曰蚍衃註曰今荆葵也荍音翹蚍音毘衃音浮深紅色花淺紅色花皆單葉種同蜀葵黄葵葉如芙蓉花色正黄而大二月以子播種夜落錢葉長綠純紅花石懋詩云春來買㫁深紅色燒得人心似火然肉紅花種同黄葵鳯仙花葉長莖肥花嬌北人名海衲花一種川鳯仙花開早花色紅紫肉紅白㸃紅數種重葉單葉之異二月以子播種搗花葉同礬可以餙指甲作絳色莖亦可以為葅露水菊長葉又名滴滴金花似黄菊即旋覆之重葉花也乘露重滴入土自生生而遂花觀音菊芭生花藍色如盖頭有心如人春間分其勾萌種之紫栁苞生葉緑如藜花細紫而長穗又名水紅花春月分其勾萌種之三春栁苞生花細紅而穗長春雨時分其勾萌種之雞冠花葉長莖肥長有止長一尺許者蘇子由謂為矮雞冠紫紅花肉紅色白色有匾潤者有鋭長者二月以子播種之金蟹花苞生翠葉黄花又名金蠅春時播其子或雨中分其勾萌種之蛺蝶白花青花即烏扇紅花皆苞生春雨時分其勾萌種之凉繖紫花肉紅花黄花白花數長朶為叢横開如張盖皆苞生春雨時分其根種之金燈花苞生根名石蒜花紅數朶為一叢横開如張盖李商𨼆詩云蘭膏􅅡處心猶淺銀燭燒殘焰不馨野生秋深蕊挺出土中葉至花盡乃發移植宜春雨後山慈菰花淺紫春雨時種根有囊皮中有綿綿内有肉堪食觀音芋花大一瓣如蓮有心如人坐者春雨時分其根種之補錦衲形葉似莧而長詩曰卭有㫖鷊爾雅曰虉注曰小草雜色如綬又有深紅間淺紅曰老少妍者曰秋紅者鷊音逆二月以子播種北蜀葵葉肥又名山芥菜即地黄花紫紅二月分其根葉種之野黄花花萼如錦葵黄色二月以子播種辟雪花生小白花初春分其根葉種之深紅蓼條花爾雅曰紅蘢古淺紅蓼皆花紅蘇東坡詩云卧雨幽花無限思抱叢寒蝶不勝情二月以子播種二至花苞生花小紫白色夏至花開至冬至止日至巳時則舒故又名巳至花春勾萌時分種之水金蓮葉滑而肥小黄花春盡分其根莖種淺水中根亦可蒸為茹凌霄花大紅黄色詩曰苕又名紫葳苕音條春間分根側小本種緣於他木酉陽雜爼曰花中露水損人目枸杞小葉紅子春間分根側小本種縁於他木其枝最多曲折子可為金髓煎有截短莖束把為畦種之漸刈其頭芼以為茹紫藤白樂天詩云藤花紫䝉苴藤葉青扶疎黄藤亦花色春月時分根側小本種之緣於堅木方能耐纒花可蒸為茹西番蓮小岐葉花㣲緑色春雨時種立屏架纍之以枝卧地則節節有根生用而分移挂棚紅子紅色挂棚金子黄色又名毛藤春月時分根側小本種緣於他木霜後結圓子纍纍若珠纒枝牡丹莖葉俱柔花色粉紅即米祥根重葉花花又名皷子花鄭谷詩曰落日風吹皷子春雨時分其勾萌立屏以纍之黒牽牛子黒花碧秦少游詩云仙衣染得天邉碧乞與人間向曉看白牽牛子白春以子播種結楥與扶向晨則花鮮見日則㽔錦荔枝莖葉皆柔即苦爪長短二種有土𤓰結子如肥棗熟紅多漿丼酸春月時以子播種立屏架以纍之結𤓰色青緣老熟紅黄皮肉磥砢磥力罪切砢力可切斑斑如錦生時可麤熟而淹以為葅詩曰蒸在栗薪萬歳藤即天門冬杜子美詩曰天棘春時取其勾萌分種立屏與纍之蘿葉週宻真如檜栢揷楥亦宜文公朱先生詩云髙蘿引蔓長揷楥垂碧絲薜荔纍木者木薜荔纍石者石薜荔名木蓮者子可食有大葉細葉皆小白花味香春雨時分其根葉種之藤蔓交錯根鬚繁宻纍衣墻壁間凌冬不凋秋間紅葉帖帖有如畫景栁栁州曰宻雨斜侵薜荔墻石菖蒲有虎鬚者冇旋如錢者一名昌陽楚辭曰蓀芒種時種於拳石間石須上水者為良根宜蓄水而葉不宜近水以木板刻穴架置寛水甕中停陰所葉則向上而立居室内亦見明而向當更移轉置之怯熟手炙怯酒氣腥味見日霜雪煙火皆㽔喜雨露遂挾而驕夜息至天明葉端有綴珠宜作綿捲小杖挹去則無黄葉杪愛滌根若留以泥土則肥而麤須恒易去水滓取清者續以新水養之乆則細短油然葱蒨音茜水用天雨惟嚴冬經凍根浮􅖖腐即去水藏於無風寒宻室中常墐其戸遇天日煖少用水澆珊瑚子小草枝柯不長葉大而疎子肥而紅陵寒不凋喜陰春時雨天移種鳯尾草小草色青葉紋喜陰春時雨天移種長生草即金釵石斛開小白花甚馨根荄間纒以人髪鐵絲絡之懸風日中自生翠雲草小草喜陰春雨時分其勾萌種於幽厓深谷之間發細葉柔莖重重碎蹙儼若翠鈿金絲苻葉有毛絲紅銀絲苻葉絲白喜陰春雨時移種水葱葉圓青潤直生又名一丈青喜陰春雨時移種於濘泥中蓄水養之萬年松寸許如松亦有如檜肥大而佳蜀有五色琅玕樹儼若珊瑚有枝無葉冬宜乾收夏宜水養拳石之間喜陰頭陀草即麥門冬有葉無莖結子青碧若琴瑟之珠雨取根葉分種而葆之向陰則葉色常青吉祥草綠葉柔莖世云花開則有赦結小紅子雨過分根葉種於陰厓處色常青蘭草有葉無莖似麥門冬稍麤紫子雨中分其葆種於陰厓處色常青漢書草叢生曰葆香草小葉柔莖結細子出丹陽八月種四月刈以湯燖之以稻穰覆五七日曬乾甚香能匹零陵香景天小草色青肥嫩即慎火草宜陰植之無火灾雨中分其葆而種植之藍大青難生少刈小青易生多刈二月以子播種用灰糞覆肥至五六月則刈其葉餘跗二三寸取葉水浸缸中停晝夜去葉存水每缸計礦灰八兩或九兩以把器擊撞翻之澄青去水下積者即靛也以為染青材其根跗間復灌之以糞水俟葉盛時再刈取靛一年可刈五次七次子陳久者播之則刈次多每畆計子二斗紅藍緑葉有刺長四五尺即紅花八九月播種其子五月侵早採花㣲擣之以囊盛入河水洗去黄汁取青蒿覆一宿成薄餅晒乾為染絳材擣其子煎挹膏為蔬笋家所須茜葉似棗葉而頭尖下濶三五對生節間蔓生一名菇藘一名茅蒐茹音如藘音閭蒐音搜齊人作畦種蒔採根以染絳自齊西之地尤多檾音綗大葉三月以子播種六月刈取其皮堪為繩索需苧大葉二月種五月刈取其皮以績凡越布之潔白者皆此洴音屏澼音霹而為之也七月再刈九月又刈其穉頭堪芼和米粉為餅餌績者以首苧柔末苧脆惟二苧能冶為細布綿花長四五尺葉青花黄結鈴有綿亦白花有白紫藍之色立夏前用水潤其子染以草灰播於犂鋤旱地之間為溝宜深既甲拆有體當芒種時須經三番鋤過則茂其冗者皆令鋤茠音薅去之惟一尺近一株為得中秋前又通摘去其散頭則開花繁結子多八月收鈴穰紡織以為布其子亦可榨油為黏舟材南粤有攀枝花木亦曰木綿花開甚爛漫其穰止可實卧褥萬年青苞生葉甚緑厚四時雨中分其根葉種之喜陰余觀花卉曽端伯取為十友張祠部圖為十客者皆欲寄一時之趣向耳今余此法非有幻胡瓣切世絶藝能變易花色惟樹藝及時灌溉適宜而種種色相聚於一所争芳鬭妍自有天然生意存焉不惟可窺造化生育之妙而亦以為養生衣食之需如周子庭前青草不除雖無幾多竒花異卉於目前各寓自家一箇意思也觀物者其必泥迹哉種竹蘆等法猫竹體甚大色青有節枝葉生節間葉尖長青筠可愛凡竹之生隨筍而長大一去籜即見穉葉遂無俗思作器用材甚廣筍可食潭筍沙筍皆此竹也台竹體大作器用材甚廣筍可食斑竹體大博物志云舜崩娥皇女英二妃淚下染竹成斑作器用材小大皆宜筀古惠切皮厚竹作器用材筍可食猫筋竹皮靭作器用材篾竹用材甚廣水筋竹皮靭厚作器用材黄孤竹皮靭厚作器多用材石淡竹節疎作器用材居多大箕竹竿長皮薄材宜為器筍宜食碧玉間黄金竹色青每節間一道黄色作器用材筍遲晩宜食黄金間碧玉竹色黄每節間一道色青材脆不堪作器筍可食紫竹初年色青二年色改紫黒作器用材大小皆宜筍味蘝方竹體方葉長而宻材不大無用於器宜蒸土種之充玩燕竹春社時燕來即有筍故名有紫白籜二種材脆薄無用於器筍皆可食慈孝竹夏筍出於竹内冬筍出於竹外有夏凊冬温之情故陸璣草木疏曰慈竹又曰孝竹述異記漢章帝三年子母竹生白虎殿前時謂之孝竹宻種為籬能絶人行迹用大缸先實以土幾半取石墊平又實土種之經十餘年後其根縱横貫結錯綜子宋切盈缸鋸解為臺面其紋可愛已上竹如種木法自八月至正月皆堪移移須記南枝不改其向則易茂有以五月十三日為竹醉日可移竹然難過暑月移則帶其故土殆數人舉之者易生也諺曰十人種竹一年成林一人種竹十年成林此之謂也箭竹節長三尺堅靭春雨時移種觀音竹形細小春雨時移種庭除間以供清翫椶竹形状椶櫚大者徑寸長者過一丈許即漢賜孔光靈夀杖也又曰桃竹出南粤畏寒怯春風芒種時從根側分析之或一竿或二三竿須根盛者種盆盎中置陰所則葉青柔可翫鳯尾竹形甚小葉甚細長丈許每春未筍前伐去計二三竿為一本分種之出筍則細幾尺者入盆中可供翫東坡竹形細小葉如大竹長者三四尺儼有長竿秀麗之態同鳯尾種法宜入盆供翫箬竹形細小葉甚長大雨中移種近河壖能防岸不虧葉材可為舟簟等禦雨之具造茶所尤珍寶之凡竹壅便人糞不便猪糞有祖竹生花者已不筍矣則斫之灌溉以人糞或盡斫之重以其苞根種或薙之壅以稻稈下泥皆能致茂挑劖鋤銜切去筍時遂以腐草覆盖又灌以糞則竹不能衰畏水又畏大旱凡沿入别地則開深溝斷禦或溝中卧之以芝麻稈盖竹所忌也瘞以死猫則能引根過鄰墻釋書云如竹見猫晋戴凱之有竹譜已備竹之名狀性質此但記所植之竹有此數等耳大㮣種法亦不異於此也劉寛夫􅜩竹詩云有清風澡慮之效無皦日明姦之機檀欒風生韻合宫徵黄山谷種竹詩云程嬰杵臼立孤難伯夷叔齊食薇瘦􅜩古火切徴陟里切蘆色青老則黄爾雅曰葭其萌為虇又名葦埤雅切曰葭葦之未秀者也今名蘆葭古遐切虇丘逺春半勾萌時取之種於淺水河壖有收其花絮沾於濕土中遂苞體之也材用甚廣其筍堪食詩云方苞方體維葉泥泥蘇東坡詩云蘆筍生時栁絮飛荻色青老則黄雅爾曰菼似葦而小實中埤雅曰菼薕之未秀者也今名荻菼他敢切有一種名􅀢莣􅀢居滑切莣岡方切者荻之類種於土墻足可䕶墻種於河壖可䕶岸又名苫墻二月至三月皆可種霜後則樵樵後遂以河泥覆壅之至來春又盛發也蒲色青老則黄以花沾於泥土中四月自生水旱皆宜經旱則細經水則肥皆刈為簍器之材刈不逼跗恐傷其本五月刈一番七月又刈一番也花可以實褥蒻黄皆可食入泥深處白者呼蒲白即蒻花上黄粉即黄菅賈顔切似蒲而細色青老則黄四月種水旱皆宜老則刈之堪為簍器繩索芒屩居勺切之材左傳曰雖有絲麻無葉菅蒯然又有鬼箭蘱草皆菅之屬種蒔以時樵刈為用亦能生廣乎財利也一種黄草捆屨尚之亦治為越布蒯古怪切蘱閭遂切蓑爾雅曰夫須詩曰臺四月種宜淺水老則刈為徽纒襏音八襫音式之材襏襫雨衣蓑襞蓆草色青葉圓長體輕柔本草曰龍鬚草九月間鋤起擇去老根去苗稍分種如揷稻法壅則河泥糞穢芒種後則不宜壅惟與草灰若便壅則生蟲退色今姑蘇蓆其材織之燈草色青老則黄圓長有心甚輕白三月間即分其種至九月移種之與蓆草同小暑樵曬之最宜腴田其心材非止用於燈火而陶埴家用亦廣也其膚殻宜為襏襫箄等材杞栁葉如栁條長五六尺去膚形似木而色白實中二月間用糞壅田水耕平之取柳鬚斷為三寸許條分種頻以濃糞壅有草茠去田勿令水竭八月刈以為篋笥杯棬丘圓切等品之材掃去敗葉不蚛音仲欲細者則宜宻種取糞滯膏壅則能不蚛榦凡木竹之類出於他國者見家規漢書曰山居千章之楸安邑千樹棗燕秦千樹栗蜀漢江陵千樹橘淮北榮南河濟之間千畆荻陳夏千畝漆齊魯千畝桑麻渭川千畝竹其人皆與千戸侯等竹嶼山房雜部卷十
