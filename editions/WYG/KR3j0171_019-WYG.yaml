body:
  text: 竹嶼山房雜部卷十九明宋詡撰尊生部七香頭部糰子香頭以沙餹一斤大蒜三瓤大者每囊切三片帶根葱白七莖生薑七片麝香如豆大一粒右件先放沙罐底下次放沙餹在上先用花篛次用油紙緊封入重湯内煎一周時取起藏之臨用旋取經嵗不壊凡生熟餹糕并裹蒸等内皆用此香頭合香頭麝香五分生薑一塊如手大好沙餹半斤右先將生薑逐牙劈開洗去泥眼乾擣絞其汁却將麝香於乳鉢内乳能令十分碎細逐旋入薑汁又乳令膠和方入沙餹乳令相入停勻盛瓦礶内用厚紙及油紙封口愈厚愈好飯上蒸過經年不壊但用食品内合用香料者入些少在内其香味藴藉不可言也􅼨料部􅼨料用官桂良薑白芷檀香杏仁藿香細辛甘草倍多用之須是大鍋中多煑則味逈佳麤􅼨料用甘草最多白芷桂枝良薑四味細􅼨料用桂心檀香藿香細辛甘松花椒􅒦砂紅荳杏仁甘草白葱桂枝良薑滉油芝蔴炒熟令擂碎入湯内煑數沸殻沈於湯底油浮於湯面銅杓撇起碗内澄去水脚與車坊頭醡者無異其味無偽反為勝之蓋人家止有斗升不可入醡則依此甚便大料物法官桂良薑蓽撥草荳䓻陳皮􅒦砂仁八角茴香各一兩川椒二兩杏仁五兩甘草一兩半白檀香半兩共為末用如帶出路以水浸蒸餅丸如彈子大用時旋以湯化開素食中物料法蒔蘿茴香川椒胡椒乾薑泡甘草馬芹杏仁各等分加榧子肉一倍共為末水浸蒸餅為丸如彈子大用時湯化開省力物料法馬芹胡椒茴香乾薑泡官桂花椒各等分為末滴水為丸如彈子大每用調和撚破即入鍋内出外尤便一了百當甜醬一斤半臘糟一斤麻油七兩鹽十兩川椒馬芹茴香胡椒杏仁良薑官桂等分為末先以油就鍋内熬香將料末同糟醬炒熟入器收貯遇修饌隨意挑用料足味全甚便行厨糟部紅糟糯米一斗水浸經宿紅麴四升為細末先將糯米蒸飯用麴末乾擣成􅀈入盆内用好酒二盞作母拌勻後發過即成糟矣入瓶收之又法用紅麴末麴末各四兩先以糯米五升炊飯候冷與麴一處拌勻入甕以好酒半升澆之夏二七日冬三七日熟更入鹽花四兩取貴不酸素餡部素饅頭餡熟銀杏栗子油煠荳腐麩菠菜白菜煠熟笋乾煑熟茭白或胡蘿萄等細切入熟油醬鹽花椒􅒦砂末拌勻滋味得所玉灌肺真粉油餅松子胡桃芝麻蒔蘿六味為末和匀入甑蒸熟切作肺様塊子用辣汁供竹嶼山房雜部卷十九
