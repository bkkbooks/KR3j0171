body:
  text: 竹嶼山房雜部卷一明宋詡撰養生部一茶制産地甚多名者為勝煑茶茶經云一曰茶二曰檟三曰蔎四曰茗五曰荈取壚煉火汲清甘之水注鐺煎之如蟹眼者正熟湯也至魚眼則過熟不堪用矣先以湯洗茶投壺方酌以湯仍以壺隔湯煑其色青黄可就供也然茶多則味濁茶少則味清茶經云茶少湯多則雲脚㪚湯少茶多則乳面聚滌器不潔而雜以油膩等物皆能敗味或多用茶内小器少沃以湯再隔湯㣲煑甚濃隨多寡滴入於湯壺巾亦佳蘇子瞻汲水煎茶詩云活水仍須活火烹自臨釣石取深清謝宗可詠茶筅詩云萬縷引風歸蟹眼半瓶飛雪起龍芽按茶品岕第一虎邱二松蘿三伏龍四汲水茶録云水泉不甘能損茶味天下之水揚子江心金山中泠泉為上南零水次之井水又次之茶經云水惡停浸而喜泉源江水為衆水雜井取汲多者一統志云中泠泉在金山寺内江心水謂之南零水歐陽永叔大明水記張又新云劉公伯芻較水又載陸羽為李李卿論水全不合人亦少遇水之所出今各鄉土有井水漸至渫而甘香皆可繘汲之也渫七洽切繘音橘按水品更有堯封第一慧泉第二梅雨最上茶香凡桂花茉莉花片腦香物類惟用輕綃或薄紙苴子魚切納茶中香自裛化潤則紙藉煉火上焙燥而收不宜散和於内混淆其味致茶香不分茶䔲坋房吻切之毎茶一壺入匕許甚協茶味之甘羙倪雲林云凡有香無毒之花皆可入茶茶果栗肉炒熟者風戾者皆去皮殻胡桃仁鉗去殻湯退去皮榛仁擊去殻湯退去皮松仁擊去殻湯退去皮西𤓰子仁槌去殻㣲焙楊梅核仁槌去核蓮心去殻㣲焙蓮菂鮮者剖去皮殻乾者水浸去皮薏或煮熟菂音的薏音億烏欖核仁湯退去皮人面核仁椰子剖用肉切橄欖太平廣記曰南威銀石器擣取汁銀杏燒熟去皮殻梧桐子仁剪去殻芡實煑熟鉗剥其肉菱實鮮者去皮殻風戾者煑熟去皮殻茶菜芝麻水浸擣去皮焙燥揚潔湯煑胡荽用頭醃泡萵苣筍乾宜芝麻豆腐乾煑軟宜芝麻胡荽芹白醃宜胡桃仁竹筍豆豉蔞蒿乾宜芝麻木蓼乾宜芝麻香椿芽㣲芼宜芝麻乾同竹筍鮮者帶籜芼加少鹽筍譜曰脱殻煑則失味鹹乾者宜芝蔴同蒿芼宜芝麻乾同鷄棕宜胡桃榛松仁龍鬚菜㣲芼筆管菜㣲芼扁豆芼熟去皮殻宜芝蔴豇豆肥穉者兼殻㣲芼乾羊角豆穉者兼殻芼熟刀豆老者芼熟去皮殻天茄穉者芼萱用芽跗同少鹽芼跗音附箭幹菜醃胡桃仁宜絲𤓰劘去皮同少鹽㣲芼金雀蘂同少鹽㣲芼乾胡蘿蔔宜胡桃仁熟栗肉熟葱白醃胡荽芝麻乳餅熱湯泡刀切鹹以淡酒少漬宜胡荽飲茶清者為上内果菜為次物之甘者忌置於内若荔枝龍眼棗柹之類大不宜投之也其他巴茶枸杞茶等又非此茶之制而論茶錄云建安民間試茶皆不入香恐奪其真若烹㸃之際又雜珍果香艸其奪益甚酒制醖法不同各出方土惟不用灰者為佳傳酵酒杜工部詩曰濁醪有妙理信然自七月間先造其麴毎小麥細麪二百五十斤則以菉豆三斗煑熟之杏仁二斤去尖擊碎之擷辣蓼枝葉水煎為汁溲前三味不宜過潤置箱中壓實厚盈寸界盈尺毎片以稻稈䕶懸無風處乾醒晝暴夜露足七日收至臘月乃造酒凡白糯米一石計麴二十斤先釋米浸半月或二旬炊浸内一斗米為飯俟寒擣麴十餘斤挹其潘瀾清合橘皮葱花椒過煎冷泔傳浮醇酒和勻醖為酵停二三時則瀝浸米盡炊飯取寒飯一斗米許者投内候發一二時又取寒飯一斗米許者又投内併其發甚則盡寒飯於缸通和酵及所餘之麴上置無麴飯幾寸遂㵼清水雜其潘瀾髙過三寸為止視近周時酒面水收開裂将杷器探討酒底覺空則通和或漸通停一二時又通一次不過四五次酒味全矣醖已熟釃音師清煎之然醖此酒亦視天時寒宜覆熱不全覆不及俟周時通麴減一二斤或三四斤後醖酒又皆傳此以為酵也麴羙遂取不以一例稿人注曰潘瀾浸米水也内酒麴方小麥麪二百斤紅豆蔲一斤藿香一斤香白芷一斤艸果仁四兩杏仁斤半俱為末竹葉十斤白蓮花二百朶辣蓼艸十斤蒼耳艸十斤俱擣糜爛菉荳二斗煑熟加水溲和布苴壓實餅紙封之約繩絡空室中乾醒須六七月造浮酵酒杜工部詩曰鵝兒黄似酒楊廷秀詩曰煑酒赤如血醖若二色者佳臘時用七月中以小麥細麪百斤菉豆一斗煑熟同汁溲為餅懸室中風戾之麴傳酵酒麴内酒麴皆宜凡白糯米一石取二十斤為率釋米注水寛浸内分一斗煑飯平置水米之上半月一旬飯浮即酵也笊盡瀝乾則将所浸米炊飯俟寒擣麴與浮飯匀溲於缸上積無麴飯僅寸挹其潘瀾清㵼至髙三寸已飯底置原酒老糟少許其酒發速視天冷周上下䕶覆天熱㣲覆一日後酒發以杷器直探酒底已熱已虛乃開通少頃再通一日數次三四日後其勢漸消緩俟醖熟釃而煎之也無酵酒二制麴米數同前數一以麴多半與先炊飯少半預和片日入餘麴後蒸飯煎潘瀾清并勻於缸為酒一先炊飯即以炊湯釋清并麴溲勻於缸不用水漿至為酒皆俟寒而釀之也凡煎泔宜煎去過半則良雪香酒楊誠齋曰生酒清於雪九月中先造其麴毎白糯米粉五升細白小麥麴六斤清水勻和不宜過潤計一升布苴壓實為一餅置乾稻稈中上下鋪覆熱已七日又暴又露皆七日收至臘時凡白糯米一石以麴一劑貯潘瀾一百二十斤少則汲清水足之照浮酵制醖成味甚香烈色清如水麴多味尤重也梔麴酒六七月間造麴用白糯米二升菉豆一升釋之水漬七日毎日易水一畨瀝起以小麥麪八斤勻和鋪葦箔上稻稈覆黄俟七日後暴乾臘時毎白糯米一石此麴一劑釀酒味美而色清潔傳酵浮酵皆宜金盤露此酒自然香甘故名韓子蒼曰飲慣茅柴諳苦硬不知如蜜有香醪八月間取小麥細麪清水溲勻布苴壓實為麴毎斤成一餅綿紙䕶封約繩懸絡風中戾之臘月凡白糯米一石釋之使潔内遺一斗煑飯平置米上計米一斗水一斗浸於器十五日或連旬飯浮則通瀝起儲其潘瀾於内器外纒䕶通暖始炊前米為飯先一甑稍待其氣㣲入於中後一甑必用熟投水温則宜冷投皆以擣麴浮飯齊下毎米一石麴二十斤為中制欲酒性醇麴十五斤止欲酒性烈二十五斤止溲勻餘麴升許藏於飯底覆暖發則漸徹器外纒䕶發甚則将杷器通一日六七次二日三四次三日一二次酒醖成七日後又炊米一斗或二斗或三斗投入勻和待再發再通其水預在煎計投米一斗水亦一斗麴二斤再七日後又視前投入如不加水酒亦濃厚至月餘酒熟踰四十日醑清煑之也省麴酒先擷辣蓼艸注水煎汁溲小麥麪為麴毎斤分為四處毎處内端午所收大艾莖三寸生薑一兩切片又四分之布苴壓實采楮葉封䕶懸無風處已乾須暴須露四十九日數足而收七月造臘月釀酒傳酵浮酵皆宜也凡白糯米一石麴五斤凡醖酒傷熱則酸傷冷則甜俱在六物咸備冷熱適調通早通晩停當其初通尚可候而續通不可誤也治酸酒方凡米一石造酒用煉火灰三升勻入少頃醑之其酸皆去禮云兼用六物秫稻必齊麴糵必時湛熾必潔水泉必香陶器必良火齊必得湛音尖熾昌志切凡煑酒入釜煎及少沸速令煬音陽者息火遂貯甕以箬以紙以泥重固須宻有貯錫甕中隔湯煑候酒方熱沸即攜起轉貯於瓷甕不得過煑也清酒二制一釀之同傳酵浮酵制惟白糯米一石麴十斤八斤也一取熱湯泡米隨浸一宿至詰旦毎石水淋一二斗炊飯傳酵而後盡炊飯溲勻釀酒加木香官桂縮砂仁各一兩匀和飯中味尤香美米一石麴十五斤成酒甚速皆釀於冬碧清酒即縹醪凡白糯米一石為率釋潔取一斗炊飯加麴四兩分盛籮器同浸於九斗米上見飯浮遂悉炊飯麴亦毎斗四兩先以甕底置前浸麴飯以後冷飯溲後麴同潘瀾貯甕中厚紙宻封數層置僻所俟四十日熟分春酒毎白糯米一石釋之炊飯俟寒勻以細麫麴百斤貯甕泥封臘時留至春啓凡一斗取釋米九斗炊飯内麴十斤照常制㵼水釀酒生酒三制即白酒楊廷秀曰煑酒不如生酒烈春秋時先造酒藥擷蝦蟆艸或香薷煎汁溲秔米粉捻若栗大之劑不可過潤上下鋪覆以稻稈置之於中五日七日以一丸投水試而即浮者則為輕美暴之露之各以七日用筐收懸於通風中毎白糯米一石釋之蒸之視天氣寒煖為節暖則冷寒則温以水更釋飯清潔入缸坋藥和勻計米一斗天寒則四丸或加小麥麪麴四兩天暖惟三丸按實中開一井徑盈尺直見缸底天暖不宜入水天寒以水少潤井内漿至時天甚熱則用酒壺注凉水納其井中温則復易不令漿酸大寒則用通䕶其缸上又覆葢不令漿甘常以漿潤飯上漿味老烈則通酌起預作熟水令冷量多寡㵼於漿粕中俟三二日釀之酒成則釃起取前所酌起之漿和入復令釀味濃厚以二三器翻澄去其濁者貯之於甕乆不傷敗有以糯米一石内取一斗炒熟作沸湯泡俟冷同炒米入於漿中成酒有以糯米一石取秔米一升炒焦黒煎湯俟冷㵼漿中成紅色若煑酒藥亦多制勝者可取元大禧白酒麴方木香沈香各一兩半檀香丁香甘草縮砂仁藿香各五兩槐花白芷零陵香各二兩半白术一兩白蓮花一百朶取鬚研碎甜𤓰五十枚去子擣濾取汁用藥俱為末溲小麥麪六十斤糯米粉四十斤甚勻不宜太潤挼無凝滯下箱履七八分厚為七八寸濶毎片紙封懸當風處戾之經四十日取晒三兩日收毎米一斗麴十兩水八升此麴宜如雪香酒制或别藥致漿量加此麴惟醸於冬月官料酒藥香薷野菊花荼蓼各一斤官桂木蘭皮天花粉巴豆白芷良薑青皮艸烏各四兩杏仁甘松撫芎各二兩焙為細末毎斤對滑石八兩合和毎二升糯米粉五升清水和丸餘如前制挼奴禾切熟酒生水入漿酒成入塢火煨釜煑俱熟投以竹葉酒清醴酒今曰宻林檎三制禮注曰再釀為醴漢書注曰三釀為酎酎除又切一用糯米釀生酒漿注臘酒内復釀熟醑之煑一用臘酒清者再注於臘酒内釀熟醑之煑一用糯米釀生酒俟漿老烈毎斗注熟水三升復釀一二日醑酒注於甕煑熟俟冷又澄其絶清者和以燒酒二斤蜜一斤停至數年不酮酮酢欲壞也徒董切燒酒用臘酒糟或清酒糟毎五斗雜礱榖糠二斗半内甑中以錫鍋宻覆煬者舉火聚其氣從口滴下即燒酒也錫鍋上儲以冷水太熱必耗酒遂宜㵼去而復易之視酒薄則止菖蒲酒壽親養老書云通血脉調榮衛主風痺治骨立痿黄醫所不治者服一劑經百日顔色豐足氣力倍常耳目聰明行及奔馬髪白更黒齒落再生晝夜有光延年益壽久服之得與神通用白糯米炊飯醖生酒醅擷蒲擣汁注之有以菖蒲煎水冷注之有屑菖蒲溲煑酒麴飯内成之菖蒲去葉莃薟酒本艸云治濕痺諸風同菖蒲酒制去根蒼耳酒本草云治攣痺濕風寒同菖蒲酒制去根天門冬酒本艸云久服輕身益氣延年同菖蒲酒制去皮鬚飲膳正要云擣汁瀘清于銀甆器慢火熬膏酒調下地黄酒本艸云涼血生血補腎水真陰不足㵼脾中濕熱同菖蒲酒制四時纂要地黄酒變白速效方肥地黄切一大斗擣碎糯米五升爛炊麴一大升右三味揉匀内不津器中泥封春夏三七日秋冬五六日日滿有一盞淥液是其精華宜先飲之餘以布絹釃之如稀餳不過三劑髪當如漆若雜以牛膝汁伴炊飯更妙五加皮酒壽親養老書云張子升楊建始王叔才于世彦皆服此酒得壽三百年有子二十人今名野椒同菖蒲酒制片腦酒本艸云通九竅除惡氣治心胸先納片腦於甕後煑臘酒注下以紙以箬重幕莫厯切又泥塗封之木香酒壽親養老書以此為荼䕷酒本艸云久服不夢寤魘寐輕身致神仙取木香切片甕中先貯沸臘酒甕口䝉以輕縠上置木香綿紙竹箬重羃又泥塗之香自下走白荳􅅳仁酒本艸云除冷氣和脾胃消榖食同木香酒制用白荳􅅳仁麤屑縮砂仁酒本艸云下氣消食煖胃温脾同木香酒制用縮砂仁麤屑蘇合香丸酒墨客揮犀曰宋真宗謂王文正公曰調五藏却諸疾用蘇合香一丸先内於甕後注以沸臘酒其蠟經熱鎔浮酒面香㪚酒中桂花酒發㪚滯氣摘半含桂花浸生酒漿中宻封用時量多寡滴酒内有酒磨其餅和之有以餅同木香酒制宻封之松針酒本艸云主風濕瘡生毛髪安五臟守中不饑延年又治三年中風力效采松青針擣糜爛酒薄調毎生酒一甕㵼入二椀宻封連甕煑熟松節酒本艸云主百節久風風虚脚痺疼痛取大松油節剉屑臨釀生酒時同藥勻入毎糯米一斗計松節八斤宜釀於冬經春夏則味變萬年酒本艸云主補中安五臟養精神除百病久服肥健輕身不老冬至前摘萬年枝子置酒内連甕煑味透或擣汁釀酒或煎汁釀酒或杵屑釀於酒長春酒賈似道曰除濕實脾去痰飲行滯氣滋血脈壮筯骨寛中快膈進飲食當歸川芎半夏湯泡七次青皮去囊木𤓰去穰白芍藥黄茋蜜炙五味子碾肉桂去麤皮甘艸炙熟地黄白茯苓去皮薏苡仁炙白荳􅅳仁碾㯽榔白术蒼朮薑制人參橘紅厚朴薑汁炒沈香木香南香藿香去土丁香神麴炒麥糵炒碾去糠枇杷葉去毛炙草果仁桑白皮蜜炙杜仲炒去絲石斛去根右件各剉碎毎以藥三錢為絹囊盛之浸於一斗酒内春七日夏三日秋五日冬十日用今有五香藥燒酒藥品不及此藥之妙胡桃燒酒煖腰膝治沈寒痼冷補捐益虚燒酒四十斤胡桃仁湯退皮一百枚紅棗子二百枚煉熟蜜四斤右三件入酒瘞倚厲切土中七日去火毒杏仁燒酒去百病除咳嗽補虛眀目除隔氣添顔色増壽活血去諸風杏仁去皮尖煑五水過一斤艾三兩芝麻去皮炒熟為末一升荆芥穗一兩核桃仁湯退去皮一斤薄荷葉三兩小茴香三兩蒼朮米泔浸一宿洗去黒皮一兩白茯苓去皮三兩銅錢五文别入右件為細末煉蜜和一處投大瓷甕中注燒酒三十斤同煑一時待藥已散用紙封口瘞土中七日取出長生酒用細花燒酒二十斤同清水二十斤分析兩甕毎甕釋白糯米一升炊飯紅棗子半斤釀之夏置凉所冬置温所天寒䕶煖夏二十一日冬二十八日自熟更毎甕計毎斤如前注水并棗飯置内俟日足亦如前分釀源源不絶也臘酒糟鄭氏曰醫酏不泲者也酏音移蔑箄甕底乾疊之稻稈灰覆上􅅹其油入食佳醅子糟釀生酒漿方至時即以瓿子貯其醅有加紅麴者有加少炒鹽者凡米一斗計鹽八兩醤制史記醢醬千瓿比千乘之家小麥生醤周禮以醯醢謂醤品物非一不若今人之造醤也葢豉者配鹽幽菽豉乾而醤濕疑後世造豉之變者歟四月小麥細麴一石為率煑黄豆三斗去汁以麪染勻不宜太潤幽煖室薄鋪葦箔上采楮葉覆黄移烈日中暴須甚燥碎擊於缸計黄一斤鹽四兩通和擷紫蘇煎湯待冷注之日暴三月後方熟湯少續湯淡續鹽計黄十斤鹽三斤止貯之甕中泥紙宻封其口置天日間勝如開暴者久則愈佳有自十月間幽黄至臘時取井水煎紫蘇湯冷注之此御厨制也後凡幽黄不宜太潤湯用紫蘇煎湯待冷一云熟豆一斗細麪二斗後倣此小麥醤油黄豆一石赤豆三斗煑熟去汁染小麥麪二百餘斤幽室中為黄暴燥毎黄五斤鹽二斤紫蘇湯十斤通勻於缸日暴成油挹取清渌者别貯甕中暴之其味尚厚煎鹽湯俟冷續注之再挹取也餘豆麫暴為醤小麥生熟醤凡小麥一石以五斗磨帶麩麫以五斗煑熟去汁煑豆和于一處幽黄暴燥以水和潤泥封復幽甕中暴三七日通磨篩取細者毎十斤鹽三斤同紫蘇湯十三斤烈日中暴之不數日醤熟有用其篩出麩亦復幽甕泥封漸取注鹽水暴熟以漬物諺曰黄十鹽三水十三麥餅熟醤小麥細麫用水和堅餠任意切為大片籠中蒸熟幽黄暴燥復磨篩細毎十斤鹽三斤注紫蘇湯暴之不過五日七日已成美醤二麥熟醤二麥炒熟磨為麫用河水和之幽黄暴燥復磨麫復用河水潤覆鹽一層幽甕中封宻置日暴浃旬覺有香氣發露計黄鹽數作湯冷注暴為醤二麥大麥小麥也用大豆煑熟同溲幽黄甚佳豆麥熟醤大豆炒熟磨細計一斗和小麥細麫二斗湯和切為片蒸熟幽為黄暴甚燥毎十斤鹽三斤注紫蘇湯日暴之遂成熟醤豌豆醤豌豆水浸煑熟暴燥磨去皮計一斗同小麥一斗再磨為麫水和切片蒸之幽黄暴燥凡十斤鹽三斤注水復暴為醤麻莘醤用新麻莘車坊中方出芝麻油餅碎擣甑中復蒸透以小麥麫和之幽為黄暴燥計十斤鹽三斤注水於日中復暴為醤逡廵醤毎以大豆一斗為率餳餹四兩加減隨宜鹽一斤可留十日二斤可留一月三斤可留久逺注水滿鍋置甑於上甑底以編蒲等箄音閉之鍋口圍宻甑心立通節竹一根下抵鍋底上平甑口别以蘆一根貫竹中與之一齊先将豆湛潔浸過一宿貯甑中宻葢蒸用竹中蘆緝視水痕稍乾即注水竹内續上直候甑靣上豆黒為度務須過熟即出鋪冷置臼中擣糜爛乃入􅄳鹽匀和遂堪取用醤靣以鵝翎染熟油刷之尤香潤也醋制社醋一名醯一名苦酒三制元臨安路産酸角浸水和羮酸美過於法醋一春秋社時無論米秔糯釋米蒸飯毎米一斗麴二斤用礱榖糠通和於缸中立大篘㵼水髙及三寸俟二七日視醋漸成味過四十日煎而貯甕一六月六日造小麥麴候八月社前二三日先以糯粞煑粥縻勻塗缸上社日用糯米蒸飯入之於缸毎米一斗用麴三斤和之缸底内熱飯一團㵼水髙三寸止中則立篘醋成從篘中汲用竭則復繼以水淡則方已一六月六日磨小麥麩麫河水通勻毎一升履麴一餅紙封風中戾之至秋社前一日秔糯米各一斗釋之漬之正社日炊飯俟冷毎米一斗麴一餅細擣勻於内同水一斗五升入甕宻封紙三十層日掲一層一月醋成篘起復作沸湯俟冷量加以麴釀二醋三醋四醋依二醋釀糠宜淘潔㫰乾後倣此臘醋二制一釀如社醋米一斗用麴三斤四斤置暖所缸宜厚䕶熱漸徹去俟四十日醋熟煎時加炒熟米一用酒糟一百斤勻礱榖糠五斗按實器中見熱而香酸毎日翻過一器不令太熱四五日後冷定醋成以鹽水調泥封固數年不敗用時漸取加水滴出其醋煎收伏醋方言七醋釀之其數皆七凡白米一石無論秔糯於五月内預釋之注水漬之必足七日更宜毎日易水蒸飯乘温幽於甕有鋪葦箔間麥䅌音涓覆黄臨六月六日旦暴至暮計黄一斗水二斗均分於甕頓僻静處上裂越布冪口不復視動俟七七日已足篘起煎熟加花椒貯瓶罌中色甚鮮紅七月八月可造數尤以七有不暴黄常然紅烙音落鐵調一畨味亦羙色不甚鮮四時醋毎糙糯米一石釋之夏秋淅半日春冬淅一日蒸飯俟温勻酒糟五斤麴二十斤同水貯於甕以越布冪甕口春冬置煖所夏秋置凉所有十日熟有十四日熟四時皆可造篘清加花椒甘艸同煎貯藏於器復内水在糟造二醋三醋四醋味淡則止長生醋二制一五六月用大麥五斗磨細發為麴復擣細以良薑三兩胡椒三兩水一擔同内甕中封固日暴成醋毎取醋三升却還水三升更内薑椒少許一擷辣蓼艸煎湯瀘潔入米煑半熟漉之待温毎米一斗麴五兩勻内於器取原湯冷注之比米髙一尺置僻處越布冪器口至十日見白醭音朴消醋已成熟毎取一升還酒一升用之不能盡須臾醋毎麥麩二斗清酒糟七斤半陳米三合煑為飦記言切粥先以麩糟勻之次以飦粥勻之不宜過潤用蒲簍郎斗切盛貯厚疊稻稈深藏於中頻候大熱再翻再藏翻過二宿醋醅成矣未熟更炊陳米熱飯一椀團置麩糟内或入甑蒸熱為助既熟将小缸一口從底側通一小隙取衣袽女居切塞宻置蒲簍於缸作沸湯沃一宿去衣袽取滴其醋神仙醋四五月候釋米粞一斗為率用蒲簍苴懸西南垂堂之上向東出日俟四十九日置瓶甕中大擊麴片四兩注水漬之已七日然帶火薪頭旋轉一畨成醋則止取醋一椀納水一椀味淡不復釀也棗子醋毎鮮棗子百枚蒸生酒藥五丸為率注薄酒漬投之常置煖處醋成如取一椀則還酒一椀久則醋益香酸炒麥醋陳米一斗或糯米水漬一宿炊飯稍温取麴二十兩細擣火焙匀飯内入甕中注水三斗按平用紙二三層宻封甕口勿見風向南方安候四十九日開将小麥二升炒􅞆投甕中少頃取醋置鍋内煎沸入瓶上用炒麥一撮醋久不䤔昨冉切䣸而琰切既取頭醋再㵼水一斗半釀第二醋旬日可取食之既取二醋又㵼水七升半釀第三醋更數日取食之既取三醋再欲食須炒焦麥半升許入甕中撘色猶可取第四醋味尚如市口賣者妙不可言䤔䣸味薄也大麥醋取大麥釋之炊飯俟冷毎斗搜白酒藥三丸入甕中越布羃甕口七日注以水一斗又七日已熟則篘起煎收再入水五升為二醋俟熟又入水三升為三醋八月可造小麥麩醋凡釀醋時用料一石二斗為率小麥麩一石白秔米二斗先以小麥麩五斗水和停勻不宜過潤納甑中蒸至甚熟布葦箔上髙厚幾一寸擷蒼耳葉履於宻室中至七日已幽為黄則碎擊之後以小麦麩五斗視前和蒸乘時煑米二斗為飯與前後所蒸麥麩齊乘熱和納於大甕中手按平實中開一穴立之以篘毎料一斗計從篘口注水一斗甕口用背三四層厚綿紙羃固暴於日中過十四日啓視醋成則釃清㵼於鍋煎沸盡挹去其浮沫隨然紅烙鐵復於醋中調轉數次量注之以香油加之以炒鹽再煎二三沸熱貯於甕甕口用紙箬紧羃紙箬上又用柴灰覆厚藏久益釅而香若十四日醋尚未成則再封俟至二十一日須自六月中乘天日烈燥易暴醋熟而釀之也餹醋二制一用􅄳即飴或白餹即厚􅄳毎五斤宜清水十五斤細麴四兩麥蘖二兩同貯於甕中釀已七日則以栁榦燃紅一頭置醋中旋轉一畨再七日皆依上旋轉之至醋成為度五月至九月皆可釀也一毎􅄳五十斤用水一百斤煑糯米飯一斤四兩細麴十兩貯於甕冬天頓於和煖之處夏天頓於陰凉之處俟至四十日醋熟香酸入鍋煎之注瓶罌内收酒醋三制一摘糯稻穟用水煑其榖折裂俟温以生酒藥和勻置于竹器中覆黄七日移置小罋中注薄酒漬没之頓於竈側俟六七日已酸而香則又移置大器中頓於凉所漸注以薄酒汲而用焉不酸則已一以秔米鐺底飯入甕中注薄酒浸頓煖處遂能成醋一以煑酒糟重入水中泲其味出又泲之至有三次計有五擔加以麩麴二十斤粇米飯三斗壓没水底器外用纒䕶須宻視寒煖漸撤之春初釀俟五月五日或六月六日乃篘煎之也竹嶼山房雜部卷一
