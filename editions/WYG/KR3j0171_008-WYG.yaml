body:
  text: 竹嶼山房雜部卷八明宋詡撰燕間部二居室事宜染白鬚髪黑先染藥黄丹鐵釜巾炒黒二兩令藥能轉色蛤粉炒二兩令藥能潤色光粉四兩取粘定粉三兩能黒色麝香二分能入肉鬚髪孔難白五味各研為細末瓷器収臨用合之後染藥針沙水淘過鐵杓内煅赤醋浸七日冄以醋炒七次六兩能黑色白芨切碎用醋噴炒一次又用燒酒漸漸噴炒二三次六兩取粘訶梨勒去核醋炒六兩能上色麝香三分入鬚髪孔難白輕粉五分能潤京墨三挺切碎能光黑没石子本草曰無食子布苴擊碎二兩冇兩月之功百藥煎大餅紫香者六兩取光八味各研為細末瓷器収臨用合之染法如黄昏時將染預以肥皂水洗鬚髪用酸石榴皮水煎濃調先染藥如稠麪塗没鬚髪上務須根杪皆到取油紙或湯泡荷葉掩宻更以巾帛絡之至焚一炷線香盡冷水洗拭乾冄用後染藥釅醋調如稀麪置鐵釜内煎沸照先染掩絡法待天明以温水洗乾以胡桃仁油潤澤膏髪常黑側柏葉柏苓百藥煎芽茶何首烏旱蓮草蕋酸石榴皮青胡桃皮香附各一兩青鹽二錢半右㕮咀瓷器内水煎三四沸冷入生薑汁七兩早晩膏髪滓可冄煎梳頭不落髪亦治頭上有白屑側柏葉手掌大兩方榧子肉三枚胡桃仁不去衣三枚右研爛水煎濃仍浸之膏髪甚驗醒頭香治髪䐈除力切汗氣並愈頭風川芎白芷甘松零陵香各一兩藁本辛夷細辛醒頭草酒洒蒸過晒乾各五錢三柰子三錢麝香一錢右為細末付頭上箆去之有頭風付頭上帕蒙一宿箆去之木犀花油摘木犀半􅅤花擇一升入真菜油一斤置瓷器中油紙并竹箬𦂳羃之置湯中煑一餉時取起十日後濾清油宻藏以膏髪愈久愈香雞子粉雞子一枚開顛竅去黄用白將上等鉛粉末一兩法用醋糟覆鉛板上蒸之取浮者水定而成曰光粉曰定粉皆此也蜜陀僧五分匀一處實於竅中紙糊封之冄以紙重䕶之水染濕文武火煨乾為度取出匀面瑩然如玉今熬熟鵞膏和合香油和粉匀面發光澤而馨本草白鵞孟詵云脂可合面脂日華子云脂潤皮膚珠子粉白坯土一錢半白芷取浮者去皮一兩碎珠子五分麝香一字輕粉二錢鷹條五錢蜜陀僧火煆七次一兩金箔五片銀箔五片朱砂五錢片腦少許右為細末用上等定粉入玉簮花開頭中蒸花青黒色為度取出配對勻面甚光瑩乾臙脂生雞子二枚開顛竅去白惟取二黄調匀以朱砂二錢明礬二錢麝香少許研細併黄入一殻復調百餘轉别以虚殻去小半掩於藥殻上綸絲蜜縛之絹囊盛懸胎於虀汁中煑半日取出俟冷去殻研細色通紅同臙脂匀臉入膚明潤今金花胭脂油胭脂白胭脂皆洗紅花膏所造綿胭脂紫錏等煎染也錏音礦十白散去靨於琰切䵟各旱切風刺面垢白芷白芨白蘝白牽牛白附子白檀香白茯苓白蒺藜白殭蠶白丁香蜜陀僧三柰子楮實子桃仁甘松鷹條各等分以肥皂角剖開水浸柔仰置釜中取薄荷葉芫荽疊滿其腹蒸退其氣味去弦膜炒同前藥俱為細末滴水丸如龍眼大每用糯米一溢作湯頮音晦面擦之浴身亦潤澤吕恵卿曰用園荽洗去面䵟亦能去黑少顔膏黄檗皮二寸半土𤓰根三寸俱為細末同肥棗子七枚𢷬為膏晨起化湯頮面大去面䐢治酒􅖟鼻枇杷葉新者去毛陰乾一兩梔子五錢右為細末每服三錢温酒調下晨起服先去左畔臨卧服去右畔其效如神治髪不生羊屎燔灰水淋取汁沐之三日一沐不過三度髪生旱蓮草晒乾肥皂炒燥為末每日沐洗鬚髪白者能黑落者冄生踈者自宻牢牙烏髭髪旱蓮草即鱧腸草七八月間連根莖葉取酒洗潔一片用青鹽二兩醃過三宿瓷罐内火煨存性碾細末貯瓷器収晨起擦牙即咽之潤膚膏治冬月遇寒風面手開成皸音軍裂猪􅏬余之切鮮者一斤紅棗子五枚甘松三錢醇酒一斤白芷三錢同浸頮面畢乗熱俱匀之去身上斑紫背浮萍端午日収隔水晒乾四兩漢防己㕮咀五錢每用濃煎浴身就取萍於患處熱擦三五次斑除羊蹄菜根擣肥皂中洗時擦紫白癜風速愈去風愈疥癬瘯千木切蠡盧啟切苦参荆芥獨活細辛地骨皮五加皮各等分右㕮咀入絹囊煎湯浴身沐髪加糯米沐浴五香湯白芷去三尸桃皮辟邪氣柏葉降真仙零陵香集霛聖青木香消穢召真右五味㕮咀煎湯沐浴㸃痣藥寒食時取桑條然灰淋汁熬成膏㸃痣自落香身丸治遍身熾氣惡氣及口齒氣丁香一兩藿香葉零陵香甘松各三兩香附白芷當歸桂心㯽榔益智仁白荳􅅳各一兩麝香五錢右為細末煉蜜和杵千下丸如梧桐子大每噙化一丸常覺口香五日身香十日衣香二十日人皆聞香辟汗香身粉蛤粉三兩青木香麻黄根各二兩甘草一兩甘松藿香零陵香各五錢右為絶細末浴畢綿樸子揾之亦以撲而汗獨神散去腋臭胡臭白礬枯右碾絶細末常傅腋下紅玉散治内縫脚指臭爛寒水石煆五兩緋丹炒五錢五分半俱研和一處傅之金蓮稳步法蕎麥稈燒灰湯淋取濃汁如釅醋色以􅗠砂白茯苓藁本等分為末毎抄三錢同灰汁三碗於砂石器中煎數沸乘熱洗浸兩足且淋且渫寒則又續熱水不數次足自柔軟易纒足面上有生㣲小瘡是藥氣所出研訶梨勒末傅之自差三十嵗婦人猶可為之也治石瘾於近切肉刺莨菪莨音浪菪音蕩根汁塗痛處立止治雞眼烏梅肉𢷬糜爛和少醋貼患處自消不痛又細研􅗠砂化牛膠調貼之其根盡出治瘊胡鈎切子地膚子白礬等分煎湯洗數次盡消去治闞口濫切指甲弩肉痛緑礬為末水調傅之内縮下自乾不痛透衣香木香檀香甘松各半兩藿香􅈎草茅香牡丹皮零陵香各一兩丁香官桂辛夷三柰子各三錢腦子麝香各少許右為麤末輕縠囊之裛篋笥中澣衣香芧香藿香零陵香等分右剉碎囊之入水煎澣衣自香遂用調糨水銀索水銀荳許江茶末五分入以唾研不見星貫綿中索之束髪根去頭虱束腰間去身虱皆盡熏衣香法凡衵日匿近體小衣服先以湯置熏篝下令潤焚合香熏之復火熨帖乾禮服惟乾覆熏篝上熏練糨𢷬帛法先用水淋草灰濃汁煑帛試軟紐不散開為則更作沸湯泡灰和斫細猪􅏬漬帛少時􅉐草藉地中取器覆半日遂以􅏬湯澣濯輕𢷬令潔㫰乾欲顔色染而後糨糨以水小粉熬厚冷水漬之停下用匀入乾生小粉為多手撲須到㫰㣲潤疊襞齊整襲砧間𢷬糨透平滑晒乾甚勝於經砑石者也此小練甚佳若大練用石灰湯煮過闕用漢椒雜呉茱茰盒有収有開苦瓠去犀藏於中永不蛀洗珍珠法用人乳浸一宿以益母草然灰淋汁入麩少許絹囊珠輕手洗其色復鮮明洗象牙器色黄法用荳腐查浸擦洗之還白惜猫晴刺子珍珠等寶見尸氣遂璺泐音勒宜重襲避之濯氊褐衣油汚法用猪蹄𤓰煎湯乘熱濯之濯蕉葛桐竹等布法不宜煩撋音㕓止宜歛襞釋米水洗手按治之可糨者少加熱香油於糨中帶潤時手平整之濯衣令白法用百部根挼汁濯衣甚潔白勝用皂角又令不生虱今之洴澼者以鹻染蒸之水濯之日晒之惟綿花苧布則宜也去青紵絲衣着日久積垢光滑法用慈孝竹茹揩擦去之潔色如故濯黴黰㸃衣法用梅葉煎湯濯之脱去起衣上油法龍骨一兩半滑石二兩海螵蛸二兩白墡土二兩共為絶細末凡油汚顔色袨熒絹切服不可水濯惟掺於汚處紙藉火熨之油汚多日者復用油潤汚處熨之有炒熱石灰二三升將油汚衣入灰内揺洗隨即脱去雖錦繡亦無痕迹濯油汚衣法嚼蘿葡吐汚處煩撋之水濯潔之無痕去漆汚衣法用油洗去更以萊菔煩撋之去脂膏汚衣法用石灰煎湯濯之去黑油汚衣法用煑酒濯之自去去血汚衣法用冷水濯之無痕去墨汚衣法𢷬半夏同水煩撋之無痕治酒汚顔色􅕼服法用井水燒之日晒乾無痕収貴重顔色衣帛法凡大紅鮮淺顔色衣帛忌煙熏重襲以厚紙篋笥藏之埤雅云以麈尾置舊帛中能令嵗久紅色不㸃収裘褐氍毹等物法凡貂䑕銀䑕狐白等裘駝羊絨褐等衣及氊毯等物經三春柳絮飛墜即生蛀預用日晒坋芫花莽草雜熏衣香掺上以絹布緊襲置通風處或避絮飛後散置通風中遇晏温常晒不宜近陰濕及閉冷蔀處惟貂䑕銀䑕青䑕等皮畏猫其脚履之毛則貼皮不起埤雅云狐白貂䑕之類燕見之則毛脱凡一切蟫蠧之類畏聞鰻鱺骨煙祛蟲之法此為甚妙蟬戈鍼切辟壁虱巴荳雄黄同𢷬糜爛黄蠟和丸爇之自無辟蚊蚊曰豹脚鱉骨甲爇之蚊皆避去即不去無生存者殺蠅蚋百部燼之本草云百部又名婆婦草竹嶼山房雜部卷八
