  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0171_WYG_021-1a, image: WYG0871/WYG0871-0319a.png}
body:
  text: 竹嶼山房雜部卷二十一明宋詡撰尊生部九粉部冷團冷團須用荳粉為縴濃餹粉細方好水團用白糯米或三五升或一斗浸一宿帶水磨下以大匾盛灰上用浄布攤蓋以糯米粉置於上濾出水如少粉撲然後以手攪成塊或用肉或用菜為餡丸如圓眼大或彈子鴨子大滚湯下之以熟為度熯􅥪子水一盞小盆合在鍋底四向放􅥪子􅂒蓋熯之如水燒乾再添水􅥪子不致焦又易熟餹部風消餹用白糯米五升或一斗淘浄曬乾磨粉用絹篩篩過滚湯煉成一塊分如彈子放在滚湯内煑熟以生粉􅀈過毎丸分作兩塊然後幹薄切作片子曬乾滚油内浮之用炒熟餹麫為末劑甚佳芝蔴餹用芝蔴二升沙餹一斤炒麫些少蔴片用餳餹一斤沙餹半斤芝蔴三升半裹餹用沙餹餅屑豆末薄荷為劑外以餳餹裹之收藏響餹以燈草寸剪重重間和收之雖經雨不潤蜜部收藏蜜煎果黄梅時換蜜以細辛末放頂上蟣蟲不生造蜜煎果凡煎果須隨其酸苦辛硬製之以半水煑十數沸乘熱控乾别換純蜜入沙銚内用文武火再煑取其色明透為度新甕盛貯緊宻封固勿令生蟲須時復看視覺蜜酸急以新蜜煉熟易之造蜜煎果子法凡煎果子酸者用朴硝破水大段硬酸者用湯化朴硝放冷浸去酸味軟嫩者只煉蜜放冷澆在果子上淹一宿其酸鹹味自去漉出淘過控乾並先煉熟蜜後入煎五七沸出放冷再入舊蜜内煎如琥珀色去蜜置器中煎時須用銀石砂銚等為佳使蜜澆者浸一宿餘並用淹一飯時即有味也又法應乾煎果先用湯􅀢白梅肉候冷浸之却控乾煉蜜浸之如前法粥部餹白粥上色白粳米隔夜淘浄白沸湯中逐旋撒米下去一邊攪一邊撒如此方勻不上清下矴須入礦灰少許稻葉少許飯部荳附治飯不餿用生莧菜鋪蓋飯上則飯不作餿氣炒萁豆清酒糟和水浸豆一宿漉起㫰畧乾慢火炒既大而脆不必用沙也竹嶼山房雜部卷二十一
  hash: sha256:7112bcf7389b9c31108c12a385343d722041a0483bebfd8d0112d2c1352206cd
