body:
  text: 竹嶼山房雜部卷十二明宋詡撰樹畜部四畜類畜蠶法開簇時視近上向陽者為强良好繭雄繭尖細緊小雌繭圓慢厚大居簇上者多雄居簇下者多雌俱摘布簾箔之上俟日數已足而蛾自出擇配精健者用厚紙收其子為連五月五日以菖蒲艾揉井水浸浴蠶連頃之去穢陰乾無令煙氣熏損祭義曰浴種于川鄭云蠶為龍精月直大火則浴其種至臘月八日復以水浴之遇雪水則佳也嵗除夜用馬齒莧桃符木查水煎停冷於元日五更又浴則辟諸惡厭魅而宜蠶盛清明之候一月前先用蠶所泥補無令濕氣透入將生時又令火氣熏煖預稱蠶連之數俟蠶生足鋪以蓐音辱紙則細切穉桑葉散於蓐紙間隨取蠶連覆於葉上蟻自下連有不下輕手振下之復稱空連遂知蠶之分兩蟻三兩計布一箔至老可布三十箔自蟻初生時將二眠時蠶室最宜温煖寒必添火熱遂去火一眠之後見天氣晴明於巳午時間開忩捲簾以通風日至大眠後天氣已熱又宜室内清凉髙潔亦不得使濕氣上蒸蠶必晝夜宜飼飼以頓數多者蠶必早老少者後老二十五日老一箔計可得絲二十五兩二十八日老一箔計可得絲二十兩若月餘或四十日老一箔計止得絲十餘兩飼蠶須匀若值陰雨有寒則束乾草㸃火繞箔通照煏去寒濕之氣然後飼之凡一眠俟十分眠方可住食至十分起方可投食若八九分遂投葉飼之直到老不能齊且多損失停眠至大眠蠶欲向黄時見黄光即住食擡解直候起齊飼之葉宜薄散厚則多傷經雨露濕葉風戾之以飼祭義曰世婦桑于公桑風戾以食之淮南子曰蠶食而不飲蠶書曰飼蠶勿用雨露濕葉蠶住食時即時分擡去其燠沙若先眠之蠶久在燠底濕熱重蒸後變為風蠶擡蠶時不得將蠶堆聚蠶受鬱熱後必病損多作薄繭又蠶眠初起若值煙熏即多黑死蠶食冷露濕葉必成白殭食舊乾濕葉則腹結頭大尾瘠倉卒開門暗值賊風必多紅殭或髙撒逺撒蠶身與箔相擊後多不旺有赤蛹嫩老翁也宜切極細桑葉一時辰可頻飼四頓一晝夜可頻飼四十九頓或三十六頓第二日飼至三十頓第三日飼至三十頓分理擡飼之時正宜極煖極暗頭眠擡飼一晝夜可飼六頓次日則漸加葉向黄之時極煖眠起時宜㣲煖停眠擡飼起齊投食一晝夜可只飼四頓次日又漸加葉眠起時宜温和大眠起直候十分起齊投食一晝夜可飼三頓次日加葉至七八頓午後天氣晴煖取預磨菉荳粉白米粉或黒荳熟粉與切下桑葉一處㣲用温水和勻一箔可飼粉十餘兩則減葉三四分至三日再如此飼一頓不惟解蠶熱毒又省葉仍得絲多易繰堅靱有色自眠起喫食十五六頓即老得絲多少全在此數日不得怠慢埤雅曰再蠶謂之原蠶又曰蠶負馬迹蠶與馬同氣物莫能兩大後世無禁一嵗至于三蠶是以桑弱而馬耗也王者之治禁之其有食柘之蠶居家必用云柘葉蠶先繭以冷水繰之絲作琴絃清明響徹勝於凡絲逺矣畜獸法走者為獸獸曰牝牡馬八尺以上為龍七尺以上為騋六尺為馬良曰天馬曰驥曰駿鈍曰駑駘曰欵段騋力才切駑乃乎切駘大來切相馬訣云三十二相眼為先次觀頭面要方圓眼似垂鈴鮮紫色滿腔凸出不驚然白縷貫瞳行五百斑如撒荳不同看面顱倒擊如鐮背鼻如金盞可藏拳口又須深牙齒逺舌如垂劍色如蓮口無黒靨須長命脣似垂箱盖一般食槽寛濶腮無肉咽要平分筋有蘭耳如楊葉刀批竹燕骨髙兮髀不堅八肉分弓彎左右龍㑹髙兮上古傳項長如鳯須彎曲鬃毛茸細要如綿鬐長膊濶槍風小臆髙胷濶脚前寛膝要髙兮圓似掬骨細筋麤節要攅蹄要圓實須卓立身中充濶要平安肋骨彎弓須緊宻排鞍肉厚穏金鞍三峰壓壓須藏骨卧如猿落重如山鵝鼻申直須停穏尾似流星散不連膏筋大小須匀壯下節攅筋緊一錢半髭有距如雞距能奔急走日行千以上貴相三十二萬中難選一俱全祖李伯樂相馬經相馬旋歌云項上雖生旋有之不用誇還縁不利長所以號騰蛇後有䘮門旋前膁有挾屍勸君不用畜無事也須疑生額并銜禍非常害長多古人如是説此事不虚歌帶劍渾閒事䘮門不可當的盧如入口有福也須防黒色耳全白從來號孝頭假饒千里足亦勸不須留背上毛生旋驢騾亦有之生當鞍貼下此者是駝尸銜禍口邊衝時間禍必逢古人看是病焉敢不言凶眼下毛生旋遥看是淚痕假饒福也病無禍亦防侵毛病深如害妨人不在占大都如此類無禍也宜嫌檐耳駝鬃項雖然毛病殊若然兼抱尾有實不如無馬畏暑不畏寒編以皂棧飼以藖何間切荳間雜以貫衆抹之使肥充不瘏音塗病宜洗澡不宜日晒常閑之以走法不騰劣也易胎駒生時遂以乾土塵染於其體遍揉捻之能馴而不蹄嚙以銀簪分界其鬃則兩開埤雅云馬走逆風韓鄂四時纂要云常係獼猴於馬坊内辟惡消百病令馬不著疥元雲南行省言亦乞不薛之地所牧國馬嵗給鹽以每月上寅日啖之則馬俱無病驢忽里謨斯國有福禄似驢而毛文可愛次於馬食不易肥生子同馬法騾説文騾驢父馬母駃騠馬父驢母漢匈奴傳曰竒畜即騾驢也又驢父牛母曰馲􅦢駃古穴切騠丁奚切馲陟格切􅦢莫百切耐走不多病病則難治生騾同馬法段成式云騾不孳乳牛水牛黄牛相牛法耕牛眼去角近眼欲大眼中有白脉貫瞳子頸稍長大後脚股濶並快使毛欲短密疎長不耐寒齒牙欲白耳角欲近角欲得細身欲得麤尾稍長大無帶抱喉及臨耳者並吉面短毛赤豎尾稍亂毛轉並主命夭凡母牛毛白乳紅孳子多乳疎黒無子生子時子卧面相向吉相背子疎一夜便糞三次一年生一子一夜一次三年生一子祖寗戚相牛經酉陽雜爼云毛少骨多有力溺射前良牛也埤雅云牛走順風又曰牛性前順牛忌眼下有旋毛名淚滴主䘮服齒齦口斤切有縁招官灾兩角間有亂毛妨主後有旋毛招盗賊牛畏熱又畏寒草食雜荳飼之俾息而齝丑之切肥潤耳濕冬以牛衣則無病也牛草脹以醋灌之或從後探去其毒牛㵼痢煎人參敗毒散黄連解毒湯飲之羊山羊綿羊類説曰氊很臘月孳者良牡羔三日即綸絲結痿於危切其外腎食草雜糯榖荳則易肥齥私列切則無病春夏早放早收收晚遇巳午時熱必汗出有龍塵入膚即生疥癩秋冬晚放放早食露水草口生瘡又鼻生膿又腹㵼則去表而墳首也羊棧宜髙宜乾久在泥中則生繭蹄亦作癩癩易害羣性好鹽常以鹽啖之綿毛至四月剪之遇夏不熱至八月再剪其毛令長氄音冗毛以禦冬寒埤雅曰羊性前逆羊疥癩用蕎麥子炒為黒灰雜白礬硫黄末油調先刮其癩至傷擦之即愈羊夾蹄用羖羊脂熬熟去滓取鐵箆子一枚煉火燔令熱將脂匀於箆上烙之勿令入水次日即愈猗頓聞陶朱公富徃問術焉告之曰子欲速富畜五㹀乃適西河大畜牛羊于猗氏之南十年之間子息萬計貲擬王公漢翁伯販脂而至千金富傾縣邑豕埤雅曰豕喜卑穢左傳母猪曰婁猪小説曰以其食不潔故謂之豕豚彘皆其名也取短項無柔毛者良一廂有三牙者難留難肥稚時食糟不長用麻子二升擣十餘杵鹽一升同煮和糠三升食之立肥豕必豶音文而必以牢然懐胎甚衆止宜二三育久則氣血不全而胎殰徒木切者多矣易曰豶豕之牙漢書五行志曰豕圂也豕熱病斷其尾尖刺其耳令血流啖以生萊菔朴硝驅浴于水愈豕疥癩用荳油滓調百草霜擦之復以百草霜摻於食上飼之愈凡馬牛羊豕遇初六日十六日二十六日生者必夭亡不宜畜養狗詩注曰長喙曰獫短喙曰歇驕爾雅曰犬狗之有縣蹄者也喙音灰獫音煉暮夜食之自穉不缺其食則易肥焚艾煙熏其鼻長則善捕貍䑕食竹茹則聲啞食木鼈子則死雜五行志曰白犬虎文畜之致萬石黒犬白耳畜之令富貴黒犬白前兩足宜子孫白犬黄頭家大吉黄犬白尾代有衣冠黄犬白前兩足利人𤨏碎録曰黒犬能辟伏屍舌青斑者識盗賊則吠猫爾雅云舊傳猫旦暮目睛皆圓及午即從歛如線其鼻端常冷惟夏至一日煖滇南有蒙貴似猱捕䑕善於猫猱乃刀切旦晝食之病則磨烏藥灌之生蚤擣桃葉觸之獅子猫灸豬肝與食令毛耏如時切潤埤雅曰世云薄荷醉猫死陸務觀詩云裹鹽近得小貍奴今人乞猫以鹽易之遺風也瑣碎録云猫一産止一子急棄之一産三四皆雄皆雌不可畜本草云用蕎麥稈灰淋汁抹六畜瘡愈容齋隨筆云莊子載徐無鬼見魏武侯告之以相狗馬荀子論堅白同異云曽不如相狗馬可以為名也史記褚先生於日者傳後云黄直丈夫陳君夫婦人也以相馬立名天下留長孺以相彘立名滎陽褚氏以相牛立名皆有髙世絶人之風今時相馬者皆有之相牛者殆絶所謂雞狗彘者不復聞之矣劉向七畧相六畜三十八卷謂骨法之度數今無一存象埤雅曰舊説象之所在其土必豐又云象性久識能浮水出沒體具十二肖肉惟鼻是其本肉膽不附肝隨月轉在諸肉假令正月建寅膽在尻肉鼻端有小爪可以拾針草食駝埤雅曰駝卧腹不貼地屈足漏明則行千里背有肉鞍如峯長頸髙脚善負知泉脈所在遇處輙停不行又知風候有野駞草食馬牛象駝皆有獸醫鹿大曰麋牝曰麀有馬鹿白鹿𤣥鹿其天鹿則純霛之獸五色光耀洞明性畏熱飼以草或飼以榖間飼以菉荳常令入水浴之希革毛毨蘇典切時文甚明麗每好奔逸項下縋以木杖疾走可擊膝使馴伏不狘許月切牡者游羣甚廣而牝者亦易胎也吞芻則如牛而齸於亦切之兎今有畜者牡牝交媾凡十八日即孕育一子論衡云䑛雄毫而孕非也有白兎黒兎畜之以穽飼以草食逸放則不能馴玉面貍以柙畜之以猪脂和米飯食之肥腯而弗瘠凡初獮息淺切山牛麞麂皆草食稚則可畜若水獺馴之能使捕魚田獵名春蒐夏苗秋獮冬狩野馬之類不能畜者見遺制畜禽法飛者為禽禽曰雌雄鵝爾雅曰舒鴈宜以一嵗再伏者為種大率三雌一雄雄宜少雌宜老尾之力全而卵不殈况必切六七月之間榖食豐足八月生卵可菢至九月初即有子鵝以供冬至五六月生卵熱不堪菢則拔去其兩翅十二翮以停之三月間生卵不已亦㧞之皆留積其卵于腹以俟時也鵞母頭欲小口上齕痕沒切有小珠滿五者生卵多滿三者為次冬宜入棧夏宜散逸而以熱食飼之易肥鴨即鶩又曰舒鳬種鴨宜六雌一雄春時生卵至四月菢出者良每五月五日不得放棲只乾食不得與水則日日生卵不然或生或不生常令入水探食魚鰕可以代榖食雄者去其勢食之易肥新生曰乳鴨雞風俗通曰雞本朱氏翁所化故呼曰朱朱冀越集云西土有駝雞大十餘斤足似駝霜降時尾之者良母雞下卵時逐月内雜以麻子與食永不肯菢常生卵以油和麫成指尖小顆日食十數枚易肥雄雞善者毛色自文而多脂膏忌栁柴烟能損目有病灌以清油愈瘟之傳者磨鐵漿染米與食愈水眼以白礬傅之愈陶朱公養雞法以地作兩所隔越之更酒麥糜取草覆化為蟲以食雞常有蟲食易成長也𤨏碎録云雞生子皆雄者必有喜事凡雞鵝鴨伏卵慮有擊聲卵毈徒玩切故雷震必以鐵置其巢埤雅曰雞鶩伏卵忌磨若聞礱磨之聲必不生矣凡雞鵝鴨初生饑之而不久多成内閉盖原其卵中之白結為皮骨卵中之黄結為肝腸鷇古候切之早其肝腸方全弱不能以磨化故必候其三晝夜肝腸已實而方漸鷇之則不病而易長也鶴𤣥鶴白鶴唐溪詩話云衆禽中惟鶴標致髙逸浮丘伯有相鶴經榖食畜之亦卵生常宜佐以魚鮮其雛能保䕶其首起丹頂乃得長壽彭淵材以為胎生非是青鸞决録注云鳯多青色者為鸞今名鸞者鷀䳓之類榖食鶿䳓似𤣥鶴而身小無丹頂而頰赤榖食亦鮮食鷺鷥詩注曰一名舂鉏一名屬玉歐陽子詩曰風格孤髙塵外物性情閒散水邊身魚食惡露埤雅云畜之極有馴擾者每至白露降日則定飛揚而去不可復畜矣孔雀元命苞曰火離為孔雀榖食立宿須髙則不殺敝其尾畜之亦能鷇雛如雞之羣生也雉漢書五行志曰壄雞有白雉黒雉説文曰長尾雉曰鷮音嬌榖食善獝計必切而避宜畜以笯音奴錦雞有吐綬金頭之屬榖食鴈太白云有五色鴈有白鴈有朱鴈榖食喜水白鷴太白詩云白鷴白如錦有黒鷴紫鷴榖食亦肉食太白又云黄山胡公有雙白鷴盖是家雞所伏自小馴狎子無驚猜天鵝即鶂莊子曰白鶂之相視眸子不運而風化輟耕録曰頭鵝榖食喜水鸕鷀水鳥即鵜今淘河鵜音啼魚食馴則能令捕魚野鵝廣志曰駕鵝鮑明逺賦曰歛雙翮於水裔翹孤趾於林隈駕音哥榖食喜水畜之鷇雛野鳬種類大小不一甚小者曰鸊鵜有鵁鶄似鳬脚髙有毛冠辟火灾鸊步覓切鵜天兮切鵁音交鶄音晴榖食喜水取其卵與家伏之鷇鶵遂馴鴛鴦埤雅曰匹鳥有思者也􅈃鶒同類榖食喜水王雎詩曰雎鳩注曰状類鳬生有定偶而不相亂偶常並游而不相狎故毛傳以為摯而有别列女傳以為人未嘗見其乘居而匹處者盖其性然也今一種名黄駕者羽毛正黄色亦類鳬鷖榖食喜水鴿羽色甚衆榖食飼以硝水能取食而復嘔之積其餘可以再飼易伏卵鷇雛凡病用古墻中螺螄朽殻并續隨子銀杏擣為丸每飼十丸愈凡初羅野禽不馴須鎩所拜切其翮而得久畜之若鸚鵡倒揷之屬則樊籠以飼之也霛雞之類見遺制畜魚法陶朱公對齊威公問其富曰治生之法有五水畜第一所謂水畜者魚也其治有九洲九島水深八尺洲髙六尺池共六畆帶子鯉魚二十頭雄鯉六頭自生自育春夏納以神守龍不將魚去鯉在池遶游日行千里則肥按鼈名神守今余處江南之地薄海有沙宜養鯔魚鄰湖無沙宜養青魚鰱魚若他鱸鱧之類啖魚者多不宜畜養惟飛魚鬐鬛舒揚善於出水畜之能辟獺而魚不淰音諗鑿池欲淺而向陽中作一區深者至冬間積槮與居使得以𨼆藏避寒池之周圍者尤勝魚在池如處江湖中晝夜逺逝悠然而相忘焉則易長也最忌桐油投水中魚即死如池泥汙穢致魚浮喁魚容切擷芭蕉葉碎棄於池自上藥毒者宜易新水水發又有魚貫之患宜開溝而編竹為門以洩之也金鯉金鯽惟堪觀玩今有飼金魚以水面紅蟲其色愈明桯史云中都豢魚者能變魚以金色鯽為上鯉次之其術以闤市洿渠之小紅蟲飼凡魚百日皆變初白如銀次漸黄久則金矣鯔魚養於有沙之池畏寒冬月居池底聚首相處網之即殭惟沙鯔不畏寒且易長大青魚有黒白鰱魚一名鱮白魚鯿魚白青魚食草鰱魚三種細頭大頭即鱅金絲皆食青魚之穢必宜並畜三月至八月常用樵採穉弱青草食之如用一擔令其食盡則食以第二擔不然積草腐氣尤能敗魚其名黒青魚者食螺螄并畜於池與食易肥白魚鯿魚易長凡初網得魚秧時開方一二丈深二三尺小池瀦水納之恒飼以細米粉或舂米糠順風舉颺浮於水面令其食盡又復取飼一日可二次待其長至五六寸時移畜大池每尾有成也魚一年長至一尺者則次年即有二尺善水畜者治生誠亦廣矣江海魚種類不一非池所畜見遺制畜蜜蜂法松江之蜂人家善畜之者其蜜甘美不下於閩廣之産先造方木箱三四層為其房每層内縱横以小竹板二條上層為之以盖下層為之以底立一架承其底層而其底為一筍可移出者置之室中向南壁間壁外通一小隙以篾編一簟作數目者掩之每目僅容一蜂出入喜順惡逆以左置右則盛以右置左則衰也凡置箱立架人必順而稍下皆不得過敵祖房三四月間蜂生息蕃衍必自分處俟其作衙成聚時用箱之上層有葢者少塗以蜜覆置蜂上又聚紙焚煙從蜂下漸漸熏之又束艾從蜂後推之其蜂皆鱗次以進上層箱中則取置於底層之上以濘泥蜜墐諸隙止通其數目出入常移其底視蜂有凡蟲來盜蜜侵害者悉為滅除之目外出入所有蜘蛛網當之者欲網蜂常纒去之俟其釀滿蜜脾一層直候昏夜蜂息時不出蠆丑介切則輕舉上層接入第二層下續其底上續其盖視前蜜墐既又釀蜜脾已滿三層四層皆若此接入也埤雅云蜂有兩衙應潮其主之所居衆蜂為之旋繞如衛誅罰徴令絶嚴有君臣之義丁文果對唐太宗曰雖無官職一日兩衙埤雅又云採取百芳釀蜜其房如脾故曰蜜脾歐陽公詩云花蕋新成滿蜜脾蘇子由詩云前人傳蜜延客住後人秉艾催客奔夏初或秋初視蜜脾已滿數層計其三冬有蓄亦於甲夜用薄大刀當房上層接縫中蜜多則二層接縫中切下不使蜂知則以布絹泲潔蜜藏應所須用則煎去其沫其滓則以水滌蜜去易水煎浮水上者取而壓乾復入乾釡内煎水竭入滑器脱下即黄蠟也其所滌水濾潔置日中晒亦能成醯墨娥小録云用地丁花皂角花百合花等分窨乾為末鍊黄蠟為丸如彈子大每蜜一斤入砂銚内煎沸下藥一丸搥碎竹箆不住攪匀成蠟傾出得十兩羅隠曰採得百花成蜜後為誰辛苦為誰甜太州羊刺草上生蜜曰刺蜜味甚佳臨冬則用泥墐其房罅至蜜衣以綿著甚煖外日仍留其出入視其蜜少不及至春採花割雞退毛去内臟懸於房中食之造一王臺當蜜脾中至春覷其王臺上惟王蜂居之而衆子亦居之多則分房不盛以長針刺其衆子止留一子與分而祖房則常殷富有蜜也埤雅云其王之所居疊積如臺王元之云山甿患其分也以棘刺闗於王臺則子盡死漢書曰陸地牧馬二百蹄牛千蹄角千足羊澤中千足彘水居千石魚陂其人皆與千户侯等竹嶼山房雜部卷十二
