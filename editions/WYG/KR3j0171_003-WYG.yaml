body:
  text: 竹嶼山房雜部卷三明宋詡撰養生部三獸屬制牛宜黄牛角蠒栗者屠牛皆解剝其皮用皮者以温湯瀹之去毛其肉不可先以水洗洗則肉青治胃脾析雜石灰揉洗白而去盡穢氣禮曰脾析注曰百葉也酉陽雜俎曰治犢頭去月骨舌本近喉有骨如肉烹牛鐵稱錘燃紅投水中不過三次水熱易爛不宜葢鍋毎斤入􅮄硝少許於内烹易糜爛汁中入醬油醋瀹之美淡者宜蒜醬牛修禮曰婦贄脯修曰抄曰加薑桂曰修用肉軒之每二三斤㕮咀白芷官桂生薑紫蘓水烹甜醬調和俟汁竭架鍋中炙燥為度宜醋内則注曰大切曰軒凡㕮咀之物入囊括之同烹後多故此牛脯禮注曰脯乾肉也又曰犓腴犓音芻用肉薄切為䐑烹熟壓乾油中煎再以水烹去油漉出以酒挼之加地椒花椒蒔蘿葱鹽又投少油中炒香燥少儀曰聶而切之為膾注曰聶之言䐑也先藿葉切之復報切之則成膾撒馬兒罕有水晶鹽堅明如水晶琢為盤以水濕之可和肉食生爨牛二制一視横理薄切為牒用酒醬花椒沃片時投寛猛火湯中速起凡和鮮筍葱頭之類皆宜先烹之一以肉入器調椒醬作沸湯淋色故即用也禮曰薄切之必絶其理熟爨牛切細膾冷水中烹以胡椒花椒醬醋葱調和有軒之和宜酸韲芫荽鹽煎牛肥腯者薄􅣸音披䐑先用鹽酒葱花椒沃少時燒鍋熾遂投内速炒色改即起油炒牛三制一用熟者切大臠力兖切或膾以鹽酒花椒沃之投油中炒乾香一生者切膾同制加醬生薑惟宜熱鍋中速炒起一生膾沃鹽赤砂餹投熬油速起牛餅子即醢二制一用肥者碎切机音几上報斫細為醢和胡椒花椒醬浥白酒成丸餅沸湯中烹熟浮先起以胡椒花椒醬油醋葱調汁澆瀹之一醬油煎火牛肉軒之每為二斤三斤計一斤炒鹽二兩揉擦勻和醃數日石灰泡湯待冷取清者洗潔風戾之懸煙突間熏牛肉􅣸為二三寸長濶薄軒用醬揉融液焚礱榖穅煙熏熟即齮齕之熏物倣此生牛腊音昔説文曰乾肉曰腊韻府曰腊羓也二制一􅣸為二指濶薄䐑沃以香油鹽花椒葱日暴之期則蒸一淡暴乾日用以水同醬油烹熟牛羓二制一用精者視理薄切為䐑和以鹽酒花椒布苴壓乾作沸湯微燖日暴之一用精者切為軒以花椒醬沃頃之加酒水醬油醋寛烹至汁竭為度俟冷或析為細縷乳餅宜入烹茶宜熱白酒澆加葱花椒宜油煎或染調麪宜醋宜為腐入羮乳線用温油煠與涉切之洒以蜜或摻以白砂餹抱螺素酥餹酥有藏白砂餹者有疊赤砂餹者馬取肉冷水下不葢鍋入酒烹有同牛制驢唐李令問好珍饌有炙驢同牛制視所宜羊齊王肅曰羊陸産之最有綿羊山羊宜山羊刲音奎羊時捫其口不使鳴不發羶胃中去穢速以石灰雜亂穰内之揉洗遂脱穢盡而白其腸同用翻其肥者在内脂易凝結浴以熱水撏毛瀹湯調温脱之易潔血以鹽水調凝速入温水中慢烹熟胸前有羶骨刳時取去烹羊取肉烹糜爛去骨乘熟以布苴壓實冷而切之為餻惟頭最宜熟肉宜燒葱白醬或花椒油或汁中惟加醬油瀹之􅠉於刀切羊二制一肉烹麋爛軒之先合􅠉料同鮮紫蘓葉水煎濃汁加醬調和入肉一以􅠉料汁烹羊肩背俟熟加醬調和撈起架鍋中炙燥為度􅠉料凡􅠉物用此佳孩兒菊味次之香白芷二兩藿香二兩官桂花二兩甘草五錢㕮咀之生爨牛與牛同制熟爨羊與牛同制油炒羊宜羓羜詩注曰羜未成羊也用羊為軒先取鍋熬油入肉加酒水烹之以鹽蒜葱花椒調和醬炙羊詩注曰炕火曰炙謂以物貫之而舉于火上以炙之今無此制惟封於鍋也炕口盎切用肉為軒研醬末縮砂仁花椒屑葱白熟香油揉和片時架少水鍋中紙封鍋葢慢火炙熟或熟者復炙之禮曰羊炙炕羊二制前制即飲膳正要曰栁蒸羊一用土塹音擊甃砌髙直竈下留方門將堅薪熾火燔使通紅方置鐵鍋一口於底實以濕土刲肥稚全體羊計二十斤者去内臓遍塗以鹽止於一斤摻以地椒花椒蒔蘿坋葱屑取小鐵攣束其腹以鐵樞籠其口以鐵鈎貫其脊倒懸竈中乗鐵梁間以以大鍋通調水泥墐封一宿俟熟或以􅠉料實於腸週纒其體炕之有常開下方門時以煉火續入復閉塞一以兩鍋相合架羊於中蜜塗其口炕熟制尤簡而便也火羊肉用肩肘陟栁切毎斤炒鹽一兩揉擦深透疊器中三五日取石灰泡湯俟冷洗潔置于寒風中戾之懸近煙突間豬宜豶豬豶音墳殺豬瀹湯不宜太熱撏毛易脱其膚潔眼下有息肉去之其腸胃用醋鹽揉無穢氣肉之佳者用短肋音勒禮曰豚拍注曰脅也烹豬宜首宜蹄烹糜爛去骨以布苴壓餻冷宜醬鹽熱肉宜花椒油花椒鹽蒜醋蒜水凡烹時其汁中冬月加鹽少許及白酒夏月别加白礬少許須日挹去其油并滓而用其清再續以水是謂原汁愈久愈美烹肉益佳蘓東坡云淨洗鐺少著水柴頭罨煙熖不起待他自熱莫催他火候足時他自美蒸豬取肉方為軒銀錫砂鑼中置之水和白酒蒸至稍熟加花椒醬復蒸糜爛以汁瀹之有水鍋中慢烹復半起其汁漸下養糜爛又俯仰交翻之鹽酒燒豬取肥嬌蹄毎一二斤以白酒鹽葱花椒和浥頃之加少水鍋中紙封固慢煬火俟熟鹽酒烹豬烹稍熟乗熱以白酒鹽葱花椒遍擦架鍋中鍋中少沃以熟油蒸香又少沃以酒微蒸取之􅠉豬用首同羊鹽煎豬先烹肉熟而切之亦宜用肉方􅣸䐑入鍋炒色改少加以水烹熟汁多則杓起漸沃之後凡有不宜汁寛者多倣此同花椒葱鹽調和和物俟熟宜芋魁劘去皮先芼熟白莱菔擊碎芼熟去水茄芼熟去水乾再芼柔山藥刮去皮先芼熟蕎頭絲𤓰穉音劘去皮芼瓠劘去皮犀芼胡蘿蔔甘露子秔糯米粉熟範為繭醬煎豬先烹肉熟而切之亦宜同鹽煎惟用醬油炒黄色加花椒蔥和物宜合麫筋樹雞洗去沙即木耳韓退之答鄧道士寄樹雞詩云割取乖龍左耳來醬烹豬二制先烹肉熟而切之亦宜一同前制甘草水烹加醬縮砂花椒葱調和和物宜生蕈湯燖去涎泠水再洗泲乾入之加燈草芼試燈草黒色則有毒朱文公先生紫蕈詩云風餐謝肥羜蒟蒻音若去麤皮大切片芼熟撈起毎一枚視老穉用淋灰水二椀或三椀擣麋爛為餅再用水芼色明潤碎切和之本艸云生㦸人喉後多倣此蘆筍去苞肉熟入杜工部詩云春飯兼苞蘆注曰蘆筍也蒲蒻生入之即起大口魚洗方切對鰕洗片􅣸一同生爨牛制酒烹豬如前制寛以酒水同甘草少許烹熟入鹽醋花椒葱調和禮注曰帶骨醢曰臡音泥和物宜合生竹筍去籜塊切同肉烹茭白去苞塊切俟肉熟入即起酸烹豬二制一切膾如前制水同甘草烹熟以醬醋花椒葱調和和物宜新韭生入即起新蒜白切絲生入即起菜臺芼熟入登豆芽少燖入酸竹筍絲水洗入一烹熟惟以鹽醋調和豬肉餅三制一用肉多肥少精或同去殻生鰕或同生黒醴魚鱖魚彭刀机上薄􅣸䐑又報斫為細醢和鹽少許有雜以藕屑浥酒為丸餅非蒸則作沸湯烹熟以胡椒花椒葱醬油醋與原汁調和澆瀹之一取菉豆粉皮下藉上覆之蒸用則塊切和物宜芝麻腐豆腐山藥生竹筍蒸果蒸蔬一以醬油同香油煎熟和物宜鮮菱肉去殻藕塊切豇豆段切鷄頭莖段切俱别用油鹽炒熟油煎豬二制一用脅肋肉骨相兼者斧為臠相如賦曰脟割輪碎脟音臠水烹加酒鹽花椒葱醃頃之投熱油中煎熟一用精肉切為軒沃以蜜投熱油中煎熟雖暑月久留不敗暑月摻以香菜亦宜其類倣此宜醋油燒豬二制一用脄之肯綮弃梃切者斧為軒先熬油投鍋中燒熟加醬縮砂仁花椒炒燥一用肉大切臠浥香熟油鹽花椒葱架鍋中燒香熟熟肉亦宜宜醋醬燒豬二制一用熟肉大軒乗熟塗研醬坋縮砂仁花椒屑葱白架鍋中燒香一先熬油取醬沃生肉一時入鍋中漸澆水以俟熟宜蒜醋清燒豬二制一用肥精肉軒之鹽揉取生茄半剖界稜或瓠布鍋底置肉加葱花椒紙封鍋燒熟一不用藉常洒以酒慢燒熟宜蒜醋蒜燒豬用首斧為軒先熬油炒之少以酒水漸澆烹糜爛多加蒜囊與鹽調和即起藏蒸豬二制一用竹筍兩節間斷為底葢底深葢淺藏肉醢料於底裁竹針闗其葢蒸熟一用肥茄切下頂剔去中瓤子同筍制藏煎豬二制一用茄削去外滑膚片切之内夾調和肉醢染水調麫油煎一用竹筍芼熟碎擊同茄制宜醋火豬肉即豬紅冬至後殺豬不宜吹氣乗熱取其肩腿毎斤炒鹽一兩先揉膚透次揉肉透平布器内重石壓四五日復轉壓四五日煎石灰湯冷取清者洗潔懸寒勁風中戾通燥焚礱榖糠煙髙熏黄香收置煙突間有云塗以香油熏以竹枝煙不生蟲風豬肉視火豬肉制醃壓之用醋洗又同醋壓漬四五日懸風中淚燥仍置通風所以五月五日水洗雖久不敗黒娥小録云瘞竈灰中若三伏中視前揉壓三日毎斤加鹽五錢復揉壓三日石灰冷湯洗之浥以香油烈日暴燥煙熏之置通風所凍豬肉惟用蹄𤓰撏洗甚潔烹糜爛去骨取膚筋復投清汁中加甘草花椒鹽醋橘皮絲調和或和以芼熟團筍或和以芼熟甜白莱菔并汁凍之和糝蒸豬用肉小􅣸䐑和秔米糝縮砂仁地椒蒔蘿花椒坋鹽蒸取飯乾再炒為坋和之尤佳和粉煎豬用菉豆湛潔水漬揉颺音樣去皮和水細磨雜以肉醢料杓入油中煎熟今曰餅炙惟以菉豆磨煎者入油醬炒鹽豬羓二制一取精肉片切軒毎斤鹽六錢花椒醃半日壓去水者油浥之蒸熟烈日中暴燥一生同制用則蒸宜醋餹豬羓取肉去膚骨切二寸長一寸濶半寸厚臠以赤沙餹少許醬地椒蒔蘿花椒和匀微見天日即收或隂乾先以香油熬熟既入肉不宜煬火待少頃自熟油爆豬取熟肉細切膾投熱油中爆香以少醬油酒澆加花椒葱宜和生竹筍絲茭白絲同爆之火炙豬二制一用肉肥嫩者薄切䐑毎斤鹽六錢醃之以花椒蒔蘿大茴香和勻微見日置鐵牀中於煉火上炙熟一用肉薄切而䐑粘薄瓷椀中以紙封之覆直煉火上烘熟手煩肉煩釋文曰捼也取肉水烹糜爛去骨和少汁煩揉融液加花椒鹽俟凝厚切用之生豬鮓取肥精相半肉􅣸絶薄小䐑取潔膚切絶細膾和勻毎斤炒鹽二錢少醃竹箬苴之置木桶中榨水去盡連桶夏月頓凉所一二日冬月頓煖所六七日常榨之不令有水用和生蒜速用醬熟豬膾熟豬肉切膾和苦爪薄切揉洗生爪鮮藕茭白萵苣同蒿熟竹筍菉豆粉皮鴨子薄餅皆切細條熟鮮鰕去殻肉芼韭白頭俱宜或五幸醋芥辣澆五辛醋葱白五莖川椒胡椒共五十粒生薑一小塊縮砂仁三顆醬一匙芝麻油少許同擣糜爛入醋少熬用熟豬膚細切同同生爪黄爪條加蒜泥鹽醋少許豬鼓先用白芷官桂鮮紫蘓葉同水煎汁次投以肥豬肉去肌骨方切小臠烹熟又次投以釋大黄豆烹熟加醬縮砂仁坋調和取起瀝之一日暴使燥有用豆先炒熟方下肉豉倣此炕豬同羊豬惟四十斤鹽二斤犬烹犬用犬擊死撏潔剖洗同肝肺水烹熟宜葱醬􅠉犬用肉同白酒水香白芷良薑官桂甘草鹽醬烹熟復浥以香油加花椒縮砂仁架鍋中燒乾香甘甚美内則曰肝膋取狗肝幪之以其膋濡炙之煨犬用肉烹糜爛去骨調雞鴨子花椒葱醬煩勻貯罋中泥塗其口焚礱榖糠火煨終一日夜俟冷擊罋開取之醃犬同豬火肉每一斤鹽二兩鹿鹿炙用肉􅣸二三寸長㣲薄軒以葱地椒花椒蒔蘿鹽酒少醃置鐵牀上傅煉火中炙再浥汁再炙之俟香透徹為度鹿脯三制一取肉片切軒以花椒醬煩揉之甑蒸熟復入煉火上焙燥一切軒用鹽川椒地椒蒔蘿酒煩揉透停一二日以油沃日暴為脯用烹一同熟牛羓後一制凡煑鹿惟七八分熟宜慢火過煑則乾燥無味野獸倣此火鹿肉同牛餘造皆倣羊制兎契丹北境有跳兎埤雅曰蟨炙兎撏潔少鹽醃遍揉香熟油花椒葱架鍋中紙封炙熟少以醋澆熱鍋中生焦煙燭黄香宜蒜醋醃兎同豬火肉油炒兎同羊鹽煎兎同豬野馬有毒飲膳正要云其肉入地不沾沙同馬犀牛氂音毛牛其尾可為旌旄犏牛犦歩角切牛即犎牛項上有骨大如覆斗日行三百里出海康山牛野驢同牛麂施州衛有紅麂同兎炙醃餘同鹿獐一名麕施州衛有花麞王者刑罰理則白麞至麕俱倫切鮮宜烹炙火餘同鹿兎黄羊飲膳正要曰種類數等又曰有白黄羊黑尾黄羊羱羊埤雅曰角尤大鮮宜烹炙火餘同鹿兎杜子美詩曰黄羊飲不羶野豬鮮宜烹火脯同鹿豪豬師古曰豪豬一名帚豲也宜醃入土一宿去腥收近火水獺宜胡椒川椒葱白醬烹狼白狼乃瑞獸同水獺狐同狼玉面貍貍種多俱宜火銀錫砂鑼中先鋪白糯米以花椒葱鹽酒沃貍身置於上蒸熟宜蜜慢火宜溲小麥麪苴之蒸野猫同兎筍雅即竹䶉蘓長公少公皆有詩宜火沃以花椒葱鹽酒溲小麥麪作厚餅苴之置銀錫砂饠中蒸宜火宜熟黄䑕一種塔剌不花又名土撥鼠鮮同兎玉面貍宜酒醅同葱花椒糟蒸宜火宜溲小麥麪苴之陳虎肉豹肉貛肉俱宜火郭璞云貒一名貛圖經云貒貛貉相類貒音湍鮮宜土中瘞一宿鹽醃一宿冷水烹稍熟易水加花椒葱復烹之駝峯駝蹄杜子美詩云紫駝之峯出翠釜蘓子瞻詩云臘糟紅糝寄駝蹄鮮醃一宿湯下一二沸慢火養肉宜火野駝同熊掌左傳曰胹熊蹯埤雅云熊冬蟄不食饑則自舐其掌故其美在掌胹音而用石灰湯撏潔以帛苴而烹之宜糟其掌入烹豬鵝汁中轉撈數迴絮羮珍美其肉宜火其白吕氏春秋曰肉之美者埤雅云熊當心有白脂如玉味甚佳俗呼熊白􅣸小段燖微熟同蜜食凡野獸各風土産者視所宜同鹿以下制獸屬通用并臟所宜千里脯訣曰不問豬羊與太牢一切切作十來條一盞淡醋二盞酒茴香花椒末分毫白鹽四錢同攪和醃過一宿慢火熬酒盡醋乾方始晒味甘休道孔聞韶香脯用牛豬肉微烹冷切片軒坋花椒蒔蘿地椒大茴香紅麴醬熟油遍揉之煉火上烘絶燥糟熟牛羊豬肉牛腱渠言切楚辭云肥牛之腱臑若乾之毎生酒醅一斤臘糟四兩熟油四兩鹽三兩以絹䝉糟豬羊頭蹄同爛烹去骨於潔布内取意布苴重石壓經宿糟之即如熊掌凡肉須臾欲用取糟之之蒸片時燘莫賄切同豬凍肉不宜橘皮豬熟者和宜雞鴨卵羊熟者和宜芼菜暴醃牛羊豬皆宜毎斤鹽二兩生二制豬羊豬兎􅣸甚薄䐑或報切甚細膾和以草果蒜酒澆惟南粤人用多蜀人則微燖之熟牛胃即肚細切烹胡椒醬醋調和韓昌黎詩云早菘細切肥牛肚驢腸􅠉汁烹熟復沃香油炙乾宜蒜醋羊肺腸胃腎血水烹熟胡椒甘艸醬醋葱調和漢書谷永傳曰濁氏以賣胃脯而連騎晉灼曰今太官常以十月作沸湯燖羊胃以末椒薑坋滿煩之暴使燥是也肝水烹熟宜醬水和蜜烹食能明目豬肺肝肚大腸白腸腎血肺水煮熟細切宜入香油少水胡椒醬和糝調和肺肚水煮熟肚以瓦器覆於鍋底或置於器上烹皆易爛宜甘草花椒葱胡荽鹽醋調和肚大腸禮曰腴水烹爛用茶葉同烹不穢氣宜花椒鹽肚生熟皆宜油鹽花椒葱酒澆烹肚用肉醢料實之縛兩端揉長烹爛冷切有熟切片􅣸兩合夾肉醢料調菉豆粉封口蒸大腸實肉醢料縛兩端水烹熟大腸和牛肚細切胡椒醬水烹熟大腸水烹同醬燒豬前一制或鹽酒浥之燒熟大腸血宜醬醋胡椒葱和汁烹為羮白腸綸絲縛兩端用酒醋水烹爛段切入熬油中後以肝片切微炒花椒葱鹽調和酒澆之即起芝麻花同白腸烹易爛白腸用肉醢料實之鹽醃暴燥烹肝水烹以花椒鹽酒浥之炙香腎外白皽之善切膜内白筋皆脱之禮曰除去筋膜也薄􅣸䐑水洗煩血水盡鹽酒浥笊籬盛沸湯中急燖煠色微改白合醬辣汁澆芥辣澆𢷬蒜和腎脱之塊切花椒葱鹽浥入熟油中速炒醬油酒澆即起鹿肺肝腸胃血同羊禽屬制鵝新生而棧者肥良殺鵝先瀹冷水中次入湯中退毛易潔血同羊雞鴨多倣此烹鵝水烹作沸湯時宜提動灌湯於腹易熟爛宜葱油齏宜花椒油宜用其汁同胡椒花椒葱白醬油調和瀹之内則曰弗食舒鴈翠注曰尾肉也埤雅曰翠上肉高有穴者名脂瓶葱油齏取油熬熟入以長葱調醬醋水縮砂仁花椒一沸杓入器中器中先屑葱白乃注入之油爆鵝二制一用熟肉切臠以鹽酒煩揉加花椒葱投小香油中爆乾香一煩揉以赤砂餹鹽花椒投油中爆之燒鵝三制即鵝炙一用全體遍挼鹽酒縮砂仁花椒葱架鍋中燒之稍熟以香油漸澆復燒黄香一塗醬葱椒澆油燒一塗之以蜜燒烹熟者同制宜蒜醋鹽水蒸鵝二制一用全體以碗仰鍋中蒸之鍋中入水半碗紙封鍋口慢煬火俟熟宜五辛醋一同蒸豬鹽炒鵝用剖為軒入鍋炒肉色改白同少酒水烹熟以鹽生蒜頭葱頭花椒調和和物宜慈菰芼熟去衣頂入山藥芼熟入水母滌去礬入明脯鬚先烹入油炒鵝剖切為軒先熬油入之少酒水烹熟以鹽縮砂仁末花椒葱白調和炒汁竭宜乾蕈洗石耳洗俱用其餘汁炒香入酒烹鵝剖為軒先炒色改白同水甘草烹熟寛注以酒加鹽醋花椒葱白調和和物宜生竹筍同入烹生茭白肉熟入之即起蘆筍生入蒲蒻生入全體亦宜熟鵝鮓用熟肉切為膾沃熟油地椒花椒蒔蘿末藕絲熟竹筍絲生菱白絲炒熟芝蔴鹽醋生鵝酢用絶肥者去骨方切小臠每五斤鹽三兩酒一大盞淹一宿去水坋地椒花椒蒔蘿紅麴屑葱白生薑酒醬少許和入罐中按實箬􅇈泥封四十日後開用留經嵗不敗鵝醢取熟頭尾翅足筋膚斫絶細和醬坋胡椒花椒縮砂仁用火鵝即鵝􅀈􅀈徒苓切同豬雞騸者稚者良割雞退毛同鵝割老雞瘞温灰中一時許退毛烹之易爛烹雞水烹熟乘熱以鹽遍挼之宜蒸熟花椒鹽醋花椒油蒜醋糟油燒雞用熟者以鹽酒花椒末葱白屑遍挼之架鍋中以香油澆上燒黄香生者同制油煎雞二制一用雞全體揉之以鹽酒花椒葱屑停一時置寛熟油中煎熟一用雞全體先在熱油中爁黄色以酒醋水鹽花椒慢烹汁竭為度油爆鷄二制一用熟肉細切為膾同醬𤓰薑絲栗茭白竹笛絲熱油中爆之加花椒葱起一用生肉細切為膾鹽酒醋浥少時作沸湯燖同前料入油炒蒜燒雞取騸雞撏潔割肋間去臟其肝肺細切醢同撃碎蒜囊鹽酒和之入腹中緘其割處寛酒水中烹熟手析雜以内腹用酒烹雞取雞斫為軒熱鍋中先炒色改寛水白酒丼草烹熟以鹽醋花椒䓤調和冬月多用醋待冷貯罋中宻封能致還數月不敗全體烹熟調和亦冝鷄軒先以醋煩揉入鍋熟亦色白和物宜地栗生㔐去皮㔐音僉鮮竹筍同烹生菱肉瓠乾生藕菱白雞熟入白鮝同烹河豚乾同烹辣炒雞用鷄斫為軒投熟鍋中炒改色水烹熟以醬胡椒花椒葱白調和全體烹熟調和亦宜和物宜熟栗熟菱燕窩温水洗麻菇温水洗鷄棕温水洗天花菜温水洗羊肚菜温水洗海絲菜亦曰龍鬚冷水洗不入鍋生蕈少􅀈冷水洗石耳温水洗蒟蒻盧筍蒲蒻竹筍乾淡者同石灰少許芼之易爛先芼鹹者水洗黄𤓰削去皮瓤胡蘿蔔塊切先芼水母明脯鬚熏雞二制用雞背刳之烹㣲熟少鹽煩操之盛於鐵牀覆以箬蓋置焚礱榖糠煙上熏燥有先以油煎熏烘雞刳鷄背㣲烹同酒薑汁鹽花椒葱浥之置煉火上烘且浥且烘以熟燥為度雞生二制一割已生卵未菢音暴雞撏潔不入水鼔刀取胷下白肉同股間肉􅣸絶薄䐑以綿紙布之收盡血水取少油㣲滑鍋中炙肉色改白報切為絶細末雜退皮胡桃榛松仁栗肉藕蒜白草果仁醬𤓰薑俱切絶細屑與雞末等和醋少許隨範為形像供延中用一止雜以胡桃榛松仁白砂餹熟雞鮓同鵝又宜和黄𤓰生𤓰去皮瓤條葅宜芥辣生鷄酢同生鵝酢凍雞用鷄烹熟手析之白鮝洗潔手析之同入鍋以雞汁生竹筍條橘皮條甘草花椒葱白醋調和貯瓷器凝凍之藏雞用鷄割嗉音素盡處去内臟將鏟去其骨其髖苦官切髀步未切間則鉗碎而取之調和切肉醢實遍滿少則足以豬肉醢割處挫針綸絲縫宻水烹熟宜母鷄初卵而未菢者火鷄即雞䐢䐢側究切同豬雞豉同豬肌肉俱用鴨用種大胞雛鴨斃鴨退毛同鵝燒鴨二制一用全體以熟油鹽少許遍沃之腹填花椒葱架鍋中燒熟一挼花椒鹽酒架鍋中燒熟以油或醋澆熱鍋上生煙熏黄香宜醋内則曰弗食舒鳬翠炙鴨用肥者全體􅀈汁中烹熟將熟油沃架而炙之鹽煎鴨同豬油煎鴨切為軒投熬油中炒香同少水烹熟加花椒葱白鹽酒調和醬烹鴨同豬和物宜芋魁山藥鮮竹筍茭白芝麻腐豆腐火鴨即鴨膎膎户佳切同豬宜老肥者野鵝野雞野鴨即鶩蚊雞色如蚊非鶡雀也鶡音文鳩鴿之屬二制一皆切為軒鹽酒浥片時投熬油中炒香同少水烹熟新蒜胡荽花椒葱調和宜鮮竹筍山藥一用全體以鹽㣲醃水烹㣲熟腹實花椒葱沃酒燒熟取油或醋滴入鍋中發焦觸之色黄味香為度宜蒜醋天鵝飲膳正要曰金頭者為上鷀䳓鴈名朱鳥靈鷄即鴇鴇音保􅝄鷺鷹鷂白鷴錦雞之屬二制一皆用全體鹽醃一日烹微熟屑蒜白葱白末川椒縮砂仁研濃醬同煩揉内外俱遍架鍋中燒熟一用全體鹽湯烹熟浥少香油置煉火上慢烘燥暑月久留不敢俱宜蒜醋黄雀中秋羅者則肥蘓東坡詩云披緜黄雀謾多脂雲間志云石首小魚長五寸秋社化為黄雀惠州志有黄雀魚八月化為黄雀十月後入海化為魚九月候人見雀入大水毎膏一滴為蛤一枚黄雀炙二制一黄雀微醃薄酒滌潔取頭頸翅研細醢雜鷄鴨子花椒葱白醬調和實腹中或雜鮮花餅倒置甑内摻末花椒屑葱白蒸一以鮮者同酒水花椒葱白鹽布銀錫砂鑼内蒸黄雀鮓三制一用黄雀鮮肥者薄酒滌潔軟帛抹乾背刳之腹間置小麥數粒葱屑花椒碎顆少許以頭尾顛倒相覆毎二十頭疊一小罐調香熟油酒漿炒鹽花椒葱屑澆没一寸取竹篾闗實封固收藏甚久用宜醋一宜方切小臠和水調雞鴨卵花椒葱白屑入器蒸一宜染水調麪油煎竹鷄北夢𤨏言曰竹雞喫半夏有毒加薑汁又有稻鷄茭雞之種鶡何葛切鴠練鵲本草云食槐子者治風疾䳺鶉鐵脚之屬撏潔用熟香油花椒葱醬油煩揉架鍋中燒熟滴醋熟鍋中發煙熏黄香宜蒜醋山鸜鵒刺毛鷹􅜇鴒秋禽海東飛至有畫烏紅肚等禽類非一種之屬視野鵝下隨宜制之有作腥者烹後乗熟以麥稍藉土上器覆之一時别制之寳慶府有鷓鴣鮓凡野禽各風土所産者視所宜同野鵝以下制禽屬通用并肫音諄卵等所宜暴醃鵝雞鴨皆宜同牛羊豬燘鵝雞皆宜同豬糟熟鵝雞同掌跖翅肝肺同獸屬鵝全體剖析四軒糟封之能久留宜冬月鵝掌美僧謙光曰願鵝生四掌生鵝鴨南粤皆用為之同獸至今存其雞者天下所同嗜也肺肝血野禽者不用熟肺肝細切膾宜新韭瓜絲菉豆粉油饊宜五辛醋或同熟鵝鮓宜芥辣生肝血宜油炒花椒胡荽葱鹽酒調和肺㣲炒起熟肝細切膾雜茭白藕絲乳線絲炒熟芝麻白砂餹鹽薑汁和宜辣烹和糝宜甜酸調和宜糟生肝宜醃卵野禽者不用醃先用水漬洗潔㫰乾以糜染鹽入甕或毎千枚取稻稈燒灰四斗鹽十五斤或十三斤碓通潤苴之入甕或貯於筐筥中而風戾之碎事曰杬子葢以杬木皮汁和鹽漬之或為混沌子取然炭灰一斗石灰一升鹽水調入鍋烹一沸俟温苴於卵上五七日黄白混為一處杬音元頓毎卵黄白二升水一升同小鹽調甚勻㵼銀錫器中槮花椒縮砂仁末葱屑不葢鍋隔湯慢頓熟宜甘草水酒或醋鹽葱煎汁瀹之宜肥辣醬之瀹之有調入熟鵝雞膏益珍乾用或先調卵於器湯中頓微熟細切熟豬肉醢鋪上又將卵瀉入再頓熟有内卵帶殻烹白微堅擊顛竅傾去黄調豬肉醢或細切乳餅滿實之又頓熟滚用甘草水酒炊沸以卵擊裂㵼入之花甲葱白鹽調和煎用熬香油擊卵㵼入或調以豬肉醢料㵼入或用攤者塊切再煎之或水烹半熟冷水浴退殻週界以稜壓低為菊花狀入煎之有水烹熟退殻綸絲斷為片染水調麪煎之用醋烹則殻柔能揉為方烹水烹熱浴冷水中取脱去殻欲餹心作沸湯入卵少烹之久烹半日餘即如抱退者煨用卵微烹擊裂醬油鹽茶清同在嬰糠火熱透留經數月有殻外束綫瘞灰火熟味優於烹攤用卵少水調雜豬肉醢料㵼少油鍋中攤開沃少酒或以鍋中少滑以油瀉調不入水卵勻甚薄片如春餅捲物用洒先作沸湯卵顛開小竅洒黄白條於湯撈之宜入酒入羮糟用熟卵去殻或生卵洗潔帶殻苴之用水烹饡用卵先油煎加以葱白花椒醬油酒調和之或用洒於湯中卵條撈入油煎復調和之宜和以新韭芼熟菜臺芼熟竹筍條索菉豆粉條竹嶼山房雜部卷三
