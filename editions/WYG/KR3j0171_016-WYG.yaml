body:
  text: 竹嶼山房雜部卷十六明宋詡撰尊生部四麴部造菉豆麴法豆一斤麫四斤將豆煑爛擣碎并汁和麪踏造白酒麴糯米五升擣粉或用粳米糯米各半生薑一斤擣杏仁半斤去皮尖爛碎嫩蓼八斤取自然汁一處搜和為丸以舊麴末為衣以穰草上下托盖候白衣生熱過方以籃盛挂當風處候乾用大禧白酒麴方木香沉香各一兩半檀香丁香甘草砂仁藿香各五兩槐花白芷零苓香各二兩半白朮一兩白蓮花一百朶取鬚用甜瓜五十箇擣自然汁右為細末用麫六十斤糯米粉四十斤和勻瓜汁拌成餅為度先稱麫粉拌勻次入藥末再又拌其藥末逐旋撒入令勻後作二起以瓜汁拌和得所搓令無塊却下廂踏只可七八分厚每隔須用白麴糝得厚勿令粘切作七八寸濶大用紙逐片包挂當風處四十日出曬三兩日收每米一斗官稱用麴十兩下水八升瓜用粗布濾去渣并瓜子蓮鬚研碎下料造紅麴方無糠粞舂白粳米水淘浄浸過宿翌旦炊飯用後項藥乘熱打拌上塢或一周時或二周時以熱為度測熱之得中則凖自身肌肉開塢攤冷洒水打拌聚起候熱攤開至夜分開攤第二日聚起洒水打拌再聚熱即攤冷凡聚熱又攤至夜分開攤第三日下水澄過瀝乾倒柳匾内候収水作熱攤分開冷又聚熱又攤至夜分開攤第四日如第三日第五日下水澄過瀝乾倒柳匾内候収水分開薄攤蘆蓆中二三日即成麴矣不要見日曬白第一日起至第四日每夜翻攤三四次若貪睡失誤以至發熱則壊矣每米一石用麴母四升磨碎海明沙一兩無名異一兩滴醋一碗一處調和打拌造酒每米一斗官稱下麴十兩下水八升若要燥水頭放寛酵麴在外只用清水者白酒藥良薑四兩草烏半斤茱萸薄荷菊花各二兩白芷官桂黄栢香附子乾薑辣蓼苦參秦椒各一兩丁皮益智杏仁各半兩右藥末半斤山石二斤米粉七升官河水為丸又方神妙在罁日乆亦可生留附子去皮臍白朮各二兩白芷川芎官桂不見火防風甘草各一兩川烏半兩草烏去皮臍漢椒去目各一兩砂仁一兩半已上日曬乾不見火為細末辣蓼二斤半青蒿一斤龍腦薄荷半斤蒼耳頭一斤半橘葉四兩晚桑葉一斤菖蒲葉半斤勾勒蔓半斤已上草藥沉入石臼内杵爛取自然汁不可入水右用糯米七升陳粳米三升淘浄控令乾杵為米粉入藥末拌勻方以藥汁拌和須乾濕得所太濕則青衣生再入臼内杵勻取出丸如雞子大中心揑作小冗入舊藥末少許先鋪青蒿半寸再鋪稻草二寸堆藥在上又以稻草鋪厚三寸盖之二日後取出如天氣熱只一日一夜亦不須厚盖候通體生白衣去草取出舊眼籃挂當風處三日刷去白衣七日可用白酒藥草烏二十斤或二十五斤光烏並同上白芷七斤薄荷十斤或十五斤良薑三斤秦椒七斤乾薑三斤千金草三斤香附五斤或七斤官桂三斤甘菊五斤或七斤黄皮二斤或三斤元有青蒿不必用右末半斤入吴茱萸一兩江茶子五錢土滑石一斤半氷粉一斗内將草烏光烏二件各分出五斤煨熱其餘亦五分内分一分用為末叧合成酒藥别安冬天時加入吴茱茰愈多愈好但只取此一味加烏頭官桂亦可合成又馬鞭草一斤或半斤蒼耳十兩或斤半車前葉二兩辣蓼十二兩或斤半薜藤三兩二兩即野蓽撥此一味無亦不妨右五味切碎入水同擣細絞其真汁叧放先以粳米四升半糯米升五合水浸三二時於石臼内洒水杵粉糠篩篩過入乾薑末三兩二錢和勻將前草汁拌和為丸如餅子樣復用舊酒藥末些少為衣盫法大深浴桶一箇麥幹或油萁尤妙鋪桶厎令厚却薄鋪青蒿即苦蒿一層於麥幹上然後攤藥餅如天色寒用綿枲衣被盖桶面天色熱用夾被或夾衣盖之經一宿俟藥餅如火之熱揭起盖物凉一二時熱氣出退藥餅放於篩匾上隂乾不許見日自盫日為始越七日便可釀酒每米一斗官用藥三兩半重若以半餅擣細投清酒内尤豁辣可喜白酒藥方茱茰斤半蒼朮白芷黄皮青皮陳皮滑石各斤半叧研入藥蒿子良薑苦參薄荷官桂天花粉各一斤菊花烏頭各二斤乾薑藿香半夏各四兩江茶子二兩草烏三兩木蘭皮右為細末每包藥味八兩入滑石末八錢白芷六兩半不妨大米粉一斗足數該做酒一十石以上每斗用藥春秋七丸夏六丸造酒麴白麫一百斤菉豆五斗辣蓼末五兩杏仁十兩去皮研為泥先用蓼汁浸菉豆一宿次日煑極爛攤冷和麫次入杏泥蓼末拌勻踏成餅稻草包裹約四十餘日去草曬乾収起須三伏中造黄子酒麴方以糯米三斗為率淘浄蒸飯八分熟放温用麫斟酌多少拌勻置不透風房内用麥柴或稻柴鋪地上又畨鋪席一領將米攤勻上用蒼耳盖之時時看覷恐致熱過成黒色須少黄衣為度每糯米一斗用此麴一斤依常法製造須初伏間為之中伏後則生蟲不可乆放此吾家常用麴也韭根麴方白麫二十斤韭根九斤生薑九斤右將韭根薑汁和麫得所摶成塊如雞卵樣用麥柴鋪盖二七日發過三伏日造如韭薑汁和麫不敷加添新水每糯米一斗用麴一斤依常法造白麴方丁香木香藿香白檀細辛官桂􅒦砂肉豆䓻蓽撥胡椒當歸蒼朮川芎白芷桂花頭良薑乾生薑附子天南星烏頭紅豆各三兩白朮人參各八兩吴茱萸陳皮防風甘草各一兩粳米一石一斗糯米一石一斗白麫五十斤杏仁麥糵一斗五升蓼子三稱此麴伏日製造係三十石糯米物料香酒麴方白麫一斤糯米粉甜瓜一百箇香熟去皮子取汁木香半兩白朮十兩蓮花一百朶去蓮取汁白檀五兩丁香白芷廣零苓香各二兩半右件六味碾為細末入麪粉内用蓮花瓜汁和勻踏作片紙袋盛挂通風處七七日可用每米一斗用麴一片夏月閉甕冬月待冷發時作糯米稀粥一碗温投之謂之搭甜蜜醖透瓶香用蜜二斤半以水一斗慢火熬及百沸雞翎掠去沫再熬沫盡為度官桂胡椒良薑紅豆􅒦砂已上各等分碾細為末右將熬下蜜水依四時下之先下藥末八錢次下乾麴末四兩後下蜜水用油紙封箬葉七重宻冬二七日春秋十日夏七日熟竹嶼山房雜部卷十六
