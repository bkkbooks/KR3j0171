body:
  text: 竹嶼山房雜部卷十七明宋詡撰尊生部五醬部伏醬三伏中黄豆一石曬乾篩浄磨去殻沸湯泡浸令漲上甑蒸熟糜爛為度去熱氣逐旋拌勻白麫七十五斤官稱攤蘆蓆上約厚二寸許候三五日黄衣上翻轉再攤窨三五日以手挼碎用鹽五十斤或六十斤約量用和鹽并醬黄下罁以手臂直到罁厎抄拌極勻有小塊即捻碎有草根即捻出候水將冷即以鹽糝罁面但擇晴日侵早便下罁寧可水少日後添入冷鹽湯然不可添多如太淡增鹽亦救不得凡醬黄攤輕則不黄重則黒爛且臭矣倘下罁後便遇雨天則以小杖撑起罁盖㣲放縫出氣仍以炒鹽停冷糝在醬面凡下罁後曬一過晴便打轉盖初下罁時打尚未勻全在這遍打勻使鹽水與豆相入又㧞出熱氣此最緊要自後約曬三五日一打盖初下罁醬黄浸不透皆漲起在上鹽水皆在下上面鹽力少若經六七日不打必致生蛆也倘下醬或水多鹽少上清下矴急逼出入鍋内煎去三之二留下待曬醬乾逐旋侵入麫醬白麫二十斤一云不拘多少冷水搜作硬劑切作一指厚蒸籠蒸熟取出攤三時許候乾以楮葉蒼耳葉麥榦盫盖到黄衣上勻為度去盖葉畨轉到次日曬乾刷去黄衣擣碎每四斤用鹽一斤水四斤拌勻入罁一用貫衆煎湯泡鹽水下日曬夜盖到四十九日極熟甜美治醬蛆每醬一甕用草烏頭五七箇每箇切作四半插在甕四邊及中心其蛆自死亦不再生或加百部尤妙熟醬油錫器置擂碎麫醬於中為窩注油重湯頓熟逡巡醬每以豆一官斗為率入􅄳糖四兩重加減隨宜此大法也鹽一斤可留十日二斤可留一月三斤可留乆逺在人取用其法木甑厎井口水上編蒲葦之類藉之或舊蒲蔞亦好先著水滿鍋置甑於上鍋口周圍用物擁蔽不令去氣甑中心立竹一根下扺鍋厎上平甑口其竹盖通節者以蘆一根從筒内挿入亦至鍋厎取出看蘆水痕深淺以此為候將豆淘浄隔宿浸裝甑中宻盖蒸之覺鍋中水漸乾用前蘆緝看如比先痕稍乾即以注子注水入筒内添之直候甑面上豆黑則連厎熟矣未黑再蒸須黑為度但不可動甑而揭盖增水則不妨謂之一氣熟取出攤冷石臼内舂爛入􅄳鹽拌和勻便可食用若要出賣臨時以鵝翎蘸熟油刷而尤香潤可愛此法甚可養生有一人以銀十兩傳得以傳胡公公與予相厚善遂傳之勾醬每醬一斤用麻油新打下麻餅𢷬碎篩過用十二兩鹽二兩水二兩攪勻用造醬二伏中不拘黄黑豆揀浄水浸一宿漉出煑爛用白麫拌勻攤蘆蓆上用楮葉盖一日發熱二日作黄衣三日後翻轉曬乾黄子一片用鹽四兩為率井水下水髙黄子一拳曬須不犯生水熟黄醬方不拘黄黑豆亦不拘多少揀浄炒熟取出磨成細末每豆細末一斗麫三斗入湯和勻切作片子蒸熟攤在蘆蓆上用麥幹蒼耳葉盫待有黄衣烈日曬令極乾一斤黄子入鹽四兩井花水投下去黄子一拳髙烈日曬之生黄醬方三伏中不拘黄黑豆揀浄水浸一宿漉出入鍋煑令熟爛取出攤令極冷多用白麫拌勻攤在蘆蓆上用麥幹蒼耳葉盫一日發熱一日作黄衣三日後翻轉烈日曬愈好秤黄子一斤用鹽四兩為率汲井花水下水髙黄子一拳曬不犯生水麫多好醬黄曬多好醬味小豆醬方不拘多少揀浄磨碎􅉫去皮再磨細浸半日榨乾擦去皮水淘浄控乾麫熟捻作團子盫盖候月方發過用大眼籃懸掛透風處至來年二月中旬用布擦去白醭擣碎再磨每細麴二十斤用鹽六斤四兩以臘水化開遇火日侵晨下兩月可食菀豆醬方不拘多少水浸蒸軟曬乾去皮每浄豆黄一斗小麥一斗同磨作麫水和硬劑切作片蒸熟覆盫盖黄衣上曬乾依造麫醬法用鹽水下榆仁醬方不拘多少淘浄浸一伏時搓洗去浮皮再以布袋盛於寛水中揉去涎控乾與蓼汁同曬乾再以蓼汁拌之每用榆仁一升發過麫麴四斤鹽一斤如法製之大麥醬方黑豆瓣浄者五斗炒熟水浸半日再入鍋用浸豆水煑令爛傾出伺冷以大麥麫百斤拌令勻以篩下麫用煑豆汁和捜作劑切作大片上甑蒸熟傾出攤冷以楮葉盫盖候黄衣上汗乾再曬擣碎揀丁日或火日下之每斗黄子用鹽二斤井花水八升化鹽水入罁造醬法凡造醬先以鹽淘浄去泥滓垃圾醬自佳先以罁盛水次以筲箕盛鹽於水中攪漉好鹽自隔箕兒下垃圾石土糞草之類皆留箕中須臾罁面又有一層黑泥末以搭羅掠之去盡罁中皆浄鹹水鹽如雪白澄於罁厎别以器盛起然後下醬先用水逐旋入白鹽多留些盖面上和訖以時蘿撒醬面上復以翎蘸好香油抹醬面及罁竹嶼山房雜部卷十七
