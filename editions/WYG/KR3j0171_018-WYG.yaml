  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0171_WYG_018-1a, image: WYG0871/WYG0871-0310a.png}
body:
  text: 竹嶼山房雜部卷十八明宋詡撰尊生部六醋部社醋白糯米一斗淘浄煑熟以麤細麴各一斤敲碎拌飯勻入甕留少許純飯蓋面便下水三十斤足稱黄草布紥口頓放透風處蓆遮之以使熱候熱稍退便去蓆熱過後方可打醋每日午時一遍打十數日後醋性定則住打三四十日熟候醋蟲生時逼取清醋煎過宻封收藏或去脚不煎生藏亦得大抵醋一熱之後不宜再熱熱則味淡矣打者所以使之不熱也春秋二社時可造春社遲造數日妙伏醋白糯米不拘多少初伏日用水浸起每朝換水至七日漉出炊熟下甕再七日下水每飯一碗用水一盆不必用麴糯米醋四時可造白糯米一斗炊熟拌麴半斤候冷入甕下水七醋陳粳米五斗不用淘水浸七日每日一次換水至第七日蒸飯熟乘熱便下缸手按平紙封勿令出氣第三日翻轉又封之第七日開封再翻轉傾入新汲水二石又封之七日攪一度封之三七日即熟矣一云陳倉米五斗浸七宿每日換水一次至七日做熟飯乘熱入甕按平封閉第二日翻轉至第七日再翻轉傾入井水三擔又封一七日攪一遍再封攪至三七日即成好醋此法簡易尤妙餳餹醋餳餹十斤温水三十斤春冬用熱湯夏秋用温湯攪勻入甕更下敲碎麤麴半斤每七日攪一度三七日熟黄草布紥甕口春冬日中曬之秋夏不曬一法加飯黄半升又法餳稀一斤水三斤先将水煎數沸豁出傾入餳稀攪勻候温入白麴末二兩同攪勻入甕紙封日曬春秋一月熟冬四十五日熟夏二十日熟下醋後到二十日後醋上有一層白醭面休得攪動任其自落之時醋乃熟也或不曬只頓静處勿揺動聽其自熟乃佳又法於臘月内收浄雪實納甕約五寸厚入餳稀一層再納雪又澆餳稀至十斤為度宻封泥固至來年四月八開黄米醋黄倉米一斗淘浄浸一宿早晨炊作硬飯令熟傾在蘆蓆上攤約四寸厚畧候飯如人體温用楮葉蓋覆如醬黄法候成黄子曬令極乾􅉫去黄衣再用倉米一斗如前炊作硬飯傾出令極冷将前黄子五升同拌在經造醋甕内冷水浸之水面約浸過兩拳又法看黄子并飯青到之處水亦浸到其處頓在静處以疎布羃之逐朝看覷時時以竹杖子攪動毋令生面半月以上香熟夏秋可造五辣醋煨葱白五莖花椒胡椒共十粒生薑乾薑各一分醋一大盞醬一匙入砂盆研爛可為五分供麩皮醋先以麩皮一斗炊熟􅝛黄停過七日後又以一斗炊熟連米四升亦炊熟拌和然後下甏水髙一拳泥了甏口曬在日中待二十日後放於隂地上歇四十日開篘用糟醋方二月初用七石缸稱臘酒糟七十斤下缸著水平浸隔一宿篘出糟再下糟七十斤再隔一宿再篘出糟用缸㔶蓋好若冷用稻草圍之到三四月間缸面結鱉撈去煎之下罈時用飛鹽一大把炒熟粳米撒在罈内􅂴婦醋六月六日以乾浄小麥磨極細清河水拌勻乾濕得所踏成餅子若傷於濕則中心清蒸每麥一升作餅一箇踏令十分堅實庶幾不蛀紙包裹挂當風處隂乾至秋社前一日粳糯米各一半和勻淘浄浸至次早正社日炊熟攤冷每米一斗用麴一餅如粳糯各一斗則用二餅研令極細拌入飯内盛潔浄甕甏中就以原量米斗下清河水每米一斗下水一斗五升如米二斗則水三斗以紙七八層宻封過一月即熟篘起頭醋煎藏再燒沸湯令冷下二醋多少約量三醋四醋亦如此下醋之日忌諸厭下二三四醋時再加些麴尤妙造麥麩醋每麥麩一斗清酒糟七斤半拌和十分停勻先以陳米二三合煑稀粥湯候麩糟停勻了方入粥湯再拌和令乾濕得所以捻則成團打則開散為度如捻未成團再入米湯些少用蒲簍盛貯上下四面厚用稻草蓋䕶頻候候到大熱時翻轉蒲簍再䕶俟熱再翻如此三四次過二宿即熱如三宿不熱者用陳米炊熱飯一碗團放蒲簍内便熱也小缸一口於下向鑽一竅布塞定將蒲簍於缸内入滚湯浸一宿或半日去塞布放出醋矣二醋依法再淋造千里醋烏梅去核一斤以釅醋三升浸一伏時曝乾再入醋浸再曝乾以醋盡為度擣為末以醋浸蒸餅和為丸如雞骰大投一二丸於湯中即成好醋造三黄醋法於三伏中將陳倉米一斗淘浄做熟硬飯攤令勻候冷定飯面上以楮葉或蒼耳青蒿皆可罨作黄衣上去罨蓋之物翻轉過至次日晒乾􅉫去黄衣浄器收貯至秋社日再用陳米一斗做熟飯與上件黄子乾飯拌和勻下水飯面上約有四指髙水紗帛幪頭至四十九日方熟慎勿動著待其自然成熟此法極妙造炒麥醋方陳倉米一斗或糯米亦可水浸一宿炊作飯攤温冷麤麴二十兩擣細火焙乾以紙襯地上出火氣拌飯勻放浄甕内入新汲水三斗又拌匀摺捺平用紙兩三層宻封甕口勿見風向南方安候四十九日開用小麥二升炒燋投入甕内少頃取醋於鍋内煎沸入瓶了上用炒麥一撮醋久不壊取頭醋了再用水一斗半釀第二醋旬日可取食之第二醋了又用水七升半釀第三醋更數日取食之第三醋了二三醋欲食須用炒燋麥半升許入甕内搭色猶可取第四醋味尚如街市中賣者此醋妙不可言米醋熱者盖謂炒米耳此法用炒麥所以性平造翻黄醋法陳粟米一斗淘浄水浸七日候覺酸氣淘浄七次上甑蒸熟如人體温下缸内捺實掺上白麫一兩用楮葉蓋候七日發使刀劙音利作十字用熟水三斗温下宻封蓋直候發每日早晩攪兩遍多攪尤妙五六日後澄清香熟撇取清者其脚再入温湯攪勻又待五六日成醋直至使了滓即已造麥黄醋法小麥不拘多少淘浄用清水浸三日漉出控乾蒸熟於煖處攤開鋪放蘆蓆上楮葉蓋之三五日黄衣上去葉曬乾􅉫浄入缸用水拌勻上面可留一拳水封閉四十九日可熟造大麥醋法大麥仁二斗内一斗炒令黄色水浸一宿炊熟以六斤白麫拌和於浄室内鋪席攤勻楮葉覆七日黄衣上曬乾更將餘者一斗麥仁炒黄浸一宿炊熟攤温同和入黄子捺在缸内以水六斗勻攪宻蓋三七日可熟造糟醋法臘糟一石泡麤糠三斗麥麩二斗右件和勻温煖處放罨蓋勤捺候氣香咂嚐有醋味依常法製造淋之按四時添减春秋用糠四斗半麩二斗半夏糠三斗麩二斗冬糠五斗麩三斗覷天氣加减造之造麩醋法初取麫麩先以五升用水和勻可作團即止上甑蒸􅝛作黄子須楮葉蓋兩日後成黄即打聚作一堆􅝛過夜曬乾先量起五升黄留作二醋然後用陳米一斗一升五升亦不妨浸一夜次早和先留麩皮五升用和勻蒸飯熟稍冷與黄子入缸一處打拌入水約五升瓶二十瓶以上攪勻用蘆蓆一片如缸口裁圓中開方一尺竅草布具糊一邊四外蘆與缸縁悉糊了置日中曬次早以杖物入草布竅内攪翻如此三早止須看潮候糊了三面草布三伏曬一月如月隂多曬十數日却榨下鍋煎數沸以浄潔瓶盛每瓶入炒麥一撮紙厚封紙上放草灰一把愈客氣置髙處勿著地氣二醋榨頭醋先一日煎下熟湯十瓶次早以先留黄子五升與頭醋糟和勻以所煎冷湯投攪如前封蓋却不須三打曬七造糠糟法每糟二十斤用水一擔不拘冬月浸一宿攪勻以爛為度如是新糟使水一擔半稻糠隨水拌糟須按令極勻装入甕將滿攤平以糠蓋或再用薦蓋甕口頻頻看覷候熱發便倒入别甕熱不得太過太過則損味如未熱不得動依前􅝛蓋熱候四度逐旋隨次按勻再煎湯淋取第二醋如要極酸即將頭醋煎重淋新糟其酸極佳如此欲得酸只將第二醋煎沸湯淋新糟已是重淋醋若更將逐甕頭醋再淋恐太酸了造成用川椒装入乾瓶泥起不可近濕氣煎了候冷装造醋之法惟要酸酸之訣在發熱時不可發過化糟時短著水淋下再淋自然妙也收藏醋法但凡收醋須用頭出者装入瓶每瓶燒紅炭一小塊投之掺入炒小麥一撮箬封泥固則永不壊或有入燒鹽者反淡了竹嶼山房雜部卷十八
