body:
  text: 竹嶼山房雜部卷四明宋詡撰養生部四鱗屬制身無鱗而名為魚者皆附後海水江水所産鰣魚爾雅曰鯦當魱注曰海魚也似鯿而大鱗肥美多鯁今江中亦有之宜日暴宜糟俱治不去鱗鯦俱救切魱音互蒸鰣魚二制一帶鱗治去腸胃水滌潔用臘酒醋醤和水調和同長葱花椒置銀錫砂鑼中蒸一用花椒葱鹽香油遍沃之蒸有少加以醤油鱑魚詩注曰似龍黄色銳頭口在頷下背上腹下皆有甲大者千餘斤即鱣今名鱑魚甲中有黄甚肥美亦有無者肉皆美此則雌雄之别宜糟宜日暴鱣張連切辣烹鱑魚剖治􅣸為䐑冷水同甘艸烹熟以胡椒花椒葱醤醋調和宜芼白菜臺和之鱑魚鮓記文曰酢蔵魚也用鱑魚肉方切小臠炒鹽醃之每斤計炒鹽六錢翌日布苴之壓乾又㫰令水竭坋花椒地椒蒔蘿紅麴匀和以香熟油漬没甕中令味自透經年不餒宜醋鱘魚爾雅曰鮥鮛鮪似鱣色青黒無甲有冠甚長與身相埒多脆骨埤雅曰江南俗云玉板宜糟惟腦傍眼下兩直肉宜日暴蒸析為細縷輟耕録曰鹿頭肉鮥音洛鮛音叔鮪音偉烹鱘魚同鱑魚其肺腸等俱堪用鱘魚鮓二制同鱑魚惟多䐑其脆骨武昌多以臘胚為之鯧魚宜為羮宜辣烹宜油煎宜糟宜日暴石首魚宜油煎宜鑽宜糟宜烘日暴燥日白鮝諺云棟花開石首來䲄魚宜油煎宜糟勒魚同鰣魚宜蒸宜烘宜油煎宜糟宜窨乾窨於禁切鯔魚宜油煎宜日暴宜糟鱸魚宜油煎宜日暴宜糟帶魚宜油煎宜日暴宜糟八帶魚宜為羮之類常制治而作之日抄云刷其鱗也滌之㣲鹽醃片時酒水烹熟花椒葱醋調和或挼鹽於魚身置花椒葱於魚腹以麥稍藉魚燒熟黄八帶魚無鱗鯊魚又名鮫有虎頭梨頭等状貌非一宜油煎宜日暴馬交魚宜油煎宜糟宜日暴板魚即比目魚宜油煎丫䲄魚宜酒烹宜油煎宜糟烏賊魚日暴曰明脯埤雅曰遇風虬前一鬚下矴名纜魚矴丁定切之類常制治之惟鯊魚湯退去皮㣲醃水烹熟𢷬醤薑醤油醋花椒葱調和赤魚本艸曰邵陽魚地青魚俱治潔宜日暴切為軒投熬油中酒水烹熟以青蒜葱白花椒鹽調和大鮆魚爾雅曰刀魚治宜同蒸鰣梅魚雲間志云石首小魚長五寸宜為羮宜同蒸鰣黄鯽宜酢俱宜油煎宜日暴之屬㣲醃酒水作沸以小筥布魚烹熟特起以鹽醋花椒葱和汁澆瀹之有以胡椒醬油和汁澆瀹之魚小者為䐑者為臠者宜入筥烹多倣此凍魚尾宜日暴冬月治之酒水烹熟宜胡椒醋凡江海魚宜釅醋白酒漿甘艸視所宜油煎者皆宜饡後多倣此江河池湖所産青魚宜虫宜鮓鰱魚即鱮古語云買魚得鱮不如啖茹今惟腹腴則為羙俱治作之去腮滌潔宜辣烹為羮酒烹油煎煎饡糟熏火日暴窨乾鱮音序蒸二制一用全魚刀寸界之内外浥醬縮砂仁胡椒花椒葱皆遍甑蒸熟宜去骨存肉苴壓為餻一用醤胡椒花椒縮砂仁葱沃全魚以新瓦礫藉鍋置魚於上澆以油常注以酒俟熟俱宜蒜醋鯔魚治肝堪用宜油煎宜酒烹宜日暴宜為羮宜糟鮠五灰切魚先治之作沸湯燖去涎水宜油煎宜糟鮎魚同制薑烹㣲醃作沸湯烹用甘艸擣醬薑醬油醋花椒葱調和之有不用淹與料物同入後倣此鱖魚宜油煎宜糟張志和云桃花流水鱖魚肥烏魚即鱧用必活者埤雅曰惟此魚膽甘可食宜油煎宜為生俱宜為羮湯燖治去鱗腮滌潔薄􅣸䐑鹽酒㣲浥布小筥中甘艸水作沸湯燖熟預以肚骨投烹加胡椒醬油醋調和為汁瀹之和物宜山藥鮮竹筍芼白菜蘆筍暑月似凍去骨熬璚枝調入冷切糟用後倣此鯿魚埤雅曰魴宜風宜糟宜窨乾大鮆魚宜日暴宜糟鱸魚宜日暴宜火宜糟宜生鰷魚即白魚宜火宜糟窨乾俱宜油煎宜同蒸鰣宜為羮酒烹三制一治去鱗腮㣲醃頃之滌潔先和甘艸水熟白酒醋鹽投魚齊烹熟入花椒葱起一腹實葱椒烹不以醋一烹熟惟以醇酒澆或加糟油有不用醃吹沙治腹有白甚羙宜油煎宜日暴宜熏鰕虎針頭魚治宜油煎宜酒烹宜日暴子鮆魚治宜油煎宜酒烹宜日暴宜糟比目魚治宜油煎魴皮魚治宜酒烹斑魚腹有黄甚珍治滌潔或去皮同猪肉斫為醢宜油煎宜糟箭頭魚有黄甚羙灰浥去涎玉箸魚治宜酒烹宜油煎宜熏俱宜為羮皆魚之小者爾雅曰小魚曰魚婢銀魚一名鱠殘宜同猪肉斫為醢宜酒烹宜油煎宜日暴之類莆田通應祠子魚俗誤為通印辣烹㣲醃入肉汁同甘艸烹熟以醬醋胡椒花椒葱白調和有不用醃鯉魚宜辣烹先刷其鱗囊括滌潔入水作湯數沸去鱗烹之宜油煎宜煎饡宜窨乾宜鮓宜火宜料烘宜糟不去鱗宜為生醬燒鯉魚治不去鱗滌潔按以熟油醬縮砂仁花椒腹中實以花椒葱鍋内置新瓦礫藉魚再以油澆落燒之熟摻以葱白屑起宜蒜醋清燒鯉魚帶鱗治滌按鹽於身腹實豬肉醢料或鮮乳餅或惟以花椒葱架鍋中燒宜蒜醋鯽魚本艸曰鮒宜酒烹宜油煎宜煎饡宜風宜糟不去鱗宜為羮宜料烘宜熏宜清燒同鯉魚辣烹鯽魚用魚治滌先刷其鱗􅌩括入水作湯數沸去鱗腹實肥豬肉醢料同吹沙制烹鯽用鱗多倣此法制鯽魚用魚治潔布浥令乾每斤紅麴坋一兩炒鹽二兩胡椒川椒地椒蒔蘿坋各一錢和勻實魚腹令滿餘者一重魚一重料物置於新瓶内泥封之十二月造正月十五後取出畨轉以臘酒漬滿至三四月熟留數年不餒河豚宜日暴宜醤燒清燒同鯉魚烹河豚二月用河豚剖治去眼去子去尾鬛血等務滌甚潔切為軒先入少水投魚烹過熟次以甘蔗蘆根制其毒荔枝殻制其刺軟續水又同烹過熟胡椒川椒葱白醬醋調和忌埃墨荆芥人傳西施乳為珍洪駒父詩云蔞蒿短短荻芽肥正是河豚欲上時甘羙逺勝西子乳吴王當日未曾知修治不如法有大毒諺云眼酸子脹血麻人鰌宜日暴宜料烘宜熏炙鰌梁朱異炰鰌不輟於口六七月間得肥大者治潔擊解其骨先熬油雜􅠉汁同鰌烹熟為鐵條架油盤中取汁潮沃炙透徹乾香為度宜蒜醋鰻鱺宜日暴宜糟取其鮮活者臨用剖宜油煎醬沃鰻鱺用必活者先以灰浥去腥漦里之切治去腸界寸臠猶屬之取胡椒縮砂仁醬赤砂餹沃一時用冬瓜或茄子藕芋魁大切片布鍋中置鰻鱺於上紙封鍋葢燒熟宜蒜醋辣烹鰻鱺同吹沙制加赤砂餹和物宜冬𤓰茄子鱓蒜燒鱓用鱓入水鍋中雜以稻稈數莖煬火水熱令自走退外膚别易水烹爛􅋇音貍分為膾投熱油内少以白酒澆之以鹽花椒葱頭蒜囊調和或再取蒜泥醋澆糊鱓用鱓同前􅋇膾先熬油炒投雞鵝肥汁中再烹加醬調和取起摻以乾薑坋和以芼熟韭凡江河池湖魚宜淡醋多用甘草墨娥小録云凡烹河魚先放在冷水中却燒火則骨軟海魚先調熟汁却入魚則骨堅又云烹時加木香少許在内不腥倪雲林云治魚無骨將踈絹反卷魚肉向外就沸湯中漸擺骨從絹眼中拔去油煎治魚㣲醃熬油煎熟有用魚先酒烹而後油煎有用魚薄􅣸䐑鹽酒浥少時油煎有用魚至小少骨者用鷄鴨卵同淅米清水調麫染之油煎廣韻曰煮魚煎食曰五侯鯖始於婁䕶會五侯競致竒膳䕶合以為鯖也鯖諸盈切煎饡治魚㣲油煎以醬酒水胡椒川椒葱白調和糟治魚滌潔㣲暴水收每醅子糟一斤炒鹽二兩熟油四兩川椒長葱和魚入甕封用置器蒸視所宜細切膾水調鴨卵花椒葱白同蒸有覆藉以豬脂蒸或油煎或煮壓餻風用魚帶鱗治去臓每斤炒鹽六錢醃二三宿滌㫰去水腹中實以豬脂肪醢川椒葱白鹽挫針縫宻倒懸於寒風中戾有用綿紙苴之而戾用蒸熏一治魚為大軒㣲醃焚礱榖糠煙熏熟燥一治魚㣲醃油煎之日暴之始煙熏之鮮烘用鮮活魚不去鱗從腮間摳去腸肚抹潔置煉火上烘絶燥漢書貨殖傳曰乾不鹽曰鮿鮿皆輒料烘用魚治去鱗坋地椒花椒蒔蘿大茴香每斤炒鹽六錢熟油同挼停三四時煉火烘燥紙苴之收火取魚治潔同豬有紙封酒糟於腹用煑日暴治魚每斤鹽一兩或六錢醃一日滌㫰水收以油花椒葱按烈日中布葦箔上暴燥用則火炮或蒸或􅣸䐑川椒酒浥蒸或油煎有乘烈日中淡魥復州界以竹貫魚為乾曰魥魥音怯而暴之有㣲醃遂暴之有薄􅣸暴之揉如擘絮禮曰䐹曰藁魚䐹音搜窨乾治魚以鹽疊於器内每百斤計鹽二十斤停三四日置日間㣲曯水去收窨中蘆竹藉地復加鹽疊二三日瀝水盡入器用或油煎或烹或蒸或糟周禮曰鮑為酢同鱑魚為生取活魚治潔去皮􅣸絶薄為䐑或絶細為膾移綿紙間收盡血水和蒜片橘絲或白蘿蔔絲釅醋漬用隋唐佳話曰金韲玉膾梭魚出六合縣龍池同鰣魚酥魚出徽州乾用宜醋花鰌形甚小無骨出寜國縣宜辣烹料烘孩兒魚出伊洛間本艸曰兒魚又有嘉魚鯉質鱒鱗肌肉甚美出于沔南之丙穴宜煎饡辣烹大口魚出朝鮮國宜水漬柔辣烹龍脯出大琉球國體如松節味似乾鰕宜海膽汁同食之味佳魚制外有販鬻者銀魚乾有大小出各湖宜酒花椒葱沃之蒸宜油炒同韭宜酒烹同冬𤓰鮮竹筍宜染調麫油煎宜為羮烘魚出台州多石首魚宜水漬柔辣烹同鮮竹筍菜宜入羮白鮝出寜波健跳者上爵溪者次即石首魚宜炮宜烹用醋宜入羮同鮮竹筍菜豆腐魚身外有别制者鰣魚子鯧魚子䲄魚子國語曰魚子曰鮞用鹽醃烈日中布新瓦上暴燥用蒸宜醋鯊魚子乾宜蒸用醋明脯鬚乾即矴宜烹熟用熟油醋魦魚鬐乾宜蒸用醋凍魚尾乾宜蒸用醋醃魚子鰾毘眇切宜醋凡有鱗屬皆視以上所宜制蟲屬制月令家語鱗羽臝毛介皆蟲也今屬非特介蟲依本艸皆曰蟲臝音祼鱉爾雅云鱉三足者名能能奴來切黿同鱉制烹鱉至冬冝食荘子曰冬則擉鼈于江尾短者母鱉多卵擉初􅃋切二制一先取生鱉殺出血作沸湯㣲燖滌退薄膚易水烹糜爛解析其肉投熬油中加原烹汁清者再烹用醤赤砂餹胡椒川椒葱白胡荽調和一先燖滌生斫為軒同前再烹調和和物宜潭筍熟栗熟菱菉豆粉片炰鱉二制同前制去膚寛用甘艸葱酒水烹熟刳去肺腸内外煩揉以葱川椒胡椒縮砂仁坋醤熟油赤砂餹鍋中再熬香油取新瓦礫藉其甲炰之頻沃以酒香味融液為度有軒之浥鹽酒入油炰鯪鯉又名川山甲治去皮甲肝腸鹽醃二三宿水烹之蛙又名田雞周禮蟈氏掌去鼃黽焚牡蘜以灰洒之則死山鷄形甚大性寒同制食宜燒酒俱宜油煎同魚或先以鹽酒以醤沃之宜糟同魚宜為羮酒烹田雞治去首膚腸爪同前魚辣烹田雞二制同前魚不醃或先熬炒田雞餅子同前豬肉餅雜以肥豬肉机上斫細甚為醘或瀹以辣汁或澆以芥辣熏田鷄同前魚烘田鷄治之連膚每斤鹽四錢醃一宿滌潔煉火烘燥用則温水漬潤退膚辣烹醃田雞治潔每斤用鹽一兩醃一宿暴日中夜晴則露之色白復暴燥收沃田雞治潔用桂皮白芷鮮紫蘇葉為末同油醬沃一時少水烹熟暴燥田鷄炙治滌俱潔將醬赤砂餹胡椒川椒縮砂仁坋沃之少頃入熬油中烹熟置煉火上紙藉炙燥田雞豉同豬連用其骨鰕海豐縣出土蝦肉色黒大如小兒臂長四五寸有腹無口目有三十足如笄簮青鰕海中産今曰對鰕六制龍鰕出福建同制一鮮者鹽水烹熟宜醋一烹熟暴燥一暴燥辣烹一入羮一倪雲林用􅣸川椒鹽酒漬之少燖一為豉同田鷄白鰕海中産四制一鮮者去鬚鹽浥片時滌潔布食器中摻末川椒取其鬚等入水同白酒烹甘艸葱鹽醋調和澆一二次用一止煎沸白酒澆之一和鹽蒸熟暴燥一俱入羮鰕腐脫大鰕頭𢷬爛水和濾去滓少入鷄鴨子調匀入鍋烹熟取冷水㵼下俱浮於水靣撈苴絹布中輕壓去水即為腐也其脫肉机上斫絶細醢和鹽花椒浥酒為丸餅烹熟置腐上擷鮮紫蘓葉甘草胡椒醬油調和原汁瀹之或薑汁醋澆之或入羮油炒鰕二制一先入熬油中炒熟醬醋葱調和一惟以鹽鹽炒鰕用鰕投水中同鹽烹熟宜醋烹熟之取水淋潔暴燥挼去殻為鰕尾色常鮮美宜黄𤓰絲用蒜醋宜油炒用韭頭宜為羮用豆腐生暴鰕綿鰕海中産同制用鮮大鰕置烈日中一日暴使燥蒸宜醋生醬鰕用鮮大鰕同末花椒醬油中漬熟宜醋生酒鰕用大鰕每斤先以鹽五錢醃半日瀝乾置瓶中每層雜川椒數顆以醇酒化鹽每斤二兩五錢漬没之泥塗瓶口俟十餘日熟生醃鰕用鮮大鰕每十斤鹽一斤醃疊之泥封一月俟熟宜醋其絶細者今曰鰕醤望潮即章舉一踵石距相類同制本艸云味珍好食品所貴重鮮宜㣲燖胡椒醋澆宜辣烹宜為羮宜糟用蒸水母即海蟄又名䖳謝宗可詩云海氣凍凝紅玉脆天風寒結紫雲腥䖳徐嫁切治潔入筐筥中瀝去其水以井水復滌令潔坋明礬同鹽揉入甕有寛汁令滿漬之用切膾花椒醋澆鮮宜用湯燖入熟油胡椒醋宜油炒入花椒葱宜糟用頭宜醋明礬坋一斤折鮮水母十二儋黄甲即蟳宜酒烹同魚宜烘同魚不用解宜糟同魚用熟者擊裂其螯蒸黄甲取生者裁竹針從臍内貫入腹架鍋中少水蒸熟肉始嫰刀解去鬚抹去泥沙宜薑醋白蟹殻之兩端皆銳傅肱蟹譜謂之䗻宜糟蒸白蟹同黄甲蒸不貫臍宜薑醋螃蟹按本艸以蟳即蝤蛑蟹圖云蟹巨者名曰蝤蛑兩螯有苔今名蟳者螯滑非蝤蛑也故從蟹圖霜後則肥皮日休云蟹因霜重金膏澁烹蟹冷水烹掲鍋葢則青色宜橘錢薑鹽醋倪雲林用生薑紫蘓橘皮鹽同烹燒蟹蒸附當蟹口刀開為方穴從腹中探去穢滿内醬花椒葱口向上布鍋内筐親於鍋煬者舉火時以油從鍋口澆落少許後以白酒薄調花椒葱醬漸澆於鍋俟熟不令有焦有内屑豬脂肪葱白花椒鹽架鍋蒸俱宜薑醋橙醋黄山谷詩云忍堪支解見薑橙芙蓉蟹用蟹解之筐中去穢布銀錫砂鑼中調白酒醋水花椒葱薑甘草蒸熟瑪瑙蟹三制一用蟹烹解脫其黄肉水調菉豆粉少許煩揉以鮮乳餅同蒸熟塊界之以原汁薑汁酒醋甘草花椒葱調和澆用一倪雲林惟調雞子蜜蒸之一用辣糊五味蟹用蟹團臍者每六斤入甕一層疊葱川椒一層取醬一斤醋一斤鹽一斤糟一斤酒不拘筭薄調漬没蟹為度熟宜醋酒蟹三制一用團臍者從臍盡實腹中以𢷬蒜泥鹽一實以坋花椒屑葱俱以白酒醅同鹽花椒葱漬之宜醋一蟹譜酒蟹須十二月間作於酒甕間撇清酒不得近糟和鹽浸蟹一宿却取出於厴中去其糞重入椒鹽訖疊淨器中取前所浸酒更入少新撇者同煎一沸以别器盛之隔宿候冷傾蟹中須令滿油炒蟹用蟹解開入熬油中炒熟鹽花椒葱調和糟蟹二制一取熟蟹去臍過冷入糟宜醋糟同魚一用生蟹團臍者每斤先以炒鹽四兩醃之次以白酒醅泲稍乾每蟹一層醅一層入罋泥塗其口勿見火藏可數月醬蟹二制一熟蟹去臍以原汁俟冷調醬漬之一生蟹團臍者惟以醬油漬之可留經年宜醋墨娥小録云熬香油入醬中可乆留不沙澁蟹胥禮注曰胥醢也二制用蟹去筐臍穢𢷬糜爛同醬胡椒花椒縮砂仁坋和熟用裁絹為小囊括之宜醋有和酒醋鹽蟛􅒹二種沙蟹亦滑螯一大一小體性柔和味甚甘肥又非擁劔蟹圖未及之也宜生糟用醋宜𢷬胥同蟹用醋宜同蟹譜酒蟹制澀蟹至小而色白性柔而肥本艸曰蟹奴陶榖謂蟛􅒹一蟹不如一蟹未嘗見此也宜生糟用醋鱟小者為鬼鱟宜用大者韓文公詩曰鱟實如惠文骨眼相負行用刀當其背刳之取足内向者去其腸甚臭惡不可傷動切為軒以胡椒川椒葱醬酒浥藉以原殻入甑蒸其水别入鍋烹如腐宜澆以胡椒醋醃酉陽雜爼曰鱟醬宜醋蠣房本艸圖經云海族之最可貴者名蠔楊誠齋詩云懐玉深藏萬壑間烈火煏開挑其肉澆以川椒醋醃宜醋蚶本艸曰瓦壠宜醬油漬同蟹宜為羮壠刀竦切烹蚶先作沸湯入醬油胡椒調和滌蚶投下不停手調旋之可拆遂起則肉鮮滿和宜潭筍酒蚶滌潔入罋調生酒漿熟油炒鹽川椒葱白漬之蛤蜊宜烹方張口内熟油醬花椒燒蟶石决明又名鰒魚鰒音伏白蜆白蛤蘓東坡松醪賦曰蛤半熟以含酒清烹先養釋米水中一二日令吐盡沙泥作沸湯調白酒川椒葱白投下旋動不停手方張口即取起剥肉鮮嫩而滿為鮓投沸湯中調旋張口取以剥肉用原汁濯去泥沙泲去水以熟油鹽醋碾炒熟芝麻和之宜取肉辣烹同魚和以麫糝宜取肉油鹽炒酒澆宜取肉為羮宜生者以冷鹽湯漬其張口取肉濯去泥沙泲去水酒漿熟油川椒葱白再漬之用醋宜生者滌潔以醬油漬用醋鹹蟶作沸湯投之滴香油數㸃肉自脫下宜和豬肉醢料為湯餅餡宜入羮宜酒漬同蚶宜醬油漬宜為鮓同蛤蜊淡菜牛翰林曰君子安知淡菜非雅物也滌潔作沸湯㣲燖剖其肉除邊鎻及毛調和胡椒川椒葱醬油醋為汁用之乾者宜入羮即􅨒􅨒音劫脚鮮宜辣烹宜入羮醃宜醋將軍㡌鮮宜辣烹醃宜醋糟宜醋江瑶柱即馬甲柱郭景純賦海月如鏡其柱如搔頭大一名江珧柱二制一取生肉酒滌潔細絲如箸頭大沸熱酒烹食之一細作縷生和胡椒醋鹽赤砂餹冷食之倪雲林作假江瑶柱用江魚背肉作長條子每箇取六塊如江瑶柱狀鹽酒浥蒸以魚餘肉熬汁用魚頭去骨取口頰金紅色幷尾煑泥螺又名土鐵醃宜醋醃者復糟宜醋􅀈音速醃宜醋蚌歩項切爾雅云蜃登州有海市云蜃吐氣成樓臺也蜃市刃切預以釋米水養之吐出泥沙生􅣸油醬胡椒烹螺螄田螺蓼螺俱養釋米水中去泥沙螺螄烹取肉辣烹用糝宜鹽水烹取肉用胡椒醋倪雲林取田螺生􅣸沙餹濃浥飯頃洗潔以花椒葱酒再淹鷄汁中㸑本草曰蓼螺辣如蓼生食以薑醋黄蜆宜為酢同蛤蜊宜為羮海出者宜醬同蛤蜊預養釋米水中去土氣取水烹宜油鹽酒花椒葱頭調和海螄鹽水烹熟宜醋蟶鼻子出揚州蟶有長鼻能自截如刀切小方臠醃宜醋鰕子鹽水漬炒乾宜醋蟹子同鰕子宜醋鱟子醃宜醋凡有蟲屬皆視上所宜制竹嶼山房雜部卷四
