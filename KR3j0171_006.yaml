body:
  text: 竹嶼山房雜部卷六明宋詡撰養生部六雜造制造茶三制學林新編云茶之佳者造在社前其次火前謂寒食前其下則雨前謂榖雨前此建安之造茶然氣有先後地有寒熱茶有早晚惟取萌蘖為上不得泥此以論茶也一摘茶萌心為上作沸湯微燖之㫰乾綿紙藉煉火上焙燥一摘葉於鍋中焙柔以手煩揉之焙燥一以葉蒸過晒乾冉以火焙燥俱以竹箬厚藉筐筥收水木犀半含桂花摘采甚潔入絹囊置清水中煩揉去苦重壓令乾疊入瓷罐竹箬覆掩之遂以長篾重重側圍箬上篾心留通一穴㵼清水滿漬須每日易水永不蔫爛炙燥能久藏柿餅俗作柿非柿芳味切削木片也柿霜後半熟者摘之輪去外皮日中晒柔漸以手按抑為餅冉晒起霜收南棗一統志曰膏棗南地鮮甜肥棗湯中微煮入稻稈藉筐筥中覆蓋一宿晒乾復蒸之紅而肉厚小甜棗藉桑葉蒸熟晒乾紋細而紅北棗牙棗紅棗圈棗北地鮮棗在鍋煮熟急入冷水中漉起晒乾火炕焙者曰北棗煮熟手捻退皮晒乾者曰牙棗生而晒乾者曰紅棗生而輪去皮鍋中藉以厚布慢火炙乾者曰圈棗蒲萄乾凡果乾者曰䕩禮曰其實乾䕩取熟甘者甑蒸柔日中晒乾復火中焙之梨乾赤梨片切窨稍乾甑蒸冉晒之桃乾生桃切去核湯中芼灑小鹽晒乾用加赤砂糖李乾大鮮李湯中芼之日晒乾巴思把餅兒采花紅周正而生堅者􅣸去皮周遭界稜如橘囊狀連晒二日用手輕輕挼匾冉晒半日蒸熟復晒乾其形製氣味與本土出産者無異蜜瓤瓜生甜瓜去皮瓤華之四分先以熟水洗過泲乾用蜜湯煎去其水又入熟水內漉出拭乾冉以蜜慢火煎令甜透如琥珀色取出仍以熱水浴之取起拭乾即以布藉壓令堅實日晒或火焙新瓷器收與真蕉黃無異也梅酥二制內則曰水醷醷音億一用熟梅蒸爛布絹中泲去皮核調炒鹽鮮紫蘇葉絲日中晒乾每梅漿百斤鹽十五斤一取霜梅連仁核鮮紫蘇葉絲冉熬赤砂糖同搗糜爛日中晒乾果單先以漆先平之器少以蜜潤使滑用桃李杏等果甘熟者蒸柔取絹濾其漿洗於蜜上置烈日中常搖振晒使勻薄俟乾揭用林檎奈子楸子等果則生取漿熬稠澆晒細酸切青梅細絲茭白細絲同紫蘇新葉浸造霜梅水中色味俱美晒絶乾加青橘皮絲以蜜潤用風栗食療云如腎氣虛弱每日空心細嚼之霜後摘之投水中試去浮者以潔布抹乾日晒醒用越布囊括於中而風戾常搖動則令均透風菱菱粉採取鮮者晒乾懸筐中風戾煮去殼搗晒羅粉風藕藕粉嫩藕頭懸筥中風戾老藕搗汁加水帛澄粉晒風地栗取絶甘嫩多漿者帶土懸筐中而風戾之細糖用赤砂糖加廣糖入鍋熬熱冷定以炒熱麵溲熟芝麻或薄荷葉縮砂仁末少許加糖香揉塊隨意片切或紐索或範為花形取火焙乾雜果糕炒熟栗去殼斤半柿餅去蒂核煮熟紅棗胡桃仁去皮核各一斤蓮菂末半斤一處舂碓糜爛揉勻刀裁片子日中晒乾有加荔枝龍眼肉各四兩五美薑薑粉鮮嫩薑采抹去皮每塊裁分四處每斤用白梅半斤槌碎去仁同炒鹽一兩和晒三日入甘草末五錢甘松末三錢白檀末二錢曬一日收入瓷器中生薑爛搗濾汁晒粉松黃餅用熟蜜白砂糖隔湯頓熱漸和松黃範為小餅蒲黃餅本草云市㕓間以蜜溲作果食貨賣甚益小兒摘新蒲黃同松黃山藥蓮菂芡栗菱藕荸薺等粉宜同制範之為餅雪花餅用菉豆粉炒熟二斤柿霜八兩薄荷坌四兩縮砂仁坌一兩煉蜜和之範為小餅菉豆粉糕先用水作沸湯下熟蜜下菉豆粉下薑粉調適均滑器潤酥油盛之脫下刀裁開以酥油澆赤砂糖甘蔗搗漿入鍋慢火煎少續水不令作焦以石灰少許投調遂凝厚為糖白砂糖二制每赤砂糖百斤水百斤勻和先以竹器盛山白土用糖水淋下濾潔入鍋煎凝白砂糖閩土則宜用水調勻復煎入模則脫為猊糖之類今曰響糖糖霜又曰糖氷黃涪翁答雍熙長老詩云逺寄蔗霜知有味勝如崔子水晶鹽楊廷秀詩云亦非崖蜜亦非餳青女吹霜凍作氷透骨清寒輕著齒嚼成人迹板橋聲皮糖每上等白砂糖十斤用水五斤慢火煎熬以滴水成珠冉候堅柔停勻為則先取瓷罐截小竹板二十餘枝縱橫置其腹間乃入以所煎之餘過一宿以罐覆碗上令其滴盡糖水半月兩旬視罐中糖霜凝結竹板之上則擊罐而取之滴下者冉煎得所置新瓦上以兩杖鼓臂抽擊遂為皮糖也皮糖以餑致逺不粘蕨粉葛粉蕨粉作沸湯溲之緘糖蜜豆沙或豬魚肉醢為餅蒸熟葛粉同麵筋用小麥白麵十六斤鹽四兩溫水和帶軟候水脈停當少時入冷水一桶從慢至緊掿洗濁則易水已成麵筋苴箬中置籠上蒸有用麥麵同制惟先宜揉韌水中停麵絹濾潔即小粉也紅花子膏釋去浮者臼內搗碎入湯浥汁更搗更煎汁鍋內沸入醋㸃絹挹之似肥肉入素食極珍美菉豆粉菉豆湛潔之漬捼去皮同水磨細以絹囊洗去但取細者加原粉酸漿㸃定成粉又以囊瀝水乾用豌豆亦可為有三制作如索粉則加調原糨揉勻兩手並搓入沸湯漉於冷水中湯粉則加水調入湯鑼沸湯中旋沒之脫於冷水中軟粉則水調入鍋煮杓於小滑器脫下以冷水漬索湯者皆宜油煎芝麻腐芝麻湛潔水漬磨糜爛囊濾去查滓煎沸漸加菉豆粉調旋冉煎視老嫩得宜入器待冷用有少加以赤砂糖每計芝麻一升清水二升乾菉豆粉八兩豆腐二制朱文公先生詩云種豆豆苗稀力竭心已腐早知淮南術安坐獲泉布黃豆二斗菉豆二升同水漬之候豆肥滿帶水磨細調以油滓用絹囊盡取其查置鍋中速火煎熟翻入一器將苦滷加水漸滴之見下凝成小顆挹入布藉器中厯出水為腐漬冷水內面衣未㸃時宜揭用漬豆過則少腐宜次序漬欲熏晒惟壓實以充所須有磨炒豆篩細三升麵和漬生豆二升漿煮熟置器壓實甚宜熏晒乳餅乳漿曰酪取下牛乳入鍋煎熟就以其酸泔漸漸滴下成聚布苴為餅乳線用初煎淡乳餅入湯鍋內隔器湯中捻絹片形上竹木棍捲扯仍下湯鍋內冉湯捲扯三五次上挣牀晒乾入少熟油捻更滑潤也酥濃而凝者為酥清而少凝者為醍醐醍醐音提胡抱螺取下牛湩貯於一甕造十字一木鑽立於其中令兩人對持糾纒牽發其精液在面者杓之復定墊其濃者煎撇去焦沫遂凝為酥有苴白砂糖模為餅有疊白砂糖切為糕清者加少羊脂肪烘鎔和以蜜滴旋水中而若螺抱者曰抱螺皆至寒月可造凡煎每斤加切白蘿蔔一二片去其羶盡乳汁曰湩今人有以牛羊骨髓煎之者亦曰酥乳腐乳餅煩揉真菉豆粉中水調入鍋煎視老嫩適宜取貯於器候冷切用羊羔酒每白糯米一石炊作白酒漿至時以肥羊肉七斤切塊杏仁煮去皮尖苦味一斤同水煮糜爛留汁共六七斗加木香末一兩俟寒傾入漿中冬釀十日酒熟取之蜜酒白沙蜜三斤水一斗同煎入瓶內候溫加細麴末二兩酒酵二兩紙羃口置僻所春秋十日夏七日冬十五日成美酒一斗賽葡萄酒用銀石器將磨碎去皮黑豆入水加烏梅數個明礬少許熬色黑濾潔調以酒蜜得所盛瓶中密封一宿飲之與真者同荸薺粉老荸薺搗取汁湯鑼湯之成粉皮同藕成乾粉菱腐藕腐鮮菱老者搗濾取汁加真菉豆粉蜜白沙糖熬成腐藕同蒸果蔬荀家曰悶子同棗栗菱肉胡桃榛松仁皆退皮俱碎切以菉豆粉調糨雜糯米粉和蜜赤砂糖縮砂仁川椒揉和甑中蒸粉熟為度切條段油煎或和豬肉醢或入於羮瀹之蒸蔬用麻菰菌竹筍木耳麵筋乳餅茭白菱藕碎切加香油餘同蒸果菉豆芽赤豆芽取菉豆水漬二宿候甲拆輕釋之內有竅缸中以編蒲等覆蓋蔀屋下勿見風常將水灌至濕透缸竅令放去其水俟芽長二三寸用赤豆同芥辣芥菜子湛潔入器乘濕時研不停手絹布泲其漿貯瓷注中水沈冷加鹽少許或以醋松仁油寧夏有核桃仁壓為油松子去皮殼搗糜爛水絞汁熬取浮清油綿濾潔冉熬之或研壓取油杏仁油杏仁搗糜爛和水煮取浮油綿濾潔冉熬成油大麻子油麻子爾雅曰黂詩曰苴賡扶涕切麻子碾碎入湯中煮漸杓取油藏之芝麻油芝麻炒熟研碎入湯內煮數沸殼沈于底油浮于面杓取去水收之較車坊者更新香也花椒子油摘新花椒子入菜油鍋中煎透笊起研糜爛以絹泲其香味仍調油中糖香零陵香一斤甘松四兩藿香一兩丁皮二兩官桂花四兩甘草半斤荔枝殼半斤松子仁一斤俱為細末和勻合香頭麝香一錢生薑汁四兩赤砂糖一斤先將麝香乳細漸入薑汁乳令如膠入糖冉乳停勻盛瓷罐內取綿紙油紙羃口甚密置飯上蒸透下於食物香最醖藉紅麴用粳米煮熟爛飯煎赤靈芝草汁溲為團中穿一穴上下擷辣蓼葉覆藉三五日未紅冉煎赤靈芝草汁常灌之常浴之仍以蓼覆紅為度晒乾收七月八月可造湯浸研之為染食物所須漿水炊熟粟米乘熱投冷水中浸五七日用夏月易酸稻米飯亦宜齏水松菜作沸湯燖之入煮麵絶清湯中用小缸盛菜不必多酸即用冬宜近熱易熟果品等物宜生宜乾宜制用未盡者荔枝鮮乾去殼龍眼鮮乾去殼梅子青宜糖黃宜去皮糖蜜杏子杏梅桃子禮曰膽之日抄云去其毛也家語曰哀公以黍雪桃孔子對曰不聞以貴雪賤也王桃櫻桃李子乾或冉蒸奈子林檎頻婆出南粵者􅜊可煮枇杷去皮宜蜜楊梅用鹽梨子輪去皮沙橘皮囊皆美衢橘早黃橘蜜橘小橘穿橘糖南橘匾橘青勝於黃緑橘以上皆去皮金橘用皮有皮肉皆甘者蜜柑皮甘於肉香柑乾柑蜜曇柑脫花甜柑生熟皆美以上皆去皮牛乳柑用皮波斯柑去皮青柑熟酸去皮酒柑切宜酒柚食皮石榴剖用子羊棗乾蒲萄有乾者或冉蒸蒲萄煎酒調用菱米鮮棗紅棗南棗圈棗牙棗木蜜木瓜宜霜後無花果郁李鮮栗去殼衣馬檳榔去殼取肉食之飲冷水少許共咽如蜜楸子果單枝頭乾蕉黃去殼柿子秋分時濫用每儋先入器作沸湯二儋投石灰一升攪勻浸沒其柿草覆一宿起惟銅盆則宜寒露時熱用以桶底及四周布以荷葉中入寒梨三四枚或木瓜麩團內柿側之蒂相向上又以荷葉覆滿一二日皆熟緑柿百枚中置肥皂二梃覆之一二宿自熟柿餅宜中藏胡桃仁西瓜削去皮華之或取汁加蜜隔湯頓再以氷沈冷用熟甜瓜削去皮華之甘蔗榨漿用糖霜響糖宜胡桃仁皮糖那合豆煮熟炒乾用雪蛆蒸宜花椒鹽蜜燒酒雜志云蛾睂雪蛆消內熱凡禽獸魚蟲燒醃糟乾者俱宜醋凡禽獸魚等熏晒乾甚者用槌軟洗潔烹如鹹更調鹽水浸一宿洗烹烹必易水凡醬漬鹽醃控乾晒乾等長久之菜宜洗淡用油炒同花椒葱白生薑凡食油酪物必用烹茶飲之食鹽物必用溫酒飲之食葷必用北棗食之逺方一時難制之物巴旦杏桬棠果八檐仁餘甘子必思答仁羊桃剖榅桲去浮毛榅烏沒切桲蒲沒切波羅蜜剖大藥剖優曇鉢鮮子黃彈君遷子鸚哥舌菴羅果宜母子盧都子盧橘米豆回回豆茄蓮根子菜藤菜蘇東波云豐湖有藤菜可以敵蓴羔髙河菜羅漢菜綽菜蕺菜食藥制桂花餅三制一摘桂花采去蒂磨至二三次通細泲去苦水範脫小餅布紙中又以紙覆密置煉火上一時炙燥之常親煙突間收貯一取餅復磨為坌同白砂糖梅酥搗範小餅一用鮮花三升碓磨絶細去苦水孩兒茶五錢訶子去核四錢甘草五分俱磨細坌搗勻以銀範或象牙範為小餅曬乾冉火炙範中常滑以蘇合香油或松仁油則光潤花形見也瓷罐收常食開胃散積滯用花入囊置水中煩揉去苦制餅佳香茶餅孩兒茶四錢芽茶四錢六安州産者白檀香一錢二分白豆蔲仁一錢五分縮砂仁五分沈香二分半片腦四分麝香二分俱為細坌煎甘草膏同白糯米細粉為糊溲勻銀範為小餅或小條晒乾常噙化清心化氣煎甘草膏方粉甘草一斤銼碎沸湯一鍋浸一宿煎减至一半去渣濾潔取汁復入鍋慢火熬至二碗易入砂鍋中煉火上冉慢熬至一大碗以成膏為度渣可冉煎橙糕本出處州用黃橙皮去筋衣作沸湯燖之㫰乾磨絶細絹囊盛括入水中洗出坌定濃晒乾每十斤熟蜜四斤揉和置瓷盤內晒露至於堅柔停勻裁為糕片剪竹箬藉收酒飯後食散腸胃惡氣消食醒酒有委頓亦能發汗查糕本出汀州用查梨去皮核大切片蒸過熟磨糜爛濾潔晒之和赤砂糖復晒堅柔適宜或範為餅或裁為片煎竹箬藉之收食後甚益脾胃消化宿積紫蘇糕紫蘇葉晒乾一斤薄荷葉晒乾八兩杏仁煮去皮尖苦味炒四兩白豆蔲仁四兩縮砂仁四兩乾薑四兩烏梅肉焙乾四兩俱為末每斤計熟蜜六兩和勻裁為片用食之下氣開胃蘇梅膏餅用鮮紫蘇葉鹽醃二三宿以梅酥調白砂糖染之冉晒冉染乾細研膏入模為餅食之能下氣生津液梅酥用前一制者甘露膏餅用烏梅蒸取肉一兩白砂糖四兩薄荷葉為粉四錢三味搗為膏模為小餅噙化生津止渴法製陳皮陳皮去白一斤青鹽四兩甘草四兩銼碎用水同入鍋高三味三寸許煎水竭為度惟取陳皮碎銼曬乾治風熱痰能醒酒法製半夏半夏一斤􅮄硝四兩用水浸一月餘乾祗加水試其味至不麻為度别取水湛潔復以清水浸一二日漉起晒微乾銼薄片加生甘草四兩薄荷葉四兩俱銼碎和勻晒燥收治風濕痰止惡心法製縮砂仁縮砂仁去皮十兩以􅮄硝水浸一宿水洗㫰乾少入麻油炒香燥官桂花一錢甘草炙一錢俱為末遇酒食後細嚼之消化水榖溫暖脾胃法製草豆蔲草豆蔲仁三兩生薑五兩切片同草豆蔲仁炒過又以水二升慢火同煮水竭為度取出俱焙乾白豆蔲仁五錢益智仁五錢莪朮煨五錢粉甘草炙一兩五錢鹽炒一兩五錢右為末每用細嚼去胃寒消宿食法製檳榔檳榔雞心者一兩切作細塊縮砂仁一兩白豆蔲仁一兩丁香切作細條一兩粉甘草切細塊一兩橘皮去白切作細條八兩生薑切作細條八兩鹽二兩右件用河水兩碗浸一宿次日用慢火於銀石器中煮乾焙乾入瓷瓶收每用細嚼治酒食過度胸膈膨滿口吐清水一切積聚今南粵有瘴氣以檳榔雜扶留藤瓦屋子灰食之法製杏仁五月采取杏仁三斗去雙仁去尖湯退皮早朝蒸至午時更慢火微烘之至七日止每日空心隨意服食駐顔延夀法製生薑生薑十兩切作片子用青鹽摻過冉以小麥麵和停焙乾官桂去皮青皮去白陳皮半夏薑製白朮以上各一兩蓽澄茄丁香木香以上各二兩五錢白豆蔲仁白茯苓去皮縮砂仁以上各一兩五錢葛根甘草炙各五錢右為末隨意服食治飲食過多或生冷停滯嘔逆惡心不欲飲食法製糖毬子鮮糖毬子從頂中去核一斤鹽二兩醃三宿壓乾草果仁一兩縮砂仁一兩檳榔三錢訶梨勒調麵苴之煨去核三錢井草炙三錢乾薑炮五錢丁皮五錢陳皮四錢青皮四錢大麥芽炒去糖一兩赤砂糖冉熬不拘右取草果仁以下十味碾為絶細末用糖和糖毬子腹中實滿多則摻於其上疊瓷器內或通搗糜爛為餅凡酒飯後嚼之大能消食不損脾胃丁香餅子半夏湯炮七次二兩白茯苓去皮一兩丁香五錢白朮炒一兩白薑炮一兩井草炙一兩白扁豆薑汁浸蒸熟焙一兩橘紅去白二兩右為細末生薑汁煮薄麵糊為餅如棊子大酒飯後嚼一餅生薑湯下溫胃去痰解酒進食寬中和氣丁沈煎丸白豆蔲五分縮砂仁蓽澄茄木香白檀香薄荷葉井松陳皮官桂花各五錢丁香沈香各五分白茯苓去皮二兩百藥煎一兩片腦二分蓬砂三分俱為細末井草膏和勻為丸如菉豆大酒飯後白湯送上十丸消酒化食薑附丸香附子炒去毛一片用河水浸秋冬二日春夏一日一夜漉出新水洗入銀石器中加水浸香附子上寸餘次取大蒜三十個去皮搗鋪香附子上慢火熬之候蒜如糊即用銀匙不住手攪二三百轉以蒜不見汁乾為度候冷每香附子一個切作四五段慢火焙乾神麴炒黃六兩乾薑炮四兩蓽撥丁皮縮砂仁炒胡椒各二兩陳皮用鹽水浸焙乾二兩有寒加附子炮去皮臍二兩桂一兩俱待冷為細末用蒸餅湯浸一宿取布苴捩去水和藥丸如梧桐子大每服五十丸不拘時白湯送下治脾胃虛弱壯人服之一生無疾又能引年麴糵枳术丸神麴炒麥芽炒去穅枳實同麩炒去麩各一兩白朮二兩俱為細末荷葉苴飯燒搗為丸如梧桐子大强食過飽溫水下五十丸八仙散鐵翁張居士采藥華山遇八道人各賜一藥與之故其名曰八仙散乾葛紋細嫩有粉白豆蔲仁去皮殼縮砂仁實者丁香大者已上各半兩井草粉者一分百藥煎一分木瓜鹽窨加倍用燒鹽一兩右件八味共細銼人不能飲酒者只抄一錢細嚼溫酒下能飲酒不醉亦治酒病夀親養老書云醉鄉寶屑無如此方之妙醍醐湯烏梅一斤槌碎甜水四大碗煎至一碗濾滓白砂蜜五斤縮砂仁為末五錢入銀石器中慢火熬成赤色膏為度取下放冷加白檀香為末三錢麝香一字攪勻於瓷石器內盛頓封口一宿夏月冷水調冬月沸湯調服歌曰烏梅化痰止煩渴蜜生津液潤心肺白檀大能消暑毒麝香通竅辟邪氣寇相入朝湯沉香木香人參肉豆蔲調麵苴煨大茴香草豆蔲仁調麵苴煨蓽澄茄甘草各等分俱為細末以沸湯入鹽少許空心㸃服二三錢衝胃霧氣春冬不可無厚朴湯宋朝士俟朝於文德殿守堂卒每以厚朴湯進厚朴去粗皮銼片用生薑汁三染三焙之一斤桂心三兩右和一處心下痞悶不下飲食沸湯泡服草果湯草果仁銼微焙一斤官桂去粗皮銼微焙四兩五錢井草粉者炙銼二兩右和一處肉食過多心中嫌惡每用二錢加炒鹽少許沸湯泡服亦治食瘧收藏制茶常近火氣味不變又忌煙埃黴明饑切黰之忍切茶䔲同茶酒先用甕湯泡滌潔又無損沁入熱酒封後只以石灰薄調染甕下一半上架收不宜親濕地及日照并鹹甕沁七鴆切糟同酒醬常用日晒不宜於日中動忌著雨水則生蟲有蟲則加熱油或鹽中苦滷醋用好甕架於凉室中不宜親濕不宜動油宜漆桶瓷缸收上雖用蓋亦為一竅通氣不宜泥封盡能作臭博物志云積油滿萬石自然生火鹽牀上以竹器盛牀下甃以淺池池外輔之以缸令流苦滷貯之白砂糖入桶中封固響糖宜火炙日晒畏南風糖霜入新甕以箬封之懸火側雖久不鎔生熟蜜皆宜陶甕蜜未煎者曰白砂蜜已煎者曰紫蜜禽獸魚臘醃者皆宜近火氣烘魚紙苴之冉烘藏晒熱小麥中不生毛蛀乳餅用灰和鹽醃藏可久酥用瓷罐收鎔則至冬冉煎窨魚收瓷缸中不枯白鮝苴以麥稍不紅餒藉以日晒常白銀魚乾晒茭葉蕰藻苴之不黃乾對蝦蝦尾皆雜蒜囊用蒲蔞苴之置通風處黃甲畏蚊蟲嘬楚怪切畜之則穿土作淺坑築實四周塗以秕榖和泥納於內上用蘆簟等蓋覆又掩以土留竅通氣永不瘦有以蒲蔞水濕苴之實壓常以水灑潤則可久留有以酒壜封口土少鹽水調薄散納缸中置蔀屋下瘦者亦肥蟹畏火明畏霧籠冬月以蒲蔞苴之置諸糠穩中可久留蟹譜曰凡糟蟹用吳茱萸一粒置厴中經歲不沙歸田録曰糟蟹者甕底加皂莢半挺經歲不沙蚶蛤蜆類畏雷聲苴以蒲蔞壓以重物則生芋魁切片或全枚晒乾收乾糠穩乾土中土瓜山藥香芋落花生等皆全枚同芋魁茄取新甕於六月中晒三五日又取茭葉截寸許晒十分乾安茄之日甕與茭葉晴日早晒至亭午摘茄葉帶無傷者先鋪茭葉在甕鋪茄一層層疊之羃以箬葉塗以泥置空板上至春亦如新或瘞於水淋淡晒乾灰中黃瓜瘞水淋淡晒乾灰中能留於冬西瓜圃中摘下露過一宿繩絡之高懸通風處可以經冬晒醃瓜茄用麥稍藉則潔白天花菜羊肚菜雞棕燕窩菜乾菌石耳木耳乾竹筍乾麻菰等俱宜近火氣鮮麻菰藏麩麵中能留二三月海絲菜紫菜鹿角菜裙帶菜苔菜等常日曬置通風處栗春半時火烙其芽入沙甕瘞之有十月間曬二三日湯中煎熟曬乾入新甕中可留一二年乾甚用則冉煮有以調泥塗乾壁間久則如風栗北棗南棗牙棗圈棗等肥者清明前晒過收新甕中閉口藏之過夏如新紅棗李乾梨子乾揪子乾羊棗乾俱火焙日曬荔枝龍眼火焙紙封竹器中懸近火處榛子胡桃火焙懸通風處烏欖仁人面果仁火焙雜小腐炭收近火處楊梅仁帶核收蓮心西瓜子仁俱帶殼收棐子銀杏俱火焙柿子經霜後日深摘下不損者取柿葉藉入新甕中上令通氣可留至春蒲萄取帶枝顆全者鎔蠟固其折盡處輕置新甕中密封之可過冬柿餅蒲萄乾宜火焙日晒馬檳榔宜火焙收近火處菱取風者至春前去殼火烘乾熟菱米宜火焙日晒橄欖以有蓋好錫瓶貯之密封置間潔地可留至五六月梨子綿著苴之有取一枚以數枚插於中蓮菂乾宜火焙日曬石榴藏乾麥中沙橘乾柑蜜柑香柑采不損者收大口新瓷甕中上令通氣可交春經夏蜜橘金橘牛乳柑之類霜後二三朝采不擊損者收大口新瓷甕中上輕覆以粳稻稈有取竹作大眼筐貫粳稻稈收置髙處最畏糯稻稈米與酒歸田録云藏菉豆中可經時不變地栗帶土在地井蔗藕以草薦藉地卧之又覆以薦常用水濕松子火焙同防風懸通風處不油防風亦不壞雞頭天雨水浸有雨則易或入瓶以篾簟掩口浸清水池中雖經年不壞晒乾者亦可久留熏果宜火焙凡人面果烏攬白梅等之鹽醃者皆宜常日晒入罐逺藏新果用新瓷瓶入新果如楊梅櫻桃之類雜薄荷鹽礬水浸以油紙數層同木蓋竹箬緊羃其口置之清冷泉內雖久而色如新必立夏時置井中至立冬時置地間每斤果鹽一兩明礬六錢水用滿六月六日儲水浸桃李梅杏枇杷林檎鮮果之類不易壞須入新甕中密封之藏五榖糙粳米用齊整稻稈乾者積之倉下布板上令通氣葦箔卷者上必以亂稻稈苫熱則可收其濕而不紅腐江古人以水浸殼二三日瀝於甑中蒸米漲出為度曬至絶乾取而礱米散收數十年既無紅腐亦不蛀食黃粳米須自冬舂者佳入倉必用齊整稻稈積之欲黃取水溲穅麧以稻稈苴置米底中每米一百石止可二三苴范至能有冬舂行糯米不宜熱黃則用凉篾篅市緣切囷丘倫切積之內立以竹籠通氣而無熱黃之患白粳米同糯米凡米舂疏者為糲刀葛切微舂者曰脫粟每一石舂得九斗為稗蒲賣切得八斗為鑿得七斗為侍御榖散收在倉冬則以亂稻稈覆上至春動收其熱氣則無氣秡蒲活切殼大麥小麥經濕則化為蝶須初伏內烈日曬甚燥乘熱密封積音漬之或雜蒼耳辣蓼同收小麥麵置鐵於中不餕宋木色求切豆大豆赤豆菉豆之屬皆曬乾散倉通氣大豆肥滿時連科本晒至葉乾積於稻稈中至春時欲用先以水浸煮如新摘芝麻曬散倉收乾白菜子曬乾散倉收凡米榖又有為露積者下用磚石甃砌須髙又用稻稈覆藉周密四圍又立石柱輔之始能悠久然在露積者米榖之色尤更鮮明於倉室中收藏者也詩曰我倉既盈我庾維億若營州遼陽之地宜為土窖亦能久藏宜禁制宜制醫學曰五榖為養謂粳米小豆麥大豆黃黍也五果為助謂桃李杏栗棗也五畜為益謂牛羊豕犬雞也五菜為充謂葵藿薤葱韭也又曰肝宜食井粳米牛肉棗葵皆井心宜食酸小豆犬肉李韭皆酸肺宜食苦小麥羊肉杏薤皆苦脾宜食鹹大豆豕肉栗藿皆鹹腎宜食辛黃黍雞肉桃葱皆辛辛散酸收井緩苦堅鹹䎡周禮食醫云食齊視音視春時羮齊視夏時醬齊視秋時飲齊視冬時春多酸夏多苦秋多辛冬多鹹調以滑井牛宜稌音杜羊宜黍豕宜稷犬宜梁鴈宜麥魚宜苽音孤凡君子之食恆放焉春宜羔豚膳膏薌音香夏宜腒音渠鱐音搜膳膏臊音搔秋宜犢麛音迷膳膏腥冬宜鮮羽膳膏羶王氏曰飲食人之本也本得其養無物不長本失其養無物不消於無事之時而順適之有道疾病何自至哉楊龜山曰所以養陰陽之氣不可偏勝凡此皆衛生之道也先王於食有醫所以治未病也凡百君子所以自養者常放先王如此至疾而後用醫則末矣是故周官疾醫施於萬民而君子不與焉禁制醫學曰五味有禁辛走氣氣病無多食辛苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸鹹走血血病無多食鹹飲膳正要曰本內經素問言五味偏走多食酸肝氣以津脾氣乃絶則肉胝竹尼切䐢而脣揭多食醎骨氣勞短肥氣折則脈凝泣音澀而變色多食井心氣喘滿色黑腎氣不平則骨痛而髮落多食苦脾氣不滯胃氣乃厚則皮槁而毛拔多食辛筋脈沮弛精神乃央則筋急而爪枯禮記曰九物雛鱉伏乳者狼腸狗腎狸正脊兔尻苦刀切狐首豚腦魚乙骨如乙之形鱉醜竅又頸下有骨能毒人內則曰牛夜鳴者􅂒音由臭也羊冷毛而毳者羶毛本稀泠而毛聚如結泠音零毳昌鋭切狗赤股而躁者臊股裏無毛而舉動急躁鳥􅀈色而沙鳴者鬱色變而無潤澤鳴而其聲沙嘶鬱臭腐也􅀈滂表切豕望視而交睫者腥望見舉目髙也交睫目睫毛交也腥肉中生小息肉如米者睫音接馬黑脊而般臂者漏般臂前脛毛斑也漏肉如螻蛄臭也般音斑漏音婁論語曰食饐於冀切而餲烏邁切魚餒而肉敗不食色惡不食臭惡不食失飪不食不時不食割不正不食不得其醬不食酒不宜久貯於錫器中亦忌銅器醬內有鹽畏貯銅器作腥醋忌貯銅器味澀油貯銅錫器發膩凡銅鹽醋油經之皆能生鉎音生也禽獸肝青者有毒馬肉自死者殺人其肝尤毒羊肝有孔者有毒不可食諸物心能損心諸物血能損血諸物腦死時怒氣所藏有毒不可食禽鳥自死口不閉有毒熟雞肉過宿藏不密蜈蚣來集須冉煮鴛鴦肉食之患大風鱉與莧菜同食生鱉疽蟹目相向者有毒鮎魚赤目赤鬚者殺人河豚有大毒中之者其害甚速用炒槐花蘆根汁橄欖白砂糖皆解倉卒無藥急以清油灌之吐出李子不沈者有毒杏子雙仁者殺人梅子藏銅器能發腥甜瓜沈水及雙蒂者殺人果有雙蒂而大者下必有毒蛇葱不與蜜同食簷滴水生菜有大毒菌下無紋者有毒治桃生毒妖術以魚肉害人在胸膈則服升麻吐之在腹服鬱金下之黃氏曰抄云李夀侍郎為雷州推官鞫獄得此方竹嶼山房雜部卷六
