body:
  text: 竹嶼山房雜部卷五明宋詡撰養生部五菜果制齏二十二制酸齏一用老白菜在半沸湯中微芼入罋以菜湯同少醋澆菜上重壓墊之用切葅宜和炒熟芝麻芫荽生薑芹菜鮮竹筍皆可為之一用菜細切葅并白胡蘿蔔條米湯中同微芼浸壓凡微芼用筐筥盛入湯後多倣此楊廷秀芹虀詩曰蟹眼嫩湯微熟了油潑韲用芥菜稚心洗日晒乾入瓶煎香油研醬末紅豆蔲縮砂仁乘熱潑於菜上俟一二日熟瓶外以水遂浸寒之不能作酸也揉齏用芥菜心同熟油鹽蒔蘿末煩揉入瓶以冷水浸瓶寒之折齏一用芥菜稚心洗日晒乾入器熬香油醋醬縮砂仁紅豆蔲蒔蘿末澆菜上搖一畨傾汁入鍋再熬再傾二三次半日已熟一用芥菜心洗晒乾入半沸湯微芼起速以熟油鹽地椒蒔蘿末和入甕密封連罋冷水浸寒一用夏菁菜稚心頭入半沸湯中微芼起用少鹽熟油醋乘熱和入瓶密封之此凡佳菜稚心皆可造香齏用白菜蔔胡萊蔔豆腐面醬瓜薑橘皮少許細切條葅熬油炒熟入川椒取起相公齏用白菜蔔胡萊蔔萵苣菜心蔓青菜根細切條葅各以鹽醃良久用湯微芼水洗壓乾熬香油加醬醋煎沸澆覆之俟熟八寶齏用麵筋熟筍乾木耳豆腐靣乳線醬薑醬瓜栗細切條葅油炒入花椒起五味瓜齏用稚瓜方切小葅少鹽醃一宿日晒微乾熬熟油加赤砂糖醋鮮紫蘇葉絲生薑絲入熱鍋中和勻瓷罐收冷齏用菜心百斤鹽二斤醃五七日以生薑碎切同油醬醋熬熟和之疊入小罋中收藏雜和齏用茭白竹筍藕生薑菠稜菜青菜葫萊蔔瓜豆腐面麵筋菉豆粉片隨時細切條葅未熟者先芼以香油醬油醋花椒入鍋熬熟和之菜豆齏取菉豆芽擇潔同菜莖條葅作沸湯微芼以甘草煎湯入少醋俟寒浸沒之茄豆齏取乾熟茄切小葅同煮乾鹽豆勻和煎甘草湯入少醋俟寒浸沒之筍齏用竹筍稚肥者寸切葅又剖切小片葅沸湯微芼泲乾用熟油炒鹽生薑絲橘皮絲川椒蒔蘿地椒末醋和勻入瓷器一宿味透藕齏同竹筍茭白齏同竹筍葱芽齏取葱置隂室中從根畔迸出嫩芽摘取寸截盛於瓶鉢中以小器覆之令可透水將沸湯從小器上澆落急漉起以肥肉汁醋醬胡椒澆之韭黃齏韭黃即新韭之在稿下者也同葱制蒲蒻齏同葱制周禮五齏深蒲一齏也淡齏用冬菜揉熟以冷水滿浸壓之用則芼有溫豆腐泔浸沒老菜遂作酸味可食不須芼沃十二制蘿蔔捲用肥白蘿蔔薄切片葅日晒微乾每片置川椒二粒新紫蘇葉絲乳線絲鮮薑絲多寡量之捲實裁竹針貫五捲為一處熬醬油醋浸一二日熟豆腐皮捲用豆腐皮洗潤切為二寸濶長片每片置川椒三粒生薑絲乳線絲醃肉絲萵苣筍絲蔓菁根絲胡桃仁退皮碎切實捲之裁竹針貫二三捲為一處以醬油炙香菾菜芼熟晒微乾寸切葅用熟油醬縮砂仁和之蒸透眼乾入罋冬瓜用冬瓜去皮瓤方切小葅加葱白屑鹽醃一宿泲水去盡以熟香油酒紅麴地椒蒔蘿大茴香花椒坌勻和入罋能久留瓠子去皮犀冬瓜豇豆用稚嫩肉肥者同菾菜菜白頭一先熬香油入醬醋花椒薑葱再熬入菜少芼即漉起用器覆之俟味足用惟夏菁菜芥藍菜為宜一倪雲林用春菜心先芼泲乾入器切乳餅蓋上加花椒薑鹽酒洗之蒸熟爛為雪盫安盍切菜茄用稚嫩者方切小葅同菜白頭前制加赤砂糖少許黃瓜去皮瓤同茄白蘿蔔方切葅同茄胡蘿蔔同白蘿蔔油醬炒三十五制天花菜先熬油熟加水同入芼之用醬醋有先熬油加醬醋水再熬始入之皆以葱白胡椒花椒松仁油或杏仁油少許調和俱可和諸鮮菜視所宜下倣此雞宗燕窩羊肚菜麻菰海絲菜連起之菌鮮者先芼洗入乾者漬潤竹筍蘝者先芼過乾者先芼爛蘝虗嚴切山藥茭白蘆筍老藕乾紅花子膏蓴菜灰浥去涎根最美故曰蓴可和米為飯謝宗可詩曰氷縠冷纒青縷滑翠鈿清綴玉絲香蒟蒻樹雞加薑石耳加薑蒲蒻胡蘿蔔白蘿蔔擊塊碎諸肥菜心雞腳菜溫水洗菘菜水芋茄乾者先芼瓠乾者水洗冬瓜絲瓜菾菜乾菱腐藕腐芝麻腐和菠稜菜豆腐或先油煎和瓢兒菜西洋菜乾而同麵筋和甕菜乾者水浸餅炙油醋和十八制發豆芽采去根葉沸湯微芼之以熟油醬油醋薑和後倣此鮮竹筍切縷葅微芼茭白切縷葅微芼芥菜根切縷葅微芼黃花菜水洗不用薑甕菜芼熟菠稜菜微芼芥藍菜微芼不用薑蘇東坡詩云芥藍如菌菌脆美牙頰響菱藕雞頭莖芼工熟豆豆芼熟刀豆稚嫩未子者芼熟天茄稚嫩者芼熟蔊菜南方造蔊菜薄去皮切如縷每兩用生薑五錢鹽一錢川椒熟香油少許煎沸醋和之密封罋中勿令泄氣楊誠齊詩曰齏臼文辭粲受辛薑芽為祖芥為孫葵菜微芼冷水洗去涎麵筋手折之沸湯洗豆腐大塊再芼熟醬漬三十制閉甕瓜每稚嫩瓜十斤鹽二斤醃一宿先用酵發蒸熟麵餅切開乘熱幽黃晒磨用十斤醃瓜一層黃一層疊甕中以瓜汁注之封密六七月造至來春開若入茄只可十分之二實香瓜先用瓜切下蒂去中瓤子俱以鹽醃揉每斤鹽一兩實以下葅瓜絲如水在苦滷內浸二三時茄絲鹽水微浸瓠絲鹽微醃杏仁去皮尖易水芼六七次去味苦青椒子鮮薑絲新紫蘇葉絲青橘皮絲皆洗潔微日矚取原蒂蓋上綸絲束之漬於醬中生瓜稚而堅者抹去毛微醃西瓜外刮去皮內剔去瓤黃瓜堅嫩者絲瓜削去粗皮苦瓜青稚者剖去子鹽湯微芼晒微乾瓠子全者抹去毛有去皮犀切片晒水乾茄用鹽煩揉皮薄水洗㫰乾稚茄每茄刺二三竅竅實胡椒一粒同洗㫰嫩韭白頭醬油漬之天茄稚嫩者薑稚嫩者采潔湯芼㫰乾用或切方葅實以花椒紅茭白不剖白菜蔔不剖青椒子稚嫩者帶枝囊刮之杏仁囊括之柑皮去苦膜芼㫰乾橘皮同萵苣筍削去皮晒微乾夏菁菜采去葉洗㫰乾束之芥菜同夏菁菜甕菜用莖刀豆稚嫩者龍瓜豆稚嫩者藊豆稚嫩者豇豆稚嫩肥長者豆腐乾溫水浸柔大切片油煎麵筋油煎璚枝煮熟大切塊柿子將熟者竹筍去籜醋浸十八制新蒲萄先入罌用薄米醋同甘草作沸湯俟寒調炒鹽注入之後倣此新棗櫻桃金橘金豆李子未熟者梅子用稚嫩未酢者同稚嫩蒜頭禮曰梅諸諸音葅桃子用未熟者切四分之湯芼㫰乾禮曰桃諸梧桐子嫩者鮮竹筍微芼生者切絶細縷即酸筍本出閩粵新大豆帶殼芼㫰乾新薑甘露子采潔洗去土胡蘿蔔塊切葅不用鹽蕎頭密封焚麥糠火煨過熟白菜頭葱白頭根鬚同芥根切絲微芼油炒四十二制同蒿用油熬熟入之加少水芼熟以少鹽川椒葱頭或少醋調和下倣此甕菜龍鬚菜少芼鸛嘴菜少芼羊角黃矮瓢兒菜菜臺韭少芼竹筍乾先芼熟薺菜蘇東坡尺牘云患瘡疥者宜食薺用淅米水芼及生薑不用鹽醋絲瓜絲瓜蕊冬瓜菠稜菜莧新瓠瓠乾藊豆新茄水浸茄乾先芼地薑根豆腐加酒麵筋加赤砂糖去葱紫藤花金雀花萱花花椒芽乾湯泡宜熟芝麻槐芽乾再芼去苦宜熟芝麻香椿芽椿芽乾湯泡宜熟芝麻木蓼乾再芼去苦宜熟芝麻馬齒莧乾湯泡又曰五行菜蒜苖蒜苖乾紫菜蕨菜乾多芼去苦詩注曰蕨鱉也初生無葉時可食薇菜乾同蕨詩注曰薇似蕨而差大有芒而味苦芍藥菜乾多芼去苦霏雪録云槍竿嶺多芍藥苖土人擷以為蔬芹菜去葉蒲蒻西洋菜先燖惡實稚者商陸稚者油煎十六制茄削去外滑皮條切染花椒醬水調麵糯米粉煎下倣此鮮竹筍擊碎胡蘿蔔切絲瓠切絲菜臺假切葅薺椿芽乾不用麵粉槐芽先芼不用麵粉藕片切菱片切藜芽即落帚本草曰地膚子蔊菜染蜜不用麵粉生麵筋不用麵粉食用蜜熟者片切開半夾調麵粉煎豆腐面先煎染蜜赤砂糖熟芝麻豆腐先以大塊水煮再切片油煎棗肉去皮核栗肉片切糖醋十制鮮竹筍用肥者剖之寸切葅每斤用鹽一兩醃過一宿以淡醋煎沸微芼再同釅醋熬赤砂糖一二沸俟寒入器浸沒下倣此甘露子加青茄頭銀條菜即藕下發嫩長條切茭白切蕎頭天茄黃瓜切稚蒜頭以上皆不用芼菜臺采去葉微醃晒乾細切葅入甕以沸醋熬赤砂糖坌蒔蘿川椒和俟寒浸之白蘿蔔用肥大者薄切片微醃晒柔捲生薑絲鮮紫蘇葉絲熬赤砂糖醋浸之醋燒十四制大麥白頭菜潔以潭筍絲胡荽頭水中同甘草芼熟鹽醋調和冷用即石崇家之假韭也崇家有韭根汁加醬油煮雞鵝豬汁皆宜下倣此鮮竹筍芹白同新蒜白頭至夏不宜食芹菌地筍菘菜菰臺先作汁投之不宜熟茭芽蒜苖瓠羊角菜黃矮菜臺蘆筍蒲蒻薺陸放翁詩云小著鹽醯助滋味或同白蘿蔔方切葅鹽醃十六制柿子石灰湯濫者用冷鹽湯浸之久則色亦紅鮮木瓜劘去皮方切小葅同鹽幽甕中夏菁菜洗㫰過乾入紅菜一層鹽一層滿疊石壓墊之每菜一百二十斤鹽四斤間一二日翻倒一次再間一二日又翻倒一次熟以二三本共紐束之置甕中煮原汁過冷浸沒泥封芥菜白菜菜臺同制或久留每百斤鹽四斤熟醃菜用已熟醃菜清水芼熟泲乾甑蒸一宿晒三五時又蒸三次俟乾醒貯甕收色黑味甜如以油和蒸之則柔閉甕醃菜先用芥菜或夏菁菜采去葉洗潔㫰乾性柔每兩莖寬束一結甕底先置香油一碗始疊菜取篾關實每菜一百二十斤計鹽四斤湯調化冷注下和以蒔蘿地椒坌一日傾出鹽水一次復傾入之經數次菜熟則止有不用油炒熟芝麻碾末同入如菜油熬過用白蘿蔔洗潔㫰乾鹽同菜斤加甘草一兩捶碎釃釋米水清者澆沒三寸浸之茄切絲疊實鹽水浸者止可漸為用有同熟醃菜制芹去葉新薑葱采去黃葉韭先用礬水洗潔采整㫰乾每把平鋪之灑鹽於上層疊於器俟柔每盈把為一束移入瓶中壓實澆以原滷花同新蒜用頭從心中去苖以炒鹽實滿覺鹹味泡甘草湯俟冷浸根鬚洗㫰同瓠大切片薺蒲蒻寸切萱芽控乾七制白菜臺每一百斤細切葅微日曯之以鹽二斤煩揉須透榨絶乾用熟油蒔蘿縮砂仁大茴香薑和勻實疊小瓶中蔑關口倒置架上用醋下倣此墨娥小録云用菜湯內微芼㫰微乾碎切入瓶築實黃草布羃口倒覆地上雖一二年不壞芥菜或用心湯芼微熟和生瓜切為絲白蘿蔔切為絲晒炙四十八制淡豆豉三月中先用黑豆芼爛控乾布葦箔上幽為黃熟退晒一二日務燥停七日釋去黃按實筐筥中半日乾濕得所又幽甕中泥固俟二七日開出又晒使燥入甕遇三五六月常出晒之數年不壞宜研以絮羮香豆豉作新甜醬漉出豆一斗同淡生瓜葅五兩淡冬瓜葅五兩去苦皮尖杏仁五兩榛仁退皮五兩川椒三兩生薑絲四兩紫蘇新葉絲半斤鹽半斤坌蒔蘿三兩縮砂仁二兩紅豆蔲二兩地椒一兩通幽甕中泥封日易五方日色晒四十九日用杏仁豆䜴先用大黃豆四升芼熟㫰去水鹽四兩和之以杏仁去皮尖二升同生薑桂皮白芷紫蘇莖碎切囊括入水芼去苦味㫰乾通和豆晒燥復囊括甑蒸透徹俟寒貯瓷器縮砂仁豆豉用大豆雜桂皮白芷紫蘇生薑同水芼熟晒乾和赤砂糖坌縮砂仁川椒地椒蒔蘿為衣再晒乾收用取熟芝麻灑之竹筍豆䜴用鮮竹筍大切塊先芼熟入鹽少許晒燥以筍汁芼大豆至熟入鹽少許紙藉煉火中焙切筍為方葅復同焙燥茄豆䜴先用鹽水浸茄小片葅晒乾釋大豆同桂皮白芷紫蘇生薑入水芼熟調和甜醬再芼復加赤砂糖又芼移日中晒燥青豆用大豆殼中取出青肉湯芼熟紙藉煉火上炙燥糖豆用大豆湛潔燒灰莧菜灰淋汁芼爛漉起别用清水浸去灰氣調赤砂糖加糖香少許勻和晒燥霜梅取半青熟梅子煎過鹹鹽湯冷浸梅柔漉起日晒夜入原滷經五六次復晒乾收滷煎過澄清為浸蔬䔩所須楊梅鹽醃晒乾小橘鹽醃蒸晒萵苣筍削去厚皮卧置長板上鹽煩揉須透疊器中天隂停下晴日用其滷煎沸加石灰少許一染即起綸絲每條繫其頭懸晒之常以手挼直俟起鹽霜捲束收甕竹筍去籜作沸鹽芼熟晒乾菘菜鹽水芼熟晒乾蒸一時再晒燥收芋莖去外皮假切葅少灑以鹽晒乾蒸之再晒雞頭莖同芋莖茭白切條葅和少鹽晒乾胡蘿蔔同茭白白蘿蔔同茭白藕老者切片葅晒燥生瓜一切絲先以鹽水浸片時漉起和以生薑絲新紫蘇葉絲晒燥少用赤砂糖醋潤或切小片葅罋疊須實一切大條或華之爾雅疏曰半破也以鹽醃滿其腹俟柔晒一日厚滷浸一日三次須晒有鹽霜乘熱以釅醋染之入甕麥䅌塞口冬瓜切小片葅不宜以鹽烈日中晒燥收入甕黃瓜去皮方切小葅灰溲之晒燥同灰甕收用則水洗瓠輪長薄條和灰壓去水晒乾茄一薄削去外滑皮細切條葅以釋米水同鹽少許浸一時漉出取鮮紫蘇葉絲生薑絲勻和晒燥入罌用加赤砂糖醋一帶蒂四分之芼熟爛壓令絶乾灑以花椒少鹽晒燥甕收再用芼或切條葅亦宜薑肥實者洗潔鹽醃三五宿晒絶乾火焙燥即火薑甚祛寒穢之氣莧莖老者削去皮鹽湯浸晒之再浸再晒以鹹為度又以水洗去鹽晒燥收菾菜芼熟晒燥馬齒莧芼熟晒燥葱葉寸斷醃一二日水洗晒乾乘熱收入甕蒜苖鹽湯芼熟晒乾蒸再晒收香椿芽鹽湯微芼晒乾花椒芽同香椿槐芽同香椿金雀花鹽湯微芼炙燥萱花同金雀花紫藤花同金雀花或用糖醋和之豇豆鹽湯芼熟炙燥木蓼三月摘嫩芽芼熟炙絶燥蕨蒸熟以乾灰浥晒燥濯去灰又晒乾蔞蒿鹽水芼火炙同蒿鹽水芼火炙商陸稚苖去膚葉鹽水芼晒蒸惡實同商陸豆腐老者不入水鹽抹晒炙之麵筋細析晒炙煮二十八制紅棗子水煮蓮菂水煮雞頭鮮者和石灰加厲石擦洗入鍋煮熟取起以冷水少釋之再入鍋炒乾入罐熱用乾者用錐挑破其眼水浸一宿煮慈菰宜鐵鍋水煮用鹽地栗宜鐵鍋水煮輪去皮菱老者風戾者水煮藕實白糯米赤豆於竅水煮用宜蜜璚枝洗甚潔用水煮調化膠加退皮胡桃仁或赤砂糖和內盛盆器冷定切用又名石花菜大豆鮮者煮大熟去殼宜五辛醋乾者淅之入鍋鋪平中為一窩置鹽在內用水繞鍋㵼下平豆為度煬火水乾豆熟其鹽自散入四向豆上並不粘鍋欲不見鹽未乾時常抄動之如欲色紅加蘇木白礬少許杏仁去皮尖煮去苦味入鹽煮燥老刀豆去內外殼宜鹽龍瓜豆去內外殼宜鹽藊豆去內外殼宜鹽大豌豆鮮者和殼煮乾者以河水入灰浸一宿洗潔煮熟用熟油鹽花椒葱炒小豌豆鮮者和殼煮竹筍帶籜煮大熟脫之宜五辛醋熟油醬茄一覆碗於鍋入水少許置茄於上煮太熟去皮宜薑鹽醋宜熟油蒸醬加罌粟米一煮茄熟壓去水熱油中染起宜蒜醋一以茄半剖界稜覆鍋上熟油澆之鹽灑之俟熟胡蘿蔔煮大熟宜胡椒鹽醋白蘿蔔煮過熟壓去水宜熟油鹽醋茭白煮太熟宜五辛醋韭微芼宜薑鹽醋菾菜煮太熟泲去水宜蒜醬醋冬瓜用堅肉切大塊煮熟爛界稜澆熟油薑醋瓠同冬瓜生瓜華之去瓤煮過熟切小條葅晒乾莧煮太熟泲去水宜蒜醋糝六制果糝先熬油入退皮胡桃仁榛仁熟蓮菂熟栗肉熟菱肉去皮地栗藕大切之少水烹加醬油胡椒花椒以麵或米粉為糝後倣此佳蔬糝熟山藥熟香芋熟旱芋熟落花生皆去皮熟慈菰去衣頂菉豆粉皮皆塊切佳䔩糝麻菰菌竹筍茭白蒟蒻胡蘿蔔絲瓜皆條切大豌豆新稚者剝取肉先芼熟同芼熟菜大黃豆同豬肉切小方臠先煮熟豆腐切塊蒸十一制桃輪去皮同蜜入器甑蒸下倣此赤梨輪去皮宜赤砂糖芋魁水生者去皮片切鍋中入水半杓以盤碗覆之上鋪以芋蒸易爛旱生者以頂抵鍋入小水蒸不復動熟復火煨乾水生者亦宜全蒸宜白砂糖鹽山藥宜鹽香芋宜鹽落花生宜鹽葛宜鹽黃獨宜鹽以上皆用退皮􅐜用灰浥半日洗去滑和以鹽赤砂糖醋蒸過熟荇鬚米去苦心晒燥蒸過熟或入甕同水火煨黃精本草圖經云九蒸九暴作果甚甘美熏八制熏橘熟橘湯中芼過焚礱榖糠煙熏和柔漸按匾復熏乾熏棗生棗甑中蒸過同熏橘熏柿生柿去皮切片同熏橘熏桃生桃以柔鐵圍之擊匾湯中芼過同熏橘熏梅今曰烏梅大青梅作沸湯芼過以稻稈一層梅一層焚礱榖糠煙熏黑熟熏楊梅采楊梅完全純紫肥甘者取小麥穩焚煙熏十餘日入罐又取罐身半瘞火中再蒸熟透熏豆腐乘熱㸃入箱壓一日以刀界開焚礱榖糠煙熏煎鹽湯寒取鵝翎漸浥掃之熏絶乾燥懸當風處熏竹筍去籜鹽湯芼熟焚礱榖糠煙熏之蒜醋和六制箭幹菜肥嫩者截白莖為二寸條葅洗潔入瓶先用搗大蒜泥和炒鹽少許覆上作甘草沸湯入醋再沸候冷浸沒之下倣此雞頭莖去皮寸切條葅楊梅蒲萄帶枝胡荽頭蔓菁根切條葅蒜鹽和六制茄稚而小者芼爛壓去水搗蒜泥炒鹽和勻實疊於罌下倣此冬瓜切條葅炒鹽醃一宿泲絶乾用蒜泥茭白同冬瓜竹筍帶籜芼熟切為條泲去水菜莖同冬瓜胡蘿蔔切絲同冬瓜芥辣和五制稚茄芼爛壓乾以芥子湛潔研細同鹽醋少許和勻入器下倣此韭頭白菜嫩頭竹筍帶籜芼切條芥菜嫩心俱同茄酒糟三十四制梅青者同苦滷浸過用臘酒糟和鹽疊之每斤糟計炒鹽三兩為率下倣此李同梅桃同梅枇杷青熟者橄欖棗鮮甜者柿濫過者茄寒露摘嫩者瘞灰中三四日取糟訣曰五茄六糟鹽十七三碗河水甜如蜜五六言斤十七言兩鹽用炒久藏者不用水箭幹菜采去葉洗潔晒乾作束凡菜倣此菜臺菘菜芥菜甕菜一作葓萵苣筍去皮㫰乾芹白竹筍熟者㫰乾生者去籜洗㫰留可久茭白以紅莧葉苴而槽之即鮮紅新薑宜醅子糟同茭白白者加白礬少許經嵗不黑地薑取鬚洗潔㫰乾白蘿蔔半切晒微乾冬瓜瓠黃瓜生瓜絲瓜削去皮青豆芼熟去殼豇豆刀豆扁豆橘枝生熟皆宜山花稚苗乾豆腐宜醅子糟麵筋宜醅子糟蒜嫩頭石灰清湯微芼陽和菜出金陵炒七制栗子一先炒鍋熟少滑以油投栗燒常抄之加鹽少許甚酥香一擇二栗平底者以一用香油塗一用水塗為一合置鍋底以衆栗旋覆二栗之上蓋鍋密封燒一飯頃則顆顆有油不粘殼而更酥爛銀杏同栗棐子一白酒浸透煉火焙乾去殼一豆腐熟泔浸半日炒乾肉上皮脫盡糯米一糙者淘淨湯澆新布苴瘞礱榖糠中一日慢火鍋中炒熟一用糯榖鍋中炒自爆出花大黃豆用糟水浸同乾沙炒芝麻浸搗去皮炒小豌豆以河水中加灰同浸柔釋潔炒熟脯二制芭蕉根粘糯者截厚大片灰汁芼令熟又易清水芼無灰氣壓乾以花椒胡椒蒔蘿地椒縮砂仁薑熟油醬研浥一兩宿出焙槌軟用牛蒡子即惡實又名鼠黏子十月已後取根硬者先捶軟同芭蕉根料物制生二十八制紫菜井水洗宜薑醋宜入熱油中鹿角菜同紫菜緑苔宜醋裙帶菜井水洗宜醋萵苣筍削去皮切片葅宜胡椒鹽醋􅐜凍摘􅐜頭以筥器盛入湯中微芼置于澗水中浸一二宿結􅐜凍用之宜薑醋薺菜鹽醃頃之加熟油醋熟芝麻蔊菜宜醋苦藚菜和水煩揉易水苦味去宜醬醋或加以熟油生菜味苦者同苦藚蒲蒻宜鹽醋同蒿宜鹽醋或加熟油新韭宜醬醋香椿芽木蓮子去殼取瓤每計一枚水二酒盞挼汁絹縠濾其清者自成為腐宜薑醋石耳洗宜胡椒醋木耳宜藕筊白瓜絲竹筍絲宜薑醋冬瓜韱去外皮用鹽水洗西瓜用堅肉宜醬醋生瓜削去皮宜薑鹽醋黃瓜削去皮宜蒜醋茭白宜炒芝麻胡荽鹽醋茄宜鹽醋銀條菜宜胡椒醋白菜蔔同胡菜蔔胡荽炒芝麻宜熟油鹽醋或擊碎以醬油石花菜宜胡椒薑鹽醋山花去皮其莖宜鹽醃頃之水洗加薑醋熟油地薑取鬚條切鹽醃頃之宜醋草之生於野而無毒者皆可用水蘋油炒水藻油炒佛耳草頭芼爛揉入米粉為餌苧頭同佛耳草天菜即地踏菜宜油炒宜日晒盤棋菜油炒不宜蓋鍋熟晒乾苦菜芼去苦水宜油醋蒲公英芼去苦水宜油醋鳳仙莖去皮芼宜醬糟山慈菰芼馬蘭頭宜油炒紅藍頭宜油炒百合根蒸甘菊頭劉禹錫有菊苖􅐽醒酒蜀葵蕊宜油炒苜蓿油炒子可蒸餅芭蕉露藝臺鮮白芷宜蜜漬糟防風芽油炒阿藍菜出金陵醃久用白菜花出金陵醃久用􅀈菜出潞州宜晒乾捶軟油醬炒菝葜瑣碎録曰田舍貧家取以釀酒張文潛詩曰烹之芼薑揉盡取無可掇菝蒲八切葜葉八切陽菜出金陵醃此類亦多木之初發芽等無毒者皆可用桄榔麵出南粵作餅桫木麵出南粵作餅枸杞頭油炒或鹽湯芼晒乾木魚即棕櫚新生子未出木者蘇東坡云用蜜煮醋浸可致千里櫧木子可為腐可炒齊木子可為腐松露珠牡丹花李昊以牛酥煎食茅母夲草入果部此類亦多有各地産皆宜識其性類視前制羮胾側吏切制凡絮腥羮先作沸湯始少調以燖竹筍瓜瓠菜等清汁後少調以烹雞鵝豬等清汁再少調以烹鮮蝦清汁煬火多烹挹盡羮面之油濾盡羮下之滓其鎔化血水水和鴨卵入羮皆能取清下醬油下胡椒川椒坌各少許復挹油滓須盡視鹹淡絮之欲酸加醋欲甜加甘草泡湯漸嘗滋味漸以續入若絮素羮始用甘蔗煎湯後用燖竹筍菜瓜瓠汁入湯欲味鮮甘則再調以蜜水餘如腥羮調和淡豆䜴研以入羮可以代醬前後必須濾去其䜴羮中事件視所宜入每羮入一件惟胡荽葱可并入之乳腐紅花子膏芝麻腐豆腐天花菜羊肚菜雞棕燕窩海絲菜蒟蒻麻菰菌石耳桑鵝即樹雞桑之所産胡桃仁生栗生菱菱腐地栗藕藕腐竹筍雞腳菜蘆筍蒲蒻茭白茭芽山藥土瓜絲瓜瓠茄冬瓜豇豆刀豆龍鬚菜筆管菜蓴菜甕菜同蒿萵苣筍羊角菜黃矮菜瓢兒菜菘菜菜臺酸齏菉豆芽韭胡荽葱白頭椿芽槐芽蒸果蒸蔬纓絡米囊括煮之入羮羮中之胾牛羊豬鮮肥者為最或薄􅣸䐑用鹽水浸作沸湯微燖者或煮糜爛者雞鵝亦可斫為軒烹熟魚蝦蟹等宜燖熟鳩鴿皆鹿兔獐麂野豬黃羊皆宜飲膳正要云黃羊煮湯無味日月腸刲羊血不入水置葱數莖頓暖處自鎔為水以水調雞卵黃灌入羊腸烹熟為日腸以水調雞卵白灌入羊腸烹熟為月腸宜入羮勝鱘魚用大魚薄切濶䐑以豬肥精肉雜乳餅機上斫細醢和胡桃松仁細切胡椒醬苴之水調菉豆粉粘蒸之入羮一捻珍用豬肥精肉雜鱖魚鱧魚俱􅣸為䐑機上報斫細為醢以生栗絲風菱絲藕絲生筍絲麻姑絲胡桃仁細切胡椒花椒醬調和手捻為一脂形蒸之入羮雋永臠雋音俊乳餅鱖魚肉熟蟹肉熟豬蹄筋俱作細醢雞子同胡椒花椒醬調和為片蒸熟方切臠入羮水陸珍黃甲蒸取肉大銀魚雞胸肉田雞腿肉白蝦肉斫細醢雞鴨子白花椒坌鹽和一處浥白酒為丸餅蒸熟入羮酥果膏用醃乳餅加菉豆粉白糯米粉切碎退皮胡桃仁揉和為丸餅甑蒸或鍋湯中煮熟入羮筋膚髓豬膚撏潔烹糜爛其蹄筋亦烹糜爛豬脊髓牛腱羊膚皆宜烹糜爛入羮舌掌跖翅腸胃肝肺腎子豬羊舌鵝舌掌雞跖鵝雞翅雞腎鵝雞肝肺豬羊腸胃魚蝦子俱處置得宜入羮肥瀹粉荸薺粉蕩索者菉豆軟粉索粉俱宜肥用胡桃松子仁鮮竹筍用豬肉細切兼乳餅熟山藥勻和為小丸用雞子黃調菉豆粉為小丸通加肥汁烹以胡椒花椒縮砂仁葱白醬調和如凍先置粉上絮羮瀹之竹嶼山房雜部卷五
