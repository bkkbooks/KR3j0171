body:
  text: 竹嶼山房雜部卷十四明宋詡撰尊生部二水部漿水熟蒸粟米乘熱傾冷水中浸五七日候酸用夏月則逐日看試纔酸便用如過酸則不中漿水法熟炊粟飯乘熱傾冷水中以罁浸五七日酸便好喫如夏月逐日看纔酸便用粱粳熟水故宋京城持缾賣粱粳熟水其法以稻稈心持擇齊整了用水濯洗浄曬乾作小把子如盪熟水時以火炙少時先以湯盪兩次然後盪熟水加以糯稻稈自可縮少便用豆䓻熟水白豆䓻揀浄投入沸湯瓶中宻封片時用之極妙每次用十箇足矣不可多用多則香濁沉香熟水先用浄瓦一片竈中燒㣲紅安平地上焙香一小片以瓶盖定約香氣盡速傾滚湯入瓶中宻封盖檀香速香之類亦依此法為之香花熟水取夏月但有香無毒之花摘半開者冷熟水浸一宿宻封次日早去花以湯浸香水用之丁香熟水丁香五粒竹葉七片炙投沸湯宻封片時用之造熟水法夏月凡造熟水先傾百沸滚湯在瓶内然後將所用之物投入宻封瓶口則香倍矣若以湯泡之則不甚香若用隔年木犀或紫蘇須畧向火上炙過方可用御用渴水官桂桂花丁香白豆䓻仁縮砂仁各半兩細麴麥糵各四兩右為細末用藤花半斤蜜十斤煉熟新汲水六十斤用藤花一處鍋内熬至四十斤生絹濾浄用小口甏一箇生絹袋盛前項七味末入甏再下新水四十斤并已煉熟蜜將甏口封了夏五日秋春七日冬十日若下脚時春秋温夏冷冬熱林檎渴水林檎㣲生者不計多少擂碎以滚湯就竹器畧定旋擂碎林檎衝淋下汁滓無味為度以文武火熬常攪勿令煿了熬至滴入水不散然後加麝腦少許檀香末尤佳又法將林檎破開去心核用浄器内擣碎布絞取汁再將滓重擣極爛放竹器中以滚湯衝淋嘗滓無味煎法同上木瓜渴水木瓜不計多少去皮穰核取浄肉一斤為率切作方寸大薄片先用蜜三斤或四五斤於砂石銀器内慢火熬開濾過次入木瓜片同煎如滚起泛沫旋旋掠去煎兩三箇時辰嘗味如酸入蜜須要甜酸得中用匙挑出放冷楪内候冷再挑起其蜜稠硬如絲不斷者為度若火緊則有涌溢之患其味又不嘉有燋煿氣但慢火為佳五味渴水北五味子肉一兩為率滚湯浸一宿取汁同煎下濃豆汁對當的顔色恰好同煉熟蜜對入酸甜得中慢火同熬一時許凉熱任用香餹渴水上等鬆餹一斤水一盞半藿香葉半錢甘松一塊生薑十大片同煎以薑熟為度濾浄磁器盛入麝香緑豆許大一塊白檀末半兩夏月氷雪内沉用之極香美楊梅渴水楊梅不計多少揉搦取自然汁濾至十分浄入砂石器内慢火熬濃滴入水不散為度若熬不到則生白醭貯以浄器用時每一斤梅汁入熟蜜三斤腦麝少許冷熱任用如無蜜餹毬四斤入水熬過亦可竹嶼山房雜部卷十四
