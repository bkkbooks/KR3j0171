body:
  text: 竹嶼山房雜部卷二十二明宋詡撰尊生部十果部收乾荔枝以新瓷甕盛每鋪一層用鹽白梅二三箇以箬葉包如棕子狀置內密封甕口則不蛀壞收藏核桃以粗布袋盛挂當風處則不膩收松子法同雷栗以兩栗蘸油兩栗蘸水置鍋中圓轉更排四十七箇濕紙搭􅂒蓋之慢火燒候有雷聲為度風栗冬至前大栗以官斗為率用鹽一斤調水浸栗令沒經宿漉起朗乾用籃懸挂於背日少見風處不蛀不損不萌或用麻布袋盛挂每日搖動一二次熟栗大栗每箇殼底以刀十字劃開底向下逐一排在鍋內以鹽一撮繞鍋緣去聲撒下􅂒蓋定發火候熟供炒栗先以衆栗中選擇二栗底面方可作合者却以一枚用香油塗濕一枚用白水塗濕仍以作合置鍋底然後取衆栗逐旋蓋覆二栗之上雖多亦不妨却蓋鍋口合縫火燒一飯頃取出其栗顆顆有油且不粘殼尤甚酥爛收藏栗子霜後初生栗投水盆中去浮者餘漉出布拭乾曬少時令無水脈為度用新小瓶先將沙炒乾放冷以栗裝入一層栗一層沙約八九分滿每瓶盛二三百箇用箬一重蓋覆以竹簽按定掃一淨地將瓶倒覆其上略以黃土封之不宜近酒氣可至來春不壞又法用栗子一石鹽二斤水泡開浸栗一二宿漉出曬乾同芝麻二石拌勻荆囤內盛永逺不壞食之軟美收藏棐子以舊盛茶瓷甕收之經久不壞蒸蓮實石蓮肉先泡去澀水洗淨蒸熟供又法以沸湯泡蓮肉拌飯頓置桶中一宿傾出成一塊不散酒家每為之藏青梅法青梅杏子林檎細看無損者便帶露連枝採下不要犯手解著每果子一斤用白礬半兩泡湯停冷去腳調炒鹽半兩以皂角洗淨手鋪青古文錢三四箇在甕底入一層果子又鋪銅錢數文如此相間入了以礬鹽水浸過上一寸細絹帛并好紙密封更以油紙封之牢縛住切忌入水以小篾籃挂在井底不得打破十月之後取出不損每果百枚只可用銅錢五十多則銅氣收藏諸青果十二月間蕩洗潔淨瓶或小缸盛臘水遇時果出用銅青末與青果同入臘水收貯顔色不變如鮮凡青梅枇杷林檎小棗蒲萄蓮蓬菱角甜瓜梨子柑橘香橙橄欖荸薺等果皆可收藏收藏諸乾果以乾沙相和入新甕內收之密封其口或用芝麻拌和亦可蒜梅青硬梅子二斤大蒜一斤成囊剝淨以炒鹽三兩酌量用水煎湯停冷浸之候五七日後有滷水將欲變色即傾出再煎停冷浸之入瓶收之候七月間取食梅味不酸蒜味不臭集香梅大青梅一斤每箇切作四界去仁用鹽一兩半生薑絲一兩半新青椒八錢糖四兩半拌勻煎盆內曬之時復攪拌候汁盡八九分乾後入砂仁桂皮甘草檀香細末各一錢拌勻收之又方青梅十斤核未甚硬者十字劈作四界入鹽一斤糖三斤薑絲一斤新椒二兩一處淹拌勻日曬頻攪拌但到汁盡不要極乾再用􅒦砂官桂各一兩甘草二兩為細末入淹梅一處攪勻入瓶收之又法只收曬乾糖梅坯臨用旋入後項香末免得藏久要蛀又帶藥氣造化梅大青時梅一斤好鬆糖一斤煎淨瓶內先以糖一層次以梅鋪一層如此層層相間藏盡為度用油紙笋箬密封瓶口頓放屋上向陽處曬一月熟瓶上以瓦片遮口以防雨水對金梅黃梅一百箇鹽淹透取出曬一日用沙糖一斤蜜半斤鋪薑絲一層梅一層糖一層勻鋪了煎醋一大盞入瓶內用綿蒙口曬半月熟薑絲酌量用韻梅梅子一百箇要黃嫩者沸湯焯過鹽一兩薑一斤細研新椒四兩去核甘草四兩銼碎一處拌勻曬乾臨乾時捻破梅子團諸料物上别用薑絲四兩勻糝入瓶曬乾為度糖脆梅小滿前三五日青梅一斤用鹽一兩二錢白礬二錢或三錢浸去酸味乃去核用尖口罐盛貯倘面壞則取壞亦不多也藏青梅法青梅時梅一百箇用白礬半兩泡湯停冷去腳調炒鹽半兩每瓶底用當十大銅錢五六枚入梅八分却入礬鹽湯浸過半寸以上再摻銅青末少許在面上以篾籃盛瓶放在井底蜜煎青杏法不拘多少刮去皮用銅青極細末銅器內勻滚令緑色然後用生蜜浸但覺有酸氣便換蜜至五遍自然不復酸可以久留銅青無多少之限但滚的勻便可也青梅亦可依此法造巴思把餅兒揀擇花紅周正而生硬者批去皮周遭切縫如橘囊狀連曬二日用手逐箇輕輕按匾再曬半日蒸熟曬乾收藏其形製氣味與本土出産者無異燒藕以老藕切作兩假豎在鍋中傾下水一盞鹽少許􅂒蓋燒之酥熟為度又法嫩藕搗碎薑醋拌勻供可以醒酒灌生藕用瓊芝煎湯調沙糖灌藕孔中留空頂上半寸油紙扎定放水缸中或用豬皮煎湯調灌之或煎魚鱗湯灌熟藕用菉豆粉濃調沙糖灌藕孔中細紙扎定以物夾住鍋中煮熟為度凡切藕須斜片則不脫收藏藕好肥白嫩者向隂濕地下埋之可經久如新若將逺以泥裹之不壞蜜煎藕法初秋藕新嫩者沸湯焯過五分熟去皮切作條子或片子每一斤用白梅四兩湯浸汁一大碗候冷浸一時許漉出控乾用蜜六兩去滷水别蜜十兩慢火煎令琥珀色放冷入罐貯之收藏桃子以麥麵煮粥入鹽少許候冷傾入新甕取桃納粥內密封甕口冬月如新桃不可熟但擇其色紅者佳收藏石榴選大者連枝摘下用新瓦缸安排在內以紙十餘重密封蓋又法選揀大石榴連枝摘下用新瓦罐一枚安排在內使紙十餘重密封可留多日不壞收藏紅棗將大磁缸一隻刷洗淨拭乾燒熱米醋澆缸內蕩令勻控乾又以熟香油勻擦缸口於缸底鋪粟稈草一重棗一重中心四圍亦令草間蓋不可重壓亦不生蛀蟲收藏梨子揀不損大梨有枝柯者插不空心大蘿蔔內紙裹暖處至春深不壞帶梗柑橘亦可依此法橙玉生雪梨大者碎切以橙絲好醋入鹽少許醬拌供可以佐酒藥橘小青橘一斗爛煮訖以冷水浸一宿再以水淘三兩度去盡苦汁漉出控乾以好醋二碗鹽半斤拌勻淹一宿曬乾用甘草丁香茴香縮砂官桂各半兩為細末醋一碗鹽二兩用藥末青橘拌勻瓷器盛日曬收之糖橘塘南橘百枚先用石灰湯焯過漉起用刀於橘囊中劃破去核留橘將沙糖二斤半入鹽少許煮五沸出鍋捺匾曬至晚歸滷中直待滷盡橘乾為度蒸過朗乾冷瓶收之法不用糖純用鹽謂之鹽橘亦頗消食下氣燒橘大橘一枚草紙裹之水中蘸濕灰火煨熟供煎金橘金橘揀大者鏤開以酒煮透候冷用針挑去核捺匾瀝乾每一斤用蜜半斤煎去酸水苦汁控出再用蜜半斤煎入甕收之煎橙橘一依此法凡用蜜惟夏蜜最佳春蜜滋酸又作腥氣冬蜜亦酸皆不堪用凡煎果子硬酸者用湯化朴硝停冷浸去酸汁煎時須砂石銚為佳人缶後更須時復看化才覺酸急以新蜜煉熟換之一法以金柑略切開十字沸湯撈過待冷捻去核入淨蜜中慢火煎熬蜜透映熟為度久藏則别換熟蜜留之金柑以小者為佳藏橘法淨室掘一窖或稻草或松毛鋪厚寸許剪刀就樹剪下橘子不可傷其皮却一箇箇排窖內安二三層别用竹作梁架定又竹籃閣上再安一二層却以缸合定或烏盆亦可四面濕泥封口至明年四五月不壞收藏柑橘揀光鮮不損者將有眼竹籠先鋪草襯底及護四圍勿令露出重疊裝滿安於人不到處勿近酒氣可至四五月若乾了用時於柑橘頂上用竹針針十數孔以溫蜜湯浸半日其漿自充滿如新收藏金橘安錫器內或芝麻雜之經久不壞若橙橘之屬藏菉豆中極妙勿近米邊見米即爛法製橘皮消痰止嗽破癜瘕痃癖橘皮半斤白檀一兩青鹽一兩茴香一兩右件四味用長流水二大碗同煎水乾為度揀出橘皮放於磁器內勿令透氣每日空心取三五斤細嚼白湯下外三味曬乾為末沸湯點服趲熟緑柿生柿置盒中每一百枚用肥皂二枚同安不一二宿即熟趲熟方柿每方柿一百枚用礦灰一升湯調浸一宿即不澀若要稍遲即停冷湯浸之收藏柿子柿未熟者以冷鹽湯浸之可令周嵗顔色不動熟生柿法取麻骨插生柿中一夜可熟梅花脯以栗子橄欖薄薄切之同食與梅花韻相似可以醒酒糖脆梅法青梅一百箇劃成路路兒將熟冷醋浸沒一宿取去控乾别用熟醋調沙糖一斤半浸沒入新瓶內以箬葉扎口仍用碗覆藏在地中深一二尺用泥土蓋過白露節取出換糖浸糖取梅法黃梅大者不拘多少捶破核未捶以前先以鹽淹一日鋪梅一層入沙糖川椒生薑絲一層重重鋪罐內八分滿以物蓋覆蒸一遍再用生絹覆罐口曬十日可供曬時先用些椒葉在梅肉上茶部合足味茶法甘三苦四妙通神甘草三兩苦參四兩五斤乾茶五斤蒸乾茶葉五斤蒸過茶五斤菉豆四升同搗合豆炒過此方宜利勝燒銀製孩兒香茶法孩兒茶一斤研極細羅過用白豆䓻仁四錢研為細末粉草炙一二錢碾為細末蓽澄茄一二錢研細末川百藥煎半兩為末將已上四件和勻磁器收貯勿沾味沈香半兩劈成一二定子插入鵝梨內用紙裹了水濕過灰火內煨梨熟為度取出沈香曬乾為細末同一二錢和之前劑將梨汁製麝香用梅花片腦一二錢米腦亦可用製過寒水石同研和拌入料寒水石半斤於炭火內煆紅先將薄荷葉四兩水浸得透鋪在紙上將煆過寒水石放在葉上裹了放冷取出稱五錢與腦子同研餘者待後次用之葉棄去不用死腦子法也不死則腦子氣味去矣麝香二錢揀去毛令淨研開用元製沈香梨汁和為泥泥在磁盞內或銀器內上用紙糊口用針透十數孔慢火焙乾研為末再施盞內焙熱合和前藥其香滿室此其法也右將潔淨糯米一升煮極爛稠粥擂細冷定用絹絞取濃汁和劑須要硬於淨捶帛石上捶三五千下愈多愈好故名千捶膏却用白檀煎油抹印印成小餅於透風處懸弔一二日刷光磁器內收酥合茶將好酥於銀石器內鎔化傾入江茶末攪勻旋旋添湯攪成稀膏子散在盞內却著湯浸供之茶與酥看客多少用但酥多於茶此為佳此法至簡且易尤珍美四季皆用湯造冬間造在風爐子上腦子茶先將好茶研細薄紙包梅花片腦一錢許於茶末內埋之經宿湯點則有腦子氣味極妙薰花茶用好淨錫打連蓋四層盒子一箇下一層裝上號髙茶末一半中一層底透作數十箇筯頭大竅薄紙襯鬆裝花至一半盒蓋定紙封縫密經宿開盒去舊花換新花如此一二次湯點其香拂鼻可愛四時中但有香頭皆可為之只要朗乾不可帶潤若紙微潤非徒無益而又害之也又法用淨磁器將茶末捺實用筯頭簽十數竅每竅安花頭一箇如此安滿却以茶末蓋之紙糊封口待經宿用此法惟造些少暫時則可若多造被濕氣反害茶香味也竹嶼山房雜部卷二十二
