body:
  text: 竹嶼山房雜部卷七明宋詡撰燕間部一文房事宜硯墨池曰銀硯凡硯堅細發墨欵識拙古為上今惟重端溪石歙石常用洗潔不得留宿滯墨寫字無精采有剖蓮房洗之有切半夏洗之大去宿滯漢未央宫魏銅雀臺瓦甓皆制硯真而舊者亦鮮倭國有漆查硯體輕而發墨青州有熟鐵硯廣南有竹硯墨南雄府有石墨長短巨細似墨即畫睂石墨取桐油煙為上豆油煙次之以燈草一莖然者煤細二莖較粗三莖則太粗矣膠少煙細為佳收時止於通風處安頓不得近濕襲箱函中火炙及日曯墨譜云墨之佳者拈來輕嗅來馨磨來清李廷圭造墨法麻油十三斤今用桐油以蘇木一兩半黃連二兩半杏仁二兩捶碎同煎油變色濾過冉以生油七斤和之入盞燒煙掃下每煙四兩半用黃蓮半兩蘇木四兩各捶碎水二盞同煎五七沸色變熟絹濾去滓别用沉香一錢半前藥汁四兩半冉煎濾次用片腦五分麝香一錢輕粉一錢半又以藥汁半合研濾將餘藥水入黃明膠一兩二分同熬不住攪令化醒又內沉香腦麝水攪勻乘熱傾煙內就無風處和勻杵透候光可照人範之乾則復蒸以滑石為末灑墨上瘞灰中五七日候乾水磨洗刷明收造墨春夏膠多秋冬膠少廷圭唐末人姓奚南唐主賜姓李自易水徙歙州造墨遂為第一紙紙有楮皮所成經水則朽有竹皮所成勝水雖色箋膠礬多者脆而易點髙麗白硾紙與倭箋鮮得南唐澄心堂紙絶無若宋箋最厚元箋頗薄亦漸罕矣今之龍箋出自內府平厚滑膩幅重一斤優於他箋也造五色箋法每官印紙一幅用煮漿及顔色水調雲母石碓粉水澄絶細先刷表面上桁俟乾後刷裏面上桁俟乾槌過熿色隨灑以金或以顔色水拖染朗乾加熿色篩雲母石粉金槌平一用白祿紙百幅牛膠半斤明礬八錢湯化醒之春夏微釅秋冬甚薄調顔色正面拖過朗乾槌平為箋正可蠟印花一用白祿紙礬膠拖過朗乾研上等定粉加顔色膠調刷紙砑滑膩為箋惟可點以金煎顔色水法肉紅用蘇木加紫草少許同水煎汁紅用蘇木八兩槌碎沸湯八碗浸三二時煎濃加白礬濾黃用槐花半升炒令焦黃色同水三碗煎數沸候色濃加白礬半兩濾粉青用靛花一斤淘潔研細其餘顔色惟此三色濃淡輕重調合若沉香色煎栗殼水染大紅用紅花水膏刷於膠礬紙也煮漿法糯米五升浸一宿研糜爛用水二升調攪濾潔入菉豆粉一斤攪勻下釜慢火煎頻攪候漿滚入黃蠟半兩攪勻熟入白礬一兩急攪之如漿濃旋入水攪量稀稠收熿紙法計紙百幅白礬二兩黃明膠一兩滚湯頓化醒成稀水收槌紙法每乾紙一幅則以灑濕一幅疉之百幅為一垜置平板上用大石重壓經一伏時俾上下乾濕皆勻於平石上勻槌二三百下務著實於百副內將五十幅晒乾却與濕者五十幅乾濕相間冉勻槌三二百下依上冉晒一半侯乾又乾濕相疊槌之以無一幅占粘為度筆筆稱兔穎有自來矣蓋惟用兔毫之在前肩者尖健而佳雖有羊毫鼠鬚狼尾等皆後塵也藏時但於筐筥中置通風處不雜以椒亦無蛀損一種草筆堪作草書松雪齋印色法用真芝麻油或菜子油一斤置銀瓷器內慢熬三沸凡油一兩先以萆麻子七粒去殼白肉投下復熬色改即漉去以白芨切隨用粘川椒隨用不蛀明礬為木隨用不滲豬牙皂角槌碎少許又投下文武火亦熬二三沸又即漉去祗熬油俟滴水成珠投黃蠟豆許不滲不花停火以細纊濾去滓貯瓷瓶地中瘞月餘取之經數年色愈明亮用時以滕黃豆許磨油內朱鮮無變先用水花上等銀朱研細水淘晒乾加油染煮帛熟艾鵝毛角屑吐絲之類內細綃囊縫固取油潤朱按染透徹內於印池印池宜瓷玉為之一取真萆麻子油每兩入五霛脂五分煎滴水成珠用之一取鵝梨肉汁和福蜜內瓷器蒸熟調朱有用辰砂研細水飛過每銀朱六錢加砂四錢為優煮鵝毛法用老鵝翹剪取內向柔軟者入水釜中石壓煮俟不浮去水晒絶乾以染朱熬蠟法黃蠟一兩入鬱金末少許熬鎔顔色深淺隨意加減乘熱絹濾去滓入瀝青兩皂角子大冉熬收之書欲易開者宜入半溫淺蘸封之欲防私折者宜熱深蘸封之合朱法膩朱法用水銀硫黃燒研淘定而成復淘潔晒研二兩以秦皮梔子皂角各一分巴豆一粒去皮入水煎汁濾潔黃明膠五錢冉熬化醒和朱脫範中陰乾復刷明滑收計朱四兩膠一兩為率唐髙駢詩云滴露研朱點周易合黃法雌黃似雲母甲錯可析者研細水飛過去水晒燥同朱法和範之韻府云古人寫書用黃紙有誤以雌黃滅之藏設書畫珍藏古今名人書畫無論絹紙凡四五月暨七八月時多降陰雨遇而黰脫必用木笥深筍者外布漆之內露木素預然炭火微引烘盡水氣捲襲笥中樓庋居綺切髙置之毋常表背慮有裁損名筆之妙及圖書收記者又下水池浮動隱約微奧處所新表背畫其糊在內雖二三年尤不退力易生黴黰有用白酒取新筆染抹去盡凡展玩不宜上以手磨指下以手掬舉蓋有古絹易斷至於損失不續甚可悔惜及方火炙之後五燥一展其絹乘燥而裂捲時須齊緩不容摺皺值春冬晴天時展設尤避濕壁狂風沾拂設不宜令太繁惟用名筆絶妙者一二三幅清致無敵數宜竒不宜耦雖大廳堂逺深邃多則五幅然而咫尺之近必觀其意思逺到如身處林麓間彌望千里胸中曠逹隨景而放有以屏風物類障之則何以得其畫之全趣耶若髙展以屏支其下軸慮有風動可焉表背書畫法秋冬為上時春為中時夏為下時暑溽音辱之月為不時凡表背必使厚薄適均潤潔平穩為精藝也訣曰春宜滑石白礬多皂角川椒等分和黃蠟水油須大用麵稱十兩要重羅滑石一兩白礬一兩皂角一梃川椒一兩黃蠟一兩油夏用信巴芨椒艾水烏頭蠟更髙皂角白礬油一兩金精木鱉與秦芃黃蠟一兩白礬一兩艾一兩金精石木鱉子秦芃白芨芫花各半兩烏頭信巴豆各少許皂角一梃秋用皂角好油宜黃蠟金精艾水微木鱉不多石燕少休教風透濕時吹黃蠟金精石木鱉子艾各半兩石燕少許皂角一梃冬月最好成書畫木鱉金精都總罷􅗠女交切砂茯油鹽蠟礬鑒者相看贈高價黃蠟一兩白礬五錢􅗠砂二錢茯苓三兩鹽三錢麵一斤發透毒氣砑子用白芨餳飴二味并熬和堅以肥皂角搓水一升聽後用蠟一處同煎粘書畫歲久永不脫過於膠漆用楮樹汁飛麵白芨末三味調如糨用之去差誤寫字法蔓荆子二錢龍骨一錢柏子霜五分白丁香十條定粉少許俱為細末點水於字上取藥摻之少頃拂去插花法折花用曲折飄散插之於瓶自然清絶繁則不佳惟梅花多有古枝可愛亦在人意向能取凡折木花先用火燔其折盡處花不易謝古銅窰器中貯之良折草花須帶葉苞聚之尤宜插其成雅趣也海棠花束薄荷於折盡處浸水內鳯仙花葵花皆浸于百沸湯梔子花將折盡處槌碎內之以鹽置器中不用水水仙花用冷水牡丹花用蜜不用水梅花用煮肉汁去油俟冷養之其萼盡開而花難謝焚香法取象錢灰米湯和劑晒乾煅紅細研依法煅三次入爐鼎然煤餅置上餅上又載以厚雲母石隔火香不易焦有載以火浣布火不能禦有載以金銀錢幾于奢泰也宜春冬時不宜夏秋時又不宜廣厦中别創小規模室闔設低几焚之則煙穗上升遍化室壁間不塗粉堊音惡糊覆以白厚綿紙收引香味不得解散火不宜猛使香味緩蒸氤氲開繞鼻觀先參不可使目見其煙之騰擁也微覺有焦遂令徹下始用檀香降真香厚濃焚之以逐諸濕穢次續以速香黃熟香等漸回香氣末則惟以伽南香沈香之類更加以上品龍涎合香和而焚之無能出其右矣楊廷秀燒香歌云琢瓷作鼎碧於水削銀為葉輕於紙不文不武火力均閉閣不簾風不起詩人自炷古龍涎但令有香不見煙素馨忽來茉利折抵處龍麝和沈檀平生飽識山林味不奈此香殊嫵媚呼童急取蒸木犀却作書生真富貴香譜旁通圖四和凝香百花碎瓊雲英寶篆清真文苑沈香二檀香兩一錢半兩箋香一分甘松一分玄參一兩丁皮一分麝香一分新料降真半兩檀香半兩甘松半兩香白芷半兩茅香四兩笑蘭檀香箋香三錢半兩沈香一分降真半兩麝香一錢腦子一錢甲香半兩清逺茅香半兩生結三分腦子一分麝香一錢檀香半兩錦囊腦子零陵香一錢半兩麝香一錢木香半兩檀香半兩藿香一分丁香五分醒心藿香麝香一分六錢腦子一錢箋香一兩沉香半兩凝和麝香丁香一分半兩檀香兩半甲香一錢結香一錢甘草一分腦子一錢已上碾細為塵用煉蜜少許和勻如常法焚惟寶篆不用蜜每香三兩加艾納一錢或酸棗仁一錢則香團聚不散艾納出西國似艾蓋松皮上蘚衣煉蜜法用真蜜以綿濾過入瓷罐內將油紙羃以數重置釜中重湯煮一日取出冉煎數沸出水氣治香法凡合香成用不津瓷合盛封以蠟紙入潔地瘞月餘凡和香用煉過蜜一斤冉入蘇合香油二兩同煉大妙凡治檀香銼米粒大慢火炒出煙盡紫色新氣即止凡藿香甘松零陵香之類須採擇用冷水洗去塵土凡治茅香銼碎以酒蜜水潤一宿炒令赤燥為度治甲香須擇如龍耳者二兩用灰汁一碗煮盡冉用好酒一盞煮盡入蜜半匙炒如金甲香螺掩也能聚衆香小龍涎香沉香一兩龍腦三錢用鵝梨汁和為餅焚之桂香冬青子絞汁同桂花蒸陰乾焚之類木犀也金龜吐艷香宜丙子日合法曰金龜雖小世無雙占斷仙家上品香尾後才燒紅火焰口中復放白毫光輕輕作朵如雲霧漸漸成灰似雪霜清玩片時真可愛人皆稱贊闕衢之錦川石鎮江之斧劈石無甚竒巧俱取其修長有特立抗獨之勢耳寧國有馬齒石閩有將樂石光瑩碨鳥罪切􅀈力罪切惟可點化其景趣在衆象中也而杭州水法石仙姑石崑山石海鹽峽石韶州英石鳯陽霛壁石自成巖岫兀立盆池中置之軒窗間則宜南粵羊肚石體有浮沉雖多人物鳥獸之肖亦宜取立盆樹之下堪養菖蒲江北礬石色白而明徐州上水石理疏而濁不及此數處之石矣浮石原是海水之沫歲久結聚土重則沉必常濯去始得久遊于水面也疊山宜用甲乙其石為髙下起伏紆迥曲折巍峩隱露有水則流動有土則崔嵬有樹則青鬱岐路梯磴幽顯相通亭榭臺館憩音器息有所是真能造出一大化工也墨娥小録云粘補斷石用黃蠟白蠟松香鎔化和以同色石為末入藥一處乘熱粘之用玉瑪腦水晶等器忌熱酒瀉急即璺音問宜先以溫水緩緩通蕩滌其性和暖始以酒酌之藏寶玉瑪瑙琉璃水晶玻璃琥珀珊瑚器內用紙襲外束繒帛各處一函不宜取散綿近之致粘帶有失誤古銅器忌熱湯滌頓無精神磨擦摶擊有損其鉎秀甲角等器犀角玳瑁龜同鶴頂之物時喜近人玩弄惟不宜親火與日舊犀角色沈晦者用蠟炬油同灰少許入水煮片時遂鮮明有光彩犀角色不黃者用鳯仙搗糜爛同礬少許塗覆一時溫水滌去色自明黃久則色紅殊不妙也藏伽南等香用好錫為函中疊一層層通多竅竅下貯蜜蘇合香油竅上置香則香潤留而不散不宜塗蜜護香俾不外發也治香枯燥用白萼葉苴之瘞土中數日香仍潤藏髹器剔西綵漆之類不宜以綿纊襲之慮入其斷紋中有損起之失更忌水浸日晒新漆器氣味未能退者溫釅醋滌蕩二三次即如舊物藏古窰器須以柔紙每器厚護疊惟三五器重壓恐茅損相磨動恐至骨出遂非完美之器瓶壺內有垢必磢初兩切之也粘窰器璺處補石藥粘之又以白蠟鎔化和定粉加減顔色飾之益玉瑪瑙水晶精神法用白梅擊碎去核同清水作沸湯入玉瑪瑙器於內浸一日許刷洗之其色倍常惟水晶必俟冷浸瑪瑙器薄者亦畏熱按玉瑪瑙珊瑚等物誤有損折用寒水石明礬研絶細粉視顔色加減以白芨磨水調塗損處以綿紙并綸絲護束置湯釜中務煮令透俟冷開永不斷罩金法先以黃金置炭火中燒之冉取鹽水調黃土塗燒之務滌潔則用焰硝緑礬等分水調傅金置火中炙色改即止入水刷滌烘乾雖次金亦如上品金色也白銀法用烏梅置瓷器中同水煎濃以銀物於火中燒去積垢投之煮令純白光明刷滌烘乾明熟銅造器釅醋糟覆上過一宿揩滌之色新明烏梅煎湯揩之明如金色明錫造器用炭已然灰煎湯滌潔器中滿注以湯外用細乾布揩擦之色明如新造礱鋼鏨等利能雕刻銅器先礱利鋼鏨以食醬同焰硝塗鏨口上火煅赤冷水淬之冉發硎音刑能屑堅銅居家必用云羊角亂髮煅細末水調傅刀口上燒紅礱之利甚礱鐵器不發鉎法新礱刀劍等物已至明瑩即以鸊􅀈膏塗之永不發鉎續英華詩曰劍瑩鸊鵜膏耐點蠟炬黃蠟松脂槐花末各一斤浮石末四兩一處鎔用燈心布澆一晝夜僅點一寸獸炭炭十斤鐵屎十斤合搗成末生芙蓉葉三斤冉搗和糯米煮糜膠隨意手範獸形晒乾俾鞲炭燔紅設爐中能三日不滅鞲炭皮排也吹扇火器竹嶼山房雜部卷七
