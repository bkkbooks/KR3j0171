body:
  text: 竹嶼山房雜部卷十一明宋詡撰樹畜部三種五榖法太和戊申大有年詔百官觀稼劉禹錫詩曰玉燭調寒暑金風報順成文公朱先生有勸農文非一通法制甚備知之有所指歸矣稻粳糯之名甚多詩曰豐年多黍多稌注曰稌稻也稌宜下濕而暑治水田芟柞須盡耕犁須深膏以糞草須勻入土易朽則發苗也詩曰載芟載柞其耕澤澤生民詩曰實方實苞載芟詩曰播厥百榖實函斯活不拘粳糯以稻稈為包至清明時懸浸於水間日舉而擊濯防有淤於去切泥涴音汙芽因帶包晒之催其芽發夜復浸於水中既見甲拆露芽遂以亂穰覆於暖室中其芽已長乃播於既耕平整田內必欲水滿以防驟雨􅀢音濁入於泥俟其芽立更看水之深淺無為熱日所鬱各種田中界開每畝計種一斗江南治田早者皆於驚蟄時浸種芒種時拔取稻秧蒔之蒔令根直須以六科一行不疏不密凡後為耘鐋等務皆以此行為則載芟詩曰綿綿其麃注曰綿綿詳密也麃耘也麃音標苗色已青則逐行耘之耘去耗稻履於泥中使腐尤能發苗惟稗似苗難别不得遺留此時工密不妨苗長若一遲誤後難助力大田詩曰不稂不莠又云去其螟螣及其蟊賊捕蝗焚而瘞之稂音郎莠音酉螟音冥螣音特蟊音矛耘後則以鐋逐行鐋之務使草根悉去不得害苗秋前必下膏壅柴灰為上芝麻莘壓油已枯之餅為次菜子餅豆餅又次皆能助其發實亦視其田之肥瘠而加之太肥則稈盛而實更粃太瘠則稈小而穟亦短左傳曰是穮是蓘注曰壅養苗也穮音標蓘音衮鐋後舉兩手逐行抓之必動其根而封以熟土見草則茠至此時則去水數日使稻根復重固不發苗而發秀將見其頴栗也生民詩曰實穎實栗稻實必俟天晴逐行以鎌刈臥之于田得晒至二三日者必乾可以穧才計切束而歸礱取其米若糯稻必晒米改白色方可為酒醴糗丘九切餈之材稼穯之功於斯畢事積之倉之正此時也黍穄皆有粳秫詩注曰黍榖名稷亦榖也一名穄注曰黍宜髙燥而寒黍宜髙田故曰黍心未生雨灌其心心傷無實初生時畏露次日早用檾麻絞下長繩上令兩人對持於黍上抹過以去其露則不傷黍刈穄欲早黍欲晚二月可播種大麥小麥詩曰貽我來牟注曰小曰來大曰牟種色甚衆牟惟青稞種為肥來惟黃稞種為肥八月內田宜耕犁須熟作畦播種之有為淺坑撮種之畏水開溝宜深麥已勾萌則碎擊其土以覆其子此即播種而耰之之理也至冬又用土覆其根膏之以糞以草灰四月內沙霧下則傷麥檾麻繩侵晨令兩人對持而抹去之五月內大麥先收小麥後收必立稍晒絶乾乘伏中落其子閉而藏之蕎麥七月種八月收播種稠則結實多稀則少大豆色有黃黑褐紫青白瑪瑙羊眼之類詩曰荏菽立夏至夏至二十日後皆得播種肥地宜疏瘠地宜密也才長遂耘莢赤莖蒼遂收種早者早種之種晚者晚種之米豆枝葉如栁花如烏豆一種之後數年收實淮南子曰豆之美者有米豆是也出雷州思霛島赤豆色紅又有白斑紫緑等之類五月種其子長盛時去其繁蔓結子良多菉豆滇南有種紅豆鮮紅可愛大小不一有綴為垂旒以飾首不堪食立秋前播種種早不生莢盛茂去其繁蔓豇豆有長莢有短莢榖雨前為淺坑種之一坑三四子六月收子遂種八月又收子其長莢稚嫩者可以入蔬頻灌水糞則常結子宜架之而生藊豆有長莢短莢寸莢龍爪早晚軟硬殼之異榖雨前為淺坑種之一坑二三子宜架之而生刀豆榖雨前種其子重宜淺置浮壤間灌水俟其甲拆有體而始以沃壤掩覆之插長楥而引其蔓令不倒俯則多花莢稚老皆堪用也龍爪豆榖雨前種其子宜架之而生羊角豆一名草决明諺名望江南杜子美詩開花無數黃金錢四月種其子孕婦食之生兒令矮稚嫩者則可摘居家必用云花忌泡茶令人患風大豌豆小豌豆陸放翁以為大巢小巢小巢之生於野田中者蘇東坡以為元修菜也一種廣豌豆如石蓮菂而堅色青白從海中飄至不堪食八月中種其子作淺坑下三四顆四月收回回豆子出回回田地芝麻白色黑色四月播種其地宜膏腴宜髙阜七月帶青收黃麻葉長而紋二月間播種其子六月收漚其皮析之可以辟纑音盧椎柔之可以絞索櫛理之可禆以粘舟子堪為食油骨堪為蠟炬心材以秋麻洴澼之遂為白色麻也青麻又曰絡麻五月播種其子八月收皮可索綯不畏水其子鵝食腐腸種蔬菜法宋宇種菜三十品曰天茁此徒助我鼎爼先治沃壤入糞鋤之又入糞鋤之經三畨而種蔬菜為良法也凡播子宜昧爽時易於勾萌子須陳久不癩其蔬菜根荄細柔與木不同移種時必於乾壤中種之而方灌水種則理其根荄務直墨娥小録云用桐油腳入糞內一順攪十分勻澆菜根黃蟲殺盡再不生白菜葉青莖白四時皆可移種七月種者為冬菜九月杵淺坑種者四月收子為榨油之需冬月以雞鵝鴨糞或芝麻莘覆護其根則不凍􅖖臘前後灌糞至花時壅及三畨則茂盛春時摘其臺心枝遂旁發結子繁衍也羊角菜似白菜而葉捲性柔四時宜種九月移種者子榨油較多於白菜其霜㽔甚適口春臺最肥東坡云味含土膏氣飽風露雖粱肉不能及也黃矮菜似白菜而短性柔而肥八月播子九月移種冬月漸摘霜㽔而用春臺肥甚四時亦宜種蓮花白菜似黃矮而色白性柔葉密九月播子十月移種四時皆宜塞心菜似蓮花菜而葉又密九月播子十月移種菘菜莖濶白葉端青碎蹙而密埤雅云菘性凌冬不凋四時常見有松之操故名在北為蔓青有根在南則為菘為菁無根四時宜種九月種者至三月甚肥周顒曰秋末晚菘夏白頭菜似白菜色微黃八月移種四月再種冬白頭菜七月播其子八月移種夏菁菜葉青短莖白肥長又名箭幹菜七月播子八月移種者肥脆春夏皆可種瓢兒菜似夏菁菜色微黃性柔七月播子八月移種四時亦宜種八斤菜葉似白菜而大方言云春而老四時皆種漸摘葉為用葵菜似蜀葵而小爾雅曰莵葵三月六月可種八月九月亦可種或生於田野中滋雨露之膏乳不勞人力芥菜大葉碎葉晚早青紫之異埤雅曰辛菜也九月移種三月收子為芥醬需堪榨油百頭芥菜八月播子九月種摘一頭旁發數頭漸摘之白芥菜子色白本草曰從西戎來八月播子九月種子甚宜為芥醬芥藍菜似芥菜色藍八月播子九月種冬菾菜葉青潤豐肥即莙薘菜有一種如藤蔓者八月播子九月種三月收夏菾菜二月播子四月移種菠稜菜葉尖色青根赤韋絢云蓋由頗能國來後人訛為菠稜也七月內用水潤其子殼柔漉少乾播之宜膏腴地其根甚甘止堪挑取於冬霜㽔益美移種肥萵音窩苣菜白而長葉者筍甚肥紅者白者皆圓葉亦有筍杜工部比君子之晚得祿十月播子十二月移種三月摘筍生可食其葉苦四時亦可種萵生菜形如萵苣色微白十月播子十二月移種有筍不肥葉可生食苦藚菜青色肥長有皺葉尖葉抱朴子曰龍葵十二月播子二月種暑月摘其頭用漸長漸摘之八月留其子長生菜葉如苦藚菜十二月播子二月種味不苦可生食莧菜古曰人莧菜圓而豐有紅白莧陸即馬齒莧野生四月種摘其頭漸長漸摘之同萵菜葉碎青若蒿黃花若菊甚香肥七月播子八月種摘其頭為用甕菜圓葉肥長色青三月種沃土中能節生根復以土壓之即蔓而遍畦漸摘其頭用之畏寒冬月收其根種盆盎內置煁竈側根須久在器者為良芹菜小青葉而蔓味香爾雅曰楚葵一種馬芹無蔓其子入大料二月中移其根莖種於沃壤間常灌以水則長大而肥多有芹白西洋菜長葉細蔓本草曰落葵又曰蘩露五月以子種結楥扶蔓摘葉用之子能染紫苜蓿漢張騫在大宛國採歸種之又名鶴頂草秋後結實黑房纍纍可為飯亦可釀酒其葉可蒸為茹三月以子種薺菜細葉小本旋貼於地冬月自生於野田草地之間唐髙力士謫承山有薺菜詩曰兩京作斤賣五溪無人採夷夏雖有殊氣味都不改蘇東坡詩曰時繞麥田求野薺胡荽碎青葉而香張騫遺種今人謂之芫荽七月擊裂其子殼而播之稀則葉短而貼地根跗美於莖葉冬暮春早其霜㽔甚甘經夏則花不堪用也龍鬚菜青翠細長今北人曰肥狼草春月種自生於山土中燕薊之地甚多筆管菜即筆管黃精一種菜名老鸛嘴味尤香辣春月種燕薊野生尤多綽菜葉類茨菰根如藕條食之令人思睡出南海夏月生於沼中蔊音漢菜形似水芹味辛故名雲南大理府髙河泉出一菜莖紅葉青味甚辛辣出江西建昌府溪澗中蕺音疾菜蔓生莖紫赤色葉如蕎麥而肥關中謂之葅菜可生食出山谷陰濕地藤菜滑美大類蓴出惠州豐湖羅漢菜葉如豆苗出蘄州三角山舊傳有異僧種之而去若雜以葷物即無味南昌山西亦出香菜青小葉甚辛香羅勒之類三月勾萌時分種常以洗魚水灌之則香而茂溝泥淅水皆宜灌也堪取於盛夏初秋時薄荷方莖葉青而香三月播種其子至六月刈莖葉日晒之長則再刈一年共刈二次赤米菊小青長葉辛香碎花作叢又名孩兒菊諺云醒頭香二月取根移種摘其葉可合爊料紫蘇大葉碎葉皆方莖而香有紫色青色爾雅曰桂荏二月播種子成穗時可蒸為茹至實可榨油菌爾雅曰大者名中馗蓋下無紋摺者能傷人大毒小者名菌亦有毒凡中毒者必笑宜苦茗雜白礬勻新水併咽之無不立愈馗音逵菌竒隕切生於茅田者曰肉菌遇雷鳴而生者曰雷菌皆形小而肥美出松根際者曰松菌又有生栁木腐中者常以淅水澆之能頻生而用寒萊蔔莖葉似菜根色白根美於莖一曰土酥有甘而脆者有辣而實者白露前地必先壅以糞耕墾甚鬆疏播其子則大有體而繁則薅之使疏其頭則大也夏萊蔔有形長而肥者有形短而鋭者宜三月播子用膏腴地耕治甚鬆作畦種之一畦先十數日一畦後十數日必計口而種得食蓋易於開花結子食未盡而頭皆老枯矣胡萊蔔形有黃色者有紅色者味甚甘苗不堪用三伏內種宜肥地稀播其子頻灌則大茄蓮葉似藍根似蘿蔔味甘脆出陜西各衛根子菜葉似蔓青而大又似蘿蔔出德安府安陸縣葱色青中虛而圓種多又有樓葱諸月宜種六月不宜喜晒根圃中作畦畦中作溝深種於溝壖依之常以沃壤覆蓋之則白跗長惟胡葱幾三月種一番不然則􅖖子可種韭色青葉長厚本草曰菜鍾乳九月分其種規而種之空其中漸生而進二月種子取碗覆土上從碗外落子長及五年則根必滿蟠步安切蚪竒樛切而不長須復分種也地宜膏腴不容凡草雜出有芿而證切遂茠去漸長漸剪惟留根跗灌之而生冬以雞鵝等糞與亂稿覆蓋春信一回遂挾而發韭黃埤雅曰凡剪不用日中周顒答太子問曰春初早韭蒜本草曰葫有冬蒜夏蒜一種山蒜野生又曰小蒜八月開其囊種之沃壤中冬蒜來春取其苗遂折束其葉使下養其囊盛夏取之夏蒜無肥苗未秋亦取其囊也薤似韭而大八月九月種蕎葉青中虛如葱外稜三脊頭似蒜而一囊即本草所云蓼蕎也五月自土中起其根晒之至八月分種春間結子亦可收種用則刈其葉令再長根美於葉黃瓜有緑色白色本草曰胡瓜是也造架依之留近跗老瓜淘其子晒乾收早秋再種中秋再實裁竹匕開其根跗間納以大麥一顆瓜生久而碩大郭璞云瓜中黃甲小蟲喜食瓜葉宜蒙纊以骨去瓜類放此爾雅曰守爪列子曰腐蠸生瓜種有斑白長短本草曰越瓜是也種於地而生留近根老瓜水淘子晒乾收熟瓜有青有斑有稜有圓有長有金色有銀色本草曰甜瓜種於地而蔓取瓜味甘美者灰浥子收之其金銀色瓜造架與依則體圓冬瓜有長短種本草曰白瓜視瓜蒂之彎弓貼肉者是母俟老留其子種之而延蔓於地西瓜有黑有白有長有圓有小有大五代時蕭翰入契丹破回紇得西瓜種以牛糞西域種之大如斗盎其味甘美春種秋熟故曰西瓜契音乞紇下沒切耕治深畦每離六尺起一淺坑用狗糞和灰土瘞之於四周中則餘以鬆宜插其子於內不宜復移瓜易活而甘美長則以其藤葉牽連互覆不令日色下晒瓜則易大灌宜晡後須透灌一日糞間五日灌一畨水二畨水一畨糞天旱則依此法天雨則更在斟酌灌之摘瓜露經一宿又候露乾始收其味之甘者留子晒乾為種其體小者可插楥引蔓而生埤雅云瓜性惡香尤忌聞麝麝氣觸之乃至一蒂不收又云瓜忌煮漆絲瓜有短而肥者有長而瘠者色緑醫方大成曰虞刺草木記曰一名天羅絮又名布瓜有苦甜二種黃花結實如瓜狀內結成網造髙架與依之宜背陽向陰九月留瓜老收子體長而稚嫩者可食瓠埤雅曰長而瘦上曰瓠短頸大腹曰匏匏類小者名瓢有延於地者有扶於楥者開其根跗間納竹針使分之其生尤多八月則斷其藤勿復花實以堅其壺為器子為種墨娥小録云瓢藤跗剖之插巴豆一粒二三日後瓢柔可紐隨去巴豆瓢復鮮活又云用筆蘸芥辣界瓢其界處永不長如刻成又云瓢頸有細長者有卷曲者於瓢頂刳空一二寸以巴豆二三粒去殼捶碎水調納之不數日蝕透瓤膜自空酉陽雜爼曰牛踐苗則子苦埤雅曰匏死燒瓤茄種有紫白斑色大蒂小蒂圓長不同亦有蔓種又名落蘇宜踈種灌溉及時則茄生多九月留近跗老茄以水淘其子視沈者晒乾收之有摘其種遂覆藏於根側土內來春視其子既勾萌取水淋播灰土中易生且得早種早生酉陽雜爼云欲其子繁待其花時取葉布於過路以灰規之人踐之子必繁也川廣地暖茄本如木以梯摘實老則復令種之自黃瓜至此數種預於正月取糞和灰土或瓦盆或木桶盛貯候發熱過以瓜茄等子插於灰土中恆以水灑之晝間移對日色夜間移就煁竈暖處既見生甲分種于膏腴之地每子以灰泥為小團種於中乾則灌溉寒則覆護有葉蔓連團移之今用布苴下浸以水上覆以灰置溫所方甲而種尤簡省也山藥形體長圓不一皮黃紫肉白色先名薯蕷事物紀原云避唐代宗名改為薯避宋英宗名改為今名二月內先治地令深鬆三四尺許和勻以灰即以圓木徑三四尺者探直下一穴實以鬱棲用其種之老而可苞體者解寸段種之覆以沃壤輔以長楥令施蔓而長及冬依楥下認其本倚一方開長坎輕手取得之在土二三年者愈長大有圓種者惟種於肥鬆地不必探穴也土瓜形似山藥短而兩端皆鋭味甚甘脆二月內視其有敦音團聚可苞體處枚取裁數塊種之治地膏壅與山藥同九月土中鋤取之旱芋形微長皮紫肉白色味甘有二種紫莖者味不麻先冬前取其根側小芋藏糠穩中不凍傷至二月時取出作畦種之宜旱地恆喜灌水壅以鬱棲凡葉上盛下不生魁至七月間長盛時則轉屈紐束其葉使下長其魁冬取之也水芋形圓皮紫肉微青漢書曰蹲鴟音存癡今冬前預取其根側小芋晒乾藏收糠穩中俟明春三月時取出以頂向上密布於鬆土之內惟灌以水候成則移蒔於水田用芝麻莘等膏之至五六月取根側土封護其根跗間而停止其水八月取芋可和糯米粉煮為蓼花材其莖亦可蒸之為茹劉靜修種芋詩云糞壤豆萁爛南風緑雲平慈菰形圓匾色微黃本草曰剪刀草五月取其種先種水田中俟其有體則易田以腐草耕釋於內而移蒔之若蒔稻然惟宜插淺行疏不宜竭水中秋則樵去其葉令養子碩大冬則鋤開土以取用菰即茭其臺有四季種今曰茭白瑣碎録云如小兒臂味甘嫩二月至五月漸取其種種於淺水之田或河壖之沃土中生臺則剖取之其烏䖇不堪用種時採時無犯鐵器犯之不生臺也甘露子形長如聨珠色白味甘脆即蘘荷楚辭曰苴蓴二三月鋤沃土於向陰之處或清樾之間疏種之葉上得雨滴入土則生子苗甚長雨中遂以灰雜鬆土覆而偃焉成子甚繁至冬鋤取也潘嶽閒居賦曰蘘荷依陰栁子厚詩曰紛敷碧樹陰土露子形圓長不一皮黃肉微黃又名落花生二三月治地作畦當畦兩壖種之離二尺一本環覆以棚花落土則成子常以灰雜土播而耰之必俟凍雪嚴霜後土中起用味始甘香香芋形圓鋭顛皮紫肉白色味甘甚香三月取其芋上鬚珠種鬆畦間造棚依其蔓畏糞以水淋淡草灰壅之冬從土中鋤取子黃獨形圓大皮紫肉黃色本草曰土卵三月取其子種造棚延其蔓冬半土有大魁鋤而取之虞伯生曰雪深劚黃獨薑葉似蘆根生盤錯叢若掬指味甚辛子虛賦曰茈薑朱子曰通神明去穢惡茈音紫三月析其種種之宜膏腴地作髙下畦倚於畦壖才有形體遂造低棚覆蓋五月從畦髙處劖去其母七月取新根傳曰千畦薑韭其人與千户侯等蒟蒻莖葉與南星絶相類大如芋惟蒟蒻白莖而有紫㸃南星紫莖而有白㸃為異四月種宜膏腴地天露重時擊其葉間之露滴土中遂生子鋤大者以刀切用留其心為種一枚有二三心者酉陽雜爼云秋露在葉滴下即為子黃精圖經云苗髙一二尺葉如竹葉而短兩兩相對花青白如小豆花子白如黍亦有無子者根如嫩生薑黃色本草云黃精益壽鈎吻殺人其形相似鈎吻有毛鈎子二箇可别三月間開其根長二寸許種於膏腴之地一年以後極稠冬取其根地筍形長似竹根有密節即澤蘭二月取其根種冬鋤其根之稚嫩者羊婆菜似薑下多肥鬚味甚辛又曰地薑本草曰廉薑也八月種四月用土壅封其跗則根劖取之葛形肥而長大皮黃肉白色味甘野葛有毒二月種其根蔓生延于水根之黃色而糯者可食皮可績搗為布穰堪禆灰油以黏舟也詩曰施于條枚施音異天茄葉花藤蔓似白牽牛莫辨惟結毬柎有肥苞無芒可分别也一名丁香茄三月間種其子蔓生造架以延之用採其毬之稚嫩者山花似胡蘿蔔苞生根莖皆可生食亦可蒸頃刻菜法用新雞首生子從頂中擊小竅去黃白納菜子紙封固之與雞伏四十九日一雞不能畢再與他雞伏足其數取濕地播之須臾菜出可用凡種瓜瓠皆如此法一法以菜子在三伏中晒過須雜麻莖內心播之頃刻即出晒一年長一寸晒過三年即長三寸若五年七年有五七寸也凡天花菜羊肚菜雞棕燕窩麻菰之類非可種植者見遺制竹嶼山房雜部卷十一
