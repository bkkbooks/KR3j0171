body:
  text: 竹嶼山房雜部卷二明宋詡撰養生部二麵食制凡磨小麥先擇潔而釋之暴微潤而磨之若太燥則麵粗太潤則難磨也麵曰玉塵雞麵晉有不托之名割取越雞稚而肥者撏潔去內臟并頭足和膚肉髓骨搗糜爛以絹囊盛作沸湯入濯膏腴勻麵中用餑音勃軸開薄轉摺細切為縷又作沸湯煮熟復投冷水中漉出從意澆之以韲以芥辣禮曰芥醬或合湯以瀹之凡麵中用餑用菉豆粉越雞莊子注曰小雞也韲湯一用切肥豬肉為膾水煮加醬醋施椒葱白縮砂仁調和內則注曰細切曰膾本草曰葱能殺魚肉毒食品所不可躅也又曰施椒殺蟲魚毒後倣此一用熬熟油取鴨子調勻細灑於內加醬醋施椒縮砂仁葱白調和一用煮雞鵝肥汁加胡椒施椒醬油葱白少醋調和切取肉為膾置麵上一用大蟹煮熟取汁加胡椒花椒醬醋葱白調和解取黃肉置麵上凡下醬時必俟其沸過乃動後倣此蝦麵取生蝦搗汁瀘去滓和麵軸開薄摺之細切如縷餘同前制其滓投雞鵝汁中瀘潔調和為湯雞子麵取雞子同水調混黃白和麵軸開薄用摺而切如細縷餘同前制豆麵三制一黃豆磨細麵勻於小麥麵中凡麥麵一斗豆麵二升取清水沸湯相半和之軸開薄摺而切為縷餘同前制一以豆腐揉入一煮黑豆取濃汁和入曰紫不托以小麥七升小豌豆一升同磨為麵甚滑萊蔔麵白萊蔔切片水中煮熟漉起每斤灑以鉛粉一錢復煮糜爛搗和麵中軸薄摺切之如縷每一斤對麵一斤餘同前制本草云研如泥制麵作餺飥佳餺飥音博拓槐葉麵杜子美蘇子曕皆有槐葉冷淘詩取稚槐葉搗自然汁勻麵軸開薄摺之細切如縷投猛火湯中煮熟餘同前制山藥麵山藥蒸去皮切置日中暴乾挼為粉篩細每二升加小麥麵四升調密水和之軸開薄疊摺而切如縷餘同前制用蜜去葱後倣此以上細切者或以筒潗之潗子入切扯昌也切麵用少鹽入水和麵一斤為率既勻沃香油少許夏月以油單紙微覆一時冬月則覆一宿餘分切如巨擘漸以兩手扯長纒絡於直指將指無名指間為細條先作沸湯隨扯隨煮視其熟而浮者先取之韲湯同煎制油單紙湯泡去油氣索麵黃山谷詩云湯餅一杯銀線亂用麵調鹽水為小劑沃之以油纒之於架而漸移架孔垂長細縷先用水煮去鹽復以前制韲湯調瀹之暴燥漸用細棊子麵用麵取鹽水和劑軸之開薄切如細棊子以篩隔之再切再隔之末者簸去湯中煮熟連湯杓於器內旋轉漉起以肥雞肉或肥豬肉切小細膾煮加醬醋胡椒花椒葱調和為韲湯暴燥留取漸用玲瓏麵二制一取羊冷脂肪細切勻於乾麵內冷水和劑軸開薄切闊條內湯中加醬醋花椒葱白酸韲調和一取鮮乳餅切細勻之餛飩二制一取鹽水或乳餅雞子勻麵軸開薄切方小片內之以餡斜摺為兜抵其尖而緘有露緣則剪齊湯中煮浮熟漉起以冷水淋清底以油潤復蒸有宜以甘草葱醋調和湯深瀹有宜以油煎一水淋清以麵片每置十數杯雜雞鵝膏鹽花椒葱白括其緣復入湯煮用一用肥豬肉去肌骨微燖徐鹽切黃氏曰抄云爚而未熟為燖切醢若米同丫䲄魚地青魚鯧魚石首魚或鱖魚鯔魚鱸魚烏魚去骨細切或解熟蟹肉或脫鮮蝦肉雜之加醬胡椒花椒葱白和為餡凡腥餡不宜入縮砂仁後多倣此倪雲林云用縮砂仁作噯氣一用肥雞肉去骨微燖兼野雞肉加去皮胡桃松榛仁及胡椒花椒葱醬和為餡一用鮮乳餅加罌粟米屑葱白坌花椒縮砂仁鹽勻之為餡一用竹筍芼熟加醬熟油花椒胡椒縮砂仁葱等葅之為餡凡菠稜菜薺菜紫藤花金雀花宜芼熟凡茭白胡蘿蔔藕瓠宜生皆用炒熟芝麻天花菜麻菰之屬皆宜為餡包子方言膪用麵水和為小劑軸甚薄置之以餡細蹙其緣束其腰而仰露其顛底下少沃以油甑中蒸熟常以水潤其緣不使麵生餡同餛飩制宜薑醋膪音腦詐熟食之肥者湯角用沸湯和麵生麵為餑勻為小劑內餡以緣緘密置甑中蒸常灑水則柔或湯煮瀹之餡同餛飩制亦宜熟油和鹽麵為餡饅頭稗官小說云諸葛武侯雜用羊豕之肉裹之以麵以象人頭祀神後人由此效而為之有饅頭之名六制用醇酵和麵揉甚勻幹劑內餡緘密之先用荷葉或生芭蕉葉箄籠間蒸熟布齊置緩火中蒸微溫取下俟酵肥復置鍋上速火一蒸視不粘已熟遂逐枚移動也其制作圓而髙起者曰饅頭低下者曰餅低而切其緣細析為小瓣者曰菊花餅麵中以醇酵調之以少蜜緘而開其頭曰槖駝臍長曰繭斜曰桃酵二制一白酒中調乾麵於內俟味老烈用之一煮糯米飯加白酒醅於內俟味老烈用之若用速加乾麵少許易於老烈夏月易熟不須暖處冬月則必置煁音辰竈側酌量加以生酒藥一二丸此酵為勝不宜鹻水腥餡調和同餛飩肉用切粗醢如大豆二制一肥豬肉去肌骨微燖惟宜同生竹筍一羊惟熟脂肪雜以韭綿羊尾亦宜素餡五制一菠稜菜薺菜竹筍芼熟泲乾細切為葅及炒熟芝麻熟香油或松仁油杏仁油花椒葱白醬胡椒縮砂仁少許調和或同餛飩後一餡一芥子湛潔碾糜爛同鹽和芼熟白菜葅一胡桃松榛仁退皮細切同白砂糖多煮熟糯米飯少許一熟香油和鹽麵赤砂糖一赤豆或豇豆芼糜爛入竹器中水洗去皮取絹囊盛砂去水鍋中炒燥加蜜或赤砂糖復炒乾濕得所視所宜加玫瑰音枚瓌膏薔薇膏桂花膏糖香合香頭少許皆妙有廣糖有閩糖有撫糖蒸捲三制一用酵和麵軸開薄同花椒鹽乾麵捲之分切小假俟酵肥蒸一以酵和赤砂糖或蜜勻麵為捲蒸一用酵和麵捲甜肥棗子蒸糕五經無糕字故劉禹鍚不題糕即古餌也乃米粉為之二制一取酵和麵染五色相間疊之上積豆砂栗絲薑絲炒熟芝麻或調菉豆粉和餛飩餡俟酵肥甑蒸每疊勻染酵水則粘一取酵和麵加糖或蜜及白者相間以疊疊中用熟栗棗子退皮胡桃仁蒸用刀界之顔色用胭脂紅麴薑黃梔子菜汁墨後多倣此薄餅二制一用麵漸入水旋調稠韌熱鍋少滑以油澆麵為薄餅用熟醃肥豬肉肥雞鴨肉切條膾及青蒜白蘿蔔胡蘿蔔胡荽醬瓜薑茄瓠切條葅同捲之一用生熟水和麵幹開薄熯熟即以冷水淋過捲之有以殽蔌同用凡用生熟水七分沸湯三分冷水後倣此蒸餅用酵和麵幹為圓薄餅少潤以油疊數層俟酵肥蒸熟層揭之捲同薄餅以八寶等虀加肉條膾尤美春餅用湯和麵加乾麵揉小劑幹甚薄餅鏊盤上急翻熟鹽水勻灑濕新布覆之捲同薄餅蕎餅用蕎麥水漬柔和水輕磨去殼囊洗滓盡以所墊音店麵調小麥麵少許澆薄餅如前捲餡油烙捲三制一用澆薄餅或春餅將前料物捲摺粘之少油內烙一用鹽蜜生熟水和麵幹薄餅油中烙塗以蜜糖捲食一用鮮乳餅揉麵中和鹽生熟水幹薄餅油中烙塗以蜜糖散以細切去皮胡桃榛松仁捲食酥揉麵中亦宜油煎捲二制一用春餅置饅頭餡或餛飩餡視所宜或豬脂肪捲摺粘之在多油內煎燥一用黃雀腦翅細斫椒醬調和入腹染調麵油煎羊熟肥腸椒醬先煮調和再染麵煎新韭餅用生熟水和麵幹開薄取豬肉先燖細切醢新韭細切葅坌花椒胡椒屑葱白醬勻和入內鎖之再餘餅熱鍋中熯熟脂肪餅三制一用生熟水和麵幹開取豬脂肪細切鹽少許和納鎖為小劑再幹成薄餅熱鍋熯之一以脂肪鹽同生熟水并揉厚餅切塊熯之一細切脂肪乾麵為餡將生熟水和麵鎖緣為餅熯之後二制以雞鵝膏豬脂肪熬化亦佳千層餅二制一用生熟水和麵幹開薄或布雞鵝膏或布細切豬脂肪同鹽花椒少許厚摻乾麵捲之直捩數轉按平幹為餅一用直捩數轉復以生熟水和麵為外皮括於內幹餅俱熱鍋熯熟薄焦餅用水和麵加生芝麻於內揉小劑幹甚薄餅熱鍋熯燥熟有和以花椒鹽熟油赤砂糖搗去皮胡桃仁皆宜回回煎餅用麵和酵俟肥再加酵調成稠醬杓入鐵爐內煉火慢烘熟切條假乘熱以酥蜜或松仁油杏仁油染之酥皮角兒用麵以油水少鹽和為小劑幹開納前餛飩腥餡素餡或熟油鹽調乾麵而緘其緣油煎之蜜透角兒用麵以生熟水和幹小劑內去皮胡桃榛松仁或糖蜜豆沙緘其緣油煎乘熱以蜜染透熯餅三制一用酵和麵加油鹽為餅先熯再以小石在鍋炒熱藏餅於中煏熟一以白酒同水和麵為餅熱鍋熯熟一用煮鵝雞汁和麵為餅熯熟俱可括餡或餛飩腥餡素餡或糖麵熟油鹽麵燒餅用酵和麵緘豆沙或糖麵幹餅潤以水染以熟芝麻俟酵肥貼烘爐上自熟糖酥餅今曰勝涿州凡麵一斤炒香熟有以綿紙藉甑底蒸熟和白砂糖三兩熬熟油少水勻麵或加松仁油杏仁油少許燥濕相停範小餅置拖爐上爆音博至糖鎔蜜酥餅三制一用綿紙藉甑底蒸麵熟和以蜜酥為皮緘退皮胡桃仁熟栗肉去皮棗肉細切同蜜為餡置鏊盤上烘一用熟香油酥白砂糖熟蜜各四兩酵麵四兩白麵二斤坌縮砂仁施椒各五錢和範為餅入鏊盤慢火烘一用油熬熟先入蜜或赤砂糖調又入麵慢火調韌加松仁幹厚餅切用即回回食酥油餅即髓餅用麵五斤為則芝麻油或菜油一斤或加松仁油或杏仁油少許同水和麵為外皮納油和麵為餡以手揉摺二三轉又納蜜和麵或糖和麵為餡鎖之幹餅置拖爐上熟蜜和餅用麵炒香熟羅細乘熱和蜜及少湯同碾去皮胡桃榛松仁範為餅糖麵餅三制一用麵取然炭灰淋熱鹻水同赤砂糖和為小劑緘以糖麵餡範為天花餅置拖爐上熟一緘油麵餡幹薄染以熟芝麻置拖爐上熟為薄脆一為餅置拖爐上熟糖潤之厚積糖炒麵薄荷末糖香為堆沙以熟糖餅磨屑積之味淡復爐餅用胡桃仁退皮搗糜爛和蜜熟酥油餅為小團别以油水和麵苴於外幹餅復入爐烘熟香露餅二制一用麵一斤為率以綿紙藉甑底蒸過取油水蜜相停調勻幹薄餅取菉豆粉為餑細攢摺兒將槌砑圓置滚油內煎起潤蜜碾松子仁於上一用水小粉再湛潔二斤同白砂糖熟蜜各四兩入鍋慢火調煎至濃加香熟油四兩再調煎極稠碾去皮胡桃松仁和之為厚餅冷定切小塊摻以糖香少許即回回曰哈哩哇一捻酥同酥油餅油水和麵幹小劑又以油和麵同鹽花椒末為餡鎖之手範為一指形置拖爐上熟透糖三制一用香油水赤砂糖和麵切小條塊置熱油中煎熟入糖炒麵中粘之於上者一用鍋中熬熱油調赤砂糖炒麵粘之者一為丸入油煎熟染以赤砂糖粘以熟芝麻曰歡喜團者香花用麵蒸熟或炒每一斤坌薄荷葉三兩白砂糖三兩熟水調蜜和之範為餅松花同香花制坌縮砂仁一兩薄荷葉一兩外摻糖香少許糖花用拖爐糖餅復碾為粗末熬赤砂糖和之摻以糖香薄荷坌範為餅芝麻葉用麵同生芝麻水和幹開薄切小條子中通一道屈其頭於內而伸之投熱油內煎燥豬耳用水和麵幹開薄切為三緣以兩緣總之入熱油中煎燥潤以赤砂糖摻以熟芝麻及少薄荷坌或炒糖麵巧花兒用蜜油水或糖油水和麵手範為雜花形置沸油中煎燥饊子用油水同鹽少許和麵揉勻切如棊子形以油潤浴中開一穴通兩手搓倉何切作細條纒絡數周取蘆竹兩莖貫內置沸油中或摺之或紐之煎燥熟亦有和赤砂糖者以蜜者有用麵扯條煎凡制麵物須用調和折衷手法純熟火候緩急無不合宜乃得精妙也束晳餅賦春用饅頭夏用薄持秋用起溲冬用湯餅四時皆宜牢丸豫考凡以麵為食具者皆得謂之餅故火燒而食者呼為燒餅水瀹而食者呼為湯餅籠蒸而食者呼為籠餅而饅頭謂之籠餅今豫名之者乃家造而方言耳粉食制粉者屑米之謂也凡粉皆用稻米而黍稷之米雖佳不若稻米尤精美也水磨丸取精御糯米湛潔之水漬之同水磨細以絹囊取其渣滓復以囊括其絶細籸音莘瀝微乾緘為丸餡用白砂糖去皮胡桃榛松仁或蜜糖豆砂投沸湯中熟水浮丸白糯米湛潔漬柔又以芋魁去皮在粗器中研糜爛米芋相半雜水磨細絹囊取渣滓復括囊􅅹其絶細籸至微乾搗去皮胡桃仁溲為丸水煮自浮加糖或蜜山藥可依為之小裹金丸三制一淅白糯米碓取重篩絶細粉水發之為小丸一取乾豆沙以糖蜜先發為小顆或響糖小顆將乾粉漸加水發積染於外為小丸一以板刻槽用湯溲粉嵌於中復緘豆沙於內刀背切開手規為小丸水煮團本心齊蔬食譜曰水團白糯米湛潔㫰乾磨絶細湯溲之內餡括其緣為團入湯煮浮熟或蒸熟餡同麵食制餛飩腥素或赤砂糖元旦上壽喜慶之宴則書吉語裁竹木小簽置于中以為利市糕楚辭曰餌五制一用精御粳米一斗有雜糯米一升湛潔漬肥􅅹乾重磨篩絶細粉或碓復暴之加白砂糖或蜜或赤砂糖又磨碓又篩濯濕布箄籠底再輕篩於籠中隨欲大小界為條塊蒸熟有以顔料為五色間之紙藉煉火上炙燥藏可經歲每米一斗糖宜四斤蜜二斤有和切豬脂肪不宜炙一用炙燥糕再磨篩粉潤以水蜜視前蒸之者一用糖溲粉雜退皮松仁胡桃仁熟栗肉棗肉熟赤豆同漸輕布甑中蒸熟衣以濕布手揉實為垜者一有疊顔色而壓為花形再衣濕布揉者一有底粉揉實而靣積糖蜜豆沙者今皆名之曰糕揉者宜油煎前二制各和薄荷縮砂仁橙皮末糖香薑粉為五味餅形低下而平圓者方俗曰太平圓湛潔白粳米五升白糯米一升淅肥瀝去水碓細粉湯溲甑中蒸熟鎖碎碾熟芝麻白砂糖餡餡中或加松仁油杏仁油少許範為餅熱鍋內熯糖鎔為度春為緑色搗燕麥汁加石灰少許旋調精沫掠熱鍋中溲米粉也乳粉餅凡白糯米細粉八合白粳米細粉二合揉勻鮮牛乳餅半斤為小餅內鑽以白砂糖去皮胡桃榛松仁或蒸或煮之油䭔音堆二制一用碓細白糯米粉湯溲之鎖以糖蜜豆沙為小䭔油中煎熟一用山藥劘去皮搗粉內鎖以鮮乳餅油煎油虛繭歲時雜記人曰京師貴家造探官繭用白糯米細粉湯溲之鎖熬熟豬脂白砂糖為繭復入豬脂中煎燥為度豆裹餈用碓白糯米粉蜜湯溲為小餅煮外以蜜豆沙或糖豆沙通厚積之粽形制不一古名角黍用精鑿糯米湛潔之候微乾摘蘆葉煮熟捲米中藏蜜糖豆沙或豬肉醢料或肥棗或去皮胡桃榛松仁白砂糖又轉摺成角必緊束堅實入鍋煮熟宜蜜宜糖茭葉同制餈許慎曰餈稻餅也炊米爛搗之也本心齊曰玉磚炊餅方切也二制一用白粳糯米相半湯中煮少熟取起别入鍋以鉢器密覆煮一時就於鍋中旋調稠韌取起加研碎炒熟芝麻同鹽少許摻之幹開界之一用白糯米煮飯臼中搗爛乾則少灑以水幹開方切以片粘則潤以熟油暴之使燥復切入鍋炒加糖或鹽風消糖白糯米五升為率磨細粉先取多半雜糖水或餳溲為厚餅每飯中通一穴入豆萁灰淋水中煮過熟漉起後以少半生粉漸揉和帶稍堅幹薄小餅暴之使燥置沸油內以箸挾其緣聚而取之用糖炒麵摻甘露餅用精御糯米磨絶細以蜜水溲團蒸熟切小顆生粉為餑幹薄暴燥置沸油中煎燥染松仁油或杏仁油取白砂糖和薄荷葉坌摻之芙蓉葉用白糯米磨細粉蜜和薄酒溲粉蒸熟以生粉為餑幹薄片摺切範芙蓉葉狀暴燥置沸油內煎熟摻以砂糖麵糖香少許玉茭白用白糯米粉一升乾山藥坌半升芋魁劘去皮搗糜爛和水濾取汁溲二物揉實長若茭白暴燥取香油一斤蜜一斤同煎肥復以蜜染取炒熟芝麻衣之骨髓餅用白糯米粉五升牛骨髓半斤白砂糖半斤酥四兩沸湯溲為餅鐵鍋中熯熟山藥糕山藥蒸熟去皮切片暴燥磨細計六升白糯米新起淅碓粉計四升白沙糖二斤蜜水溲之復碓篩甑中隨界之蒸粉熟為度宜火炙蓮菂糕乾蓮菂去薏細切暴燥磨末同山藥糕制芡糕乾芡搗去殼磨細末同山藥糕制其末範餅别用蒸熟栗糕栗實炒熟去殼搗爛暴燥磨細末同山藥糕制白砂糖用半斤松黃糕韻府云松花名松黃服之輕身松黃六升白糯米絶細粉四升白砂糖一斤蜜一斤少水溲和復碓之復篩之甑中界之蒸至粉熟為度炒米糕南粵以方切者為糖方用白糯米炊飯湛清暴燥乾沙中炒虛圓雜炒芝麻以赤砂糖和餳置熱鍋中溲勻取起揉實俟冷切為片或乘熱手規之為歡喜團煎蘇木水染飯暴燥炒為紅米米􅶊音爛謝疊山曰米線二制一粳米湛潔碓篩絶細粉湯溲稍堅置鍋中煮熟雜生粉少半幹使開薄摺切細條暴燥入肥汁中煮以胡椒施椒醬油葱調和一粉中和米漿為糨揉如索菉豆粉入湯釜中取起二粉片每白糯米粉一升黃大豆粉二升湯溲之揉實切為厚片入肥肉汁中煮加椒醬酸韲調和蓼花制蓼花取芋魁劘去皮搗糜爛七分雜白糯米絶細粉三分復搗一處為厚餅數十枚水煮過熟置器中調攬甚勻先將一木板傅餑在上幹開暴半燥切片假復暴燥用又切小顆同乾沙炒肥或同小石子炒為後四制以猪脂熬為油入煎之尤肥而鬆也檀香毬用白砂糖水煮加炒熟麵乘熱染之火炙燥七香毬用赤砂糖同炒熟麵和糖香香油煮鎔染之芝麻毬用先染以赤砂糖後衣以炒熟芝麻薄荷毬用薄荷葉坌之同芝麻毬制白糖制白糖楚詞曰餦餭緬甸取貝木實汁熬為白糖鋹鍠音張皇白糯米每一斗蒸飯候冷雜以搗碎麥蘖二升再雜以礱榖糠和湯滿浸候味甘置淋缸中放其水煎之漸用鍬器翻挑成糖其柔薄者即餳然造此火不宜息亦視天之寒熱也粳米亦宜糯米糖多有揉炒芝麻切為糕者有捲豆末而為管者有為條為餅之類其制非一酥捲糖先用退皮胡桃仁炒熟芝麻碎搗入鍋溫之置糖於內俟和柔取幹薄捲切為小塊坌花椒薄荷葉縮砂仁少許摻之於上藕絲糖取白糖隔湯頓醒就湯鍋氣中以濕手抽疊之筒而吹虛之竅如藕熱刀隨裁作長短條假外衣以炒米花或雜以熟芝麻薄荷葉坌有為毬以線結糖纒制糖纒凡白砂糖一斤入銅鐵銚中加水少許置煉火上鎔化投以果物和勻速宜離火俟其糖性少凝則每顆碎析之紙間火焙乾白砂糖本草曰石蜜宜入糖物胡桃仁去皮榛仁去皮松仁去皮瓜子仁微炒瓠子仁微炒烏欖核仁去皮人面果仁楊梅核仁蓮心微炒杏核仁水煮一過去苦皮尖焙燥梧桐子去殼栗熟末蓮菂末棐末橙利刀削橙外薄皮暴燥香櫞皮去白方切煮漬去苦暴燥芝麻炒大豆炒末紫蘇生擷穗造霜梅水中漬透蒸罌收用子白豆􅛌仁末縮砂仁末草果仁末細茶葉末薄荷葉末生薑粉桂花末蜜煎制楊梅擇肥甘者鹽少許醃一宿復以水洗晴天日微曯水盡澆蜜暴之有水㵼去復加蜜暴至甜透入甕又用蜜漬蜜須先煉熟者後多倣此橙子佛手柑新摘帶青黃橙子以利刀削去外粗薄皮周界為稜每斤鹽一兩同水漬一宿味酸再漬去核及水置日中曯稍乾入銀錫器砂鑼中注蜜隔湯煮停冷有水㵼去復加蜜煮日暴甜透徹入甕以蜜漬削下皮留為糖纒有以橙去酸水及核白酒中煮至無酸㫰乾以蜜煮甜蜜漬之佛手柑無囊不用水漬同制凡煮皆宜隔湯凡有鹽者皆宜留久用則漸以蜜煮後多倣此金橘牛乳柑金豆閩粵有柑皮煎金橘新摘不傷損者每斤鹽一兩水漬之用時以刀界稜復漬蜜煮餘如橙制牛乳柑金豆同梅子小滿時摘青梅未甚酢者調􅮄硝湯待冷漬之欲原青加銅青同漬視梅性柔翠周界以稜剔去其核水洗潔曯至水竭置蜜中煮甜又日暴透以蜜漬或以醋漬止宜一晝夜凡梅十斤用銅青三錢李子南粵蜜煎李多渣摘青脆者以朴硝冷湯漬無酸澀微燖之界小稜去核水洗曯乾蜜煮甜又日暴透蜜漬林檎頻婆林檎摘帶青者利刀劘去外皮周界為稜鹽水漬柔水洗曯乾蜜中煮甜又日暴透以蜜漬頻婆同作四分之棗子摘鮮帶堅實肉厚者同林檎制枇杷摘黃者每斤鹽一兩礬六錢同水漬之用時易水洗去皮核蜜煮甜日暴透以蜜漬櫻桃蘇東坡老叨賦云爛櫻珠之煎蜜摘半熟者鹽水漬一宿每斤計鹽一兩水洗㫰乾剔去核易以響糖小顆蜜煮日暴透徹漬之木瓜羊桃木瓜摘稚嫩者銅刀劘去皮方切片或刻菊艾葉狀以石灰泡湯俟冷取絶清者漬去酸澀味作沸湯微燖曯乾蜜煮甜日暴透又蜜漬之羊桃同制橄欖梧桐子用粗瓷器中揉擦去皮銅刀界之為稜同淅米水入瓷器煮味不苦澀核脫㫰乾蜜中煮甜透日暴以蜜漬梧桐子煎去殼惟以蜜煮透漬藕劘去皮方切片少鹽醃頃之作沸湯微燖㫰乾以蜜煮甜日暴透又蜜漬竹筍誠齊詩曰稚子玉膚新脫錦蘆筍竹筍去籜尖杪切條假同藕制蘆筍去苞同茭白去苞取尖杪同藕制蒲蒻又曰蒲白去外苞寸切條假同藕制薑秦太虛詩云先社薑芽勝肥肉地薑薑稚芽方切片或刻菊艾葉狀或細絲鹽醃一宿水洗作沸湯少燖㫰乾以蜜煮又日暴透徹蜜漬之地薑去根鬚假切同桑黮音甚取紫熟者去蒂同薑制本草云桑黮和蜜食之令人聰明安魂鎮神茄摘甚稚小者界其蒂為四道去中骨釋米水漬柔界其身為細稜去子肉作沸湯燖㫰乾以蒂倒結束之蜜煮日暴透又以蜜漬冬瓜劘去外皮及瓤方切堅肉為片石灰煎湯取清冷者漬一宿作沸湯微燖曯乾蜜煮暴復漬之蘘荷同冬瓜制天茄稚嫩者刳去子同冬瓜制刀豆稚嫩者橫切為片同冬瓜制豇豆稚嫩者寸切條同冬瓜制地黃取生嫩者每一斤用霜梅二斤甘草四兩同水煮去藥氣以蜜煮甜透日暴又蜜漬之商陸夲草云樟桞根取根方切片同冬瓜制木通嫩者去皮同冬瓜制天門冬冬月取之水煮去皮心㫰乾蜜煮甜透色明日暴復以蜜漬天麻本草云苗名赤箭取稚嫩色白者水漬去皮方切片曯乾蜜煮甜日暴透又蜜漬之圖經曰山人取生者蜜煎作果食之甚珍菖蒲採嫩根無絲筋者劘去皮切絶細縷以造霜梅水漬透洗㫰以蜜煮甜更日暴又以蜜漬蜜裹酥二制用梅酥同白砂糖搗味酸甜適宜擷新紫蘇葉湯泡柔入梅酥為小摺包取細篾貫之蜜中煮日暴透復蜜漬有用楊梅乾肉再加川椒少許蜜霜梅用霜梅肉厚者同甘草煮味無酸擊去仁曯乾蜜煮甜透日暴又漬之取漬桂花色常鮮明凡蜜煎日暴勝煮乾則常漬以蜜頻抹罋口不令其生白醭頻見日暴不令其有饏徒敢切䭕子敢切欲乾收者煮之日暴之亦常潤蜜不宜枯竭之甚也後凡物宜蜜煎者多倣此饏䭕無味也閩廣中所産者荔枝龍眼餘甘子人面果烏欖椰子波羅蜜草果豆蔲皮縮砂仁蔞藤葉檳榔南粵以蒟醬為扶留藤取葉合檳榔食之辛而香也即蔞藤蒟音矩之類常潤蜜遇晏溫即暴之日出清霽為晏溫花香宜為膏者桂花蘭花玫瑰花薔薇花燖茉莉花木香花之類用花瓣心搗糜爛壓去水蜜和之日暴之加白砂糖復搗之收入瓷器常以日暴花無毒宜煎者木筆花玉蘭花梔子花棣棠花萱花葵花鶯花荷花絲瓜花之類如味苦澀皆作沸湯先燖㫰乾復內造霜梅水中醃之洗潔㫰乾蜜煮日暴甜透又以蜜漬糖劑制右以糖蜜共燒之者今各有制衣梅用赤砂糖一斤為率釜中再熬乘熱和新薄荷葉絲八兩鮮薑絲四兩日中暴乾置臼中搗和丸之有脫楊梅肉雜於內今加白豆蔲一兩白檀香二兩末片腦一錢坌白砂糖為珍糖再熬後倣此天鮮楊梅二制乾楊梅一鮮紫肥楊梅加赤砂糖鮮紫蘇葉鮮薄荷葉和一二日去水又入糖日中暴甜透一用紫蘇薄荷各四兩楊梅一斤糖一斤貯罋內羃之記取五方日色移暴乾楊梅甘草湯煮淡以糖漬糖椒梅黃梅大者鹽醃一日槌核去仁內瓷甕中凡梅一層生花椒生薑絲一層疊八分滿以赤砂糖漬沒之以新椒葉覆掩之竹箬羃甕口蒸一時取日暴十日用糖紫蘇梅用青梅鹽醃柔剖分四片洗潔㫰乾細切鮮紫蘇葉同和赤砂糖中漬之日中暴甜透糖薄荷梅小滿時煎􅮄硝湯俟冷投青梅漬味無酸界為周稜洗㫰乾取薄荷葉同赤砂糖漬之有水㵼去又易以糖甜透為度糖滷梅每青梅十斤鹽十兩赤砂糖五斤和入罌中油紙羃口日曯梅甜柔為度酢復加糖糖李用熟者微燖之俟冷乾漬赤砂糖中甜透用糖橙金橘牛乳柑乾小橘方言橘藥同蜜煎制和赤砂糖煮甜乾小橘湯洗淡糖漬糖木瓜同蜜煎制用赤砂糖糖冬瓜同蜜煎制用赤砂糖糖竹筍同蜜煎制用赤砂糖糖天茄同蜜煎制用赤砂糖糖蘘荷同蜜煎制用赤砂糖糖薑同蜜煎制用赤砂糖糖豇豆同蜜煎制用赤砂糖糖萊蔔茄用白萊蔔大切片鹽微醃水洗日曯乾同赤砂糖漬日暴甜透茄用淅米水漬沸湯微燖俟冷以赤砂糖漬暴之湯水制春月宜用四時皆宜水芝湯昔仙人務光子服此湯以致飛升去蓮菂帶黑皮及薏炒燥通搗為細末一斤粉甘草銼碎微炒搗為末一兩右俱羅細每服二錢鹽少許沸湯㸃服不老湯烏梅去仁焙燥十斤甘草炒一斤紫蘇葉暴燥斤鹽炒一斤麵炒黃色一斤用前二味别研後三味勻和再研為細末貯瓷器沸湯㸃服夏月宜用早秋亦宜香薷湯香薷一斤厚朴薑制八兩白茯苓去皮五兩甘草四兩白扁豆炒八兩右銼碎每用五錢作沸湯泡夏宜冷秋宜稍熱服薑湯生薑碎切作沸湯泡去薑加白砂糖或蜜冷飲米湯白米粳者炒熟作沸湯泡去米加白砂糖或蜜調飲麥湯大麥炒熟磨麧下沒切去糠作沸湯泡濾其清飲梅酥湯梅酥再研作沸湯調加蜜酸甜得宜飲菉豆湯菉豆水煮熟或先炒水煮去豆加蜜糖調湯飲天香湯桂花半含者摘下擇去蒂取河水同炒鹽少許溲入小罐上以霜梅二三顆碎擊掩之箬羃固用以數朵置蜜湯中春元湯梅花未放時鎔蠟㸃其瓣候氣足摘下如天香制用取二三朵置蜜湯中盡放鳯髓湯松仁去皮研糜爛入湯中濾清蜜調無塵湯水晶糖霜二兩片腦二分右將糖霜乳絶細入片腦研勻每一錢沸湯㸃服須當前烹㸃久則香散香糖渴水白砂糖一斤水一盞半藿香葉半錢甘松一塊生薑十大片同煎以熟為度濾潔入麝香如菉豆一塊白檀香末半兩瓷器盛氷水中沈用之林檎渴水林檎微生者搗碎入竹器中以沸湯衝淋其汁至滓無味為節用文武火熬常攪勿令焦滴入水不散然後加腦麝檀香末少許調飲蒲萄渴水飲膳正要有櫻桃取汁熬之生蒲萄研碎濾去滓慢火熬濃稠為度貯瓷器中切勿犯鐵器太熱者不可用加腦麝少許入煉蜜㸃飲楊梅渴水飲膳正要有安石榴子取漿熬之楊梅揉搦取自然汁濾滓須盡入砂石器內慢火熬濃滴入水不散為度若熬不到即生白醭瓷器貯之加蜜腦麝少許沸湯調飲冷則不澀木瓜渴水木瓜銅刀去皮瓤核潔肉一斤為率切為方寸大薄片用蜜先熬次入木瓜再慢火同熬二三時掠去上沫嘗味酸甜得宜濾潔先挑於瓷碟內冷試稠硬不斷為度沸湯調飲五味渴水北五味子肉一兩作沸湯漬一宿取汁别煮下濃黑豆汁對當顔色恰好用煉熟蜜對入酸甜皆宜慢火同熬一時許凉熱任意調用沈香熟水沈香一小片先用潔瓦一方火然微紅置于平處加香在上以瓶覆定約香氣盡速注沸湯於瓶中密封輟耕録云以沈香削小釘插於林檎中湯泡之尤佳丁香熟水丁香五粒竹葉七片作沸湯泡密封片時用豆蔲熟水白豆蔲仁碎擊投沸湯瓶中蜜封片時用每次用五七枚足矣多則香濁紫蘇熟水紫蘇摘新葉陰乾用時隔紙火炙作沸湯泡蜜封熱飲冷則傷人秋月宜用香櫞湯香櫞去皮去囊白取肉一斤炒鹽二兩甘草末一兩疊實於罐收之用時作沸湯調有不入甘草用以蜜糖有取肉研濾漿同蜜熬成煎甘菊湯黃菊花味甘者去青苞以霜梅去核每枚藏一二朵於內疊之或入罐一層加炒鹽一層每斤鹽二兩疊實用時入沸湯中加蜜冬月宜用椒棗湯北棗肥者湯退去皮去核每一枚入花椒一粒碎切炒鹽粒米許收瓷器中作沸湯泡杏薑湯夏蘭渚云一薑二杏三鹽四草生薑一斤搗取汁杏仁去皮尖二兩鹽炒三兩甘草末四兩同搗和入薑汁瓷器收旋作沸湯調甚美風韻竹嶼山房雜部卷二
