body:
  text: 竹嶼山房雜部卷二明宋詡撰養生部二麫食制凡磨小麥先擇潔而釋之暴㣲潤而磨之若太燥則麫麤太潤則難磨也麫曰玉塵雞麫晉有不托之名割取越雞穉而肥者撏潔去内臟并頭足和膚肉髓骨擣糜爛以絹囊盛作沸湯入濯膏腴勻麫中用餑音勃軸開薄轉摺細切為縷又作沸湯煑熟復投冷水中漉出從意澆之以韲以芥辣禮曰芥醤或合湯以瀹之凡麫中用餑用菉豆粉越雞荘子注曰小雞也韲湯一用切肥豬肉為膾水煑加醤醋施椒葱白縮砂仁調和内則注曰細切曰膾本艸曰葱能殺魚肉毒食品所不可躅也又曰施椒殺蟲魚毒後倣此一用熬熟油取鴨子調勻細洒於内加醤醋施椒縮砂仁葱白調和一用煑雞鵝肥汁加胡椒施椒醤油葱白少醋調和切取肉為膾置麫上一用大蟹煑熟取汁加胡椒花椒醤醋葱白調和解取黄肉置麫上凡下醤時必俟其沸過乃動後倣此鰕麫取生鰕擣汁瀘去滓和麫軸開薄摺之細切如縷餘同前制其滓投雞鵝汁中瀘潔調和為湯雞子麫取雞子同水調混黄白和麫軸開薄用摺而切如細縷餘同前制豆麫三制一黄豆磨細麫勻於小麥麫中凡麥麫一斗豆麫二升取清水沸湯相半和之軸開薄摺而切為縷餘同前制一以豆腐揉入一煑黒豆取濃汁和入曰紫不托以小麥七升小豌豆一升同磨為麫甚滑萊菔麫白萊菔切片水中煑熟漉起毎斤洒以鉛粉一錢復煑糜爛擣和麫中軸薄摺切之如縷毎一斤對麫一斤餘同前制本艸云研如泥制麫作餺飥佳餺飥音博拓槐葉麫杜子羙蘇子曕皆有槐葉冷淘詩取穉槐葉擣自然汁勻麫軸開薄摺之細切如縷投猛火湯中煑熟餘同前制山藥麫山藥蒸去皮切置日中暴乾挼為粉篩細毎二升加小麥麫四升調宻水和之軸開薄疊摺而切如縷餘同前制用蜜去葱後倣此以上細切者或以筒潗之潗子入切撦昌也切麫用少鹽入水和麫一斤為率既勻沃香油少許夏月以油單紙㣲覆一時冬月則覆一宿餘分切如巨擘漸以兩手撦長纒絡於直指将指無名指間為細條先作沸湯隨撦隨煑視其熟而浮者先取之韲湯同煎制油單紙湯泡去油氣索麫黄山谷詩云湯餅一杯銀線亂用麫調鹽水為小劑沃之以油纒之於架而漸移架孔垂長細縷先用水煑去鹽復以前制韲湯調瀹之暴燥漸用細棊子麫用麫取鹽水和劑軸之開薄切如細棊子以篩隔之再切再隔之末者簸去湯中煮熟連湯杓於器内旋轉漉起以肥雞肉或肥豬肉切小細膾煑加醤醋胡椒花椒葱調和為韲湯暴燥留取漸用玲瓏麫二制一取羊冷脂肪細切勻於乾麫内冷水和劑軸開薄切闊條内湯中加醤醋花椒葱白酸韲調和一取鮮乳餠切細勻之餛飩二制一取鹽水或乳餅雞子勻麪軸開薄切方小片内之以餡斜摺為兠抵其尖而緘有露縁則剪齊湯中煑浮熟漉起以冷水淋清底以油潤復蒸有宜以甘艸葱醋調和湯深瀹有宜以油煎一水淋清以麫片毎置十數杯雜鷄鵝膏鹽花椒葱白括其縁復入湯煑用一用肥豬肉去肌骨㣲燖徐鹽切黄氏曰抄云爚而未熟為燖切醢若米同丫䲄魚地青魚鯧魚石首魚或鱖魚鯔魚鱸魚烏魚去骨細切或解熟蟹肉或脫鮮鰕肉雜之加醤胡椒花椒葱白和為餡凡腥餡不宜入縮砂仁後多倣此倪雲林云用縮砂仁作噯氣一用肥雞肉去骨㣲燖兼野雞肉加去皮胡桃松榛仁及胡椒花椒葱醤和為餡一用鮮乳餅加罌粟米屑葱白坋花椒縮砂仁鹽匀之為餡一用竹筍芼熟加醤熟油花椒胡椒縮砂仁葱等葅之為餡凡菠稜菜薺菜紫藤花金雀花宜芼熟凡茭白胡蘿蔔藕瓠宜生皆用炒熟芝麻天花菜麻菇之屬皆宜為餡包子方言膪用麫水和為小劑軸甚薄置之以餡細蹙其緣束其腰而仰露其顛底下少沃以油甑中蒸熟常以水潤其縁不使麫生餡同餛飩制宜薑醋膪音腦詐熟食之肥者湯角用沸湯和麫生麫為餑勻為小劑内餡以縁緘宻置甑中蒸常洒水則柔或湯煑瀹之餡同餛飩制亦宜熟油和鹽麫為餡饅頭稗官小説云諸葛武侯雜用羊豕之肉裹之以麫以象人頭祀神後人由此效而為之有饅頭之名六制用醇酵和麫揉甚勻幹劑内餡緘宻之先用荷葉或生芭蕉葉箄籠間蒸熟布齊置緩火中蒸㣲温取下俟酵肥復置鍋上速火一蒸視不粘已熟遂逐枚移動也其制作圓而髙起者曰饅頭低下者曰餅低而切其縁細析為小瓣者曰菊花餅麫中以醇酵調之以少蜜緘而開其頭曰槖駝臍長曰繭斜曰桃酵二制一白酒中調乾麫於内俟味老烈用之一煑糯米飯加白酒醅於内俟味老烈用之若用速加乾麫少許易於老烈夏月易熟不須煖處冬月則必置煁音辰竈側酌量加以生酒藥一二丸此酵為勝不宜鹻水腥餡調和同餛飩肉用切麤醢如大豆二制一肥豬肉去肌骨㣲燖惟宜同生竹筍一羊惟熟脂肪雜以韭綿羊尾亦宜素餡五制一菠稜菜薺菜竹筍芼熟泲乾細切為葅及炒熟芝麻熟香油或松仁油杏仁油花椒葱白醤胡椒縮砂仁少許調和或同餛飩後一餡一芥子湛潔碾糜爛同鹽和芼熟白菜葅一胡桃松榛仁退皮細切同白砂餹多煑熟糯米飯少許一熟香油和鹽麫赤砂餹一赤豆或豇豆芼糜爛入竹器中水洗去皮取絹囊盛砂去水鍋中炒燥加蜜或赤砂餹復炒乾濕得所視所宜加玫瑰音枚瓌膏薔薇膏桂花膏餹香合香頭少許皆妙有廣餹有閩餹有撫餹蒸捲三制一用酵和麫軸開薄同花椒鹽乾麫捲之分切小叚俟酵肥蒸一以酵和赤砂餹或蜜勻麫為捲蒸一用酵和麫捲甜肥棗子蒸餻五經無餻字故劉禹鍚不題餻即古餌也乃米粉為之二制一取酵和麫染五色相間疊之上積豆砂栗絲薑絲炒熟芝麻或調菉豆粉和餛飩餡俟酵肥甑蒸毎疊勻染酵水則粘一取酵和麫加餹或蜜及白者相間以疊疊中用熟栗棗子退皮胡桃仁蒸用刀界之顔色用胭脂紅麴薑黄梔子菜汁墨後多倣此薄餅二制一用麫漸入水旋調稠靱熱鍋少滑以油澆麫為薄餅用熟醃肥豬肉肥雞鴨肉切條膾及青蒜白蘿蔔胡蘿蔔胡荽醤𤓰薑茄瓠切條葅同捲之一用生熟水和麫榦開薄熯熟即以冷水淋過捲之有以殽蔌同用凡用生熟水七分沸湯三分冷水後倣此蒸餅用酵和麫榦為圓薄餅少潤以油疊數層俟酵肥蒸熟層掲之捲同薄餠以八寳等虀加肉條膾尤羙春餅用湯和麫加乾麫揉小劑榦甚薄餅鏊盤上急翻熟鹽水勻洒濕新布覆之捲同薄餅蕎餅用蕎麥水漬柔和水輕磨去殻囊洗滓盡以所墊音店麫調小麥麫少許澆薄餅如前捲餡油烙捲三制一用澆薄餅或春餠将前料物捲摺粘之少油内烙一用鹽蜜生熟水和麫榦薄餅油中烙塗以蜜餹捲食一用鮮乳餅揉麫中和鹽生熟水榦薄餅油中烙塗以蜜餹㪚以細切去皮胡桃榛松仁捲食酥揉麫中亦宜油煎捲二制一用春餅置饅頭餡或餛飩餡視所宜或豬脂肪捲摺粘之在多油内煎燥一用黄雀腦翅細斫椒醤調和入腹染調麫油煎羊熟肥腸椒醤先煑調和再染麫煎新韭餅用生熟水和麫榦開薄取豬肉先燖細切醢新韭細切葅坋花椒胡椒屑葱白醤勻和入内鎖之再餘餅熱鍋中熯熟脂肪餅三制一用生熟水和麫榦開取豬脂肪細切鹽少許和納鎖為小劑再榦成薄餅熱鍋熯之一以脂肪鹽同生熟水并揉厚餅切塊熯之一細切脂肪乾麫為餡将生熟水和麫鎖縁為餅熯之後二制以雞鵝膏豬脂肪熬化亦佳千層餅二制一用生熟水和麫榦開薄或布雞鵝膏或布細切豬脂肪同鹽花椒少許厚摻乾麫捲之直捩數轉按平榦為餅一用直捩數轉復以生熟水和麫為外皮括於内榦餅俱熱鍋熯熟薄焦餅用水和麫加生芝麻於内揉小劑榦甚薄餠熱鍋熯燥熟有和以花椒鹽熟油赤砂餹擣去皮胡桃仁皆宜囘囘煎餅用麫和酵俟肥再加酵調成稠醤杓入鐵爐内煉火慢烘熟切條叚乘熱以酥蜜或松仁油杏仁油染之酥皮角兒用麫以油水少鹽和為小劑榦開納前餛飩腥餡素餡或熟油鹽調乾麫而緘其縁油煎之蜜透角兒用麫以生熟水和榦小劑内去皮胡桃榛松仁或餹蜜豆沙緘其縁油煎乘熱以蜜染透熯餅三制一用酵和麫加油鹽為餅先熯再以小石在鍋炒熱藏餅於中煏熟一以白酒同水和麫為餅熱鍋熯熟一用煑鵝雞汁和麫為餅熯熟俱可括餡或餛飩腥餡素餡或餹麫熟油鹽麫燒餅用酵和麫緘豆沙或餹麫榦餅潤以水染以熟芝麻俟酵肥貼烘爐上自熟餹酥餅今曰勝涿州凡麫一斤炒香熟有以綿紙藉甑底蒸熟和白砂餹三兩熬熟油少水勻麫或加松仁油杏仁油少許燥濕相停範小餅置拖爐上爆音博至餹鎔蜜酥餅三制一用綿紙藉甑底蒸麫熟和以蜜酥為皮緘退皮胡桃仁熟栗肉去皮棗肉細切同蜜為餡置鏊盤上烘一用熟香油酥白砂餹熟蜜各四兩酵麫四兩白麫二斤坋縮砂仁施椒各五錢和範為餅入鏊盤慢火烘一用油熬熟先入蜜或赤砂餹調又入麫慢火調靱加松仁榦厚餅切用即囘囘食酥油餅即髓餅用麫五斤為則芝麻油或菜油一斤或加松仁油或杏仁油少許同水和麫為外皮納油和麫為餡以手揉摺二三轉又納蜜和麫或餹和麫為餡鎻之榦餅置拖爐上熟蜜和餅用麫炒香熟羅細乘熱和蜜及少湯同碾去皮胡桃榛松仁範為餅餹麫餅三制一用麫取然炭灰淋熱鹻水同赤砂餹和為小劑緘以餹麫餡範為天花餅置拖爐上熟一緘油麫餡榦薄染以熟芝麻置拖爐上熟為薄脆一為餅置拖爐上熟餹潤之厚積餹炒麫薄荷末餹香為堆沙以熟餹餅磨屑積之味淡復爐餅用胡桃仁退皮擣糜爛和蜜熟酥油餅為小團别以油水和麫苴於外榦餅復入爐烘熟香露餅二制一用麫一斤為率以綿紙藉甑底蒸過取油水蜜相停調勻榦薄餅取菉荳粉為餑細攢摺兒将槌砑圓置滚油内煎起潤蜜碾松子仁於上一用水小粉再湛潔二斤同白砂餹熟蜜各四兩入鍋慢火調煎至濃加香熟油四兩再調煎極稠碾去皮胡桃松仁和之為厚餅冷定切小塊摻以餹香少許即囘囘曰哈哩哇一捻酥同酥油餅油水和麫榦小劑又以油和麫同鹽花椒末為餡鎻之手範為一指形置拖爐上熟透餹三制一用香油水赤砂餹和麫切小條塊置熱油中煎熟入餹炒麫中粘之於上者一用鍋中熬熱油調赤砂餹炒麫粘之者一為丸入油煎熟染以赤砂餹粘以熟芝麻曰歡喜團者香花用麫蒸熟或炒毎一斤坋薄荷葉三兩白砂餹三兩熟水調蜜和之範為餅松花同香花制坋縮砂仁一兩薄荷葉一兩外摻餹香少許餹花用拖爐餹餅復碾為麤末熬赤砂餹和之摻以餹香薄荷坋範為餅芝麻葉用麫同生芝麻水和榦開薄切小條子中通一道屈其頭於内而伸之投熱油内煎燥豬耳用水和麫榦開薄切為三縁以兩縁緫之入熱油中煎燥潤以赤砂餹摻以熟芝麻及少薄荷坋或炒餹麫巧花兒用蜜油水或餹油水和麫手範為雜花形置沸油中煎燥饊子用油水同鹽少許和麫揉勻切如棊子形以油潤浴中開一穴通兩手搓倉何切作細條纒絡數週取蘆竹兩莖貫内置沸油中或摺之或紐之煎燥熟亦有和赤砂餹者以蜜者有用麫撦條煎凡制麫物須用調和折衷手法純熟火候緩急無不合宜乃得精妙也束晳餅賦春用饅頭夏用薄持秋用起溲冬用湯餅四時皆宜牢丸予考凡以麫為食具者皆得謂之餅故火燒而食者呼為燒餅水瀹而食者呼為湯餅籠蒸而食者呼為籠餅而饅頭謂之籠餅今予名之者乃家造而方言耳粉食制粉者屑米之謂也凡粉皆用稻米而黍稷之米雖佳不若稻米尤精羙也水磨丸取精御糯米湛潔之水漬之同水磨細以絹囊取其渣滓復以囊括其絶細籸音莘瀝㣲乾緘為丸餡用白砂餹去皮胡桃榛松仁或蜜餹豆砂投沸湯中熟水浮丸白糯米湛潔漬柔又以芋魁去皮在麤器中研糜爛米芋相半雜水磨細絹囊取渣滓復括囊􅅹其絶細籸至㣲乾擣去皮胡桃仁溲為丸水煑自浮加餹或蜜山藥可依為之小裹金丸三制一淅白糯米碓取重篩絶細粉水發之為小丸一取乾豆沙以餹蜜先發為小顆或響餹小顆将乾粉漸加水發積染於外為小丸一以板刻槽用湯溲粉嵌於中復緘豆沙於内刀背切開手規為小丸水煑團本心齋蔬食譜曰水團白糯米湛潔㫰乾磨絶細湯溲之内餡括其縁為團入湯煑浮熟或蒸熟餡同麫食制餛飩腥素或赤砂餹元旦上壽喜慶之宴則書吉語裁竹木小簽置于中以為利市餻楚辭曰餌五制一用精御秔米一斗有雜糯米一升湛潔漬肥􅅹乾重磨篩絶細粉或碓復暴之加白砂餹或蜜或赤砂餹又磨碓又篩濯濕布箄籠底再輕篩於籠中隨欲大小界為條塊蒸熟有以顔料為五色間之紙藉煉火上炙燥藏可經歳毎米一斗餹宜四斤蜜二斤有和切豬脂肪不宜炙一用炙燥餻再磨篩粉潤以水蜜視前蒸之者一用餹溲粉雜退皮松仁胡桃仁熟栗肉棗肉熟赤豆同漸輕布甑中蒸熟衣以濕布手揉實為垜者一有疊顔色而壓為花形再衣濕布揉者一有底粉揉實而靣積餹蜜豆沙者今皆名之曰餻揉者宜油煎前二制各和薄荷縮砂仁橙皮末餹香薑粉為五味餅形低下而平圓者方俗曰太平圓湛潔白秔米五升白糯米一升淅肥瀝去水碓細粉湯溲甑中蒸熟鎻碎碾熟芝麻白砂餹餡餡中或加松仁油杏仁油少許範為餅熱鍋内熯餹鎔為度春為緑色擣燕麥汁加石灰少許旋調精沫掠熱鍋中溲米粉也乳粉餅凡白糯米細粉八合白秔米細粉二合揉勻鮮牛乳餅半斤為小餅内鑽以白砂餹去皮胡桃榛松仁或蒸或煑之油䭔音堆二制一用碓細白糯米粉湯溲之鎻以餹蜜豆沙為小䭔油中煎熟一用山藥劘去皮擣粉内鎻以鮮乳餅油煎油虛繭歳時雜記人曰京師貴家造探官繭用白糯米細粉湯溲之鎻熬熟豬脂白砂餹為繭復入豬脂中煎燥為度豆裹餈用碓白糯米粉蜜湯溲為小餅煑外以蜜豆沙或餹豆沙通厚積之粽形制不一古名角黍用精鑿糯米湛潔之候㣲乾摘蘆葉煮熟捲米中藏蜜餹豆沙或豬肉醢料或肥棗或去皮胡桃榛松仁白砂餹又轉摺成角必緊束堅實入鍋煑熟宜蜜宜餹茭葉同制餈許慎曰餈稻餅也炊米爛擣之也本心齋曰玉磚炊餅方切也二制一用白秔糯米相半湯中煑少熟取起别入鍋以鉢器宻覆煑一時就於鍋中旋調稠靭取起加研碎炒熟芝麻同鹽少許摻之榦開界之一用白糯米煑飯臼中擣爛乾則少洒以水榦開方切以片粘則潤以熟油暴之使燥復切入鍋炒加餹或鹽風消餹白糯米五升為率磨細粉先取多半雜餹水或餳溲為厚餅毎飯中通一穴入豆萁灰淋水中煑過熟漉起後以少半生粉漸揉和帶稍堅榦薄小餅暴之使燥置沸油内以箸挟其縁聚而取之用餹炒麫摻甘露餅用精御糯米磨絶細以蜜水溲團蒸熟切小顆生粉為餑榦薄暴燥置沸油中煎燥染松仁油或杏仁油取白砂餹和薄荷葉坋摻之芙蓉葉用白糯米磨細粉蜜和薄酒溲粉蒸熟以生粉為餑榦薄片摺切範芙蓉葉狀暴燥置沸油内煎熟摻以砂餹麫餹香少許玉茭白用白糯米粉一升乾山藥坋半升芋魁劘去皮擣糜爛和水濾取汁溲二物揉實長若茭白暴燥取香油一斤蜜一斤同煎肥復以蜜染取炒熟芝麻衣之骨髓餅用白糯米粉五升牛骨髓半斤白砂餹半斤酥四兩沸湯溲為餅鐵鍋中熯熟山藥餻山藥蒸熟去皮切片暴燥磨細計六升白糯米新起淅碓粉計四升白沙餹二斤蜜水溲之復碓篩甑中隨界之蒸粉熟為度宜火炙蓮菂餻乾蓮菂去薏細切暴燥磨末同山藥餻制芡餻乾芡擣去殻磨細末同山藥餻制其末範餅别用蒸熟栗餻栗實炒熟去殻擣爛暴燥磨細末同山藥餻制白砂餹用半斤松黄餻韻府云松花名松黄服之輕身松黄六升白糯米絶細粉四升白砂餹一斤蜜一斤少水溲和復碓之復篩之甑中界之蒸至粉熟為度炒米餻南粤以方切者為餹方用白糯米炊飯湛清暴燥乾沙中炒虛圓雜炒芝麻以赤砂餹和餳置熱鍋中溲勻取起揉實俟冷切為片或乘熱手規之為歡喜團煎蘇木水染飯暴燥炒為紅米米􅶊音爛謝疊山曰米線二制一秔米湛潔碓篩絶細粉湯溲稍堅置鍋中煑熟雜生粉少半榦使開薄摺切細條暴燥入肥汁中煑以胡椒施椒醤油葱調和一粉中和米漿為糨揉如索菉豆粉入湯釜中取起二粉片毎白糯米粉一升黄大豆粉二升湯溲之揉實切為厚片入肥肉汁中煑加椒醤酸韲調和蓼花制蓼花取芋魁劘去皮擣糜爛七分雜白糯米絶細粉三分復擣一處為厚餅數十枚水煑過熟置器中調攬甚勻先将一木板傅餑在上榦開暴半燥切片叚復暴燥用又切小顆同乾沙炒肥或同小石子炒為後四制以猪脂熬為油入煎之尤肥而鬆也檀香毬用白砂餹水煑加炒熟麫乘熱染之火炙燥七香毬用赤砂餹同炒熟麫和餹香香油煑鎔染之芝麻毬用先染以赤砂餹後衣以炒熟芝麻薄荷毬用薄荷葉坋之同芝麻毬制白餹制白餹楚詞曰餦餭緬甸取貝木實汁熬為白餹鋹鍠音張皇白糯米毎一斗蒸飯候冷雜以擣碎麥蘖二升再雜以礱榖糠和湯滿浸候味甘置淋缸中放其水煎之漸用鍬器翻挑成餹其柔薄者即餳然造此火不宜息亦視天之寒熱也秔米亦宜糯米餹多有揉炒芝麻切為餻者有捲豆末而為管者有為條為餅之類其制非一酥捲餹先用退皮胡桃仁炒熟芝麻碎擣入鍋温之置餹於内俟和柔取榦薄捲切為小塊坋花椒薄荷葉縮砂仁少許摻之於上藕絲餹取白餹隔湯頓醒就湯鍋氣中以濕手抽疊之筒而吹虛之竅如藕熱刀隨裁作長短條叚外衣以炒米花或雜以熟芝麻薄荷葉坋有為毬以綫結餹纒制餹纒凡白砂餹一斤入銅鐵銚中加水少許置煉火上鎔化投以果物和勻速宜離火俟其餹性少凝則毎顆碎析之紙間火焙乾白砂餹本艸曰石蜜宜入餹物胡桃仁去皮榛仁去皮松仁去皮𤓰子仁㣲炒瓠子仁㣲炒烏欖核仁去皮人面果仁楊梅核仁蓮心㣲炒杏核仁水煑一過去苦皮尖焙燥梧桐子去殻栗熟末蓮菂末榧末橙利刀削橙外薄皮暴燥香櫞皮去白方切煑漬去苦暴燥芝麻炒大豆炒末紫蘇生擷穗造霜梅水中漬透蒸罌收用子白豆􅛌仁末縮砂仁末艸果仁末細茶葉末薄荷葉末生薑粉桂花末蜜煎制楊梅擇肥甘者鹽少許醃一宿復以水洗晴天日㣲曯水盡澆蜜暴之有水㵼去復加蜜暴至甜透入甕又用蜜漬蜜須先煉熟者後多倣此橙子佛手柑新摘帶青黄橙子以利刀削去外麤薄皮周界為稜毎斤鹽一兩同水漬一宿味酸再漬去核及水置日中曯稍乾入銀錫器砂鑼中注蜜隔湯煑停冷有水㵼去復加蜜煑日暴甜透徹入甕以蜜漬削下皮留為餹纒有以橙去酸水及核白酒中煑至無酸㫰乾以蜜煑甜蜜漬之佛手柑無囊不用水漬同制凡煑皆宜隔湯凡有鹽者皆宜留久用則漸以蜜煑後多倣此金橘牛乳柑金豆閩粤有柑皮煎金橘新摘不傷損者毎斤鹽一兩水漬之用時以刀界稜復漬蜜煑餘如橙制牛乳柑金豆同梅子小滿時摘青梅未甚酢者調􅮄硝湯待冷漬之欲原青加銅青同漬視梅性柔翠周界以稜剔去其核水洗潔曯至水竭置蜜中煑甜又日暴透以蜜漬或以醋漬止宜一晝夜凡梅十斤用銅青三錢李子南粤蜜煎李多渣摘青脆者以朴硝冷湯漬無酸澁㣲燖之界小稜去核水洗曯乾蜜煑甜又日暴透蜜漬林檎頻婆林檎摘帶青者利刀劘去外皮周界為稜鹽水漬柔水洗曯乾蜜中煑甜又日暴透以蜜漬頻婆同作四分之棗子摘鮮帶堅實肉厚者同林檎制枇杷摘黄者毎斤鹽一兩礬六錢同水漬之用時易水洗去皮核蜜煑甜日暴透以蜜漬櫻桃蘇東坡老饕賦云爛櫻珠之煎蜜摘半熟者鹽水漬一宿毎斤計鹽一兩水洗㫰乾剔去核易以響餹小顆蜜煑日暴透徹漬之木𤓰羊桃木𤓰摘穉嫩者銅刀劘去皮方切片或刻菊艾葉状以石灰泡湯俟冷取絶清者漬去酸澁味作沸湯㣲燖曯乾蜜煑甜日暴透又蜜漬之羊桃同制橄欖梧桐子用麤瓷器中揉擦去皮銅刀界之為稜同淅米水入瓷器煑味不苦澁核脫㫰乾蜜中煑甜透日暴以蜜漬梧桐子煎去殻惟以蜜煑透漬藕劘去皮方切片少鹽醃頃之作沸湯㣲燖㫰乾以蜜煑甜日暴透又蜜漬竹筍誠齋詩曰穉子玉膚新脱錦蘆筍竹筍去籜尖杪切條叚同藕制蘆筍去苞同茭白去苞取尖杪同藕制蒲蒻又曰蒲白去外苞寸切條叚同藕制薑秦太虛詩云先社薑芽勝肥肉地薑薑穉芽方切片或刻菊艾葉状或細絲鹽醃一宿水洗作沸湯少燖㫰乾以蜜煑又日暴透徹蜜漬之地薑去根鬚叚切同桑黮音甚取紫熟者去蒂同薑制本艸云桑黮和蜜食之令人聰明安魂鎮神茄摘甚穉小者界其蒂為四道去中骨釋米水漬柔界其身為細稜去子肉作沸湯燖㫰乾以蒂倒結束之蜜煑日暴透又以蜜漬冬瓜劘去外皮及瓤方切堅肉為片石灰煎湯取清冷者漬一宿作沸湯㣲燖曯乾蜜煑暴復漬之蘘荷同冬𤓰制天茄穉嫩者刳去子同冬瓜制刀豆穉嫩者横切為片同冬瓜制豇豆穉嫩者寸切條同冬𤓰制地黄取生嫩者毎一斤用霜梅二斤甘草四兩同水煑去藥氣以蜜煑甜透日暴又蜜漬之商陸夲草云樟桞根取根方切片同冬瓜制木通嫩者去皮同冬瓜制天門冬冬月取之水煑去皮心㫰乾蜜煑甜透色明日暴復以蜜漬天麻本草云苗名赤箭取穉嫩色白者水漬去皮方切片曯乾蜜煑甜日暴透又蜜漬之圖經曰山人取生者蜜煎作果食之甚珍菖蒲採嫩根無絲筋者劘去皮切絶細縷以造霜梅水漬透洗㫰以蜜煑甜更日暴又以蜜漬蜜裹酥二制用梅酥同白砂餹擣味酸甜適宜擷新紫蘇葉湯泡柔入梅酥為小摺包取細篾貫之蜜中煑日暴透復蜜漬有用楊梅乾肉再加川椒少許蜜霜梅用霜梅肉厚者同甘艸煑味無酸擊去仁曯乾蜜煑甜透日暴又漬之取漬桂花色常鮮明凡蜜煎日暴勝煑乾則常漬以蜜頻抺罋口不令其生白醭頻見日暴不令其有饏徒敢切䭕子敢切欲乾收者煑之日暴之亦常潤蜜不宜枯竭之甚也後凡物宜蜜煎者多倣此饏䭕無味也閩廣中所産者荔枝龍眼餘甘子人面果烏欖椰子波羅蜜草果豆蔲皮縮砂仁蔞藤葉㯽榔南粤以蒟醤為扶留藤取葉合㯽榔食之辛而香也即蔞藤蒟音矩之類常潤蜜遇晏温即暴之日出清霽為晏溫花香宜為膏者桂花蘭花玫瑰花薔薇花燖茉莉花木香花之類用花瓣心擣糜爛壓去水蜜和之日暴之加白砂餹復擣之收入瓷器常以日暴花無毒宜煎者木筆花玉蘭花梔子花棣棠花萱花葵花鶯花荷花絲瓜花之類如味苦澁皆作沸湯先燖㫰乾復内造霜梅水中醃之洗潔㫰乾蜜煑日暴甜透又以蜜漬餹劑制右以餹蜜共燒之者今各有制衣梅用赤砂餹一斤為率釜中再熬乘熱和新薄荷葉絲八兩鮮薑絲四兩日中暴乾置臼中擣和丸之有脫楊梅肉雜於内今加白豆蔲一兩白檀香二兩末片腦一錢坋白砂餹為珍餹再熬後倣此天鮮楊梅二制乾楊梅一鮮紫肥楊梅加赤砂餹鮮紫蘇葉鮮薄荷葉和一二日去水又入餹日中暴甜透一用紫蘇薄荷各四兩楊梅一斤餹一斤貯罋内羃之記取五方日色移暴乾楊梅甘草湯煑淡以餹漬餹椒梅黄梅大者鹽醃一日槌核去仁内瓷甕中凡梅一層生花椒生薑絲一層疊八分滿以赤砂餹漬沒之以新椒葉覆掩之竹箬羃甕口蒸一時取日暴十日用餹紫蘇梅用青梅鹽醃柔剖分四片洗潔㫰乾細切鮮紫蘇葉同和赤砂餹中漬之日中暴甜透餹薄荷梅小滿時煎􅮄硝湯俟冷投青梅漬味無酸界為周稜洗㫰乾取薄荷葉同赤砂餹漬之有水㵼去又易以餹甜透為度餹滷梅毎青梅十斤鹽十兩赤砂餹五斤和入甖中油紙羃口日曯梅甜柔為度酢復加餹餹李用熟者㣲燖之俟冷乾漬赤砂餹中甜透用餹橙金橘牛乳柑乾小橘方言橘藥同蜜煎制和赤砂餹煑甜乾小橘湯洗淡餹漬餹木瓜同蜜煎制用赤砂餹餹冬瓜同蜜煎制用赤砂餹餹竹筍同蜜煎制用赤砂餹餹天茄同蜜煎制用赤砂餹餹蘘荷同蜜煎制用赤砂餹餹薑同蜜煎制用赤砂餹餹豇豆同蜜煎制用赤砂餹餹莱菔茄用白莱菔大切片鹽㣲醃水洗日曯乾同赤砂餹漬日暴甜透茄用淅米水漬沸湯㣲燖俟冷以赤砂餹漬暴之湯水制春月宜用四時皆宜水芝湯昔仙人務光子服此湯以致飛昇去蓮菂帶黒皮及薏炒燥通擣為細末一斤粉甘草剉碎㣲炒擣為末一兩右俱羅細毎服二錢鹽少許沸湯㸃服不老湯烏梅去仁焙燥十斤甘草炒一斤紫蘇葉暴燥斤鹽炒一斤麫炒黄色一斤用前二味别研後三味勻和再研為細末貯瓷器沸湯㸃服夏月宜用早秋亦宜香薷湯香薷一斤厚朴薑制八兩白茯苓去皮五兩甘草四兩白扁豆炒八兩右剉碎毎用五錢作沸湯泡夏宜冷秋宜稍熱服薑湯生薑碎切作沸湯泡去薑加白砂餹或蜜冷飲米湯白米秔者炒熟作沸湯泡去米加白砂餹或蜜調飲麥湯大麥炒熟磨麧下没切去糠作沸湯泡濾其清飲梅酥湯梅酥再研作沸湯調加蜜酸甜得宜飲菉豆湯菉豆水煑熟或先炒水煑去豆加蜜餹調湯飲天香湯桂花半含者摘下擇去蔕取河水同炒鹽少許溲入小罐上以霜梅二三顆碎擊掩之箬羃固用以數朶置蜜湯中春元湯梅花未放時鎔蠟㸃其瓣候氣足摘下如天香制用取二三朶置蜜湯中盡放鳯髓湯松仁去皮研糜爛入湯中濾清蜜調無塵湯水晶餹霜二兩片腦二分右将餹霜乳絶細入片腦研匀毎一錢沸湯㸃服須當前烹㸃久則香散香餹渇水白砂餹一斤水一盞半藿香葉半錢甘松一塊生薑十大片同煎以熟為度濾潔入麝香如菉豆一塊白檀香末半兩瓷器盛氷水中沈用之林檎渇水林檎㣲生者擣碎入竹器中以沸湯衝淋其汁至滓無味為節用文武火熬常攪勿令焦滴入水不散然後加腦麝檀香末少許調飲蒲萄渇水飲膳正要有櫻桃取汁熬之生蒲萄研碎濾去滓慢火熬濃稠為度貯瓷器中切勿犯鐵器太熱者不可用加腦麝少許入煉蜜㸃飲楊梅渇水飲膳正要有安石榴子取漿熬之楊梅揉搦取自然汁濾滓須盡入砂石器内慢火熬濃滴入水不散為度若熬不到即生白醭瓷器貯之加蜜腦麝少許沸湯調飲冷則不澁木瓜渇水木瓜銅刀去皮瓤核潔肉一斤為率切為方寸大薄片用蜜先熬次入木瓜再慢火同熬二三時掠去上沬嘗味酸甜得宜濾潔先挑於瓷碟内冷試稠硬不斷為度沸湯調飲五味渇水北五味子肉一兩作沸湯漬一宿取汁别煑下濃黒豆汁對當顔色恰好用煉熟蜜對入酸甜皆宜慢火同熬一時許凉熱任意調用沈香熟水沈香一小片先用潔瓦一方火然㣲紅置于平處加香在上以瓶覆定約香氣盡速注沸湯於瓶中宻封輟耕錄云以沈香削小釘挿於林檎中湯泡之尤佳丁香熟水丁香五粒竹葉七片作沸湯泡宻封片時用豆蔲熟水白豆蔲仁碎擊投沸湯瓶中蜜封片時用毎次用五七枚足矣多則香濁紫蘇熟水紫蘇摘新葉陰乾用時隔紙火炙作沸湯泡蜜封熱飲冷則傷人秋月宜用香櫞湯香櫞去皮去囊白取肉一斤炒鹽二兩甘草末一兩疊實於罐收之用時作沸湯調有不入甘草用以蜜餹有取肉研濾漿同蜜熬成煎甘菊湯黄菊花味甘者去青苞以霜梅去核毎枚藏一二朶於内疊之或入罐一層加炒鹽一層毎斤鹽二兩疊實用時入沸湯中加蜜冬月宜用椒棗湯北棗肥者湯退去皮去核毎一枚入花椒一粒碎切炒鹽粒米許收瓷器中作沸湯泡杏薑湯夏蘭渚云一薑二杏三鹽四草生薑一斤擣取汁杏仁去皮尖二兩鹽炒三兩甘草末四兩同擣和入薑汁瓷器收旋作沸湯調甚美風韻竹嶼山房雜部卷二
