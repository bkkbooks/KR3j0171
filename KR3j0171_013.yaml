body:
  text: 竹嶼山房雜部卷十三明宋詡撰尊生部一湯部茴香湯乾生薑半兩甘草二兩小茴香一兩炒鹽二兩半右為末白湯調達旦茴香青鹽尤妙鐵刷湯蒼朮二兩米泔浸一宿切片焙乾良薑三兩鎚碎油炒砂仁二兩甘草一兩七錢炒鹽一兩八錢炒右末每服一錢空心沸湯點服丁沈煎丸白豆蔲五分砂仁畢澄茄木香檀香薄荷葉甘松淨陳皮桂花各半兩丁香沉香各五分白茯苓二兩百藥煎一兩右為末用甘草膏和勻丸如菉豆大常服能消酒化食若臨用時入龍腦香麝香硼砂少許尤妙熬甘草膏法粉草一斤搗碎熱水浸半日揉洗紐去滓再浸再洗再紐凡三次將淨甘草水入磁器內熬成膏子又見卷末視此較詳杏薑湯一薑二杏三鹽四草每生薑一斤搗細絞取真汁却將去皮尖淨杏仁二兩炒鹽三兩甘草末四兩同搗細入薑汁搗勻逐旋湯調服甚美風韻縮砂湯縮砂仁四兩烏藥二兩香附子一兩炒粉草二兩炙共為末每服二錢加鹽沸湯點服中酒者服之妙常服快氣進食須問湯東坡歌括云半兩生薑乾用一升棗乾用去核三兩白鹽炒黃二兩草尖去皮丁香木香各半錢約量陳皮去白一處搗煎也好點也好紅白容顔直到老鳯髓湯松子仁胡桃肉湯浸去皮各一兩或二兩共研爛入熟蜜半兩和勻每用沸湯點服服能潤肺療咳嗽杏酪湯板杏仁用三兩半沸湯二升浸蓋却候冷即便換沸湯如是五度了逐箇搯去皮尖入小砂盆子內細研次用好蜜一斤於銚子內煉三兩沸看涌掇退候半冷旋傾入杏泥又研如是旋添入研和勻極細湯成矣醍醐湯止渴生津烏梅一斤捶碎用水入大罐同熬作一碗澄清不犯鐵器蜜五斤縮砂仁半斤碾白檀末二錢麝香二字右將梅水縮砂蜜三件一處於砂石器內熬之候赤色為度冷定入白檀香麝香水芝湯通心氣益精髓粉草一兩微炒乾蓮實一斤帶皮炒極燥搗羅為細末右為細末每服二錢入鹽少許沸湯點服蓮實搗羅至黑皮如鐵不可搗則去之世人用蓮實去黑皮及澀皮并心大為不便黑皮堅氣而澀皮固精世人多不知也此湯夜坐過飢氣乏不欲取食則飲一盞大能補虛助氣昔仙人務光服此得道茉莉湯用蜜一兩匙甘草一分土薑自然汁一滴同研令極勻調塗在碗中心抹勻不令洋流每於凌晨採摘茉莉花一二十朵將放藥碗蓋花取其香氣熏之午間乃可以點用木香苦湯片子薑黃四兩縮砂仁半兩木香半兩白豆䓻仁半兩藿香葉半兩白檀半兩陳皮去白半兩青皮去白半兩甘草炒半兩廣茂炮半兩香附子去毛炒一兩川楝子半兩白扁豆去皮蒸熟焙乾稱二兩右為細末每服一二錢空心沸湯點服無塵湯水晶糖霜二兩梅花片腦二分右將糖霜乳細羅過入腦子再研勻每用一錢沸湯點服如點帶香湯茶必須當面烹點不可多多則令人厭少則有餘不足存焉慎勿背地烹點供上如背處烹點則香氣已散矣緑雲湯荆芥穗四兩白朮粉草各二兩右為末入鹽點服仙朮湯辟瘟疫除寒濕溫脾胃進飲食蒼朮去皮十二斤米泔水浸焙棗去核六升杏仁去皮尖炒斤半乾薑五兩炮粉草炙三斤半鹽六斤四兩右為細末入杏仁和勻每服一錢沸湯點服常服延年益夀明目駐顔輕身不老御愛靈黍湯暖脾剋化宿食大小麥各二升粉草炙四兩縮砂仁一兩半生薑一斤帶皮切鹽六兩白者右將二麥炒熟入諸藥焙乾為細末以磁器內盛食前後皆可服大小麥恐有粗皮難服先别多碾取淨末用加肉豆䓻八枚尤佳荔枝香烏梅半斤洗淨熬去核去滓沙糖二斤熟水化作汁濾去滓桂末三錢丁香末一錢乾生薑末半兩右將糖梅汁合和了銀石器內熬耗一半然後入丁桂薑末再熬成膏入淨器內收貯溫棗湯大棗一斤去核用水五升熬汁生薑汁蜜右將三味調停和美再入銀石器內令稀稠得所入麝香少許每盞抄一大匙沸湯點服香蘇湯乾棗一斗去核劈碎木瓜五箇去皮稀搗碎紫蘇葉半斤右件一處再搗勻分作五分勻攤在竹籮內燒滚湯潑淋下汁嘗瓜棗無味了去却别換好者一分依上潑之以味盡為度將淋下汁慢火銀石器內熬成膏子冷熱任用地黃膏子湯生地黃肥大者於秋暮冬初採之淨洗拆碎入石臼中以木杵搗爛榨取汁入砂石器內熬至浮沫起皆掠去至淨煎至三分去二别換銀石小器慢火熬至滴入水不散為度造時始末不犯銅鐵器於淨磁器內收貯入檀香末并腦麝少許或云入蜜熬者非入酒中同飲極妙并可沸湯點服輕素湯乾山藥三兩蓮子肉半斤湯浸去紫皮并心子洗淨白右日乾為細末生龍腦少許湯點服沃雪湯雞蘇葉三兩縮砂仁一兩荆芥穗一兩半甘草半兩天花粉甜者二錢半為末湯點櫻珠湯用一味好南參不以多寡碾為細末以胡桃仁松子亦得同和勻煉蜜為膏子丸如櫻珠大以辰砂為衣取其紅色仍用青松叉為葉每用二顆放在湯盞呈過沸湯當頭衝點香美風韻悅目有補熟梅湯黃梅十斤鹽一斤青椒四兩粉草末六兩薑汁一小碗右拌勻日曬半月磁器收貯東坡梅湯黃梅一百箇蒸熟以生布絞去皮核留肉用炒鹽一斤生薑一斤去渣粉草末二兩右拌勻入甕綿紙裹甕口曬之沸湯點用梅絲湯青梅用大而堅者趂衆手切絲不可遲遲則絲黃軟每絲一斤用甘草一兩半新椒一合生薑少許炒鹽半斤停冷右件拌勻入罐留少許鹽封面厚紙密封不犯生水黃梅湯黃梅百箇須蒸熟皮核生粗布細梢五兩椒從枝上採半斤鹽向火中燒斤薑搗取自然汁粉草羅將四兩饒綿裹甕口晴日曬渴時須用沸湯澆青脆梅湯青消梅一斤十二兩甘草生末四兩炒鹽半斤生薑一斤四兩青椒三兩紅椒半兩去目擘作兩片大率青梅湯家家有方分兩亦大同小異初造之時香味一同但藏經月之後便爛熟如黃梅亦蓋有説焉一者須用青消梅在小滿前採捶破核去仁不得纎毫犯手用乾匙撥至打拌之時亦然捶破之後須攤在潔淨篩子中令水脈略乾爽二者甘草生用不見火三者炒鹽須待冷用生薑須用不經水浸者去皮半斤切作絲一半擂碎亦不得犯手五者青椒不可帶葉旋採朗乾制度俱依法了一齊拌勻仍用銀匙或銀筯或竹筯抄入淨新甕瓶內瓶不可大只用盛十餘盞湯料以上者仍留些鹽糝面六者不得用箬葉笋籜掩面須用兩層油單夾一層厚壯紙緊扎瓶口如此制作方可全脆字也青梅湯小滿前採青梅硬者一斤連核略舂自然肉脫核去除核留肉用鹽三兩半花椒皮半兩同拌入瓶集香湯縮砂四兩半甘草三兩胡椒檀香各半兩鹽四兩右先將鹽甘草炒次下餘藥炒令香熟研為細末點服青梅湯青梅三十兩粉草末四兩極細炒鹽十兩右青梅劈開去仁留核切碎與炒鹽甘草末一處拌勻入瓶竹箬包口泥封懸之經半月方開入青椒不拘多少再拌勻還入瓶封之逐旋取出用須是小滿前梅子製造則脆黃梅湯每黃梅一斤大者劈作六塊小者四塊去仁用鹽五兩甘草末一兩半檀香末半兩薑絲一兩青椒葉少許拌和勻置磁器中粗布羃口曬熟收藏甚妙極有風味或不用拌和先以鹽少許鋪器砥梅塊一層撒鹽料一層層皆如之上以鹽蓋亦好熟梅湯樹頭黃大梅蒸熟去皮核每斤用甘草末五錢炒鹽四兩薑絲二兩青椒五錢待秋間入木犀不拘多少木犀湯每用木犀花去萼揀淨一斤以鹽少許略搗絞去清汁再以炒鹽四兩淹拌捺實於瓷器內合時旋取出别碎每料用木犀六兩甘草四兩甘松檀香丁皮各半兩炒麵一斤右為細末沸湯點服桂花湯木犀花帶露打下去青蒂擂爛以細麵炒熟搜勻為薄餅一日曬乾每花餅二兩入砂仁末半兩甘草末酌量用以甘草膏子調和佳桂香湯桂花三斤㨂淨去青蒂細研磁器盛貯覆合略蒸乾薑一兩甘草略炙右為細末與桂花拌勻量入炒鹽磁器盛貯勿令走氣如常法點天香湯白木犀盛開時清晨帶露用杖打下花以布被盛之揀去蒂萼頓在淨磁器內俟積聚多然後用新砂盆擂爛如泥一名仙桂湯亦名木犀湯並同用木犀一斤鹽炒四兩粉草炙二兩右件拌勻置磁器中密封曝七日每用沸湯點服一枝花一層煉蜜一層木犀花一層去核霜梅肉一層椒葉入一層煉蜜若花枝多更依此法如此相間入磁器封定此法凡四時中有香無毒之花皆可製須是帶露剪花去葉小枝兒點湯時取一枝入盞內以湯輕輕傾下花枝儼然如生蜜中諸物可作果供法製縮砂消化水榖溫暖脾胃縮砂十兩去皮以朴硝水浸一宿曬乾以麻油炒燥香熟為度粉草炙桂花各一錢半研為細末右件和勻每遇酒食後細嚼香橙湯青香橙去核穰取皮一斤以炒鹽四兩淹拌曬乾每用四兩入甘草四兩炒鹽二兩右為細末沸湯點服又方香橙取皮切絲每斤用甘草末三兩半炒鹽三兩生薑絲少許以橙穰去核淨布細捩酸水入橙絲拌勻磁罐密封之又方香橙五十斤去核取皮連穰切片生薑五兩去皮切片右件於砂盆內搗爛如泥入炙甘草末三兩檀香末半兩和勻捻作餅子焙乾為細末入鹽少許沸湯點服又方橙子黃者一斤剝皮去囊去筋核連皮用舂如泥甘草一兩檀香半兩甘松三錢並為末炒鹽三兩右拌勻入瓶收藏又方大橙子三斤去核切作片子連皮用檀香末半兩生薑五兩切作片焙乾甘草末一兩或二兩右橙薑二件用淨砂盆研爛次入檀香甘草末和作餅子焙乾研為細末每用一錢鹽少許沸湯點服能寬中快氣消酒香櫞湯俗作圓非香櫞去心用皮瓤薄切細片一斤半以炒鹽三兩甘草末一兩半花椒橘皮隨意右件拌勻淹數日沸湯點服橘紅湯橘紅一斤鹽四兩水五碗右件砂甏中慢火煮令汁盡乾右為細末沸湯點服去痰如神調胃湯糖糟曬乾生薑片各為細末酌量調和滋味得所為度沸湯點服鳯池湯大塘南橘一斤去核與筋膜留瓤皮先以皮切碎爛搗次以瓤切搗爛細拌勻入炒鹽三兩再同杵如泥甘草末一兩半拌勻沸湯點服洞庭湯細皮黃橘子一斤於淨盆內就薄切去核留汁生薑去皮半斤甘草四兩各搗碎炒鹽三兩拌罨一宿或兩宿取出入所餘橘汁以炒麵糝乾共焙燥右為細末如常法點服鳯池湯皮薄味甘紅橘一斤擘皮細切叧杵擘瓤去筋核細切叧杵碎和橘醬拌勻入炒鹽三兩再同杵如泥更入甘草末一兩半拌勻沸湯點服補氣湯五味子二兩甘草半兩白鹽一兩炒三件同拌勻器中淹一宿取出焙乾為細末熟湯點服清中湯生薑五兩不去皮切片白鹽四兩炒與生薑同淹一宿焙乾白术甘草各二兩半右為細末沸湯點服解酲湯胡椒官桂丁香各一分檀香三錢藿香半兩甘草三兩鹽四兩炒右為細末滚湯點服百花湯杏仁四兩去皮尖生薑四兩取自然汁與杏仁同研細白蜜半斤右同攪拌勻以磁器盛蒸熟匙攪成膏沸湯點服快腸湯生薑二斤切片米泔浸三日曬令半乾丁香四兩銼白鹽半斤甘草六兩切如豆大右以淨銚一枚先以鹽炒熟次下薑稍乾脆次下甘草炒令赤色次下丁香同炒慢火不得焦但紫色為度乘熱入新磁器密封三日後開研為細末沸湯點服仙朮湯辟山嵐瘴氣晨昏宜服之蒼朮九兩米泔浸刮去皮棗去核乾薑各半兩泡杏仁一兩半去皮尖麩皮炒雙仁不用叧研甘草二兩三分炒白鹽六兩炒右為細末沸湯點服醒脾湯乾薑三兩白麵五兩炒炒鹽三十五兩甘草二十兩炒杏仁一兩半去皮尖及雙仁者麩皮炒右為細末沸湯點服棗湯棗去核一斤生薑五兩切洗甘草三兩炙銼右三味一處拌勻用盆盛貯以布蓋罨一宿焙乾為末入鹽少許沸湯點服梅蘇湯烏梅一斤去核甘草四兩紫蘇四兩炒鹽六兩炒麵十一兩右為細末沸湯點服木瓜湯木瓜半斤甘草五兩檀片茴香各四兩乾薑砂仁各四兩右為細末沸湯點服清中湯水薑片半斤甘草四兩檀片少許炒鹽半斤炒麵半斤右為細末沸湯點服荔枝湯烏梅肉四兩焙乾乾薑二兩泡甘草二兩官桂半兩叧研鬆沙糖二斤叧研右為細末與沙糖官桂拌勻磁器收貯沸湯點服紫雲湯甘草二兩檀香良薑桂枝各三兩砂仁乾薑甘松各二兩右件銼碎以水濃煎去渣多以鹽調和滋味美為度不換金湯炒麵一斤芝麻減半椒皮六錢茴香六錢半炒鹽三兩一處同拌更加酥蜜右為細末沸湯調服不老湯生薑一斤棗一斤青鹽三兩甘草四兩丁香檀香各半錢陳皮三兩右件一處搗爛空心調服又按此方與前須問湯大同小異姑兩存一斤生薑一斤棗三兩青鹽四兩草丁香白檀各半錢三兩陳皮一處搗煎也好點也好久久服之長不老和合湯砂糖一斤約以水三二盞先燒略滚沸便下糖滚三兩沸掠去沫舀起烏梅不拘多少打破去核仁湯泡叧置臨用時二件調和酸甜得所為度造化湯肥大烏梅去仁留核甘草炒鹽各等分先以烏梅甘草杵為粗末次下炒鹽拌勻入罐實按密封收起須臘月或伏中修合半年後方取出焙乾研為細末沸湯調服荔枝膏湯烏梅三十箇肥大者先以湯浸三五次去酸水取肉爛研入砂糖一斤臨時添減與梅同熬得所即止生薑半斤取自然汁加減用桂末半兩入湯內右件熬成膏子看可丸使住火用湯或水調點密封瓶檀香湯以甘草膏子一料用檀香細末三錢腦麝各少許研細入生薑自然汁兩三點同研投入膏內點時以少許湯化開飲胡椒湯入胡椒末一兩腦麝少許並依前法丁香湯入丁香細末三錢餘依前法以上二方首云入者當本甘草膏而言煎甘草膏子法好粉草一斤慢火上炙黃細銼碎研為粗末以百沸湯五六盆煮以竹杖兒攪成濃汁生絹袋濾過再將甘草滓别用水煎以無味為度併前濾過汁作一處使熱鍋子內先以麻油少許乘熱擦了入甘草汁煎數十沸以鹽一斤將汁就化用紗片濾去鹽滓再熬成膏子如飲相似投入乾瓶內臨時修合每用膏子一料入後項藥大率一斤甘草熬成膏子可分作五料也竹嶼山房雜部卷十三
