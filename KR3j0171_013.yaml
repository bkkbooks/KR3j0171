body:
  text: 竹嶼山房雜部卷十三明宋詡撰尊生部一湯部茴香湯乾生姜半兩甘草二兩小茴香一兩炒鹽二兩半右為末白湯調達旦茴香青鹽尤妙鐵刷湯蒼朮二兩米泔浸一宿切片焙乾良薑三兩鎚碎油炒砂仁二兩甘草一兩七錢炒鹽一兩八錢炒右末每服一錢空心沸湯㸃服丁沈煎丸白豆蔲五分砂仁畢澄茄木香檀香薄荷葉甘松浄陳皮桂花各半兩丁香沉香各五分白茯苓二兩百藥煎一兩右為末用甘草膏和匀丸如菉豆大常服能消酒化食若臨用時入龍腦香麝香硼砂少許尤妙熬甘草膏法粉草一斤𢷬碎熱水浸半日揉洗紐去滓再浸再洗再紐凡三次將浄甘草水入磁器内熬成膏子又見卷末視此較詳杏薑湯一薑二杏三鹽四草每生薑一斤𢷬細絞取真汁却將去皮尖浄杏仁二兩炒鹽三兩甘草末四兩同𢷬細入薑汁𢷬匀逐旋湯調服甚美風韻縮砂湯縮砂仁四兩烏藥二兩香附子一兩炒粉草二兩炙共為末每服二錢加鹽沸湯㸃服中酒者服之妙常服快氣進食須問湯東坡歌括云半兩生薑乾用一升棗乾用去核三兩白鹽炒黄二兩草尖去皮丁香木香各半錢約量陳皮去白一處𢷬煎也好㸃也好紅白容顔直到老鳯髓湯松子仁胡桃肉湯浸去皮各一兩或二兩共研爛入熟蜜半兩和匀每用沸湯㸃服服能潤肺療咳嗽杏酪湯板杏仁用三兩半沸湯二升浸盖却候冷即便換沸湯如是五度了逐箇搯去皮尖入小砂盆子内細研次用好蜜一斤於銚子内煉三兩沸看涌掇退候半冷旋傾入杏泥又研如是旋添入研和匀極細湯成矣醍醐湯止渴生津烏梅一斤搥碎用水入大罐同熬作一碗澄清不犯鐵器蜜五斤縮砂仁半斤碾白檀末二錢麝香二字右將梅水縮砂蜜三件一處於砂石器内熬之候赤色為度冷定入白檀香麝香水芝湯通心氣益精髓粉草一兩㣲炒乾蓮實一斤帶皮炒極燥𢷬羅為細末右為細末每服二錢入鹽少許沸湯㸃服蓮實𢷬羅至黒皮如鐵不可𢷬則去之世人用蓮實去黒皮及澀皮并心大為不便黒皮堅氣而澀皮固精世人多不知也此湯夜坐過饑氣乏不欲取食則飲一盞大能補虚助氣昔仙人務光服此得道茉莉湯用蜜一兩匙甘草一分土薑自然汁一滴同研令極匀調塗在碗中心抹匀不令洋流每於凌晨採摘茉莉花一二十朶將放藥碗蓋花取其香氣熏之午間乃可以㸃用木香苦湯片子薑黄四兩縮砂仁半兩木香半兩白豆䓻仁半兩藿香葉半兩白檀半兩陳皮去白半兩青皮去白半兩甘草炒半兩廣茂炮半兩香附子去毛炒一兩川楝子半兩白扁豆去皮蒸熟焙乾秤二兩右為細末每服一二錢空心沸湯㸃服無塵湯水晶糖霜二兩梅花片腦二分右將糖霜乳細羅過入腦子再研匀每用一錢沸湯㸃服如㸃帶香湯茶必須當面烹㸃不可多多則令人厭少則有餘不足存焉慎勿背地烹㸃供上如背處烹㸃則香氣已散矣綠雲湯荆芥穂四兩白朮粉草各二兩右為末入鹽㸃服仙朮湯辟瘟疫除寒濕温脾胃進飲食蒼朮去皮十二斤米泔水浸焙棗去核六升杏仁去皮尖炒斤半乾薑五兩炮粉草炙三斤半鹽六斤四兩右為細末入杏仁和匀每服一錢沸湯㸃服常服延年益夀明目駐顔輕身不老御愛靈黍湯煖脾剋化宿食大小麥各二升粉草炙四兩縮砂仁一兩半生薑一斤帶皮切鹽六兩白者右將二麥炒熟入諸藥焙乾為細末以磁器内盛食前後皆可服大小麥恐有麤皮難服先别多碾取淨末用加肉豆䓻八枚尤佳荔枝香烏梅半斤洗淨熬去核去滓沙糖二斤熟水化作汁濾去滓桂末三錢丁香末一錢乾生薑末半兩右將糖梅汁合和了銀石器内熬耗一半然後入丁桂薑末再熬成膏入淨器内収貯温棗湯大棗一斤去核用水五升熬汁生薑汁蜜右將三味調停和美再入銀石器内令稀稠得所入麝香少許每盞抄一大匙沸湯㸃服香蘇湯乾棗一斗去核劈碎木瓜五箇去皮稀𢷬碎紫蘇葉半斤右件一處再𢷬匀分作五分匀攤在竹籮内燒滚湯潑淋下汁嘗𤓰棗無味了去却别換好者一分依上潑之以味盡為度將淋下汁慢火銀石器内熬成膏子冷熱任用地黄膏子湯生地黄肥大者於秋暮冬初採之淨洗拆碎入石臼中以木杵𢷬爛榨取汁入砂石器内熬至浮沫起皆掠去至淨煎至三分去二别換銀石小器慢火熬至滴入水不散為度造時始末不犯銅鐵器於淨磁器内收貯入檀香末并腦麝少許或云入蜜熬者非入酒中同飲極妙并可沸湯㸃服輕素湯乾山藥三兩蓮子肉半斤湯浸去紫皮并心子洗浄白右日乾為細末生龍腦少許湯㸃服沃雪湯雞蘇葉三兩縮砂仁一兩荆芥穂一兩半甘草半兩天花粉甜者二錢半為末湯㸃櫻珠湯用一味好南參不以多寡碾為細末以胡桃仁松子亦得同和匀煉蜜為膏子丸如櫻珠大以辰砂為衣取其紅色仍用青松釵為葉每用二顆放在湯盞呈過沸湯當頭衝㸃香美風韻悦目有補熟梅湯黄梅十斤鹽一斤青椒四兩粉草末六兩薑汁一小碗右拌匀日曬半月磁器收貯東坡梅湯黄梅一百箇蒸熟以生布絞去皮核留肉用炒鹽一斤生薑一斤去渣粉草末二兩右拌匀入甕綿紙裹甕口曬之沸湯㸃用梅絲湯青梅用大而堅者趂衆手切絲不可遲遲則絲黄軟每絲一斤用甘草一兩半新椒一合生薑少許炒鹽半斤停冷右件拌匀入罐留少許鹽封面厚紙宻封不犯生水黄梅湯黄梅百箇須蒸熟皮核生麤布細梢五兩椒從枝上採半斤鹽向火中燒斤薑𢷬取自然汁粉草羅將四兩饒綿裹甕口晴日曬渴時須用沸湯澆青脆梅湯青消梅一斤十二兩甘草生末四兩炒鹽半斤生薑一斤四兩青椒三兩紅椒半兩去目擘作兩片大率青梅湯家家有方分兩亦大同小異初造之時香味一同但藏經月之後便爛熟如黄梅亦盖有説焉一者須用青消梅在小滿前採搥破核去仁不得纎毫犯手用乾匙撥至打拌之時亦然搥破之後須攤在潔浄篩子中令水脉畧乾爽二者甘草生用不見火三者炒鹽須待冷用生薑須用不經水浸者去皮半斤切作絲一半擂碎亦不得犯手五者青椒不可帶葉旋採㫰乾制度俱依法了一齊拌匀仍用銀匙或銀筯或竹筯抄入浄新甕瓶内瓶不可大只用盛十餘盞湯料以上者仍留些鹽糝面六者不得用箬葉笋籜掩面須用兩層油單夾一層厚壯紙緊紥瓶口如此制作方可全脆字也青梅湯小滿前採青梅硬者一斤連核畧舂自然肉脱核去除核留肉用鹽三兩半花椒皮半兩同拌入瓶集香湯縮砂四兩半甘草三兩胡椒檀香各半兩鹽四兩右先將鹽甘草炒次下餘藥炒令香熟研為細末㸃服青梅湯青梅三十兩粉草末四兩極細炒鹽十兩右青梅劈開去仁留核切碎與炒鹽甘草末一處拌匀入瓶竹箬包口泥封懸之經半月方開入青椒不拘多少再拌匀還入瓶封之逐旋取出用須是小滿前梅子製造則脆黄梅湯每黄梅一斤大者劈作六塊小者四塊去仁用鹽五兩甘草末一兩半檀香末半兩薑絲一兩青椒葉少許拌和匀置磁器中麤布羃口曬熟收蔵甚妙極有風味或不用拌和先以鹽少許鋪器厎梅塊一層撒鹽料一層層皆如之上以鹽盖亦好熟梅湯樹頭黄大梅蒸熟去皮核每斤用甘草末五錢炒鹽四兩薑絲二兩青椒五錢待秋間入木犀不拘多少木犀湯每用木犀花去萼揀浄一斤以鹽少許畧擣絞去清汁再以炒鹽四兩淹拌捺實於瓷器内合時旋取出别碎每料用木犀六兩甘草四兩甘松檀香丁皮各半兩炒麫一斤右為細末沸湯㸃服桂花湯木犀花帶露打下去青蒂擂爛以細麫炒熟捜匀為薄餅一日曬乾每花餅二兩入砂仁末半兩甘草末酌量用以甘草膏子調和佳桂香湯桂花三斤㨂浄去青蒂細研磁器盛貯覆合畧蒸乾薑一兩甘草畧炙右為細末與桂花拌匀量入炒鹽磁器盛貯勿令走氣如常法㸃天香湯白木犀盛開時清晨帶露用杖打下花以布被盛之揀去蒂萼頓在浄磁器内俟積聚多然後用新砂盆擂爛如泥一名仙桂湯亦名木犀湯並同用木犀一斤鹽炒四兩粉草炙二兩右件拌匀置磁器中宻封曝七日每用沸湯㸃服一枝花一層煉蜜一層木犀花一層去核霜梅肉一層椒葉入一層煉蜜若花枝多更依此法如此相間入磁器封定此法凡四時中有香無毒之花皆可製須是帶露剪花去葉小枝兒㸃湯時取一枝入盞内以湯輕輕傾下花枝儼然如生蜜中諸物可作果供法製縮砂消化水榖温煖脾胃縮砂十兩去皮以朴硝水浸一宿曬乾以麻油炒燥香熟為度粉草炙桂花各一錢半研為細末右件和勻每遇酒食後細嚼香橙湯青香橙去核穰取皮一斤以炒鹽四兩淹拌曬乾每用四兩入甘草四兩炒鹽二兩右為細末沸湯㸃服又方香橙取皮切絲每斤用甘草末三兩半炒鹽三兩生薑絲少許以橙穰去核浄布細捩酸水入橙絲拌匀磁罐宻封之又方香橙五十斤去核取皮連穰切片生薑五兩去皮切片右件於砂盆内擣爛如泥入炙甘草末三兩檀香末半兩和匀捻作餅子焙乾為細末入鹽少許沸湯㸃服又方橙子黄者一斤剥皮去囊去筋核連皮用舂如泥甘草一兩檀香半兩甘松三錢並為末炒鹽三兩右拌匀入瓶收蔵又方大橙子三斤去核切作片子連皮用檀香末半兩生薑五兩切作片焙乾甘草末一兩或二兩右橙薑二件用浄砂盆研爛次入檀香甘草末和作餅子焙乾研為細末毎用一錢鹽少許沸湯㸃服能寛中快氣消酒香櫞湯俗作圓非香櫞去心用皮瓤薄切細片一斤半以炒鹽三兩甘草末一兩半花椒橘皮隨意右件拌匀淹數日沸湯㸃服橘紅湯橘紅一斤鹽四兩水五碗右件砂甏中慢火煮令汁盡乾右為細末沸湯㸃服去痰如神調胃湯糖糟曬乾生薑片各為細末酌量調和滋味得所為度沸湯㸃服鳯池湯大塘南橘一斤去核與筋膜留瓤皮先以皮切碎爛擣次以瓤切擣爛細拌匀入炒鹽三兩再同杵如泥甘草末一兩半拌勻沸湯㸃服洞庭湯細皮黄橘子一斤於浄盆内就薄切去核留汁生薑去皮半斤甘草四兩各擣碎炒鹽三兩拌罨一宿或兩宿取出入所餘橘汁以炒麫糝乾共焙燥右為細末如常法㸃服鳯池湯皮薄味甘紅橘一斤擘皮細切叧杵擘瓤去筋核細切叧杵碎和橘醤拌匀入炒鹽三兩再同杵如泥更入甘草末一兩半拌匀沸湯㸃服補氣湯五味子二兩甘草半兩白鹽一兩炒三件同拌匀器中淹一宿取出焙乾為細末熟湯㸃服清中湯生薑五兩不去皮切片白鹽四兩炒與生薑同淹一宿焙乾白术甘草各二兩半右為細末沸湯㸃服解酲湯胡椒官桂丁香各一分檀香三錢藿香半兩甘草三兩鹽四兩炒右為細末滚湯㸃服百花湯杏仁四兩去皮尖生薑四兩取自然汁與杏仁同研細白蜜半斤右同攪拌匀以磁器盛蒸熟匙攪成膏沸湯㸃服快腸湯生薑二斤切片米泔浸三日曬令半乾丁香四兩剉白鹽半斤甘草六兩切如豆大右以浄銚一枚先以鹽炒熟次下薑稍乾脆次下甘草炒令赤色次下丁香同炒慢火不得焦但紫色為度乘熱入新磁器宻封三日後開研為細末沸湯㸃服仙朮湯辟山嵐瘴氣晨昏宜服之蒼朮九兩米泔浸刮去皮棗去核乾薑各半兩泡杏仁一兩半去皮尖麩皮炒雙仁不用叧研甘草二兩三分炒白鹽六兩炒右為細末沸湯㸃服醒脾湯乾薑三兩白麫五兩炒炒鹽三十五兩甘草二十兩炒杏仁一兩半去皮尖及雙仁者麩皮炒右為細末沸湯㸃服棗湯棗去核一斤生薑五兩切洗甘草三兩炙剉右三味一處拌匀用盆盛貯以布盖罨一宿焙乾為末入鹽少許沸湯㸃服梅蘇湯烏梅一斤去核甘草四兩紫蘇四兩炒鹽六兩炒麫十一兩右為細末沸湯㸃服木瓜湯木瓜半斤甘草五兩檀片茴香各四兩乾薑砂仁各四兩右為細末沸湯㸃服清中湯水薑片半斤甘草四兩檀片少許炒鹽半斤炒麫半斤右為細末沸湯㸃服荔枝湯烏梅肉四兩焙乾乾薑二兩泡甘草二兩官桂半兩叧研鬆沙糖二斤叧研右為細末與沙糖官桂拌匀磁器收貯沸湯㸃服紫雲湯甘草二兩檀香良薑桂枝各三兩砂仁乾薑甘松各二兩右件剉碎以水濃煎去渣多以鹽調和滋味美為度不換金湯炒麫一斤芝麻減半椒皮六錢茴香六錢半炒鹽三兩一處同拌更加酥蜜右為細末沸湯調服不老湯生薑一斤棗一斤青鹽三兩甘草四兩丁香檀香各半錢陳皮三兩右件一處擣爛空心調服又按此方與前須問湯大同小異姑兩存一斤生薑一斤棗三兩青鹽四兩草丁香白檀各半錢三兩陳皮一處擣煎也好㸃也好乆乆服之長不老和合湯砂糖一斤約以水三二盞先燒畧滚沸便下糖滚三兩沸掠去沫舀起烏梅不拘多少打破去核仁湯泡叧置臨用時二件調和酸甜得所為度造化湯肥大烏梅去仁留核甘草炒鹽各等分先以烏梅甘草杵為粗末次下炒鹽拌匀入罐實按宻封收起須臘月或伏中修合半年後方取出焙乾研為細末沸湯調服荔枝膏湯烏梅三十箇肥大者先以湯浸三五次去酸水取肉爛研入砂糖一斤臨時添減與梅同熬得所即止生薑半斤取自然汁加減用桂末半兩入湯内右件熬成膏子看可丸使住火用湯或水調㸃宻封瓶檀香湯以甘草膏子一料用檀香細末三錢腦麝各少許研細入生薑自然汁兩三㸃同研投入膏内㸃時以少許湯化開飲胡椒湯入胡椒末一兩腦麝少許並依前法丁香湯入丁香細末三錢餘依前法以上二方首云入者當本甘草膏而言煎甘草膏子法好粉草一斤慢火上炙黄細剉碎研為粗末以百沸湯五六盆煑以竹杖兒攪成濃汁生絹袋濾過再將甘草滓别用水煎以無味為度併前濾過汁作一處使熱鍋子内先以麻油少許乘熱擦了入甘草汁煎數十沸以鹽一斤将汁就化用紗片濾去鹽滓再熬成膏子如飲相似投入乾瓶内臨時修合每用膏子一料入後項藥大率一斤甘草熬成膏子可分作五料也竹嶼山房雜部卷十三
