body:
  text: 竹嶼山房雜部卷二十明宋詡撰尊生部八辣部辣芥辣芥中研猢猻頭草粒則辣異常一名石龍苪芥辣芥菜子不拘數淨淘入細辛少許白蜜好醋一處同研爛再入淡醋濾去滓極辣麵部虀麵好虀菜去葉只用莖切如豆大勿令太細先起蔥油次下虀頭用爁次下虀汁入鹽醬調和令味美滚數沸以汁澆麵供麵煮熟後溫水度過成團結起放盤中供先滴數滴油在溫水內則麵不結自愛虀細切蔥白生薑香油炒熟好滴醋和糖醬調勻做虀澆冷淘麵供入胡桃松子仁更妙無錫雪花餅揀小麥淘淨篩簸訖以少水潤濕入臼舂去黃皮然後上磨故其麵雪花無比一以豬脂切作骰子塊用少水鍋內熬鎔逐旋舀出未盡者再熬再舀如此則油白若熬久則不白矣以此油和麵為餅面一以好沙糖和麵為餅中餡子右件做成餅子略放草灰在熬盤上以紙隔之置餅在上熯熟為度韭餅帶臕豬肉切作燥子乾炒過生韭切碎椒醬同拌勻幹小薄餅餡兩箇夾熯熟旋供捲煎餅白麵二斤半冷水和成硬劑搙搜極勻旋旋添水調作稀稠得所麵汁量傾在熬盤上以油攤為薄餅餡子用羊肉二斤半脂一斤碎切生薑一兩橘皮一兩片鹽一合蔥油炒右伴拌餡訖炒熟以前攤下薄餅鋪開裝上餡子捲作一條子用麵佳再以浮油煎令焦紅色薑醋汁入擂細胡桃松子仁澆供打餅三日五日尚軟和麵時入鹽蜜各少許在內可留三五日永不硬馬腦糕沙糖三斤半白麵二斤桃肉十兩先用糖一斤半水半盞和麵炒熟次用糖二斤水一盞鎔開入前麵又方木犀花斤半孩茶一斤芽茶三兩豆䓻三錢甘草末三錢辰砂二錢腦麝皆不用右製造如前竹嶼山房雜部卷二十
