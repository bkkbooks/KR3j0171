body:
  text: 竹嶼山房雜部卷一明宋詡撰養生部一茶制産地甚多名者為勝煮茶茶經云一曰茶二曰檟三曰蔎四曰茗五曰荈取壚煉火汲清甘之水注鐺煎之如蟹眼者正熟湯也至魚眼則過熟不堪用矣先以湯洗茶投壺方酌以湯仍以壺隔湯煮其色青黃可就供也然茶多則味濁茶少則味清茶經云茶少湯多則雲腳散湯少茶多則乳面聚滌器不潔而雜以油膩等物皆能敗味或多用茶內小器少沃以湯再隔湯微煮甚濃隨多寡滴入於湯壺巾亦佳蘇子瞻汲水煎茶詩云活水仍須活火烹自臨釣石取深清謝宗可詠茶筅詩云萬縷引風歸蟹眼半瓶飛雪起龍芽按茶品岕第一虎邱二松蘿三伏龍四汲水茶録云水泉不甘能損茶味天下之水揚子江心金山中泠泉為上南零水次之井水又次之茶經云水惡停浸而喜泉源江水為衆水雜井取汲多者一統志云中泠泉在金山寺內江心水謂之南零水歐陽永叔大明水記張又新云劉公伯芻較水又載陸羽為李李卿論水全不合人亦少遇水之所出今各鄉土有井水漸至泄而甘香皆可繘汲之也泄七洽切繘音橘按水品更有堯封第一慧泉第二梅雨最上茶香凡桂花茉莉花片腦香物類惟用輕綃或薄紙苴子魚切納茶中香自裛化潤則紙藉煉火上焙燥而收不宜散和於內混淆其味致茶香不分茶䔲坌房吻切之每茶一壺入匕許甚協茶味之甘美倪雲林云凡有香無毒之花皆可入茶茶果栗肉炒熟者風戾者皆去皮殼胡桃仁鉗去殼湯退去皮榛仁擊去殼湯退去皮松仁擊去殼湯退去皮西瓜子仁槌去殼微焙楊梅核仁槌去核蓮心去殼微焙蓮菂鮮者剖去皮殼乾者水浸去皮薏或煮熟菂音的薏音億烏欖核仁湯退去皮人面核仁椰子剖用肉切橄欖太平廣記曰南威銀石器搗取汁銀杏燒熟去皮殼梧桐子仁剪去殼芡實煮熟鉗剝其肉菱實鮮者去皮殼風戾者煮熟去皮殼茶菜芝麻水浸搗去皮焙燥揚潔湯煮胡荽用頭醃泡萵苣筍乾宜芝麻豆腐乾煮軟宜芝麻胡荽芹白醃宜胡桃仁竹筍豆豉蔞蒿乾宜芝麻木蓼乾宜芝麻香椿芽微芼宜芝麻乾同竹筍鮮者帶籜芼加少鹽筍譜曰脫殼煮則失味鹹乾者宜芝麻同蒿芼宜芝麻乾同雞棕宜胡桃榛松仁龍鬚菜微芼筆管菜微芼扁豆芼熟去皮殼宜芝麻豇豆肥稚者兼殼微芼乾羊角豆稚者兼殼芼熟刀豆老者芼熟去皮殼天茄稚者芼萱用芽跗同少鹽芼跗音附箭幹菜醃胡桃仁宜絲瓜劘去皮同少鹽微芼金雀蘂同少鹽微芼乾胡蘿蔔宜胡桃仁熟栗肉熟蔥白醃胡荽芝麻乳餅熱湯泡刀切鹹以淡酒少漬宜胡荽飲茶清者為上內果菜為次物之甘者忌置於內若荔枝龍眼棗柿之類大不宜投之也其他巴茶枸杞茶等又非此茶之制而論茶録云建安民間試茶皆不入香恐奪其真若烹點之際又雜珍果香草其奪益甚酒制醖法不同各出方土惟不用灰者為佳傳酵酒杜工部詩曰濁醪有妙理信然自七月間先造其麴每小麥細麵二百五十斤則以菉豆三斗煮熟之杏仁二斤去尖擊碎之擷辣蓼枝葉水煎為汁溲前三味不宜過潤置箱中壓實厚盈寸界盈尺每片以稻稈護懸無風處乾醒晝暴夜露足七日收至臘月乃造酒凡白糯米一石計麴二十斤先釋米浸半月或二旬炊浸內一斗米為飯俟寒搗麴十餘斤挹其潘瀾清合橘皮蔥花椒過煎冷泔傳浮醇酒和勻醖為酵停二三時則瀝浸米盡炊飯取寒飯一斗米許者投內候發一二時又取寒飯一斗米許者又投內併其發甚則盡寒飯於缸通和酵及所餘之麴上置無麴飯幾寸遂㵼清水雜其潘瀾髙過三寸為止視近周時酒面水收開裂將杷器探討酒底覺空則通和或漸通停一二時又通一次不過四五次酒味全矣醖已熟釃音師清煎之然醖此酒亦視天時寒宜覆熱不全覆不及俟周時通麴減一二斤或三四斤後醖酒又皆傳此以為酵也麴美遂取不以一例稿人注曰潘瀾浸米水也內酒麴方小麥麵二百斤紅豆蔲一斤藿香一斤香白芷一斤草果仁四兩杏仁斤半俱為末竹葉十斤白蓮花二百朵辣蓼草十斤蒼耳草十斤俱搗糜爛菉豆二斗煮熟加水溲和布苴壓實餅紙封之約繩絡空室中乾醒須六七月造浮酵酒杜工部詩曰鵝兒黃似酒楊廷秀詩曰煮酒赤如血醖若二色者佳臘時用七月中以小麥細麵百斤菉豆一斗煮熟同汁溲為餅懸室中風戾之麴傳酵酒麴內酒麴皆宜凡白糯米一石取二十斤為率釋米注水寬浸內分一斗煮飯平置水米之上半月一旬飯浮即酵也笊盡瀝乾則將所浸米炊飯俟寒搗麴與浮飯勻溲於缸上積無麴飯僅寸挹其潘瀾清㵼至髙三寸已飯底置原酒老糟少許其酒發速視天冷周上下護覆天熱微覆一日後酒發以杷器直探酒底已熱已虛乃開通少頃再通一日數次三四日後其勢漸消緩俟醖熟釃而煎之也無酵酒二制麴米數同前數一以麴多半與先炊飯少半預和片日入餘麴後蒸飯煎潘瀾清并勻於缸為酒一先炊飯即以炊湯釋清并麴溲勻於缸不用水漿至為酒皆俟寒而釀之也凡煎泔宜煎去過半則良雪香酒楊誠齋曰生酒清於雪九月中先造其麴每白糯米粉五升細白小麥麴六斤清水勻和不宜過潤計一升布苴壓實為一餅置乾稻稈中上下鋪覆熱已七日又暴又露皆七日收至臘時凡白糯米一石以麴一劑貯潘瀾一百二十斤少則汲清水足之照浮酵制醖成味甚香烈色清如水麴多味尤重也梔麴酒六七月間造麴用白糯米二升菉豆一升釋之水漬七日每日易水一畨瀝起以小麥麵八斤勻和鋪葦箔上稻稈覆黃俟七日後暴乾臘時每白糯米一石此麴一劑釀酒味美而色清潔傳酵浮酵皆宜金盤露此酒自然香甘故名韓子蒼曰飲慣茅柴諳苦硬不知如蜜有香醪八月間取小麥細麵清水溲勻布苴壓實為麴每斤成一餅綿紙護封約繩懸絡風中戾之臘月凡白糯米一石釋之使潔內遺一斗煮飯平置米上計米一斗水一斗浸於器十五日或連旬飯浮則通瀝起儲其潘瀾於內器外纒護通暖始炊前米為飯先一甑稍待其氣微入於中後一甑必用熟投水溫則宜冷投皆以搗麴浮飯齊下每米一石麴二十斤為中制欲酒性醇麴十五斤止欲酒性烈二十五斤止溲勻餘麴升許藏於飯底覆暖發則漸徹器外纒護發甚則將杷器通一日六七次二日三四次三日一二次酒醖成七日後又炊米一斗或二斗或三斗投入勻和待再發再通其水預在煎計投米一斗水亦一斗麴二斤再七日後又視前投入如不加水酒亦濃厚至月餘酒熟踰四十日醑清煮之也省麴酒先擷辣蓼草注水煎汁溲小麥麵為麴每斤分為四處每處內端午所收大艾莖三寸生薑一兩切片又四分之布苴壓實采楮葉封護懸無風處已乾須暴須露四十九日數足而收七月造臘月釀酒傳酵浮酵皆宜也凡白糯米一石麴五斤凡醖酒傷熱則酸傷冷則甜俱在六物咸備冷熱適調通早通晚停當其初通尚可候而續通不可誤也治酸酒方凡米一石造酒用煉火灰三升勻入少頃醑之其酸皆去禮云兼用六物秫稻必齊麴糵必時湛熾必潔水泉必香陶器必良火齊必得湛音尖熾昌志切凡煮酒入釜煎及少沸速令煬音陽者息火遂貯甕以箬以紙以泥重固須密有貯錫甕中隔湯煮候酒方熱沸即攜起轉貯於瓷甕不得過煮也清酒二制一釀之同傳酵浮酵制惟白糯米一石麴十斤八斤也一取熱湯泡米隨浸一宿至詰旦每石水淋一二斗炊飯傳酵而後盡炊飯溲勻釀酒加木香官桂縮砂仁各一兩勻和飯中味尤香美米一石麴十五斤成酒甚速皆釀於冬碧清酒即縹醪凡白糯米一石為率釋潔取一斗炊飯加麴四兩分盛籮器同浸於九斗米上見飯浮遂悉炊飯麴亦每斗四兩先以甕底置前浸麴飯以後冷飯溲後麴同潘瀾貯甕中厚紙密封數層置僻所俟四十日熟分春酒每白糯米一石釋之炊飯俟寒勻以細麵麴百斤貯甕泥封臘時留至春啓凡一斗取釋米九斗炊飯內麴十斤照常制㵼水釀酒生酒三制即白酒楊廷秀曰煮酒不如生酒烈春秋時先造酒藥擷蝦蟆草或香薷煎汁溲粳米粉捻若栗大之劑不可過潤上下鋪覆以稻稈置之於中五日七日以一丸投水試而即浮者則為輕美暴之露之各以七日用筐收懸於通風中每白糯米一石釋之蒸之視天氣寒暖為節暖則冷寒則溫以水更釋飯清潔入缸坌藥和勻計米一斗天寒則四丸或加小麥麵麴四兩天暖惟三丸按實中開一井徑盈尺直見缸底天暖不宜入水天寒以水少潤井內漿至時天甚熱則用酒壺注涼水納其井中溫則復易不令漿酸大寒則用通護其缸上又覆蓋不令漿甘常以漿潤飯上漿味老烈則通酌起預作熟水令冷量多寡㵼於漿粕中俟三二日釀之酒成則釃起取前所酌起之漿和入復令釀味濃厚以二三器翻澄去其濁者貯之於甕久不傷敗有以糯米一石內取一斗炒熟作沸湯泡俟冷同炒米入於漿中成酒有以糯米一石取粳米一升炒焦黑煎湯俟冷㵼漿中成紅色若煮酒藥亦多制勝者可取元大禧白酒麴方木香沈香各一兩半檀香丁香甘草縮砂仁藿香各五兩槐花白芷零陵香各二兩半白术一兩白蓮花一百朵取鬚研碎甜瓜五十枚去子搗濾取汁用藥俱為末溲小麥麵六十斤糯米粉四十斤甚勻不宜太潤挼無凝滯下箱履七八分厚為七八寸濶每片紙封懸當風處戾之經四十日取晒三兩日收每米一斗麴十兩水八升此麴宜如雪香酒制或别藥致漿量加此麴惟釀於冬月官料酒藥香薷野菊花荼蓼各一斤官桂木蘭皮天花粉巴豆白芷良薑青皮草烏各四兩杏仁甘松撫芎各二兩焙為細末每斤對滑石八兩合和每二升糯米粉五升清水和丸餘如前制挼奴禾切熟酒生水入漿酒成入塢火煨釜煮俱熟投以竹葉酒清醴酒今曰密林檎三制禮注曰再釀為醴漢書注曰三釀為酎酎除又切一用糯米釀生酒漿注臘酒內復釀熟醑之煮一用臘酒清者再注於臘酒內釀熟醑之煮一用糯米釀生酒俟漿老烈每斗注熟水三升復釀一二日醑酒注於甕煮熟俟冷又澄其絶清者和以燒酒二斤蜜一斤停至數年不酮酮酢欲壞也徒董切燒酒用臘酒糟或清酒糟每五斗雜礱榖粳二斗半內甑中以錫鍋密覆煬者舉火聚其氣從口滴下即燒酒也錫鍋上儲以冷水太熱必耗酒遂宜㵼去而復易之視酒薄則止菖蒲酒壽親養老書云通血脈調榮衛主風痺治骨立痿黃醫所不治者服一劑經百日顔色豐足氣力倍常耳目聰明行及奔馬髮白更黑齒落再生晝夜有光延年益壽久服之得與神通用白糯米炊飯醖生酒醅擷蒲搗汁注之有以菖蒲煎水冷注之有屑菖蒲溲煮酒麴飯內成之菖蒲去葉莃蘞酒本草云治濕痺諸風同菖蒲酒制去根蒼耳酒本草云治攣痺濕風寒同菖蒲酒制去根天門冬酒本草云久服輕身益氣延年同菖蒲酒制去皮鬚飲膳正要云搗汁瀘清于銀瓷器慢火熬膏酒調下地黃酒本草云涼血生血補腎水真陰不足㵼脾中濕熱同菖蒲酒制四時纂要地黃酒變白速效方肥地黃切一大斗搗碎糯米五升爛炊麴一大升右三味揉勻內不津器中泥封春夏三七日秋冬五六日日滿有一盞淥液是其精華宜先飲之餘以布絹釃之如稀餳不過三劑髮當如漆若雜以牛膝汁伴炊飯更妙五加皮酒壽親養老書云張子升楊建始王叔才于世彥皆服此酒得壽三百年有子二十人今名野椒同菖蒲酒制片腦酒本草云通九竅除惡氣治心胸先納片腦於甕後煮臘酒注下以紙以箬重幕莫厯切又泥塗封之木香酒壽親養老書以此為荼䕷酒本草云久服不夢寤魘寐輕身致神仙取木香切片甕中先貯沸臘酒甕口蒙以輕縠上置木香綿紙竹箬重羃又泥塗之香自下走白豆蔲仁酒本草云除冷氣和脾胃消榖食同木香酒制用白豆蔲仁粗屑縮砂仁酒本草云下氣消食暖胃溫脾同木香酒制用縮砂仁粗屑蘇合香丸酒墨客揮犀曰宋真宗謂王文正公曰調五藏却諸疾用蘇合香一丸先內於甕後注以沸臘酒其蠟經熱鎔浮酒面香散酒中桂花酒發散滯氣摘半含桂花浸生酒漿中密封用時量多寡滴酒內有酒磨其餅和之有以餅同木香酒制密封之松針酒本草云主風濕瘡生毛髮安五臟守中不飢延年又治三年中風力效采松青針搗糜爛酒薄調每生酒一甕㵼入二碗密封連甕煮熟松節酒本草云主百節久風風虛腳痺疼痛取大松油節銼屑臨釀生酒時同藥勻入每糯米一斗計松節八斤宜釀於冬經春夏則味變萬年酒本草云主補中安五臟養精神除百病久服肥健輕身不老冬至前摘萬年枝子置酒內連甕煮味透或搗汁釀酒或煎汁釀酒或杵屑釀於酒長春酒賈似道曰除濕實脾去痰飲行滯氣滋血脈壯筯骨寬中快膈進飲食當歸川芎半夏湯泡七次青皮去囊木瓜去穰白芍藥黃茋蜜炙五味子碾肉桂去粗皮甘草炙熟地黃白茯苓去皮薏苡仁炙白豆蔲仁碾檳榔白术蒼朮薑制人參橘紅厚朴薑汁炒沈香木香南香藿香去土丁香神麴炒麥糵炒碾去粳枇杷葉去毛炙草果仁桑白皮蜜炙杜仲炒去絲石斛去根右件各銼碎每以藥三錢為絹囊盛之浸於一斗酒內春七日夏三日秋五日冬十日用今有五香藥燒酒藥品不及此藥之妙胡桃燒酒暖腰膝治沈寒痼冷補捐益虛燒酒四十斤胡桃仁湯退皮一百枚紅棗子二百枚煉熟蜜四斤右三件入酒瘞倚厲切土中七日去火毒杏仁燒酒去百病除咳嗽補虛眀目除隔氣添顔色增壽活血去諸風杏仁去皮尖煮五水過一斤艾三兩芝麻去皮炒熟為末一升荆芥穗一兩核桃仁湯退去皮一斤薄荷葉三兩小茴香三兩蒼朮米泔浸一宿洗去黑皮一兩白茯苓去皮三兩銅錢五文别入右件為細末煉蜜和一處投大瓷甕中注燒酒三十斤同煮一時待藥已散用紙封口瘞土中七日取出長生酒用細花燒酒二十斤同清水二十斤分析兩甕每甕釋白糯米一升炊飯紅棗子半斤釀之夏置涼所冬置溫所天寒護暖夏二十一日冬二十八日自熟更每甕計每斤如前注水并棗飯置內俟日足亦如前分釀源源不絶也臘酒糟鄭氏曰醫酏不泲者也酏音移蔑箄甕底乾疊之稻稈灰覆上􅅹其油入食佳醅子糟釀生酒漿方至時即以瓿子貯其醅有加紅麴者有加少炒鹽者凡米一斗計鹽八兩醬制史記醢醬千瓿比千乘之家小麥生醬周禮以醯醢謂醬品物非一不若今人之造醬也蓋豉者配鹽幽菽豉乾而醬濕疑後世造豉之變者歟四月小麥細麴一石為率煮黃豆三斗去汁以麵染勻不宜太潤幽暖室薄鋪葦箔上采楮葉覆黃移烈日中暴須甚燥碎擊於缸計黃一斤鹽四兩通和擷紫蘇煎湯待冷注之日暴三月後方熟湯少續湯淡續鹽計黃十斤鹽三斤止貯之甕中泥紙密封其口置天日間勝如開暴者久則愈佳有自十月間幽黃至臘時取井水煎紫蘇湯冷注之此御厨制也後凡幽黃不宜太潤湯用紫蘇煎湯待冷一云熟豆一斗細麵二斗後倣此小麥醬油黃豆一石赤豆三斗煮熟去汁染小麥麵二百餘斤幽室中為黃暴燥每黃五斤鹽二斤紫蘇湯十斤通勻於缸日暴成油挹取清渌者别貯甕中暴之其味尚厚煎鹽湯俟冷續注之再挹取也餘豆麵暴為醬小麥生熟醬凡小麥一石以五斗磨帶麩麵以五斗煮熟去汁煮豆和于一處幽黃暴燥以水和潤泥封復幽甕中暴三七日通磨篩取細者每十斤鹽三斤同紫蘇湯十三斤烈日中暴之不數日醬熟有用其篩出麩亦復幽甕泥封漸取注鹽水暴熟以漬物諺曰黃十鹽三水十三麥餅熟醬小麥細麵用水和堅餅任意切為大片籠中蒸熟幽黃暴燥復磨篩細每十斤鹽三斤注紫蘇湯暴之不過五日七日已成美醬二麥熟醬二麥炒熟磨為麵用河水和之幽黃暴燥復磨麵復用河水潤覆鹽一層幽甕中封密置日暴浹旬覺有香氣發露計黃鹽數作湯冷注暴為醬二麥大麥小麥也用大豆煮熟同溲幽黃甚佳豆麥熟醬大豆炒熟磨細計一斗和小麥細麵二斗湯和切為片蒸熟幽為黃暴甚燥每十斤鹽三斤注紫蘇湯日暴之遂成熟醬豌豆醬豌豆水浸煮熟暴燥磨去皮計一斗同小麥一斗再磨為麵水和切片蒸之幽黃暴燥凡十斤鹽三斤注水復暴為醬麻莘醬用新麻莘車坊中方出芝麻油餅碎搗甑中復蒸透以小麥麵和之幽為黃暴燥計十斤鹽三斤注水於日中復暴為醬逡巡醬每以大豆一斗為率餳糖四兩加減隨宜鹽一斤可留十日二斤可留一月三斤可留久逺注水滿鍋置甑於上甑底以編蒲等箄音閉之鍋口圍密甑心立通節竹一根下抵鍋底上平甑口别以蘆一根貫竹中與之一齊先將豆湛潔浸過一宿貯甑中密蓋蒸用竹中蘆緝視水痕稍乾即注水竹內續上直候甑靣上豆黑為度務須過熟即出鋪冷置臼中搗糜爛乃入餳鹽勻和遂堪取用醬靣以鵝翎染熟油刷之尤香潤也醋制社醋一名醯一名苦酒三制元臨安路産酸角浸水和羮酸美過於法醋一春秋社時無論米粳糯釋米蒸飯每米一斗麴二斤用礱榖粳通和於缸中立大篘㵼水髙及三寸俟二七日視醋漸成味過四十日煎而貯甕一六月六日造小麥麴候八月社前二三日先以糯粞煮粥縻勻塗缸上社日用糯米蒸飯入之於缸每米一斗用麴三斤和之缸底內熱飯一團㵼水髙三寸止中則立篘醋成從篘中汲用竭則復繼以水淡則方已一六月六日磨小麥麩麵河水通勻每一升履麴一餅紙封風中戾之至秋社前一日粳糯米各一斗釋之漬之正社日炊飯俟冷每米一斗麴一餅細搗勻於內同水一斗五升入甕密封紙三十層日揭一層一月醋成篘起復作沸湯俟冷量加以麴釀二醋三醋四醋依二醋釀粳宜淘潔朗乾後倣此臘醋二制一釀如社醋米一斗用麴三斤四斤置暖所缸宜厚護熱漸徹去俟四十日醋熟煎時加炒熟米一用酒糟一百斤勻礱榖粳五斗按實器中見熱而香酸每日翻過一器不令太熱四五日後冷定醋成以鹽水調泥封固數年不敗用時漸取加水滴出其醋煎收伏醋方言七醋釀之其數皆七凡白米一石無論粳糯於五月內預釋之注水漬之必足七日更宜每日易水蒸飯乘溫幽於甕有鋪葦箔間麥䅌音涓覆黃臨六月六日旦暴至暮計黃一斗水二斗均分於甕頓僻靜處上裂越布冪口不復視動俟七七日已足篘起煎熟加花椒貯瓶罌中色甚鮮紅七月八月可造數尤以七有不暴黃常然紅烙音落鐵調一畨味亦美色不甚鮮四時醋每糙糯米一石釋之夏秋淅半日春冬淅一日蒸飯俟溫勻酒糟五斤麴二十斤同水貯於甕以越布冪甕口春冬置暖所夏秋置涼所有十日熟有十四日熟四時皆可造篘清加花椒甘草同煎貯藏於器復內水在糟造二醋三醋四醋味淡則止長生醋二制一五六月用大麥五斗磨細發為麴復搗細以良薑三兩胡椒三兩水一擔同內甕中封固日暴成醋每取醋三升却還水三升更內薑椒少許一擷辣蓼草煎湯瀘潔入米煮半熟漉之待溫每米一斗麴五兩勻內於器取原湯冷注之比米髙一尺置僻處越布冪器口至十日見白醭音朴消醋已成熟每取一升還酒一升用之不能盡須臾醋每麥麩二斗清酒糟七斤半陳米三合煮為飦記言切粥先以麩糟勻之次以飦粥勻之不宜過潤用蒲簍郎斗切盛貯厚疊稻稈深藏於中頻候大熱再翻再藏翻過二宿醋醅成矣未熟更炊陳米熱飯一碗團置麩糟內或入甑蒸熱為助既熟將小缸一口從底側通一小隙取衣袽女居切塞密置蒲簍於缸作沸湯沃一宿去衣袽取滴其醋神仙醋四五月候釋米粞一斗為率用蒲簍苴懸西南垂堂之上向東出日俟四十九日置瓶甕中大擊麴片四兩注水漬之已七日然帶火薪頭旋轉一畨成醋則止取醋一碗納水一碗味淡不復釀也棗子醋每鮮棗子百枚蒸生酒藥五丸為率注薄酒漬投之常置暖處醋成如取一碗則還酒一碗久則醋益香酸炒麥醋陳米一斗或糯米水漬一宿炊飯稍溫取麴二十兩細搗火焙勻飯內入甕中注水三斗按平用紙二三層密封甕口勿見風向南方安候四十九日開將小麥二升炒焦投甕中少頃取醋置鍋內煎沸入瓶上用炒麥一撮醋久不䤔昨冉切䣸而琰切既取頭醋再㵼水一斗半釀第二醋旬日可取食之既取二醋又㵼水七升半釀第三醋更數日取食之既取三醋再欲食須炒焦麥半升許入甕中搭色猶可取第四醋味尚如市口賣者妙不可言䤔䣸味薄也大麥醋取大麥釋之炊飯俟冷每斗搜白酒藥三丸入甕中越布羃甕口七日注以水一斗又七日已熟則篘起煎收再入水五升為二醋俟熟又入水三升為三醋八月可造小麥麩醋凡釀醋時用料一石二斗為率小麥麩一石白粳米二斗先以小麥麩五斗水和停勻不宜過潤納甑中蒸至甚熟布葦箔上髙厚幾一寸擷蒼耳葉履於密室中至七日已幽為黃則碎擊之後以小麥麩五斗視前和蒸乘時煮米二斗為飯與前後所蒸麥麩齊乘熱和納於大甕中手按平實中開一穴立之以篘每料一斗計從篘口注水一斗甕口用背三四層厚綿紙羃固暴於日中過十四日啓視醋成則釃清㵼於鍋煎沸盡挹去其浮沫隨然紅烙鐵復於醋中調轉數次量注之以香油加之以炒鹽再煎二三沸熱貯於甕甕口用紙箬緊羃紙箬上又用柴灰覆厚藏久益釅而香若十四日醋尚未成則再封俟至二十一日須自六月中乘天日烈燥易暴醋熟而釀之也糖醋二制一用餳即飴或白糖即厚餳每五斤宜清水十五斤細麴四兩麥蘖二兩同貯於甕中釀已七日則以栁幹燃紅一頭置醋中旋轉一畨再七日皆依上旋轉之至醋成為度五月至九月皆可釀也一每餳五十斤用水一百斤煮糯米飯一斤四兩細麴十兩貯於甕冬天頓於和暖之處夏天頓於陰涼之處俟至四十日醋熟香酸入鍋煎之注瓶罌內收酒醋三制一摘糯稻穟用水煮其榖折裂俟溫以生酒藥和勻置于竹器中覆黃七日移置小甕中注薄酒漬沒之頓於竈側俟六七日已酸而香則又移置大器中頓於涼所漸注以薄酒汲而用焉不酸則已一以粳米鐺底飯入甕中注薄酒浸頓暖處遂能成醋一以煮酒糟重入水中泲其味出又泲之至有三次計有五擔加以麩麴二十斤粳米飯三斗壓沒水底器外用纒護須密視寒暖漸撤之春初釀俟五月五日或六月六日乃篘煎之也竹嶼山房雜部卷一
