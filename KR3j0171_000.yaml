body:
  text: 竹嶼山房雜部雜家類四雜品之屬提要臣等謹案竹嶼山房雜部三十二卷是書凡養生部六卷燕間部二卷樹畜部四卷皆明華亭宋詡撰種植部十卷尊生部十卷詡子公望撰公望之子懋澄合而編之詡字久夫公望字天民皆見于書中其始末則未詳焉考千頃堂書目載是書凡二十七卷前集樹畜部四卷養生部六卷家要二卷宗儀二卷家規四卷後集種植一卷尊生一卷此本蓋不完之書然此書以農圃之言兼玩好之其與家要家規宗儀同為一帙實屬不倫疑其後析而别行而此五部以類相聚自為一編則亦不可謂非全帙也至種植養生二部實各十卷與黃氏所云各一卷者不合且以黃氏所載卷數計之與二十七卷之數又自不相合則黃氏所云亦不足據以定此書之完缺矣其書于田居雜事最為詳悉而亦間附考證如養生部鰣魚條引爾雅鯦當魱以證之鄭樵注謂鯦即魱魱即縮項鯿郭璞注謂鯦似鯿而小則非鯿可知鄭注似誤此書取張萱彚雅之説舍鄭從郭以鯦為鰣所解甚確則猶讀書考古者所為非僅山人墨客語也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:5f3675e14ffc9a9098210b04965267d09799f587eee4b821591432d21c37830e
