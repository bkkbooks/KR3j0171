body:
  text: 竹嶼山房雜部卷十七明宋詡撰尊生部五醬部伏醬三伏中黃豆一石曬乾篩淨磨去殼沸湯泡浸令漲上甑蒸熟糜爛為度去熱氣逐旋拌勻白麵七十五斤官稱攤蘆席上約厚二寸許候三五日黃衣上翻轉再攤窨三五日以手挼碎用鹽五十斤或六十斤約量用和鹽并醬黃下缸以手臂直到缸砥抄拌極勻有小塊即捻碎有草根即捻出候水將冷即以鹽糝缸面但擇晴日侵早便下缸寧可水少日後添入冷鹽湯然不可添多如太淡增鹽亦救不得凡醬黃攤輕則不黃重則黑爛且臭矣倘下缸後便遇雨天則以小杖撑起缸蓋微放縫出氣仍以炒鹽停冷糝在醬面凡下缸後曬一過晴便打轉蓋初下缸時打尚未勻全在這遍打勻使鹽水與豆相入又拔出熱氣此最緊要自後約曬三五日一打蓋初下缸醬黃浸不透皆漲起在上鹽水皆在下上面鹽力少若經六七日不打必致生蛆也倘下醬或水多鹽少上清下矴急逼出入鍋內煎去三之二留下待曬醬乾逐旋侵入麵醬白麵二十斤一云不拘多少冷水搜作硬劑切作一指厚蒸籠蒸熟取出攤三時許候乾以楮葉蒼耳葉麥幹盫蓋到黃衣上勻為度去蓋葉畨轉到次日曬乾刷去黃衣搗碎每四斤用鹽一斤水四斤拌勻入缸一用貫衆煎湯泡鹽水下日曬夜蓋到四十九日極熟甜美治醬蛆每醬一甕用草烏頭五七箇每箇切作四半插在甕四邊及中心其蛆自死亦不再生或加百部尤妙熟醬油錫器置擂碎麵醬於中為窩注油重湯頓熟逡巡醬每以豆一官斗為率入餳糖四兩重加減隨宜此大法也鹽一斤可留十日二斤可留一月三斤可留久逺在人取用其法木甑砥井口水上編蒲葦之類藉之或舊蒲蔞亦好先著水滿鍋置甑於上鍋口周圍用物擁蔽不令去氣甑中心立竹一根下扺鍋砥上平甑口其竹蓋通節者以蘆一根從筒內插入亦至鍋砥取出看蘆水痕深淺以此為候將豆淘淨隔宿浸裝甑中密蓋蒸之覺鍋中水漸乾用前蘆緝看如比先痕稍乾即以注子注水入筒內添之直候甑面上豆黑則連砥熟矣未黑再蒸須黑為度但不可動甑而揭蓋增水則不妨謂之一氣熟取出攤冷石臼內舂爛入餳鹽拌和勻便可食用若要出賣臨時以鵝翎蘸熟油刷而尤香潤可愛此法甚可養生有一人以銀十兩傳得以傳胡公公與豫相厚善遂傳之勾醬每醬一斤用麻油新打下麻餅搗碎篩過用十二兩鹽二兩水二兩攪勻用造醬二伏中不拘黃黑豆揀淨水浸一宿漉出煮爛用白麵拌勻攤蘆席上用楮葉蓋一日發熱二日作黃衣三日後翻轉曬乾黃子一片用鹽四兩為率井水下水髙黃子一拳曬須不犯生水熟黃醬方不拘黃黑豆亦不拘多少揀淨炒熟取出磨成細末每豆細末一斗麵三斗入湯和勻切作片子蒸熟攤在蘆席上用麥幹蒼耳葉盫待有黃衣烈日曬令極乾一斤黃子入鹽四兩井花水投下去黃子一拳髙烈日曬之生黃醬方三伏中不拘黃黑豆揀淨水浸一宿漉出入鍋煮令熟爛取出攤令極冷多用白麵拌勻攤在蘆席上用麥幹蒼耳葉盫一日發熱一日作黃衣三日後翻轉烈日曬愈好稱黃子一斤用鹽四兩為率汲井花水下水髙黃子一拳曬不犯生水麵多好醬黃曬多好醬味小豆醬方不拘多少揀淨磨碎簸去皮再磨細浸半日榨乾擦去皮水淘淨控乾麵熟捻作團子盫蓋候月方發過用大眼籃懸掛透風處至來年二月中旬用布擦去白醭搗碎再磨每細麴二十斤用鹽六斤四兩以臘水化開遇火日侵晨下兩月可食菀豆醬方不拘多少水浸蒸軟曬乾去皮每淨豆黃一斗小麥一斗同磨作麵水和硬劑切作片蒸熟覆盫蓋黃衣上曬乾依造麵醬法用鹽水下榆仁醬方不拘多少淘淨浸一伏時搓洗去浮皮再以布袋盛於寬水中揉去涎控乾與蓼汁同曬乾再以蓼汁拌之每用榆仁一升發過麵麴四斤鹽一斤如法製之大麥醬方黑豆瓣淨者五斗炒熟水浸半日再入鍋用浸豆水煮令爛傾出伺冷以大麥麵百斤拌令勻以篩下麵用煮豆汁和搜作劑切作大片上甑蒸熟傾出攤冷以楮葉盫蓋候黃衣上汗乾再曬搗碎揀丁日或火日下之每斗黃子用鹽二斤井花水八升化鹽水入缸造醬法凡造醬先以鹽淘淨去泥滓垃圾醬自佳先以缸盛水次以筲箕盛鹽於水中攪漉好鹽自隔箕兒下垃圾石土糞草之類皆留箕中須臾缸面又有一層黑泥末以搭羅掠之去盡缸中皆淨鹹水鹽如雪白澄於缸砥别以器盛起然後下醬先用水逐旋入白鹽多留些蓋面上和訖以時蘿撒醬面上復以翎蘸好香油抹醬面及缸竹嶼山房雜部卷十七
